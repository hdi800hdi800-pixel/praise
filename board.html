<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>업무 현황판</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#EBEEF3; --surface:#FFFFFF; --surface-2:#F5F7FA;
    --ink:#18222E; --muted:#6B7787; --line:#E3E8EF;
    --primary:#2D63B4; --primary-deep:#1E4880;
    --green:#1F9D55; --amber:#DD8311; --red:#D54848; --gray:#A0ABB7;
    --shadow:0 1px 2px rgba(20,35,55,.06),0 6px 20px rgba(20,35,55,.05);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:88px;
  }
  .wrap{max-width:640px;margin:0 auto}

  /* Header */
  header{
    background:linear-gradient(135deg,#22456F 0%,#2D63B4 100%);
    color:#fff; padding:18px 18px 14px;
    position:sticky; top:0; z-index:40;
    box-shadow:0 4px 18px rgba(30,72,128,.18);
  }
  .head-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;min-width:0}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:#7FE6C0;box-shadow:0 0 0 4px rgba(127,230,192,.22);flex:none}
  .brand h1{font-size:18px;font-weight:800;margin:0;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .me-btn{
    display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.28); color:#fff; font-weight:700;
    padding:7px 12px;border-radius:999px;font-size:13.5px;cursor:pointer;flex:none;
    font-family:inherit;
  }
  .me-btn .av{width:20px;height:20px;border-radius:50%;background:#fff;color:var(--primary-deep);
    display:grid;place-items:center;font-size:11px;font-weight:800}
  .subline{margin-top:8px;font-size:12.5px;color:rgba(255,255,255,.78);font-weight:500}

  /* Filters */
  .filters{display:flex;gap:8px;padding:12px 14px 4px;overflow-x:auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex:none;border:1px solid var(--line);background:var(--surface);color:var(--muted);
    font-weight:700;font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer;
    font-family:inherit;transition:.15s;display:flex;align-items:center;gap:6px;
  }
  .chip .cnt{font-size:11px;background:var(--surface-2);color:var(--muted);padding:1px 7px;border-radius:999px}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .chip.on .cnt{background:rgba(255,255,255,.22);color:#fff}

  /* List */
  main{padding:8px 14px 20px}
  .empty{
    text-align:center;color:var(--muted);padding:64px 24px;
  }
  .empty .big{font-size:40px;margin-bottom:10px}
  .empty p{margin:4px 0;font-size:14px}

  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;
  }
  .card-main{padding:15px 15px 13px;cursor:pointer}
  .row1{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .type-badge{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:7px;letter-spacing:-.2px}
  .t-meeting{background:#E7F0FB;color:#2D63B4}
  .t-report{background:#EAF6EE;color:#1F9D55}
  .t-directive{background:#FBF0E2;color:#C5780E}
  .t-custom{background:#EEF0F3;color:#5B6675}
  .dday{margin-left:auto;font-size:12px;font-weight:800;padding:3px 9px;border-radius:7px;background:var(--surface-2);color:var(--muted)}
  .dday.warn{background:#FCEDE8;color:var(--red)}
  .dday.soon{background:#FBF3E2;color:#C5780E}
  .title{font-size:16px;font-weight:800;letter-spacing:-.3px;margin:0 0 2px}
  .desc{font-size:13px;color:var(--muted);margin:0 0 12px;white-space:pre-wrap;word-break:break-word}

  /* Signature: response ribbon */
  .ribbon{display:flex;gap:3px;height:8px;border-radius:999px;overflow:hidden;background:#EDF1F6}
  .ribbon i{flex:1;display:block;background:#DCE3EC;border-radius:2px;min-width:3px}
  .seg-green{background:var(--green)!important}
  .seg-amber{background:var(--amber)!important}
  .seg-red{background:var(--red)!important}
  .seg-gray{background:#C4CDD8!important}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .resp-count{font-size:12.5px;color:var(--muted);font-weight:600}
  .resp-count b{color:var(--ink);font-weight:800}
  .mystatus{font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:5px}
  .mystatus .pill{padding:3px 10px;border-radius:999px}
  .pill-need{background:#FCEDE8;color:var(--red)}
  .pill-green{background:#EAF6EE;color:var(--green)}
  .pill-amber{background:#FBF3E2;color:#C5780E}
  .pill-red{background:#FCEDE8;color:var(--red)}
  .pill-gray{background:#EEF0F3;color:#5B6675}

  /* Expand */
  .detail{border-top:1px solid var(--line);padding:14px 15px;background:var(--surface-2);display:none}
  .detail.open{display:block}
  .sec-label{font-size:11.5px;font-weight:800;color:var(--muted);text-transform:none;margin:0 0 8px;letter-spacing:.2px}
  .opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .opt{flex:1;min-width:84px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);
    font-family:inherit;font-weight:800;font-size:13.5px;padding:11px 8px;border-radius:11px;cursor:pointer;transition:.12s}
  .opt[data-tone=green].on{background:var(--green);border-color:var(--green);color:#fff}
  .opt[data-tone=amber].on{background:var(--amber);border-color:var(--amber);color:#fff}
  .opt[data-tone=red].on{background:var(--red);border-color:var(--red);color:#fff}
  .opt[data-tone=gray].on{background:#6B7787;border-color:#6B7787;color:#fff}

  .members{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .mtag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted);display:flex;align-items:center;gap:5px}
  .mtag .d{width:7px;height:7px;border-radius:50%;background:var(--gray)}
  .mtag.green{border-color:#BDE6CC;color:#157D42;background:#F2FAF5}.mtag.green .d{background:var(--green)}
  .mtag.amber{border-color:#F2DCB4;color:#A9650A;background:#FDF8EF}.mtag.amber .d{background:var(--amber)}
  .mtag.red{border-color:#F1C9C9;color:#B83A3A;background:#FDF4F4}.mtag.red .d{background:var(--red)}
  .mtag.me{box-shadow:0 0 0 2px rgba(45,99,180,.18)}
  .del-item{margin-top:14px;width:100%;background:none;border:1px solid var(--line);color:var(--muted);
    font-family:inherit;font-weight:700;font-size:12.5px;padding:9px;border-radius:10px;cursor:pointer}

  /* FAB */
  .fab{
    position:fixed;left:50%;transform:translateX(-50%);bottom:22px;z-index:45;
    background:var(--primary);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:15px;
    padding:14px 24px;border-radius:999px;box-shadow:0 8px 24px rgba(45,99,180,.4);cursor:pointer;
    display:flex;align-items:center;gap:8px;
  }
  .fab:active{transform:translateX(-50%) scale(.97)}

  /* Modal */
  .ov{position:fixed;inset:0;background:rgba(20,30,45,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .ov.open{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:640px;border-radius:22px 22px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));animation:up .22s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h2{margin:0 0 16px;font-size:18px;font-weight:800;letter-spacing:-.3px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:7px}
  .field input,.field textarea,.field select{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;
    background:var(--surface-2);color:var(--ink);outline:none;transition:.12s
  }
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary);background:#fff}
  .field textarea{resize:vertical;min-height:64px}
  .type-pick{display:flex;gap:8px;flex-wrap:wrap}
  .type-pick button{flex:1;min-width:120px;border:1.5px solid var(--line);background:var(--surface-2);color:var(--muted);
    font-family:inherit;font-weight:800;font-size:13.5px;padding:12px 8px;border-radius:12px;cursor:pointer}
  .type-pick button.on{border-color:var(--primary);background:#E7F0FB;color:var(--primary-deep)}
  .type-pick .opts-preview{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-top:3px}
  .type-pick button.on .opts-preview{color:var(--primary)}
  .sheet-actions{display:flex;gap:10px;margin-top:6px}
  .btn{flex:1;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:14px;border-radius:13px;cursor:pointer}
  .btn-ghost{background:var(--surface-2);color:var(--muted)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:disabled{opacity:.45}
  .name-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .name-list button{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);font-family:inherit;
    font-weight:700;font-size:13px;padding:8px 13px;border-radius:999px;cursor:pointer}
  .hint{font-size:12px;color:var(--muted);margin-top:-4px;margin-bottom:14px}

  /* Setup banner */
  .setup{margin:14px;padding:16px;background:#FFF7E8;border:1px solid #F2DCA8;border-radius:14px;color:#8A6418;font-size:13px;line-height:1.6}
  .setup b{color:#6B4D12}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:#18222E;color:#fff;
    padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-top">
      <div class="brand"><span class="dot"></span><h1>업무 현황판</h1></div>
      <button class="me-btn" id="meBtn"><span class="av" id="meAv">?</span><span id="meName">이름 설정</span></button>
    </div>
    <div class="subline" id="subline">함께 확인하는 진행 상황 · 실시간 공유</div>
  </header>

  <div id="setupBanner"></div>

  <nav class="filters" id="filters">
    <button class="chip on" data-f="all">전체 <span class="cnt" id="c-all">0</span></button>
    <button class="chip" data-f="mine">내 응답 필요 <span class="cnt" id="c-mine">0</span></button>
    <button class="chip" data-f="urgent">마감 임박 <span class="cnt" id="c-urgent">0</span></button>
  </nav>

  <main id="list"></main>
</div>

<button class="fab" id="addFab">＋ 새 안건</button>

<!-- 이름 설정 -->
<div class="ov" id="nameOv">
  <div class="sheet">
    <h2>내 이름 설정</h2>
    <div class="field">
      <label>이름</label>
      <input id="nameInput" placeholder="예: 홍길동" maxlength="20" autocomplete="off" />
    </div>
    <p class="hint">현황판에서 나를 구분하는 이름입니다. 이 기기에 저장됩니다.</p>
    <div id="existingNames"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="nameCancel">취소</button>
      <button class="btn btn-primary" id="nameSave" disabled>저장</button>
    </div>
  </div>
</div>

<!-- 안건 추가 -->
<div class="ov" id="addOv">
  <div class="sheet">
    <h2>새 안건 등록</h2>
    <div class="field">
      <label>유형</label>
      <div class="type-pick" id="typePick">
        <button data-type="meeting" class="on">회의 참석 확인<span class="opts-preview">참석 · 불참 · 미정</span></button>
        <button data-type="report">보고서 제출<span class="opts-preview">제출완료 · 작성중 · 미제출</span></button>
        <button data-type="directive">지시사항 진행<span class="opts-preview">완료 · 진행중 · 시작전</span></button>
        <button data-type="custom">기타<span class="opts-preview">완료 · 진행중 · 대기</span></button>
      </div>
    </div>
    <div class="field">
      <label>안건 제목</label>
      <input id="itemTitle" placeholder="예: 7월 1일 정기회의 참석 여부" maxlength="80" autocomplete="off" />
    </div>
    <div class="field">
      <label>마감일 <span style="font-weight:600;color:var(--muted)">(선택)</span></label>
      <input id="itemDue" type="date" />
    </div>
    <div class="field">
      <label>설명 <span style="font-weight:600;color:var(--muted)">(선택)</span></label>
      <textarea id="itemDesc" placeholder="장소, 양식, 참고사항 등" maxlength="500"></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="addCancel">취소</button>
      <button class="btn btn-primary" id="addSave" disabled>등록</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ============================================================
   ① Firebase 설정 — 여기만 본인 프로젝트 값으로 바꾸면 됩니다.
   stckvote 등 기존 프로젝트의 firebaseConfig를 그대로 붙여넣으면
   바로 동작합니다. databaseURL이 반드시 있어야 합니다.
   (Realtime Database 규칙: read/write = true 로 설정)
   ============================================================ */
const firebaseConfig = {
  apiKey: "여기에_API_KEY",
  authDomain: "여기에_PROJECT.firebaseapp.com",
  databaseURL: "https://여기에_PROJECT-default-rtdb.firebaseio.com",
  projectId: "여기에_PROJECT_ID",
  storageBucket: "여기에_PROJECT.appspot.com",
  messagingSenderId: "여기에_SENDER_ID",
  appId: "여기에_APP_ID"
};
const ROOT = "collabBoard"; // 데이터가 저장될 최상위 노드 (다른 앱과 안 겹치게)

/* ---- 유형별 상태 옵션 ---- */
const TYPES = {
  meeting:   {label:"회의 참석", cls:"t-meeting",   opts:[{k:"참석",t:"green"},{k:"불참",t:"red"},{k:"미정",t:"amber"}]},
  report:    {label:"보고서 제출",cls:"t-report",    opts:[{k:"제출완료",t:"green"},{k:"작성중",t:"amber"},{k:"미제출",t:"red"}]},
  directive: {label:"지시사항 진행",cls:"t-directive",opts:[{k:"완료",t:"green"},{k:"진행중",t:"amber"},{k:"시작전",t:"gray"}]},
  custom:    {label:"기타",      cls:"t-custom",    opts:[{k:"완료",t:"green"},{k:"진행중",t:"amber"},{k:"대기",t:"gray"}]},
};

let db=null, ready=false;
let members={}, items={}, responses={};
let myId=localStorage.getItem("board_member_id")||null;
let myName=localStorage.getItem("board_member_name")||null;
let filter="all", openItemId=null, pickedType="meeting";

const $=s=>document.querySelector(s);
const esc=s=>String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}

/* ---- 초기화 ---- */
function init(){
  const ok = firebaseConfig.databaseURL && !firebaseConfig.databaseURL.includes("여기에");
  if(!ok){ showSetup(); }
  else{
    try{
      firebase.initializeApp(firebaseConfig);
      db=firebase.database();
      ready=true;
      db.ref(ROOT+"/members").on("value",s=>{members=s.val()||{};refreshMe();render();});
      db.ref(ROOT+"/items").on("value",s=>{items=s.val()||{};render();});
      db.ref(ROOT+"/responses").on("value",s=>{responses=s.val()||{};render();});
    }catch(e){ showSetup(); }
  }
  bind();
  refreshMe();
  if(ready && !myId) openName();
}
function showSetup(){
  $("#setupBanner").innerHTML=
    '<div class="setup"><b>⚙ 설정이 필요합니다.</b><br>이 파일을 열어 상단 <b>firebaseConfig</b> 부분에 본인 Firebase 프로젝트 값(특히 <b>databaseURL</b>)을 입력하면 20명이 실시간으로 공유합니다. 기존 stckvote 설정을 그대로 붙여넣으셔도 됩니다.</div>';
}

/* ---- 내 정보 ---- */
function refreshMe(){
  if(myId && members[myId]) myName=members[myId].name;
  $("#meName").textContent=myName||"이름 설정";
  $("#meAv").textContent=myName?myName.trim().slice(0,1):"?";
  $("#subline").textContent = members&&Object.keys(members).length
    ? "멤버 "+Object.keys(members).length+"명 · 함께 확인하는 진행 상황"
    : "함께 확인하는 진행 상황 · 실시간 공유";
}

/* ---- 렌더 ---- */
function dday(due){
  if(!due) return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due+"T00:00:00");
  return Math.round((d-today)/86400000);
}
function render(){
  const memList=Object.entries(members);
  const total=memList.length;
  const all=Object.entries(items).map(([id,it])=>({id,...it}));

  // 카운트
  const mineCount=all.filter(o=>myId && !(responses[o.id]&&responses[o.id][myId])).length;
  const urgentCount=all.filter(o=>{const dd=dday(o.due);return dd!==null&&dd<=3;}).length;
  $("#c-all").textContent=all.length;
  $("#c-mine").textContent=mineCount;
  $("#c-urgent").textContent=urgentCount;

  let arr=all;
  if(filter==="mine") arr=all.filter(o=>myId && !(responses[o.id]&&responses[o.id][myId]));
  if(filter==="urgent") arr=all.filter(o=>{const dd=dday(o.due);return dd!==null&&dd<=3;});

  arr.sort((a,b)=>{
    const da=a.due?dday(a.due):9e9, dbb=b.due?dday(b.due):9e9;
    if(da!==dbb) return da-dbb;
    return (b.createdAt||0)-(a.createdAt||0);
  });

  const L=$("#list");
  if(!all.length){
    L.innerHTML='<div class="empty"><div class="big">🗂️</div><p><b>아직 등록된 안건이 없어요.</b></p><p>아래 <b>＋ 새 안건</b>으로 회의 참석·보고서·지시사항을 등록해 보세요.</p></div>';
    return;
  }
  if(!arr.length){
    L.innerHTML='<div class="empty"><div class="big">✅</div><p>'+(filter==="mine"?"응답할 안건이 없어요. 모두 확인하셨네요!":"해당하는 안건이 없어요.")+'</p></div>';
    return;
  }

  L.innerHTML=arr.map(o=>{
    const T=TYPES[o.type]||TYPES.custom;
    const resp=responses[o.id]||{};
    const toneOf=k=>{const f=T.opts.find(x=>x.k===k);return f?f.t:"gray";};
    // ribbon: 멤버 수만큼 세그먼트
    const segs=memList.map(([mid])=>{
      const r=resp[mid];
      return '<i class="seg-'+(r?toneOf(r.status):"")+'"></i>';
    }).join("")||'<i></i>';
    const answered=memList.filter(([mid])=>resp[mid]).length;
    const dd=dday(o.due);
    let ddHtml="";
    if(dd!==null){
      const cls=dd<0?"warn":dd<=3?"soon":"";
      const txt=dd<0?"D+"+(-dd):dd===0?"D-DAY":"D-"+dd;
      ddHtml='<span class="dday '+cls+'">'+txt+'</span>';
    }
    // 내 상태
    const mine=myId&&resp[myId]?resp[myId].status:null;
    let myHtml;
    if(!myId) myHtml='<span class="mystatus"><span class="pill pill-gray">이름 설정 필요</span></span>';
    else if(!mine) myHtml='<span class="mystatus">내 응답 <span class="pill pill-need">필요</span></span>';
    else myHtml='<span class="mystatus">내 응답 <span class="pill pill-'+toneOf(mine)+'">'+esc(mine)+'</span></span>';

    const isOpen=openItemId===o.id;
    // detail
    const optHtml=T.opts.map(op=>
      '<button class="opt'+(mine===op.k?" on":"")+'" data-tone="'+op.t+'" data-item="'+o.id+'" data-st="'+esc(op.k)+'">'+esc(op.k)+'</button>'
    ).join("");
    const memHtml=memList.length?memList.map(([mid,m])=>{
      const r=resp[mid];
      const tone=r?toneOf(r.status):"";
      return '<span class="mtag '+tone+(mid===myId?" me":"")+'"><span class="d"></span>'+esc(m.name)+(r?" · "+esc(r.status):"")+'</span>';
    }).join(""):'<span class="hint">아직 멤버가 없습니다.</span>';

    return '<div class="card">'+
      '<div class="card-main" data-open="'+o.id+'">'+
        '<div class="row1"><span class="type-badge '+T.cls+'">'+T.label+'</span>'+ddHtml+'</div>'+
        '<p class="title">'+esc(o.title)+'</p>'+
        (o.desc?'<p class="desc">'+esc(o.desc)+'</p>':'')+
        '<div class="ribbon">'+segs+'</div>'+
        '<div class="meta"><span class="resp-count"><b>'+answered+'</b> / '+total+'명 응답</span>'+myHtml+'</div>'+
      '</div>'+
      '<div class="detail'+(isOpen?" open":"")+'" id="d-'+o.id+'">'+
        (myId?'<p class="sec-label">내 상태 선택</p><div class="opts">'+optHtml+'</div>':'<p class="hint">먼저 우측 상단에서 이름을 설정하세요.</p>')+
        '<p class="sec-label">멤버별 현황</p><div class="members">'+memHtml+'</div>'+
        '<button class="del-item" data-del="'+o.id+'">이 안건 삭제</button>'+
      '</div>'+
    '</div>';
  }).join("");
}

/* ---- 이벤트 ---- */
function bind(){
  $("#filters").addEventListener("click",e=>{
    const b=e.target.closest(".chip");if(!b)return;
    filter=b.dataset.f;
    document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c===b));
    render();
  });

  $("#list").addEventListener("click",e=>{
    const op=e.target.closest("[data-st]");
    if(op){ setStatus(op.dataset.item,op.dataset.st); return; }
    const del=e.target.closest("[data-del]");
    if(del){ delItem(del.dataset.del); return; }
    const card=e.target.closest("[data-open]");
    if(card){ openItemId=openItemId===card.dataset.open?null:card.dataset.open; render(); }
  });

  // 이름
  $("#meBtn").addEventListener("click",openName);
  $("#nameInput").addEventListener("input",e=>{$("#nameSave").disabled=!e.target.value.trim();});
  $("#nameCancel").addEventListener("click",()=>$("#nameOv").classList.remove("open"));
  $("#nameSave").addEventListener("click",saveName);

  // 안건 추가
  $("#addFab").addEventListener("click",openAdd);
  $("#typePick").addEventListener("click",e=>{
    const b=e.target.closest("button");if(!b)return;
    pickedType=b.dataset.type;
    document.querySelectorAll("#typePick button").forEach(x=>x.classList.toggle("on",x===b));
  });
  $("#itemTitle").addEventListener("input",e=>{$("#addSave").disabled=!e.target.value.trim();});
  $("#addCancel").addEventListener("click",()=>$("#addOv").classList.remove("open"));
  $("#addSave").addEventListener("click",saveItem);

  document.querySelectorAll(".ov").forEach(ov=>ov.addEventListener("click",e=>{if(e.target===ov)ov.classList.remove("open");}));
}

function openName(){
  if(!ready){toast("먼저 Firebase 설정을 완료하세요");return;}
  $("#nameInput").value=myName||"";
  $("#nameSave").disabled=!(myName&&myName.trim());
  const others=Object.entries(members).filter(([id])=>id!==myId);
  $("#existingNames").innerHTML = others.length
    ? '<p class="hint" style="margin-top:8px">기존 멤버로 들어가기</p><div class="name-list">'+
      others.map(([id,m])=>'<button data-pick="'+id+'">'+esc(m.name)+'</button>').join("")+'</div>'
    : "";
  $("#existingNames").querySelectorAll("[data-pick]").forEach(b=>b.addEventListener("click",()=>{
    myId=b.dataset.pick; myName=members[myId].name;
    localStorage.setItem("board_member_id",myId);
    localStorage.setItem("board_member_name",myName);
    $("#nameOv").classList.remove("open"); refreshMe(); render(); toast(myName+"님으로 설정됨");
  }));
  $("#nameOv").classList.add("open");
  setTimeout(()=>$("#nameInput").focus(),120);
}
function saveName(){
  const name=$("#nameInput").value.trim();if(!name)return;
  if(myId && members[myId]){
    db.ref(ROOT+"/members/"+myId+"/name").set(name);
  }else{
    myId="m_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    db.ref(ROOT+"/members/"+myId).set({name,joinedAt:Date.now()});
  }
  myName=name;
  localStorage.setItem("board_member_id",myId);
  localStorage.setItem("board_member_name",myName);
  $("#nameOv").classList.remove("open"); refreshMe(); render(); toast("저장되었습니다");
}

function openAdd(){
  if(!ready){toast("먼저 Firebase 설정을 완료하세요");return;}
  if(!myId){openName();return;}
  pickedType="meeting";
  document.querySelectorAll("#typePick button").forEach((x,i)=>x.classList.toggle("on",i===0));
  $("#itemTitle").value="";$("#itemDue").value="";$("#itemDesc").value="";$("#addSave").disabled=true;
  $("#addOv").classList.add("open");
}
function saveItem(){
  const title=$("#itemTitle").value.trim();if(!title)return;
  const it={title,type:pickedType,due:$("#itemDue").value||"",desc:$("#itemDesc").value.trim(),
    createdAt:Date.now(),createdBy:myName||""};
  db.ref(ROOT+"/items").push(it);
  $("#addOv").classList.remove("open"); toast("안건이 등록되었습니다");
}
function setStatus(itemId,st){
  if(!myId){openName();return;}
  db.ref(ROOT+"/responses/"+itemId+"/"+myId).set({status:st,updatedAt:Date.now()});
  toast('"'+st+'"(으)로 표시됨');
}
function delItem(itemId){
  const it=items[itemId];
  if(!confirm('"'+(it?it.title:"")+'" 안건을 삭제할까요?\n모든 응답도 함께 삭제됩니다.'))return;
  db.ref(ROOT+"/items/"+itemId).remove();
  db.ref(ROOT+"/responses/"+itemId).remove();
  openItemId=null; toast("삭제되었습니다");
}

init();
</script>
