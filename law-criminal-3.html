  var uh=document.createElement('div'); uh.className='unit';
  uh.innerHTML='【 '+u.t+' 】<small>'+u.q.length+'문항</small>';
  quiz.appendChild(uh); unitAnchor[ui]=uh;
  u.q.forEach(function(it){
    total++; var n=gi+1; gi++;
    var card=document.createElement('div'); card.className='q';
    var idx=n;
    var qn=document.createElement('div'); qn.className='qn'; qn.textContent=String(n).padStart(3,'0');
    var qt=document.createElement('div'); qt.className='qt'; qt.textContent=it[0];
    card.appendChild(qn); card.appendChild(qt);
    var ans=it[2], exp=it[3], opts=it[1];
    var optEls=[];
    opts.forEach(function(o,k){
      var el=document.createElement('div'); el.className='opt';
      el.innerHTML='<span class="mk">'+MK[k]+'</span><span>'+o.replace(/</g,'&lt;')+'</span>';
      el.addEventListener('click',function(){ pick(idx,k); });
      card.appendChild(el); optEls.push(el);
    });
    var ex=document.createElement('div'); ex.className='exp';
    ex.innerHTML='<b>정답 '+MK[ans-1]+'</b> · 근거: '+exp.replace(/</g,'&lt;');
    card.appendChild(ex);
    card._opts=optEls; card._ans=ans; card._ex=ex;
    quiz.appendChild(card);
    if(!window._cards) window._cards={};
    window._cards[idx]=card;
  });
});
function pick(idx,k){
  if(answered[idx]!==undefined) return;
  var c=window._cards[idx]; answered[idx]=k;
  var ans=c._ans;
  c._opts.forEach(function(el,j){
    if(j===ans-1) el.classList.add('correct');
    else if(j===k) el.classList.add('wrong');
    else el.classList.add('dim');
  });
  c._ex.classList.add('show');
  if(k===ans-1) correct++;
  document.getElementById('score').textContent='맞힌 문제 '+correct+' / '+total;
}
document.getElementById('btnReset').onclick=function(){
  if(!confirm('푼 내용을 모두 지울까요?')) return;
  location.reload();
};
// 목차
DATA.forEach(function(u,ui){
  var t=document.createElement('div'); t.className='ti';
  t.innerHTML=u.t+'<span>'+u.q.length+'문항</span>';
  t.onclick=function(){ closeSheet(); unitAnchor[ui].scrollIntoView({behavior:'smooth',block:'start'}); };
  toc.appendChild(t);
});
function openSheet(){document.getElementById('scrim').classList.add('show');document.getElementById('sheet').classList.add('show');}
function closeSheet(){document.getElementById('scrim').classList.remove('show');document.getElementById('sheet').classList.remove('show');}
document.getElementById('btnToc').onclick=openSheet;
document.getElementById('scrim').onclick=closeSheet;
document.getElementById('shX').onclick=closeSheet;
