<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>하빈이의 음성일기</title>
<meta property="og:title" content="하빈이의 음성일기 📔">
<meta property="og:description" content="말하면 일기가 저절로 써져요! 날짜별로 차곡차곡 모으는 하빈이의 음성 일기장.">
<meta property="og:image" content="https://hdi800hdi800-pixel.github.io/praise/habin_diary_poster-1.png">
<meta property="og:url" content="https://hdi800hdi800-pixel.github.io/praise/habin_diary.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7FF; --ink:#3a3766; --ink2:#6a6690; --line:#e3def2;
    --lav:#7C5CFC; --lav-soft:#EDE7FF; --mint:#5BC894; --sky:#7EC4EF; --sun:#FFC94D; --coral:#FF8A7A;
    --shadow:0 6px 0 rgba(58,55,102,.10), 0 12px 26px rgba(58,55,102,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Gaegu',system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 6%, #fff 0 20px, transparent 21px),
      linear-gradient(180deg,#EFE7FF,#FBF7FF 32%);
    color:var(--ink); min-height:100vh; padding:0 0 44px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}
  header.app{text-align:center;padding:26px 16px 8px}
  .logo{font-family:'Jua',sans-serif;font-size:33px;color:var(--ink);letter-spacing:-1px}
  .logo .pen{color:var(--lav)}
  .sub{font-size:17px;color:#8a82b0;margin-top:2px}
  .datebar{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 4px}
  .datebar button{font-family:'Jua';border:none;background:#fff;color:var(--ink);
    width:38px;height:38px;border-radius:50%;font-size:20px;box-shadow:var(--shadow);cursor:pointer}
  .datebar .today{font-family:'Jua';font-size:20px;background:var(--ink);color:#fff;
    padding:8px 18px;border-radius:30px;box-shadow:var(--shadow);min-width:170px;text-align:center}
  .stars{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:10px 0 2px;min-height:24px}
  .stars span{font-size:18px}

  .card{background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:16px 16px 18px;margin:14px 0;border:2px solid #fff}

  .moodrow{display:flex;gap:8px;justify-content:center;margin:2px 0 12px}
  .mood{font-size:26px;width:50px;height:50px;border-radius:16px;border:2px solid var(--line);background:#fcfaff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s}
  .mood:active{transform:scale(.9)}
  .mood.on{border-color:var(--lav);background:var(--lav-soft);transform:scale(1.05)}

  .diarytitle{font-family:'Jua';font-size:18px;color:var(--ink);margin:2px 2px 8px;display:flex;align-items:center;gap:6px}
  /* 공책 줄무늬 일기칸 */
  .paper{position:relative;border-radius:18px;border:2px solid var(--line);overflow:hidden;background:#fffdff}
  .paper::before{content:"";position:absolute;top:0;bottom:0;left:34px;width:2px;background:#ffd0c8;opacity:.7}
  textarea.diary{
    display:block;width:100%;border:none;outline:none;resize:none;background:transparent;
    font-family:'Gaegu';font-size:19px;line-height:34px;color:#4a4670;
    min-height:204px;padding:6px 14px 10px 46px;
    background-image:repeating-linear-gradient(transparent,transparent 33px,#ece7fb 33px,#ece7fb 34px);
  }
  textarea.diary::placeholder{color:#c3bce0}

  .voicewrap{margin-top:12px}
  .voicebtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    font-family:'Jua';font-size:20px;color:#fff;background:var(--lav);border:none;border-radius:18px;
    padding:16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s}
  .voicebtn:active{transform:translateY(2px)}
  .voicebtn.rec{background:#e0463a;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,70,58,.45)}50%{box-shadow:0 0 0 12px rgba(224,70,58,0)}}
  .mic-emoji{font-size:22px}
  .reclive{display:none;align-items:center;justify-content:center;gap:8px;margin-top:10px;color:#e0463a;font-family:'Jua';font-size:16px}
  .reclive.show{display:flex}
  .reclive .dot{width:7px;height:7px;border-radius:50%;background:#e0463a;animation:blink 1s infinite}
  .reclive .dot:nth-child(3){animation-delay:.2s}
  .reclive .dot:nth-child(4){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

  .toolrow{display:flex;gap:8px;margin-top:10px}
  .tool{flex:1;font-family:'Jua';font-size:15px;border:none;border-radius:16px;padding:13px 6px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .1s}
  .tool:active{transform:translateY(2px)}
  .tool.fix{background:#FFE3B0;color:#7a5a10}
  .tool.pen{background:#E3F6EC;color:#1f7a53}
  .tool.clr{background:#FCE2E2;color:#b5453a}

  .hint{display:none;margin-top:10px;background:#fff7e8;border:2px solid #ffe3b0;border-radius:14px;
    padding:10px 12px;font-size:15px;color:#7a6a3e;line-height:1.5}
  .hint.show{display:block}
  .hint #micReload{margin-top:8px;font-family:'Jua';border:none;background:#7C5CFC;color:#fff;border-radius:12px;padding:10px 16px;font-size:15px;cursor:pointer}

  .savebtn{font-family:'Jua';width:100%;border:none;border-radius:20px;padding:17px;font-size:20px;cursor:pointer;
    background:var(--sun);color:#7a5a10;box-shadow:var(--shadow);transition:transform .1s;margin-top:4px}
  .savebtn:active{transform:translateY(2px)}

  .feedback{margin-top:12px;border-radius:18px;padding:16px;background:linear-gradient(135deg,#F1ECFF,#FFE9E4);display:none;animation:pop .3s}
  .feedback.show{display:block}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  .feedback .big{font-family:'Jua';font-size:21px;color:var(--lav);margin-bottom:8px}
  .feedback .ln{font-size:18px;color:var(--ink);line-height:1.5}

  .secttl{font-family:'Jua';font-size:20px;margin:24px 6px 6px;color:var(--ink);display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap}
  .datebtn{position:relative;font-family:'Jua';font-size:14px;color:#5b3fd6;background:var(--lav-soft);border-radius:20px;
    padding:7px 14px;cursor:pointer;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:4px}
  .datebtn input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}

  .history .day{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:11px 14px;margin:8px 0;cursor:pointer;
    display:flex;align-items:center;gap:10px}
  .history .day .d{font-family:'Jua';font-size:17px;color:var(--ink);flex:none}
  .history .day .m{font-size:20px;flex:none}
  .history .day .s{font-size:15px;color:#9a92b8;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
  .history .day .star{flex:none}
  .empty{color:#aaa0cc;text-align:center;padding:14px;font-size:16px}
  .mascot{font-size:40px;text-align:center;margin-top:8px}
  .tip{text-align:center;color:#aaa0cc;font-size:14px;margin-top:18px;line-height:1.5}

  /* 업로드 안내 */
  #up{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:99;padding:20px}
  #up .box{background:#fff;border-radius:18px;max-width:380px;width:100%;padding:18px}
  #up h3{font-family:'Jua';margin:.2em 0 .5em;color:var(--ink)}
  #up .lnk{background:#f3f0fa;border-radius:10px;padding:9px;font-size:12px;word-break:break-all;margin:8px 0;font-family:monospace}
  #up button{font-family:'Jua';width:100%;border:none;border-radius:12px;padding:12px;margin-top:6px;font-size:15px;cursor:pointer}
  .b1{background:#7C5CFC;color:#fff}.b2{background:#FFC94D;color:#7a5a10}.b3{background:#eee;color:#555}
  #chromebar{position:fixed;left:0;right:0;bottom:0;z-index:120;background:#3a3766;color:#fff;
    display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;
    font-family:'Jua';font-size:15px;box-shadow:0 -4px 16px rgba(0,0,0,.25)}
  #chromebar button{font-family:'Jua';border:none;background:#FFC94D;color:#7a5a10;border-radius:20px;
    padding:9px 16px;font-size:14px;flex:none;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">하빈이의 음성일기 <span class="pen">📔</span></div>
    <div class="sub">말하면 일기가 저절로 써져요!</div>
    <div class="datebar">
      <button id="prev">‹</button>
      <div class="today" id="dateLabel">오늘</div>
      <button id="next">›</button>
    </div>
    <div class="stars" id="starRow"></div>
  </header>

  <div class="card">
    <div class="diarytitle">😊 오늘 기분은?</div>
    <div class="moodrow" id="moodRow">
      <button class="mood" data-m="😄">😄</button>
      <button class="mood" data-m="🙂">🙂</button>
      <button class="mood" data-m="😐">😐</button>
      <button class="mood" data-m="😢">😢</button>
      <button class="mood" data-m="😡">😡</button>
    </div>

    <div class="diarytitle">📝 오늘의 일기</div>
    <div class="paper">
      <textarea class="diary" id="diary" placeholder="🎙️ 를 누르고 오늘 있었던 일을 말해 봐!&#10;(또는 ✏️ 로 직접 써도 돼요)"></textarea>
    </div>

    <div class="voicewrap">
      <button class="voicebtn" id="voiceBtn"><span class="mic-emoji">🎙️</span> 눌러서 말하기</button>
      <div class="reclive" id="recLive"><span>듣고 있어요</span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="toolrow">
        <button class="tool fix" id="fixBtn">✨ 다듬기</button>
        <button class="tool pen" id="penBtn">✏️ 쓰기</button>
        <button class="tool clr" id="clrBtn">🗑️ 전체삭제</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <button class="savebtn" id="saveBtn">⭐ 오늘 일기 저장</button>
  <div class="feedback" id="feedback"></div>

  <div class="secttl"><span>📅 지난 일기 기록</span><label class="datebtn">📆 날짜 선택<input type="date" id="datePick"></label></div>

  <div class="mascot">🦉</div>
  <div class="tip">🎙️ 한 문장씩 말하면 글씨로 적혀요. 더 말하려면 🎙️ 다시!<br>✨ 다듬기로 맞춤법을 정리하고, 매일 저장하면 별이 모여요!</div>
</div>

<div id="up"><div class="box">
  <h3>📤 업로드 안내</h3>
  <div>이 파일을 깃허브에 올리면 아래 주소로 열려요:</div>
  <div class="lnk" id="upLink"></div>
  <button class="b1" id="upGit">깃허브 업로드 페이지 열기</button>
  <button class="b2" id="upNet">넷리파이 드롭 열기</button>
  <button class="b3" id="upClose">닫기</button>
</div></div>

<script>
const KEY=d=>"voicediary_habin:"+d;
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const t=new Date();return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate());};
let cur=todayStr();
const DOW=["일","월","화","수","목","금","토"];
function label(d){
  const [y,m,dd]=d.split("-").map(Number);
  const dt=new Date(y,m-1,dd);
  const tag=d===todayStr()?"오늘 · ":"";
  return tag+m+"월 "+dd+"일 ("+DOW[dt.getDay()]+")";
}
function load(d){ try{return JSON.parse(localStorage.getItem(KEY(d)))||null}catch(e){return null} }
function save(d,o){ localStorage.setItem(KEY(d),JSON.stringify(o)); }
function allDays(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("voicediary_habin:"))out.push(k.slice(17));}
  return out.sort().reverse();
}
function diaryEl(){ return document.getElementById('diary'); }

/* ---- 화면 그리기 ---- */
function renderSheet(){
  const data=load(cur)||{};
  diaryEl().value=data.text||"";
  document.querySelectorAll('.mood').forEach(b=>b.classList.toggle('on', data.mood===b.dataset.m));
  document.getElementById('dateLabel').textContent=label(cur);
  renderStars();
}
function renderStars(){
  const days=allDays().filter(d=>{const x=load(d);return x&&x.star;});
  const row=document.getElementById('starRow');
  row.innerHTML = days.length
    ? days.slice(0,14).map(()=>'<span>⭐</span>').join('')+(days.length>14?' <span style="font-family:Jua;color:#7C5CFC">+'+(days.length-14)+'</span>':'')
    : '<span style="color:#c3bce0;font-size:15px">오늘 저장하면 첫 별이 생겨요 ✨</span>';
}
function renderHistory(){
  const h=document.getElementById('history');
  if(!h) return;
  const days=allDays();
  if(!days.length){h.innerHTML='<div class="empty">아직 일기가 없어요. 오늘부터 시작! 🌱</div>';return;}
  h.innerHTML='';
  days.slice(0,15).forEach(d=>{
    const x=load(d); if(!x)return;
    const preview=(x.text||'').replace(/\s+/g,' ').trim()||'기록';
    const div=document.createElement('div');
    div.className='day';
    div.innerHTML='<span class="d">'+label(d).replace('오늘 · ','')+'</span>'
      +'<span class="m">'+(x.mood||'📔')+'</span>'
      +'<span class="s">'+esc(preview)+'</span>'
      +(x.star?'<span class="star">⭐</span>':'');
    div.addEventListener('click',()=>{cur=d;document.getElementById('feedback').classList.remove('show');renderSheet();renderHistory();window.scrollTo({top:0,behavior:'smooth'});});
    h.appendChild(div);
  });
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function saveDiary(){
  const data=load(cur)||{};
  data.text=diaryEl().value;
  const on=document.querySelector('.mood.on');
  data.mood=on?on.dataset.m:(data.mood||'');
  save(cur,data);
}

/* ---- 맞춤법 다듬기 (오프라인 가벼운 교정 + 띄어쓰기/문장부호) ---- */
function tidy(s){
  if(!s) return s;
  s=s.replace(/\s+/g,' ').trim();
  const map=[
    [/되요/g,'돼요'],[/안되([요다])/g,'안 돼$1'],[/어떻해/g,'어떻게'],
    [/오랫만/g,'오랜만'],[/금새/g,'금세'],[/역활/g,'역할'],[/희안/g,'희한'],
    [/설겆이/g,'설거지'],[/왠만/g,'웬만'],[/뭐에요/g,'뭐예요'],[/그리고나서/g,'그러고 나서'],
    [/할께/g,'할게'],[/갈께/g,'갈게'],[/줄께/g,'줄게'],[/볼께/g,'볼게'],[/먹을께/g,'먹을게'],
    [/이쁘/g,'예쁘'],[/낼\b/g,'내일'],[/넘\b/g,'너무']
  ];
  map.forEach(p=>{ s=s.replace(p[0],p[1]); });
  // 연속으로 똑같이 반복된 말 정리 (음성 인식 중복 방지)
  var prev; do{ prev=s; s=s.replace(/([가-힣]{2,}|[A-Za-z0-9]{2,})(?:\s+\1\b)+/g,'$1'); }while(s!==prev);
  s=s.replace(/\s{2,}/g,' ').trim();
  // 문장 끝에 마침표
  if(!/[.!?…~]$/.test(s)) s+='.';
  return s;
}
document.getElementById('fixBtn').addEventListener('click',()=>{
  const ta=diaryEl();
  if(!ta.value.trim()){ showHint("먼저 일기를 말하거나 적어 줘! 🎙️✏️"); return; }
  ta.value=tidy(ta.value);
  saveDiary();
  showHint("✨ 맞춤법과 띄어쓰기를 다듬었어요!");
});
document.getElementById('penBtn').addEventListener('click',()=>{ diaryEl().focus(); });
document.getElementById('clrBtn').addEventListener('click',()=>{
  if(recording) stopVoice();
  if(!diaryEl().value.trim()){ showHint("이미 비어 있어요."); return; }
  if(confirm("오늘 일기 내용을 모두 지울까요?")){
    diaryEl().value='';
    saveDiary();
    showHint("전체 삭제했어요. 다시 말하거나 ✏️ 로 적어 줘!");
  }
});
diaryEl().addEventListener('input',saveDiary);

/* 기분 선택 */
document.getElementById('moodRow').addEventListener('click',e=>{
  const b=e.target.closest('.mood'); if(!b)return;
  const wasOn=b.classList.contains('on');
  document.querySelectorAll('.mood').forEach(x=>x.classList.remove('on'));
  if(!wasOn) b.classList.add('on');
  saveDiary();
});

/* ---- 안내 메시지 ---- */
let hintT=null;
function showHint(msg){
  const el=document.getElementById('hint');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(hintT); hintT=setTimeout(()=>el.classList.remove('show'),5000);
}
function micBlockedHelp(scroll){
  const el=document.getElementById('hint');
  clearTimeout(hintT);
  el.innerHTML='🎙️ 마이크가 꺼져 있어요. 켜는 법:<br>① 주소창 왼쪽 <b>🔒 자물쇠</b> 누르기<br>② <b>권한</b>(또는 사이트 설정) 누르기<br>③ <b>마이크 → 허용</b> 으로 바꾸기<br>④ 아래 새로고침 후 🎙️ 다시 누르기<br><button id="micReload">🔄 새로고침</button>';
  el.classList.add('show');
  const rb=document.getElementById('micReload');
  if(rb) rb.onclick=function(){ location.reload(); };
  if(scroll) el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ---- 음성 입력 (말하면 자동 기록) ---- */
let rec=null, recording=false;
function setRecUI(on){
  document.getElementById('voiceBtn').classList.toggle('rec',on);
  document.getElementById('voiceBtn').innerHTML = on
    ? '<span class="mic-emoji">⏹️</span> 그만 말하기'
    : '<span class="mic-emoji">🎙️</span> 눌러서 말하기';
  document.getElementById('recLive').classList.toggle('show',on);
}
document.getElementById('voiceBtn').addEventListener('click',startVoice);
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showHint("이 브라우저는 말하기가 안 돼요. 크롬으로 열면 잘 돼요. 그동안 ✏️ 로 직접 써도 돼요."); return; }
  if(recording){ stopVoice(); return; }
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(st){
      try{ st.getTracks().forEach(function(t){t.stop();}); }catch(e){}
      setTimeout(beginVoice,200);
    }).catch(function(err){
      var n=(err&&err.name)||"";
      if(n==='NotAllowedError'||n==='SecurityError'||n==='PermissionDeniedError')
        micBlockedHelp(true);
      else if(n==='NotFoundError'||n==='DevicesNotFoundError')
        showHint("마이크를 찾을 수 없어요. ✏️ 로 직접 써도 돼요.");
      else beginVoice();
    });
  } else { beginVoice(); }
}
function beginVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const ta=diaryEl();
  let base=ta.value?ta.value.replace(/\s+$/,'')+' ':'';
  let finalText='';
  try{ rec=new SR(); }catch(e){ showHint("말하기를 시작할 수 없어요. ✏️ 로 써도 돼요."); return; }
  rec.lang='ko-KR'; rec.interimResults=true; rec.continuous=false; rec.maxAlternatives=1;
  recording=true; setRecUI(true);
  rec.onresult=function(e){
    let fin='', interim='';
    for(let i=0;i<e.results.length;i++){           // 매번 전체를 다시 만들어 중복 방지
      const r=e.results[i];
      if(r.isFinal) fin+=r[0].transcript+' ';
      else interim+=r[0].transcript;
    }
    finalText=fin;
    ta.value=(base+finalText+interim).replace(/\s{2,}/g,' ');
    saveDiary();
  };
  rec.onerror=function(ev){
    const er=ev&&ev.error;
    if(er==='not-allowed'||er==='service-not-allowed') micBlockedHelp(true);
    else if(er==='no-speech') showHint("소리가 안 들렸어요. 마이크에 또렷하게 말해 줘! 🎙️");
    else if(er==='audio-capture') showHint("마이크를 쓸 수 없어요. 다른 앱이 마이크를 쓰고 있지 않은지 확인해 줘.");
    else if(er==='network') showHint("인터넷 연결을 확인해 줘. 말하기는 인터넷이 필요해요.");
  };
  rec.onend=function(){                              // 한 문장 끝나면 멈추고 다듬기 (반복 시작 안 함)
    recording=false; setRecUI(false);
    const t=diaryEl();
    t.value=tidy(base+finalText);
    saveDiary();
  };
  try{ rec.start(); }catch(e){ recording=false; setRecUI(false); showHint("다시 한 번 🎙️ 를 눌러 줘!"); }
}
function stopVoice(){
  recording=false;
  try{ rec&&rec.stop(); }catch(e){}
  setRecUI(false);
  const ta=diaryEl();
  ta.value=tidy(ta.value);
  saveDiary();
}

/* ---- 저장 + 칭찬 ---- */
const PRAISE=[
  "오늘 하루도 잘 보냈구나, 하빈아! 🌟",
  "멋진 일기야! 글솜씨가 쑥쑥 자라네 ✍️",
  "오늘의 마음을 잘 담았어. 참 잘했어! 💜",
  "하빈이의 하루가 반짝반짝 빛나! ✨",
  "솔직하게 쓴 네가 정말 멋져! 🦉"
];
document.getElementById('saveBtn').addEventListener('click',()=>{
  if(recording) stopVoice();
  const ta=diaryEl();
  if(!ta.value.trim()){ showHint("오늘 있었던 일을 한 가지라도 적어 줘! 🎙️✏️"); return; }
  const data=load(cur)||{};
  data.text=ta.value;
  const on=document.querySelector('.mood.on'); data.mood=on?on.dataset.m:(data.mood||'');
  data.star=true; data.savedAt=new Date().toISOString();
  save(cur,data);
  renderStars(); renderHistory();
  const p=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  const fb=document.getElementById('feedback');
  fb.innerHTML='<div class="big">⭐ 오늘 일기 저장 완료!</div><div class="ln">'+p+'</div>';
  fb.classList.add('show');
  fb.scrollIntoView({behavior:'smooth',block:'center'});
});

/* ---- 날짜 이동 ---- */
document.getElementById('prev').addEventListener('click',()=>shift(-1));
document.getElementById('next').addEventListener('click',()=>shift(1));
function shift(n){
  const [y,m,d]=cur.split("-").map(Number);
  const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n);
  cur=dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate());
  document.getElementById('feedback').classList.remove('show');
  if(recording) stopVoice();
  renderSheet();
}

/* ---- 달력으로 지난 일기 보기 ---- */
(function(){
  var dp=document.getElementById('datePick');
  if(!dp) return;
  dp.value=cur;
  dp.addEventListener('change',function(){
    if(this.value){
      if(recording) stopVoice();
      cur=this.value;
      document.getElementById('feedback').classList.remove('show');
      renderSheet(); renderHistory();
      window.scrollTo({top:0,behavior:'smooth'});
    }
  });
})();

renderSheet(); renderHistory();

/* 마이크 권한이 막혀 있으면 미리 안내 */
if(navigator.permissions&&navigator.permissions.query){
  try{ navigator.permissions.query({name:'microphone'}).then(function(pp){ if(pp&&pp.state==='denied') micBlockedHelp(false); }).catch(function(){}); }catch(e){}
}

/* ---- 날짜 자동 변환: 하루 지나면 오늘로 (카톡 붙임용) ---- */
let lastToday=todayStr();
function checkDayChange(){
  const t=todayStr();
  if(t!==lastToday){
    if(cur===lastToday){ cur=t; document.getElementById('feedback').classList.remove('show'); renderSheet(); }
    lastToday=t;
  }
}
setInterval(checkDayChange,60000);
document.addEventListener('visibilitychange',function(){ if(!document.hidden) checkDayChange(); });
window.addEventListener('pageshow',function(){ checkDayChange(); });   // 캐시된 화면 복귀 시
window.addEventListener('focus',function(){ checkDayChange(); });      // 앱으로 돌아올 때

/* ---- 업로드 안내 (github.io / netlify 에서는 숨김) ---- */
(function(){
  const host=location.hostname;
  if(host.endsWith("github.io")||host.endsWith("netlify.app"))return;
  setTimeout(()=>{
    const file=(location.pathname.split("/").pop()||"habin_diary.html");

    document.getElementById('upNet').onclick=()=>window.open("https://app.netlify.com/drop","_blank");

/* ---- 카톡 등 인앱브라우저 → 크롬으로 열기 (말하기는 크롬에서 잘 됨) ---- */
(function(){
  var ua=navigator.userAgent||"";
  var isAndroid=/Android/i.test(ua);
  var isIOS=/iPhone|iPad|iPod/i.test(ua);
  var isChrome=/Chrome\/[.0-9]+/.test(ua) && !/(SamsungBrowser|EdgA|EdgiOS|OPR\/|Whale|UCBrowser|KAKAOTALK|NAVER|DaumApps|Line\/|FB_IAB|FBAN|FBAV|Instagram|kakaostory|band|everytime|wadiz)/i.test(ua);
  var isInApp=/(KAKAOTALK|NAVER|DaumApps|Line\/|FB_IAB|FBAN|FBAV|Instagram|kakaostory|band|everytime|wadiz)/i.test(ua);
  if(isChrome) return;                 // 이미 크롬이면 끝
  if(!isAndroid && !isIOS) return;     // PC 등은 그대로

  function go(){
    try{
      var hp=location.host+location.pathname+location.search+location.hash;
      if(isAndroid){
        var fb=encodeURIComponent(location.href);
        location.href="intent://"+hp+"#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url="+fb+";end";
      }else{
        location.href="googlechromes://"+hp;   // iOS 크롬
      }
    }catch(e){}
  }
  // 비크롬이면 자동 1회 크롬 열기 시도 (삼성인터넷·인앱 포함)
  try{
    if(!sessionStorage.getItem('toChrome')){ sessionStorage.setItem('toChrome','1'); setTimeout(go, isAndroid?120:300); }
  }catch(e){ setTimeout(go,150); }
  // 자동이 막히면 안내 바 표시
  setTimeout(function(){
    if(document.getElementById('chromebar')) return;
    var bar=document.createElement('div'); bar.id='chromebar';
    bar.innerHTML='<span>🎙️ 말하기는 크롬에서 잘 돼요</span><button id="cbBtn">크롬에서 열기</button>';
    document.body.appendChild(bar);
    document.getElementById('cbBtn').addEventListener('click',go);
  },1300);
})();
</script>
