<style>
  :root{--paper:#EAEDF2;--surface:#FFFFFF;--ink:#1A2230;--muted:#697585;--line:#E1E6EC;

    --shadow:0 1px 2px rgba(20,35,55,.05),0 6px 22px rgba(20,35,55,.06);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard","Pretendard Variable",-apple-system,system-ui,"Apple SD Gothic Neo",sans-serif;

  .htop{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .htop h1{font-size:17px;font-weight:800;margin:0;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .seal{width:30px;height:26px;border:2px solid #F4C9C4;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800;color:#FBE3E0;transform:rotate(-7deg);flex:none;white-space:nowrap;padding:0 2px}

  .controls{max-width:640px;margin:12px auto 0;display:flex;gap:8px;align-items:center}
  .ctrl{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:inherit;font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px;cursor:pointer}

  .opt.correct{background:#EAF7EF;border-color:#9FD9B6}.opt.correct .mk{color:var(--green)}
  .opt.wrong{background:#FCEDEC;border-color:#EFB7B2}.opt.wrong .mk{color:var(--red)}

  .stamp{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:23px;font-weight:900;line-height:1;color:var(--seal)}
  .check{margin-top:4px;background:var(--navy);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:11px;border-radius:11px;cursor:pointer;width:100%}

  .result.no{background:#FCEDEC;color:#B3322C;border:1px solid #EAC2BE}

  .result b{font-weight:800}
  .expl{margin-top:8px;font-size:13px;color:#33404F;line-height:1.7;white-space:pre-wrap}
  .retry{margin-top:10px;background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-weight:700;font-size:13px;padding:7px 13px;border-radius:9px;cursor:pointer}
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:640px;margin:0 auto;z-index:25}

  .jump{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:700}
  .jump input{width:56px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;text-align:center}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);background:#1A2230;color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

    const q=QUIZDATA[idx];
    area.innerHTML='<div class="qcard">'+optHtml(q,idx)+'</div>';
    $("#prev").disabled=idx===0; $("#next").disabled=idx===QUIZDATA.length-1;
    $("#jumpIn").value=q.n;
    $("#hint").textContent=(idx+1)+" / "+QUIZDATA.length+"문항";
    window.scrollTo(0,0);
  }
  updateScore();
}
function toggle(qi,n){
  const st=state[qi]||(state[qi]={sel:[],done:false});
  const q=QUIZDATA[qi], multi=q.ans.length>1;
  let s=new Set(st.sel);
  if(multi){ s.has(n)?s.delete(n):s.add(n); }
  else { s=new Set([n]); }   // 단일정답이면 하나만
  st.sel=[...s]; save();
  if(!multi){ grade(qi); return; }   // 단일정답은 누르면 바로 채점
  render();
}
function grade(qi){
  const st=state[qi]||(state[qi]={sel:[],done:false});
  st.done=true; save(); render();
}
function retry(qi){ state[qi]={sel:[],done:false}; save(); render(); }
function go(d){idx=Math.max(0,Math.min(QUIZDATA.length-1,idx+d));render();}
function jump(){const v=parseInt($("#jumpIn").value,10);const i=QUIZDATA.findIndex(q=>q.n===v);if(i>=0){idx=i;render();}else toast("그 번호는 없어요");}
function setMode(m){mode=m;$("#m1").classList.toggle("on",m==="one");$("#m2").classList.toggle("on",m==="all");render();}
function resetAll(){if(!confirm("모든 기록을 지우고 처음부터?"))return;state={};save();idx=0;render();toast("초기화했어요");}
function updateScore(){
  let done=0,correct=0;
  QUIZDATA.forEach((q,qi)=>{
    const st=state[qi]; if(!st||!st.done)return; done++;
    if(q.atype==="none"){correct++;return;}
    const ans=aset(q), sel=new Set(st.sel);
    if(sel.size===ans.size && [...ans].every(x=>sel.has(x))) correct++;
  });
  $("#score").textContent=correct+" / "+done;
  $("#barFill").style.width=(done/QUIZDATA.length*100)+"%";
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function load(){try{state=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){state={};}}
load();render();
</script>
