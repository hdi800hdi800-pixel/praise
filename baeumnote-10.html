<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>성령이 배움노트</title>
<meta property="og:title" content="성령이 배움노트 ⭐">
<meta property="og:description" content="오늘 학교에서 배운 걸 말하면, 노트가 기록하고 칭찬하고 더 알려줘요! 날짜별로 차곡차곡 모으는 나만의 배움 노트.">
<meta property="og:image" content="https://hdi800hdi800-pixel.github.io/praise/baeumnote_poster.png">
<meta property="og:url" content="https://hdi800hdi800-pixel.github.io/praise/baeumnote.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF7EC; --ink:#33406b; --ink2:#5a6a8a; --line:#e9dcc4;
    --sun:#FFC94D; --coral:#FF8A7A; --mint:#5BC894; --sky:#7EC4EF;
    --shadow:0 6px 0 rgba(51,64,107,.12), 0 12px 24px rgba(51,64,107,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Gaegu',system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 8%, #fff 0 22px, transparent 23px),
      linear-gradient(180deg,#FFE9C7,#FFF7EC 30%);
    color:var(--ink); min-height:100vh; padding:0 0 40px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}
  header.app{
    text-align:center;padding:26px 16px 10px;position:relative
  }
  .logo{font-family:'Jua',sans-serif;font-size:34px;color:var(--ink);letter-spacing:-1px}
  .logo .star{color:var(--sun)}
  .sub{font-size:17px;color:#8a7a5e;margin-top:2px}
  .datebar{
    display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 4px
  }
  .datebar button{
    font-family:'Jua';border:none;background:#fff;color:var(--ink);
    width:38px;height:38px;border-radius:50%;font-size:20px;box-shadow:var(--shadow);cursor:pointer
  }
  .datebar .today{
    font-family:'Jua';font-size:20px;background:var(--ink);color:#fff;
    padding:8px 18px;border-radius:30px;box-shadow:var(--shadow);min-width:170px;text-align:center
  }
  .stars{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:10px 0 4px;min-height:24px}
  .stars span{font-size:18px}
  .card{
    background:#fff;border-radius:22px;box-shadow:var(--shadow);
    padding:14px 14px 16px;margin:14px 0;border:2px solid #fff
  }
  .period{
    border:2px dashed var(--line);border-radius:16px;padding:10px 12px;margin:10px 0;background:#fffdf8
  }
  .period.filled{border-style:solid;border-color:var(--mint);background:#f4fcf7}
  .phead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .pill{
    font-family:'Jua';font-size:15px;color:#fff;background:var(--sky);
    padding:3px 12px;border-radius:20px;white-space:nowrap
  }
  .period:nth-child(1) .pill{background:#FF8A7A}
  .period:nth-child(2) .pill{background:#FFB04D}
  .period:nth-child(3) .pill{background:#FFC94D;color:#7a5a10}
  .period:nth-child(4) .pill{background:#5BC894}
  .period:nth-child(5) .pill{background:#7EC4EF}
  .period:nth-child(6) .pill{background:#B79CED}
  .subj{
    font-family:'Gaegu';font-weight:700;font-size:18px;border:none;background:transparent;
    color:var(--ink);width:100%;outline:none;padding:2px 0
  }
  .subj::placeholder{color:#c9bda3}
  .row{display:flex;gap:8px;align-items:flex-start}
  textarea.note{
    font-family:'Gaegu';font-size:17px;line-height:1.5;border:none;background:transparent;
    width:100%;resize:none;outline:none;color:#444;min-height:46px;padding:2px 0
  }
  textarea.note::placeholder{color:#c9bda3}
  .mic{
    border:none;background:var(--coral);color:#fff;width:42px;height:42px;border-radius:50%;
    font-size:20px;flex:none;box-shadow:0 3px 0 rgba(0,0,0,.12);cursor:pointer;transition:transform .1s
  }
  .mic:active{transform:scale(.92)}
  .mic.rec{background:#e0463a;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,70,58,.5)}50%{box-shadow:0 0 0 10px rgba(224,70,58,0)}}
  .actions{display:flex;gap:10px;margin-top:6px}
  .btn{
    font-family:'Jua';flex:1;border:none;border-radius:18px;padding:15px;font-size:19px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .1s
  }
  .btn:active{transform:translateY(2px)}
  .btn.save{background:var(--sun);color:#7a5a10}
  .btn.play{background:var(--mint);color:#fff}
  .feedback{
    margin-top:12px;border-radius:18px;padding:14px 16px;background:linear-gradient(135deg,#FFF1D6,#FFE3E0);
    display:none;animation:pop .3s
  }
  .feedback.show{display:block}
  .reflect .rtitle{font-family:'Jua';font-size:20px;color:var(--ink);margin:2px 2px 8px}
  .rblock{border:2px dashed var(--line);border-radius:16px;padding:10px 12px;margin:10px 0;background:#fffdf8}
  .rblock.filled{border-style:solid;border-color:var(--sun);background:#fffaf0}
  .rq{font-family:'Gaegu';font-weight:700;font-size:17px;color:var(--ink);margin-bottom:4px}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .feedback .big{font-family:'Jua';font-size:21px;color:var(--coral);margin-bottom:10px}
  .feedback .q{font-size:18px;color:var(--ink);line-height:1.5}
  .feedback .q b{color:#c97a00}
  .fbrow{background:#fff;border-radius:14px;padding:11px 13px;margin:9px 0;box-shadow:0 2px 6px rgba(51,64,107,.08)}
  .fbtag{font-family:'Jua';display:inline-block;background:var(--sky);color:#fff;font-size:14px;padding:2px 12px;border-radius:20px;margin-bottom:6px}
  .fbline{font-size:18px;color:var(--ink);line-height:1.5;font-weight:700}
  .fbfact{font-size:17px;color:#5a6a8a;line-height:1.5;margin-top:4px}
  .fbq{font-size:17px;color:var(--ink);line-height:1.5;margin-top:4px}
  .fbq b{color:#c97a00}
  .fbrow.concept{background:#f3effe;border:2px solid #d9ccff}
  .fbrow.concept .fbfact{color:#3f3070;font-size:18px;margin-top:6px}
  .stepbar{text-align:center;font-family:'Jua';font-size:15px;color:#9a8a6e;margin-top:10px}
  .stepbar b{color:#c97a00}
  .secttl{font-family:'Jua';font-size:20px;margin:24px 6px 6px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .history .day{
    background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:10px 14px;margin:8px 0;cursor:pointer;
    display:flex;align-items:center;gap:10px
  }
  .history .day .d{font-family:'Jua';font-size:17px;color:var(--ink);flex:none}
  .history .day .s{font-size:15px;color:#9a8a6e;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
  .history .day .n{font-family:'Jua';background:var(--sun);color:#7a5a10;border-radius:20px;padding:2px 10px;font-size:14px;flex:none}
  .empty{color:#b0a288;text-align:center;padding:14px;font-size:16px}
  .tip{text-align:center;color:#b0a288;font-size:14px;margin-top:20px;line-height:1.5}
  .mascot{font-size:40px;text-align:center;margin-top:6px}
  /* popup */
  #up{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:99;padding:20px}
  #up .box{background:#fff;border-radius:18px;max-width:380px;width:100%;padding:18px}
  #up h3{font-family:'Jua';margin:.2em 0 .5em;color:var(--ink)}
  #up .lnk{background:#f3f0e8;border-radius:10px;padding:9px;font-size:12px;word-break:break-all;margin:8px 0;font-family:monospace}
  #up button{font-family:'Jua';width:100%;border:none;border-radius:12px;padding:12px;margin-top:6px;font-size:15px;cursor:pointer}
  .b1{background:#2B3A67;color:#fff}.b2{background:#FFC94D;color:#7a5a10}.b3{background:#eee;color:#555}
  #chromebar{position:fixed;left:0;right:0;bottom:0;z-index:120;background:#2B3A67;color:#fff;
    display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;
    font-family:'Jua';font-size:16px;box-shadow:0 -4px 16px rgba(0,0,0,.25)}
  #chromebar button{font-family:'Jua';border:none;background:#FFC94D;color:#7a5a10;border-radius:20px;
    padding:9px 16px;font-size:15px;flex:none;cursor:pointer}
  #michelp{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:130;padding:22px}
  #michelp .mh-box{background:#fff;border-radius:20px;max-width:420px;width:100%;padding:20px}
  #michelp .mh-t{font-family:'Jua';font-size:22px;color:var(--ink);margin-bottom:6px}
  #michelp .mh-s{font-size:16px;color:#7a6a4e;line-height:1.5;margin-bottom:10px}
  #michelp .mh-l{margin:0 0 12px;padding-left:22px;color:var(--ink);font-size:16px;line-height:1.7}
  #michelp .mh-l b{color:#c97a00}
  #michelp button{font-family:'Jua';width:100%;border:none;border-radius:14px;padding:13px;margin-top:8px;font-size:16px;cursor:pointer}
  #michelp .mh-btn1{background:#2B3A67;color:#fff}
  #michelp .mh-btn2{background:#FFC94D;color:#7a5a10}
  .helpbtn{display:block;margin:14px auto 0;font-family:'Jua';border:none;background:#fff;color:#5a6a8a;
    border-radius:20px;padding:10px 18px;font-size:15px;box-shadow:var(--shadow);cursor:pointer}
  #helptab{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:140;padding:18px}
  #helptab .ht-box{background:#fff;border-radius:20px;max-width:440px;width:100%;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .ht-top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
  .ht-title{font-family:'Jua';font-size:21px;color:var(--ink)}
  .ht-x{border:none;background:#f0ece2;border-radius:50%;width:34px;height:34px;font-size:16px;color:#777;cursor:pointer}
  .ht-scroll{overflow-y:auto;padding:4px 18px 8px;font-size:16px;color:var(--ink);line-height:1.6}
  .ht-scroll h4{font-family:'Jua';color:#c97a00;margin:14px 0 4px;font-size:17px}
  .ht-scroll ol{margin:0 0 8px;padding-left:20px}
  .ht-scroll li{margin:3px 0}
  .ht-scroll .note{background:#fff7e8;border-radius:12px;padding:10px 12px;margin-top:8px;font-size:15px;color:#7a6a4e}
  .ht-copy{font-family:'Jua';border:none;background:#2B3A67;color:#fff;padding:14px;margin:8px 14px 14px;border-radius:14px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">성령이 배움노트 <span class="star">⭐</span></div>
    <div class="sub">오늘 배운 걸 말하면, 노트가 기억해 줄게!</div>
    <div class="datebar">
      <button id="prev">‹</button>
      <div class="today" id="dateLabel">오늘</div>
      <button id="next">›</button>
    </div>
    <div class="stars" id="starRow"></div>
  </header>

  <div class="card" id="sheet"></div>

  <div class="card reflect" id="reflect">
    <div class="rtitle">🌈 오늘 하루 돌아보기</div>
    <div class="rblock">
      <div class="rq">😄 제일 재미있었던 과목과 이유는?</div>
      <div class="row">
        <textarea class="note" id="funText" placeholder="예: 과학! 실험이 신기했어"></textarea>
        <button class="mic" id="funMic" title="말하기">🎙️</button>
      </div>
    </div>
    <div class="rblock">
      <div class="rq">😣 제일 어렵고 힘들었던 과목과 이유는?</div>
      <div class="row">
        <textarea class="note" id="hardText" placeholder="예: 수학! 분수가 헷갈렸어"></textarea>
        <button class="mic" id="hardMic" title="말하기">🎙️</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn play" id="playBtn">🔊 다시 들려줘</button>
    <button class="btn save" id="saveBtn">⭐ 오늘 저장</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="secttl">📅 지난 배움 기록</div>
  <div class="history" id="history"></div>

  <div class="mascot">🦉</div>
  <div class="tip">마이크 🎙️ 를 누르고 말하면 글씨로 적혀요.<br>매일 저장하면 별이 모여요!</div>
  <button id="helpBtn" class="helpbtn">❓ 마이크가 안 될 때 (도움말)</button>
</div>

<div id="helptab"><div class="ht-box">
  <div class="ht-top"><span class="ht-title">🎙️ 마이크 켜는 법</span><button id="htClose" class="ht-x">✕</button></div>
  <div class="ht-scroll" id="htBody"></div>
  <button id="htCopy" class="ht-copy">📋 도움말 복사하기</button>
</div></div>

<div id="up"><div class="box">
  <h3>📤 업로드 안내</h3>
  <div>이 파일을 깃허브에 올리면 아래 주소로 열려요:</div>
  <div class="lnk" id="upLink"></div>
  <button class="b1" id="upGit">깃허브 업로드 페이지 열기</button>
  <button class="b2" id="upNet">넷리파이 드롭 열기</button>
  <button class="b3" id="upClose">닫기</button>
</div></div>

<script>
const PERIODS=6;
const KEY=d=>"baeumnote:"+d;
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const t=new Date();return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate());};
let cur=todayStr();

const DOW=["일","월","화","수","목","금","토"];
function label(d){
  const [y,m,dd]=d.split("-").map(Number);
  const dt=new Date(y,m-1,dd);
  const t=todayStr();
  const tag=d===t?"오늘 · ":"";
  return tag+m+"월 "+dd+"일 ("+DOW[dt.getDay()]+")";
}

function load(d){ try{return JSON.parse(localStorage.getItem(KEY(d)))||null}catch(e){return null} }
function save(d,obj){ localStorage.setItem(KEY(d),JSON.stringify(obj)); }
function allDays(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("baeumnote:"))out.push(k.slice(10));}
  return out.sort().reverse();
}

function renderSheet(){
  const data=load(cur)||{periods:[]};
  const sheet=document.getElementById('sheet');
  sheet.innerHTML='';
  for(let i=0;i<PERIODS;i++){
    const p=data.periods[i]||{subject:"",text:""};
    const div=document.createElement('div');
    div.className='period'+((p.subject||p.text)?' filled':'');
    div.innerHTML=`
      <div class="phead">
        <span class="pill">${i+1}교시</span>
        <input class="subj" data-i="${i}" data-f="subject" placeholder="과목 (예: 국어, 수학)" value="${esc(p.subject)}">
      </div>
      <div class="row">
        <textarea class="note" data-i="${i}" data-f="text" placeholder="무엇을 배웠어? 말해도 돼!">${esc(p.text)}</textarea>
        <button class="mic" data-i="${i}" title="말하기">🎙️</button>
      </div>`;
    sheet.appendChild(div);
  }
  document.getElementById('dateLabel').textContent=label(cur);
  bindInputs();
  renderReflect();
  renderStars();
}
function renderReflect(){
  const data=load(cur)||{};
  const fun=document.getElementById('funText'), hard=document.getElementById('hardText');
  fun.value=(data.reflect&&data.reflect.fun)||"";
  hard.value=(data.reflect&&data.reflect.hard)||"";
  fun.closest('.rblock').classList.toggle('filled',!!fun.value);
  hard.closest('.rblock').classList.toggle('filled',!!hard.value);
}
function saveReflect(){
  const data=load(cur)||{periods:[]};
  data.reflect={fun:document.getElementById('funText').value,hard:document.getElementById('hardText').value};
  save(cur,data);
  document.getElementById('funText').closest('.rblock').classList.toggle('filled',!!data.reflect.fun);
  document.getElementById('hardText').closest('.rblock').classList.toggle('filled',!!data.reflect.hard);
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function collect(){
  const data=load(cur)||{periods:[]};
  data.periods=data.periods||[];
  document.querySelectorAll('[data-f]').forEach(el=>{
    const i=+el.dataset.i, f=el.dataset.f;
    data.periods[i]=data.periods[i]||{subject:"",text:""};
    data.periods[i][f]=el.value;
  });
  return data;
}
function bindInputs(){
  document.querySelectorAll('[data-f]').forEach(el=>{
    el.addEventListener('input',()=>{
      const data=collect(); save(cur,data);
      const wrap=el.closest('.period');
      const d=data.periods[+el.dataset.i];
      wrap.classList.toggle('filled',!!(d.subject||d.text));
    });
  });
  document.querySelectorAll('.mic').forEach(btn=>{ if(btn.dataset.i!==undefined) btn.addEventListener('click',()=>startMic(btn)); });
}

// 돌아보기 입력/마이크 연결
['funText','hardText'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',saveReflect);
});
function startMicEl(ta,btn){ runMic(ta,btn); }
document.getElementById('funMic').addEventListener('click',()=>startMicEl(document.getElementById('funText'),document.getElementById('funMic')));
document.getElementById('hardMic').addEventListener('click',()=>startMicEl(document.getElementById('hardText'),document.getElementById('hardMic')));

/* ---- 음성 입력 (Web Speech) ---- */
let rec=null;
function isChromeNow(){
  var ua=navigator.userAgent||"";
  return /Chrome\/[.0-9]+/.test(ua) && !/(SamsungBrowser|EdgA|OPR\/|Whale|UCBrowser|KAKAOTALK|NAVER|DaumApps|Line\/|FB_IAB|Instagram)/i.test(ua);
}
function openChrome(){
  var hostpath=location.host+location.pathname+location.search+location.hash;
  var intent="intent://"+hostpath+"#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url="+encodeURIComponent(location.href)+";end";
  try{ location.href=intent; }catch(e){}
}
function runMic(ta,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  // 1) 음성 인식 지원 안 함 → 크롬으로
  if(!SR){
    if(/Android/i.test(navigator.userAgent) && !isChromeNow()){
      if(confirm("이 브라우저는 마이크가 안 돼요.\n크롬으로 열까요? (소리·마이크 둘 다 크롬에서 잘 돼요)")) openChrome();
    } else {
      alert("이 브라우저는 음성 입력을 지원하지 않아요. 크롬으로 열어줘!");
    }
    return;
  }
  // 2) 이미 녹음 중이면 중지(토글)
  if(rec){ try{rec.stop();}catch(e){} rec=null; btn.classList.remove('rec'); return; }

  let base=ta.value?ta.value+" ":"";
  let got=false;
  try{ rec=new SR(); }catch(e){ alert("마이크를 시작할 수 없어요. 크롬으로 열어줘!"); return; }
  rec.lang="ko-KR"; rec.interimResults=true; rec.continuous=false; rec.maxAlternatives=1;
  btn.classList.add('rec');

  rec.onresult=e=>{
    got=true;
    let s=""; for(let k=0;k<e.results.length;k++) s+=e.results[k][0].transcript;
    ta.value=base+s;
    ta.dispatchEvent(new Event('input'));
  };
  rec.onerror=ev=>{
    btn.classList.remove('rec'); rec=null;
    const err=ev&&ev.error;
    if(err==='not-allowed'||err==='service-not-allowed'){
      showMicHelp();
    } else if(err==='no-speech'){
      alert("소리가 안 들렸어요. 마이크를 누르고 또렷하게 말해줘! 🎙️");
    } else if(err==='audio-capture'){
      alert("마이크를 찾을 수 없어요. 다른 앱이 마이크를 쓰고 있지 않은지 확인해줘.");
    } else if(err==='network'){
      alert("인터넷 연결을 확인해줘. 음성 인식은 인터넷이 필요해요.");

function conceptFor(merged){
  for(const c of CONCEPTS){ if(c.k.some(w=>merged.replace(/\s/g,"").includes(w.replace(/\s/g,"")))) return c; }
  return null;
}

function commentFor(p,idx){
  const subj=(p.subject||"").trim();
  const text=(p.text||"").trim();
  const merged=subj+" "+text;
  const con=conceptFor(merged);
  let hit=null;
  for(const f of FACTS){ if(f.k.some(w=>merged.includes(w))){hit=f;break;} }
  const open=OPENERS[(idx+Math.floor(Math.random()*OPENERS.length))%OPENERS.length];
  const subjLabel=subj?("‘"+subj+"’"):((idx+1)+"교시");
  let line1;
  if(text) line1=`${open} ${subjLabel} 시간에 "${text}" 를 배웠구나.`;
  else     line1=`${open} ${subjLabel} 시간을 잘 보냈구나.`;
  // 개념 설명은 따로 분리 (전용 카드로 크게 보여줌)
  const fact = hit ? hit.f : GENFACT[(idx)%GENFACT.length];
  const q    = hit ? hit.q : GENQ[(idx)%GENQ.length];
  return {period:idx+1, subj, line1, fact, q, concept:con};
}

function buildFeedback(data){
  const items=[];
  (data.periods||[]).forEach((p,i)=>{ if(p&&(p.subject||p.text)) items.push(commentFor(p,i)); });
  return items;
}

/* ---- 선생님 음성: 가장 자연스러운 한국어 보이스 자동 선택 ---- */
let TEACHER_VOICE=null;
function pickVoice(){
  if(!('speechSynthesis'in window)) return;
  const vs=speechSynthesis.getVoices()||[];
  const ko=vs.filter(v=>/ko(-|_)?KR/i.test(v.lang)||/korean|한국/i.test(v.name));
  // 자연스러운(구글/네트워크) 음성 우선, 여성 톤 우선
  const score=v=>{
    let s=0; const n=(v.name||"").toLowerCase();
    if(/google/.test(n))s+=5;
    if(/natural|wavenet|neural|premium|enhanced/.test(n))s+=4;
    if(/female|yuna|heami|sora|여성|여자/.test(n))s+=2;
    if(v.localService===false)s+=1; // 네트워크 음성이 보통 더 자연스러움
    return s;
  };
  ko.sort((a,b)=>score(b)-score(a));
  TEACHER_VOICE = ko[0] || vs[0] || null;
}
if('speechSynthesis'in window){
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}

function speakNow(t){
  if(!('speechSynthesis'in window)) return;
  try{
    speechSynthesis.cancel();
    if(!TEACHER_VOICE) pickVoice();
    const u=new SpeechSynthesisUtterance(t);
    u.lang="ko-KR";
    if(TEACHER_VOICE) u.voice=TEACHER_VOICE;
    u.rate=0.86;   // 천천히, 또박또박
    u.pitch=1.15;  // 다정하고 밝은 톤
    u.volume=1;
    speechSynthesis.speak(u);
  }catch(e){}
}

      html:`<div class="fbrow">
        <div class="fbtag">${it.period}교시${it.subj?' · '+esc(it.subj):''}</div>
        <div class="fbline">👩‍🏫 ${esc(it.line1)}</div>
        <div class="fbfact">💡 ${esc(it.fact)}</div>
        <div class="fbq">🤔 <b>${esc(it.q)}</b></div>
      </div>`,
      say:`${it.line1} ${it.fact} ${it.q}`});
    // 개념 정리 전용 카드 (말한 주제를 선생님이 설명)
    if(it.concept){
      cards.push({
        html:`<div class="fbrow concept">
          <div class="fbtag" style="background:#7C5CFC">📖 개념 정리 · ${esc(it.concept.t)}</div>
          <div class="fbline">👩‍🏫 ${esc(it.concept.t)}에 대해 설명해 줄게!</div>
          <div class="fbfact">${esc(it.concept.d)}</div>
        </div>`,
        say:`${it.concept.t}에 대해 설명해 줄게. ${it.concept.d}`});
    }
  });
  const fun=(data.reflect&&data.reflect.fun||"").trim();
  const hard=(data.reflect&&data.reflect.hard||"").trim();
  if(fun){
    cards.push({html:`<div class="fbrow" style="background:#fff7e8">
        <div class="fbtag" style="background:#FFC94D;color:#7a5a10">😄 제일 재미있었던 과목</div>
        <div class="fbline">👩‍🏫 "${esc(fun)}" 라고 했구나. 좋아하는 게 생기면 공부가 놀이처럼 즐거워져!</div>
        <div class="fbq">🤔 <b>그 과목이 왜 그렇게 재미있었는지 한 가지만 더 말해 줄래?</b></div>
      </div>`,
      say:`제일 재미있었던 건 ${fun} 라고 했지. 좋아하는 게 있으면 공부가 놀이처럼 즐거워져!`});
  }
  if(hard){
    cards.push({html:`<div class="fbrow" style="background:#fdeeee">
        <div class="fbtag" style="background:#FF8A7A">😣 제일 어려웠던 과목</div>
        <div class="fbline">👩‍🏫 "${esc(hard)}" 가 어려웠구나. 솔직하게 말한 너, 정말 용감해!</div>
        <div class="fbfact">💡 어려운 건 못하는 게 아니라 아직 배우는 중이라는 뜻이야. 내일 한 번만 더 보면 훨씬 쉬워져.</div>
        <div class="fbq">🤔 <b>어디가 제일 헷갈렸어? 같이 천천히 풀어보자!</b></div>
      </div>`,
      say:`제일 어려웠던 건 ${hard} 라고 했구나. 솔직하게 말한 너 정말 용감해! 어려운 건 아직 배우는 중이라는 뜻이야.`});
  }
  cards.push({html:`<div class="fbrow" style="background:#eefaf2;text-align:center">
      <div class="fbline">🌟 오늘도 정말 잘했어. 내일도 화이팅! 🌟</div></div>`,
      say:`오늘도 정말 잘했어. 내일도 화이팅!`});
  return cards;
}

function showStep(){
  const el=document.getElementById('feedback');
  const c=stepCards[stepIdx];
  el.innerHTML=c.html +
    `<div class="stepbar">${stepIdx+1} / ${stepCards.length} · <b>${stepIdx<stepCards.length-1?'저장 버튼을 또 누르면 다음 코멘트 ▶':'마지막이야! 참 잘했어 🎉'}</b></div>`;
  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth',block:'center'});
  speakNow(c.say);
}

document.getElementById('saveBtn').addEventListener('click',()=>{
  // 1) 진행 중인 음성 인식 멈추고 화면값 반영
  if(rec){ try{rec.stop();}catch(e){} rec=null; }
  document.querySelectorAll('.mic.rec').forEach(b=>b.classList.remove('rec'));

  let data=collect();
  // 2) 혹시 화면에서 못 읽었으면, 저장돼 있던 값으로 보완 (음성으로 넣은 글자 보호)
  const stored=load(cur);
  if(stored&&stored.periods){
    data.periods=data.periods||[];
    stored.periods.forEach((p,i)=>{
      if(!p) return;
      data.periods[i]=data.periods[i]||{subject:"",text:""};
      if(!data.periods[i].subject && p.subject) data.periods[i].subject=p.subject;
      if(!data.periods[i].text && p.text) data.periods[i].text=p.text;
    });
  }

  const any=data.periods.some(p=>p&&((p.subject&&p.subject.trim())||(p.text&&p.text.trim())));
  if(!any){ alert("오늘 배운 걸 한 가지라도 적어줘! 🎙️\n(말한 글자가 칸에 보이는지 확인해줘)"); return; }
  data.savedAt=new Date().toISOString();
  data.star=true;
  data.reflect={fun:document.getElementById('funText').value,hard:document.getElementById('hardText').value};
  save(cur,data);
  renderStars(); renderHistory();

  // 같은 날 내용이면 이어서 다음 코멘트로, 새로 시작이면 1번부터
  const key=cur+"|"+JSON.stringify(data.periods)+"|"+(data.reflect.fun||"")+"|"+(data.reflect.hard||"");
  if(stepKey!==key || !stepCards){ stepCards=buildCards(data); stepIdx=0; stepKey=key; }
  else { stepIdx=(stepIdx+1)%stepCards.length; }
  showStep();
});

function renderStars(){
  const days=allDays().filter(d=>{const x=load(d);return x&&x.star;});
  const row=document.getElementById('starRow');
  row.innerHTML = days.length? days.slice(0,14).map(()=> '<span>⭐</span>').join('')+(days.length>14?` <span style="font-family:Jua;color:#c97a00">+${days.length-14}</span>`:'') 
    : '<span style="color:#c9bda3;font-size:15px">오늘 저장하면 첫 별이 생겨요 ✨</span>';
}
function renderHistory(){
  const days=allDays();
  const h=document.getElementById('history');
  if(!days.length){h.innerHTML='<div class="empty">아직 기록이 없어요. 오늘부터 시작! 🌱</div>';return;}
  h.innerHTML='';
  days.forEach(d=>{
    const x=load(d); if(!x)return;
    const filled=(x.periods||[]).filter(p=>p&&(p.subject||p.text));
    const summary=filled.map(p=>p.subject||'').filter(Boolean).join(' · ')||'기록';
    const div=document.createElement('div');
    div.className='day';
    div.innerHTML=`<span class="d">${label(d).replace('오늘 · ','')}</span><span class="s">${esc(summary)}</span><span class="n">${filled.length}과목</span>`;
    div.addEventListener('click',()=>{cur=d;renderSheet();renderHistory();document.getElementById('feedback').classList.remove('show');window.scrollTo({top:0,behavior:'smooth'});});
    h.appendChild(div);
  });
}

document.getElementById('prev').addEventListener('click',()=>shift(-1));
document.getElementById('next').addEventListener('click',()=>shift(1));
function shift(n){
  const [y,m,d]=cur.split("-").map(Number);
  const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n);
  cur=dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate());
  document.getElementById('feedback').classList.remove('show');
  renderSheet();
}

/* ---- 소리 안정: 크롬이 아니면 크롬으로 열기 (안드로이드) ---- */
(function(){
  var ua=navigator.userAgent||"";
  var isAndroid=/Android/i.test(ua);
  var isChrome=/Chrome\/[.0-9]+/.test(ua) && !/(SamsungBrowser|EdgA|OPR\/|Whale|UCBrowser|KAKAOTALK|NAVER|DaumApps|Line\/|FB_IAB|Instagram)/i.test(ua);
  if(!isAndroid || isChrome) return;
  var hostpath=location.host+location.pathname+location.search+location.hash;
  var fb=encodeURIComponent(location.href);
  var intent="intent://"+hostpath+"#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url="+fb+";end";
  function go(){ try{ location.href=intent; }catch(e){} }
  // 자동 1회 시도
  try{ if(!sessionStorage.getItem('toChrome')){ sessionStorage.setItem('toChrome','1'); setTimeout(go,200); } }catch(e){ setTimeout(go,200); }
  // 자동이 막히면 탭으로
  setTimeout(function(){
    if(document.getElementById('chromebar')) return;
    var bar=document.createElement('div');
    bar.id='chromebar';
    bar.innerHTML='<span>🔊 소리가 잘 나오려면 크롬에서 열어요</span><button id="cbBtn">크롬에서 열기</button>';
    document.body.appendChild(bar);
    document.getElementById('cbBtn').addEventListener('click',go);
  },900);
})();
