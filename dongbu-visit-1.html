<style>
  :root{ --accent:#ffd60a; --link:#6fc3ff; --good:#5be39a; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{ -webkit-text-size-adjust:100%; }
  body{margin:0;background:#000;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    line-height:1.7;font-size:19px;}
  body.fs2{font-size:22px} body.fs3{font-size:26px} body.fs4{font-size:30px}

  a{color:var(--link);}
  /* 강한 포커스 표시 (키보드·스위치 사용자) */
  a:focus-visible, button:focus-visible{outline:4px solid var(--accent);outline-offset:3px;border-radius:8px;}

  .skip{position:absolute;left:-999px;top:0;background:var(--accent);color:#000;padding:12px 16px;font-weight:800;z-index:200;}
  .skip:focus{left:8px;top:8px;}

  /* 상단 */
  header{background:linear-gradient(180deg,#16294a,#0c1730);padding:22px 16px 18px;text-align:center;border-bottom:2px solid #2a3f63;}
  .emblem{width:120px;height:120px;margin:0 auto 12px;border-radius:50%;overflow:hidden;background:#172c4b;border:2px solid #3a5c8a;}
  .emblem img{width:100%;height:100%;object-fit:cover;display:block;}
  h1{font-size:1.5em;margin:0 0 6px;font-weight:900;letter-spacing:-.5px;}
  .addr{font-size:.8em;color:#bcd0ee;margin:0;}

  /* 글자크기 조절 */
  .fsbar{display:flex;gap:8px;justify-content:center;align-items:center;padding:12px 12px 4px;background:#0a0a0a;border-bottom:1px solid #222;}
  .fsbar .lbl{font-size:.8em;color:#bbb;margin-right:4px;}
  .fsbtn{min-width:54px;min-height:48px;font-size:1em;font-weight:800;background:#1c1c1c;color:#fff;border:2px solid #444;border-radius:12px;}
  .fsbtn[aria-pressed="true"]{background:var(--accent);color:#000;border-color:var(--accent);}

  /* 전체 듣기 바 */
  .playall{padding:14px 14px 4px;background:#0a0a0a;}
  .playall button{width:100%;min-height:70px;font-size:1.15em;font-weight:900;border-radius:16px;border:3px solid var(--good);
    background:#0c2a1c;color:var(--good);display:flex;align-items:center;justify-content:center;gap:10px;}
  .playall button.on{background:#3a1010;border-color:#ff7a7a;color:#ff9d9d;}
  .playall button:active{transform:scale(.99)}
  .pstat{text-align:center;font-size:.78em;color:#9a9a9a;padding:8px 14px 2px;min-height:1.2em;}

  main{padding:6px 14px 30px;}
  section{border:2px solid #333;border-radius:18px;margin:16px 0;background:#0c0c0c;overflow:hidden;}
  .shead{display:flex;align-items:center;gap:12px;padding:16px 16px;background:#141414;border-bottom:2px solid #2a2a2a;}
  .shead .ic{font-size:1.5em;}
  .shead h2{flex:1;margin:0;font-size:1.15em;font-weight:900;color:var(--accent);}
  .listenbtn{min-width:96px;min-height:54px;font-size:.86em;font-weight:900;border-radius:13px;
    background:#10243d;color:#aee0ff;border:2px solid #2f6aa0;display:flex;align-items:center;justify-content:center;gap:6px;}
  .listenbtn.on{background:#3a1010;color:#ff9d9d;border-color:#ff7a7a;}

  .sbody{padding:10px 16px 18px;}
  .item{font-size:1em;padding:12px 0;border-bottom:1px solid #222;color:#f2f2f2;}
  .item:last-child{border-bottom:none;}
  .item b{color:#fff;}
  .hl{color:var(--accent);font-weight:800;}

  .acts{margin-top:14px;display:flex;flex-direction:column;gap:12px;}
  .act{min-height:64px;display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;
    font-size:1.02em;font-weight:800;border-radius:14px;text-decoration:none;padding:10px 14px;line-height:1.3;}
  .act.call{background:#0c2a1c;color:var(--good);border:3px solid #2f9c6a;}
  .act.web{background:#10243d;color:#aee0ff;border:3px solid #2f6aa0;}
  .act.map{background:#181828;color:#cdb6ff;border:3px solid #6a4fa0;}
  .act.ig{background:linear-gradient(45deg,#f09433,#dc2743 55%,#bc1888);color:#fff;border:3px solid #ffffff33;}
  .act.gov{background:#22344a;color:#cfe2ff;border:3px solid #3a5c8a;}
  .act:active{opacity:.9}

  .codebox{background:#000;border:2px solid #444;border-radius:12px;padding:14px;font-size:.95em;color:var(--good);
    word-break:break-all;margin:10px 0;font-weight:700;}
  .note{background:#241a06;border:2px solid #5a4410;border-radius:12px;padding:14px;margin-top:12px;font-size:.92em;color:#ffe6a6;}
  .note b{color:#fff}

  footer{padding:22px 18px 60px;color:#999;font-size:.78em;text-align:center;line-height:1.7;border-top:1px solid #222;}

  /* 업로드 팝업 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-bg.show{display:flex;}
  .modal{width:100%;max-width:400px;background:#101010;border:2px solid #444;border-radius:18px;padding:22px;}
  .modal h3{margin:0 0 6px;font-size:1.1em;}
  .modal p{margin:0 0 12px;font-size:.85em;color:#bbb;}
  .mlink{background:#000;border:2px solid #444;border-radius:10px;padding:13px;font-size:.85em;color:var(--good);word-break:break-all;margin-bottom:6px;font-weight:700;}
  .mcopied{font-size:.78em;color:var(--good);height:18px;margin-bottom:8px;font-weight:800;}
  .mbtn{display:block;width:100%;text-align:center;min-height:60px;line-height:60px;border-radius:13px;border:2px solid #444;
    background:#1c1c1c;color:#fff;font-size:.95em;font-weight:800;margin-top:10px;text-decoration:none;}
  .mbtn.pri{background:var(--good);border-color:var(--good);color:#03150d;}
  .mclose{margin-top:14px;background:none;border:none;color:#888;font-size:.85em;width:100%;min-height:44px;}
</style>
</head>

  var main=document.getElementById('main');
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  DATA.forEach(function(s){
    var sec=document.createElement('section');
    sec.id='sec-'+s.id;
    sec.setAttribute('aria-labelledby','h-'+s.id);
    var h='<div class="shead"><span class="ic" aria-hidden="true">'+s.ic+'</span>'
        +'<h2 id="h-'+s.id+'">'+esc(s.title)+'</h2>'
        +'<button class="listenbtn" data-sec="'+s.id+'" aria-label="'+esc(s.title)+' 음성으로 듣기">🔊 듣기</button></div>';
    h+='<div class="sbody">';
    s.items.forEach(function(it){ h+='<p class="item">'+esc(it)+'</p>'; });
    if(s.code){ h+='<div class="codebox" aria-label="주소">'+esc(s.code)+'</div>'; }
    if(s.acts&&s.acts.length){
      h+='<div class="acts">';
      s.acts.forEach(function(a){
        h+='<a class="act '+a.cls+'" href="'+a.href+'" '
          +(/^https?:/.test(a.href)?'target="_blank" rel="noopener"':'')+'>'+esc(a.label)+'</a>';
      });
      h+='</div>';
    }
    h+='</div>';
    sec.innerHTML=h;
    main.appendChild(sec);
  });

  /* ===================== 글자 크기 ===================== */
  document.querySelectorAll('.fsbtn').forEach(function(b){
    b.addEventListener('click',function(){
      document.body.className=document.body.className.replace(/\bfs[1-4]\b/,'')+' fs'+b.dataset.fs;
      document.querySelectorAll('.fsbtn').forEach(function(x){x.setAttribute('aria-pressed', x===b?'true':'false');});
    });
  });

  /* ===================== 음성(TTS) ===================== */
  var synth=window.speechSynthesis, koVoice=null, rate=0.96;
  function pickVoice(){
    var vs=synth?synth.getVoices():[]; if(!vs) return;
    koVoice=vs.filter(function(v){return /ko(-|_)?KR/i.test(v.lang)||/korean|한국/i.test(v.name);})[0]
          || vs.filter(function(v){return /^ko/i.test(v.lang);})[0] || null;
  }
  if(synth){ pickVoice(); synth.onvoiceschanged=pickVoice; }

  var queue=[], qi=0, mode=null; // mode: 'all' | section id

  function buildQueue(items){
    var out=[];
    items.forEach(function(t){
      t=String(t).replace(/[○]/g,'').replace(/\s+/g,' ').trim();
      // 문장 단위로 쪼개기 (안드로이드 크롬 끊김 방지)
      t.split(/(?<=[.!?])\s+/).forEach(function(p){ p=p.trim(); if(p) out.push(p); });
    });
    return out;
  }
  function speakNext(){
    if(mode===null) return;
    if(qi>=queue.length){ stopSpeak(true); return; }
    var u=new SpeechSynthesisUtterance(queue[qi]);
    u.lang='ko-KR'; u.rate=rate; u.pitch=1; if(koVoice)u.voice=koVoice;
    u.onend=function(){ if(mode===null)return; qi++; speakNext(); };
    u.onerror=function(){ if(mode===null)return; qi++; setTimeout(speakNext,120); };
    try{ synth.speak(u); }catch(e){ qi++; setTimeout(speakNext,150); }
  }
  function startSpeak(items, newMode, statusText){
    stopSpeak(false);
    queue=buildQueue(items); qi=0; mode=newMode;
    setStatus(statusText||'음성 안내 재생 중…');
    setTimeout(speakNext,80);
    updateButtons();
  }
  function stopSpeak(finished){
    mode=null; try{synth.cancel();}catch(e){}
    setStatus(finished?'음성 안내가 끝났습니다.':'');
    updateButtons();
  }
  function setStatus(t){ document.getElementById('pstat').textContent=t; }

  function updateButtons(){
    var pa=document.getElementById('playAll');
    var onAll = mode==='all';
    pa.classList.toggle('on',onAll);
    pa.textContent = onAll ? '⏹ 멈추기' : '🔊 전체 안내 음성으로 듣기';
    pa.setAttribute('aria-label', onAll ? '음성 안내 멈추기' : '전체 안내를 음성으로 듣기');
    document.querySelectorAll('.listenbtn').forEach(function(b){
      var on = mode===b.dataset.sec;
      b.classList.toggle('on',on);
      b.textContent = on ? '⏹ 멈춤' : '🔊 듣기';
    });
  }

  document.getElementById('playAll').addEventListener('click',function(){
    if(mode==='all'){ stopSpeak(false); return; }
    var all=[];
    DATA.forEach(function(s){ all.push(s.title+'.'); s.items.forEach(function(i){all.push(i);}); });
    startSpeak(all,'all','전체 안내 재생 중…');
  });
  document.addEventListener('click',function(e){
    var b=e.target.closest('.listenbtn'); if(!b) return;
    var id=b.dataset.sec;
    if(mode===id){ stopSpeak(false); return; }
    var s=DATA.filter(function(x){return x.id===id;})[0]; if(!s)return;
    var arr=[s.title+'.'].concat(s.items);
    startSpeak(arr,id,s.title+' 재생 중…');
  });
  /* 크롬 끊김 방지 */
  setInterval(function(){ if(mode!==null && synth.speaking && !synth.paused){ try{synth.resume();}catch(e){} } },5000);
  /* 페이지 떠날 때 정지 */
  window.addEventListener('pagehide',function(){ try{synth.cancel();}catch(e){} });

  /* ===================== 업로드 안내 팝업 ===================== */
  var host=location.hostname||'';
  if(/github\.io$/i.test(host)||/netlify\.app$/i.test(host)) return;
  var fname=decodeURIComponent((location.pathname.split('/').pop()||'').trim());
  if(!/\.html?$/i.test(fname)) fname='dongbu-visit.html';
  var link='https://hdi800hdi800-pixel.github.io/praise/'+fname;
  document.getElementById('upLink').textContent=link;
  document.getElementById('btnNetlify').href='https://app.netlify.com/drop';
  document.getElementById('btnGithub').href='https://github.com/hdi800hdi800-pixel/praise/upload/main';
  function copy(msg){
    try{ navigator.clipboard.writeText(link).then(function(){
      document.getElementById('upCopied').textContent=msg||'✓ 링크가 복사됐어요. 카톡에 붙여넣기!';
    }).catch(fallback);}catch(e){fallback();}
  }
  function fallback(){
    try{var ta=document.createElement('textarea');ta.value=link;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
      document.getElementById('upCopied').textContent='✓ 링크 복사됨';
    }catch(e){document.getElementById('upCopied').textContent='복사 버튼을 눌러주세요';}
  }
  document.getElementById('btnCopy').addEventListener('click',function(){copy('✓ 복사 완료! 카톡에 붙여넣기');});
  document.getElementById('btnClose').addEventListener('click',function(){document.getElementById('upModal').classList.remove('show');});
  setTimeout(function(){document.getElementById('upModal').classList.add('show');copy();},600);
})();
</script>
</body>
</html>
