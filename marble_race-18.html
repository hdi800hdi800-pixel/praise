<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#000; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff; }
  #game { display:block; width:100vw; height:100vh; touch-action:none; }
  #musicBtn { position:fixed; top:10px; left:10px; z-index:30; display:none;
    width:42px; height:42px; border-radius:50%; border:1.5px solid #1f6b4f;
    background:rgba(10,20,30,.55); color:#fff; font-size:19px; cursor:pointer; backdrop-filter:blur(4px); }
  #musicBtn:active { transform:scale(.94); }

  #setup { position:fixed; inset:0; z-index:50;
    background:radial-gradient(circle at 50% 30%, #0a0f1f, #000 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; overflow-y:auto; }
  #setup h1 { font-size:30px; font-weight:900; letter-spacing:1px; text-align:center; margin-bottom:4px;
    color:#fff; text-shadow:0 0 12px #00e5ff, 0 0 28px #00e5ff; }
  #setup .tag { font-size:13px; color:#7fd4ff; margin-bottom:22px; text-shadow:0 0 8px #00aaff; }
  .panel { width:100%; max-width:380px; }
  .panel label { font-size:12px; color:#9fb3c8; display:block; margin-bottom:6px; font-weight:700; letter-spacing:.5px; }
  textarea { width:100%; height:170px; background:#0b1220; color:#eaf6ff; border:1.5px solid #16324d;
    border-radius:14px; padding:14px; font-size:15px; line-height:1.7; resize:none; outline:none;
    box-shadow:inset 0 0 14px rgba(0,160,255,.08); }
  textarea:focus { border-color:#00c2ff; box-shadow:inset 0 0 16px rgba(0,194,255,.18); }
  .hint2 { font-size:11px; color:#5f7488; margin-top:8px; line-height:1.5; }
  .start { width:100%; max-width:380px; margin-top:18px; padding:17px; border:none; cursor:pointer;
    font-size:18px; font-weight:900; letter-spacing:1px; color:#001018;
    background:linear-gradient(135deg,#00e5ff,#7c4dff); border-radius:16px; box-shadow:0 0 24px rgba(0,229,255,.5); }
  .start:active { transform:scale(.98); }
  #replayWrap { position:fixed; left:50%; bottom:38px; transform:translateX(-50%); z-index:40; display:none; }
  #replay { padding:15px 30px; border:none; cursor:pointer; font-size:16px; font-weight:900; color:#001018;
    background:linear-gradient(135deg,#ffe14d,#ff7ce0); border-radius:30px; box-shadow:0 0 24px rgba(255,124,224,.5); }
  #replay:active { transform:scale(.97); }

  .gh-overlay{position:fixed;inset:0;background:rgba(20,20,40,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
  .gh-overlay.show{opacity:1;pointer-events:auto}
  .gh-card{background:#fff;color:#1a1a2e;border-radius:20px;width:100%;max-width:360px;padding:24px 20px 20px;text-align:center;transform:translateY(20px);transition:transform .3s;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .gh-overlay.show .gh-card{transform:translateY(0)}
  .gh-emoji{font-size:44px;margin-bottom:8px}
  .gh-card h2{font-size:18px;font-weight:800;margin-bottom:6px}
  .gh-card .gh-desc{font-size:13px;color:#777;line-height:1.5;margin-bottom:16px}
  .gh-linkbox{background:#f0f4ff;border-radius:12px;padding:10px 12px;margin-bottom:14px;text-align:left}
  .gh-linkbox .gh-label{font-size:10px;color:#2F5BEA;font-weight:700;letter-spacing:.5px}
  .gh-linkbox .gh-val{font-size:12px;color:#333;word-break:break-all;margin-top:2px}
  .gh-btn{display:block;width:100%;text-decoration:none;background:linear-gradient(135deg,#2F5BEA,#6a1b9a);color:#fff;font-size:15px;font-weight:800;padding:15px;border-radius:14px;margin-bottom:10px;border:none;cursor:pointer}
  .gh-btn:active{opacity:.85}
  .gh-btn.netlify{background:linear-gradient(135deg,#00ad9f,#00c7b7)}
  .gh-btn.copy{background:#fff;color:#2F5BEA;border:2px solid #2F5BEA}
  .gh-close{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;margin-top:4px;text-decoration:underline}
  .gh-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;z-index:10000;opacity:0;transition:opacity .3s;pointer-events:none}
  .gh-toast.show{opacity:1}
</style>

<script>
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
let DPR=Math.min(window.devicePixelRatio||1,2), CW=0, CH=0;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); CW=innerWidth; CH=innerHeight;
  canvas.width=CW*DPR; canvas.height=CH*DPR; canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

const PALETTE=['#b8ff3d','#ff4dd2','#7c9bff','#ff6ec7','#5dffd0','#5fd0ff','#c77dff','#ff6b6b','#ffd24d','#4dff9e','#ff9a4d','#4dd2ff'];
const CYAN='#22e6ff', YELLOW='#ffd24d';

const W=480, WALL=18, R=13;
let H=0, finishY=0;
let walls=[], pegs=[], bumpers=[], spinners=[], diamonds=[], dpegs=[];
let balls=[], finishOrder=[], running=false, startTime=0, raceClock=0, gateOpen=false, raceOver=false;
let sfxHit=0, confetti=[], fireworks=[], camY=0;
let winnerName=null, winnerColor=null, winnerShownAt=0;

function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function seg(ax,ay,bx,by,gate){ walls.push({ax,ay,bx,by,gate:!!gate}); }

function buildTrack(){
  walls=[]; pegs=[]; bumpers=[]; spinners=[]; diamonds=[]; dpegs=[];
  const L=WALL, Rt=W-WALL;
  const D45=Math.PI/4;

  // 출발 게이트
  seg(L, 132, Rt, 132, true);

  // 구간1: 시안 다이아몬드 핀 밭
  for(let row=0,yy=320; yy<780; yy+=92,row++){
    const off=(row%2)?46:0;
    for(let xx=66+off; xx<W-50; xx+=92) dpegs.push({x:xx,y:yy,half:15,ang:D45});
  }

  // 구간2: 회전 다이아몬드 A (크기 줄이고 사이 공간 넓힘)
  diamonds.push({cx:W*0.28, cy:980,  half:72, ang:D45, w:0.011});
  diamonds.push({cx:W*0.72, cy:1180, half:70, ang:D45, w:-0.013});
  diamonds.push({cx:W*0.30, cy:1400, half:66, ang:D45, w:0.015});
  diamonds.push({cx:W*0.72, cy:1600, half:64, ang:D45, w:-0.016});

  // 구간3: 지그재그 채널
  let dir=1;
  for(let i=0;i<5;i++){
    const top=1820+i*168;
    if(dir>0) seg(L+40, top, W*0.72, top+138);
    else      seg(Rt-40, top, W*0.28, top+138);
    dir*=-1;
  }

  // 구간4: 시안 플리퍼 바 + 노란 범퍼 믹서
  spinners.push({cx:W*0.34, cy:2780, len:120, ang:0,   w:0.04,  th:14});
  spinners.push({cx:W*0.66, cy:2840, len:120, ang:1.2, w:-0.045,th:14});
  bumpers.push({x:W*0.5,  y:2680, r:54});
  bumpers.push({x:W*0.24, y:2980, r:42});
  bumpers.push({x:W*0.76, y:2980, r:42});

  // 구간5: 회전 다이아몬드 B (작게, 엇갈리게)
  diamonds.push({cx:W*0.28, cy:3120, half:62, ang:D45, w:0.018});
  diamonds.push({cx:W*0.72, cy:3300, half:62, ang:D45, w:-0.018});
  diamonds.push({cx:W*0.30, cy:3500, half:58, ang:D45, w:0.02});

  // 구간6: 노란 링 핀 밭
  for(let row=0,yy=3560; yy<3940; yy+=98,row++){
    const off=(row%2)?64:0;
    for(let xx=60+off; xx<W-45; xx+=128) pegs.push({x:xx,y:yy,r:15});
  }

  // 구간7: 막판 교란 대형 다이아몬드
  diamonds.push({cx:W*0.5, cy:4080, half:78, ang:D45, w:0.05});

  // 구간8: Y자 갈림 결승 + 깔때기 플리퍼 + 노란 링 (영상 스타일)
  let ey=4280;
  seg(L, ey, W*0.5-42, ey+250);          // 좌측 깔때기
  seg(Rt, ey, W*0.5+42, ey+250);         // 우측 깔때기
  seg(W*0.5, ey+95, W*0.5, ey+360);      // 중앙 분리대 (Y)
  seg(W*0.5-42, ey+250, W*0.5-42, ey+360);
  seg(W*0.5+42, ey+250, W*0.5+42, ey+360);
  spinners.push({cx:W*0.30, cy:ey+70, len:90, ang:0.5,  w:0, th:15, bouncy:true, bob:{base:ey+70, amp:38, spd:0.05, t:0}});
  spinners.push({cx:W*0.70, cy:ey+70, len:90, ang:-0.5, w:0, th:15, bouncy:true, bob:{base:ey+70, amp:38, spd:0.05, t:Math.PI}});
  bumpers.push({x:W*0.50, y:ey-80, r:30});   // 깔때기 입구 위 노란 링
  bumpers.push({x:W*0.32, y:ey+150, r:26});  // 깔때기 안 핀볼 링(작게)
  bumpers.push({x:W*0.68, y:ey+150, r:26});
  finishY=ey+370; H=ey+540;

  // 외벽 + 천장
  seg(L,60,L,H); seg(Rt,60,Rt,H); seg(L,60,Rt,60);
}

function makeBalls(names){
  balls=[]; finishOrder=[];
  const n=names.length;
  const span=W-2*WALL-40;
  const gap=Math.min(40, span/n);
  const startX=W/2 - gap*(n-1)/2;
  names.forEach((nm,i)=>{
    balls.push({ name:nm, color:PALETTE[i%PALETTE.length],
      x:startX+i*gap, y:110, vx:0, vy:0, r:R, finished:false, place:0, stuck:0 });
  });
}

// ---------- 물리 ----------
const GRAV=0.19, REST=0.56, MAXV=15, SUBSTEPS=6;

function collideSeg(b,ax,ay,bx,by,rest,addVx,addVy){
  const abx=bx-ax, aby=by-ay, len2=abx*abx+aby*aby||1e-6;
  let t=clamp(((b.x-ax)*abx+(b.y-ay)*aby)/len2,0,1);
  const cx=ax+abx*t, cy=ay+aby*t;
  let dx=b.x-cx, dy=b.y-cy, d=Math.hypot(dx,dy);
  if(d<b.r){
    if(d<1e-6){ dx=0; dy=-1; d=1; }
    const nx=dx/d, ny=dy/d;
    b.x=cx+nx*b.r; b.y=cy+ny*b.r;
    const vn=b.vx*nx+b.vy*ny;
    if(vn<0){ b.vx-=(1+rest)*vn*nx; b.vy-=(1+rest)*vn*ny; if(-vn>2) sfxHit=Math.max(sfxHit,-vn); }
    if(addVx||addVy){ b.vx+=addVx; b.vy+=addVy; }
  }
}
function collidePeg(b,p){
  let dx=b.x-p.x, dy=b.y-p.y, d=Math.hypot(dx,dy); const minD=b.r+p.r;
  if(d<minD){ if(d<1e-6){dx=0;dy=-1;d=1;} const nx=dx/d, ny=dy/d;
    b.x=p.x+nx*minD; b.y=p.y+ny*minD; const vn=b.vx*nx+b.vy*ny;
    if(vn<0){ b.vx-=(1+REST)*vn*nx; b.vy-=(1+REST)*vn*ny; if(-vn>2) sfxHit=Math.max(sfxHit,-vn); } }
}
function collideBumper(b,p){
  let dx=b.x-p.x, dy=b.y-p.y, d=Math.hypot(dx,dy); const minD=b.r+p.r;
  if(d<minD){ if(d<1e-6){dx=0;dy=-1;d=1;} const nx=dx/d, ny=dy/d;
    b.x=p.x+nx*minD; b.y=p.y+ny*minD; const vn=b.vx*nx+b.vy*ny;
    if(vn<0){ const RB=1.05; b.vx-=(1+RB)*vn*nx; b.vy-=(1+RB)*vn*ny;
      b.vx+=nx*3.8; b.vy+=ny*3.8;          // 펑! 크게 튀어오름
      if(-vn>1) sfxHit=Math.max(sfxHit,-vn+3); p.flash=10; } }
}
// 회전 사각형(다이아몬드) 충돌 - 로컬 좌표 AABB 방식
function collideRotSquare(b,cx,cy,half,ang,w,rest){
  const cs=Math.cos(-ang), sn=Math.sin(-ang);
  const lx=(b.x-cx)*cs-(b.y-cy)*sn, ly=(b.x-cx)*sn+(b.y-cy)*cs;
  const qx=clamp(lx,-half,half), qy=clamp(ly,-half,half);
  let dx=lx-qx, dy=ly-qy, d=Math.hypot(dx,dy);
  if(d<b.r){
    let nlx,nly,newlx,newly;
    if(d>1e-6){ nlx=dx/d; nly=dy/d; newlx=qx+nlx*b.r; newly=qy+nly*b.r; }
    else { const dl=half+lx,drr=half-lx,dt=half+ly,db=half-ly,m=Math.min(dl,drr,dt,db);
      if(m===dl){nlx=-1;nly=0;}else if(m===drr){nlx=1;nly=0;}else if(m===dt){nlx=0;nly=-1;}else{nlx=0;nly=1;}
      newlx=lx+nlx*b.r; newly=ly+nly*b.r; }
    const c2=Math.cos(ang), s2=Math.sin(ang);
    b.x=cx+newlx*c2-newly*s2; b.y=cy+newlx*s2+newly*c2;
    const wnx=nlx*c2-nly*s2, wny=nlx*s2+nly*c2, vn=b.vx*wnx+b.vy*wny;
    if(vn<0){ b.vx-=(1+rest)*vn*wnx; b.vy-=(1+rest)*vn*wny;
      if(w){ const push=w*38; b.vx+=-wny*push; b.vy+=wnx*push; }
      if(-vn>2) sfxHit=Math.max(sfxHit,-vn); }
  }
}
function ballBall(a,b){
  let dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy); const minD=a.r+b.r;
  if(d<minD){ if(d<1e-6){dx=Math.random()-0.5;dy=Math.random()-0.5;d=Math.hypot(dx,dy)||1;}
    const nx=dx/d, ny=dy/d, ov=(minD-d)/2;
    a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
    const va=a.vx*nx+a.vy*ny, vb=b.vx*nx+b.vy*ny, diff=vb-va;
    a.vx+=diff*nx; a.vy+=diff*ny; b.vx-=diff*nx; b.vy-=diff*ny; }
}

function step(){
  for(const s of spinners){ s.ang+=s.w; if(s.bob){ s.bob.t+=s.bob.spd; s.cy=s.bob.base+Math.sin(s.bob.t)*s.bob.amp; } }
  for(const dm of diamonds) dm.ang+=dm.w;
  sfxHit=0;
  let leadY=-1e9, lastY=1e9, leadBall=null, lastBall=null;
  for(const b of balls){ if(b.finished) continue;
    if(b.y>leadY){ leadY=b.y; leadBall=b; }
    if(b.y<lastY){ lastY=b.y; lastBall=b; } }

  for(let sub=0; sub<SUBSTEPS; sub++){
    for(const b of balls){
      if(b.finished){ b.vy+=GRAV; b.y+=b.vy/SUBSTEPS; continue; }
      b.vy+=GRAV/SUBSTEPS;
      // 극적 역전 강화 — 선두는 결승 직전에 확 잡아두고(가까울수록 더), 꼴등은 따라붙게
      if(gateOpen){
        const zone=1200;
        const nearFinish = b.y > finishY-zone;
        if(nearFinish){
          const prox = Math.min(1,(b.y-(finishY-zone))/zone);   // 0→1 (결승 가까울수록)
          if(b===leadBall){ b.vy*=(0.955-0.06*prox); b.vx+=(Math.random()-0.5)*0.35; } // 선두 강하게 정체
          else if(b===lastBall){ b.vy+=(0.20+0.30*prox)/SUBSTEPS; }                      // 꼴등 따라잡기
        } else {
          const gap=leadY-b.y;                                  // 평소엔 너무 벌어지지 않게
          if(gap>120){ b.vy+=Math.min(gap*0.0006,0.08)/SUBSTEPS; }
        }
      }
      const sp=Math.hypot(b.vx,b.vy); if(sp>MAXV){ b.vx*=MAXV/sp; b.vy*=MAXV/sp; }
      b.x+=b.vx/SUBSTEPS; b.y+=b.vy/SUBSTEPS;

      for(const w of walls){ if(w.gate && gateOpen) continue; collideSeg(b,w.ax,w.ay,w.bx,w.by,REST); }
      for(const dp of dpegs){ if(Math.abs(dp.y-b.y)<40) collideRotSquare(b,dp.x,dp.y,dp.half,dp.ang,0,0.6); }
      for(const dm of diamonds){ if(Math.abs(dm.cy-b.y)<dm.half+50) collideRotSquare(b,dm.cx,dm.cy,dm.half,dm.ang,dm.w,0.62); }
      for(const p of pegs){ if(Math.abs(p.y-b.y)<60) collidePeg(b,p); }
      for(const bm of bumpers){ if(Math.abs(bm.y-b.y)<bm.r+40) collideBumper(b,bm); }
      for(const s of spinners){ const c=Math.cos(s.ang),sn=Math.sin(s.ang),hx=c*s.len/2,hy=sn*s.len/2,pu=s.w*40;
        const rest=s.bouncy?1.05:0.7, ky=s.bouncy?-4.2:0;  // bouncy 플리퍼는 위로 펑 차올림
        collideSeg(b,s.cx-hx,s.cy-hy,s.cx+hx,s.cy+hy,rest,-sn*pu,c*pu+ky); }
    }
    for(let i=0;i<balls.length;i++) for(let j=i+1;j<balls.length;j++){
      if(balls[i].finished||balls[j].finished) continue; ballBall(balls[i],balls[j]); }
  }

  for(const b of balls) if(!b.finished && b.y>finishY){ b.finished=true; b.place=finishOrder.length+1; finishOrder.push(b); }
  // 끼임 방지: 거의 멈춘 공은 밀어줌 (결승 근처에선 더 강하게)
  if(gateOpen) for(const b of balls){ if(b.finished) continue;
    const near=b.y>finishY-700;
    if(Math.hypot(b.vx,b.vy)<(near?0.7:0.45)) b.stuck++; else b.stuck=0;
    if(b.stuck>(near?38:70)){ b.vx+=(Math.random()-0.5)*5; b.vy+=near?4.2:2.6; b.stuck=0; } }
  if(sfxHit>0 && gateOpen) Audio2.blip(sfxHit);
}

function updateCamera(){
  let lead=null;
  for(const b of balls){ if(!b.finished && (!lead||b.y>lead.y)) lead=b; }
  if(!lead){ lead=balls[0]; for(const b of balls) if(b.y>lead.y) lead=b; }
  const target=clamp(lead.y-CH*0.42, 0, Math.max(0,H-CH/scale*scale));
  camY+=(target-camY)*0.12;
  camY=clamp(camY,0,Math.max(0,H-CH/scale));
}

let scale=1, offX=0;
function worldToScreen(){ const maxW=Math.min(CW,560); scale=maxW/W; offX=(CW-W*scale)/2; }
function sx(x){ return offX+x*scale; }
function sy(y){ return (y-camY)*scale; }
function vTop(){ return camY; }
function vBot(){ return camY+CH/scale; }

function drawGlowLine(ax,ay,bx,by,color,width,blur){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=width; ctx.lineCap='round';
  ctx.shadowColor=color; ctx.shadowBlur=blur;
  ctx.beginPath(); ctx.moveTo(sx(ax),sy(ay)); ctx.lineTo(sx(bx),sy(by)); ctx.stroke(); ctx.restore();
}
function drawGlowRing(x,y,r,color,width,blur){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=width; ctx.shadowColor=color; ctx.shadowBlur=blur;
  ctx.beginPath(); ctx.arc(sx(x),sy(y),r*scale,0,Math.PI*2); ctx.stroke(); ctx.restore();
}
function drawDiamond(cx,cy,half,ang,fillA,glow){
  ctx.save(); ctx.translate(sx(cx),sy(cy)); ctx.rotate(ang);
  ctx.shadowColor=CYAN; ctx.shadowBlur=glow;
  ctx.fillStyle='rgba(34,230,255,'+fillA+')';
  ctx.fillRect(-half*scale,-half*scale,half*2*scale,half*2*scale);
  ctx.lineWidth=2.5; ctx.strokeStyle=CYAN;
  ctx.strokeRect(-half*scale,-half*scale,half*2*scale,half*2*scale);
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,CW,CH); ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
  for(const w of walls){ if(w.gate&&gateOpen) continue;
    if(Math.max(w.ay,w.by)<vTop()-40||Math.min(w.ay,w.by)>vBot()+40) continue;
    drawGlowLine(w.ax,w.ay,w.bx,w.by, w.gate?'#ff5db0':'#ffffff', 3, w.gate?14:10); }
  for(const dp of dpegs){ if(dp.y<vTop()-30||dp.y>vBot()+30) continue; drawDiamond(dp.x,dp.y,dp.half,dp.ang,0.9,14); }
  for(const dm of diamonds){ if(dm.cy<vTop()-dm.half-30||dm.cy>vBot()+dm.half+30) continue; drawDiamond(dm.cx,dm.cy,dm.half,dm.ang,0.85,26); }
  for(const p of pegs){ if(p.y<vTop()-30||p.y>vBot()+30) continue; drawGlowRing(p.x,p.y,p.r,YELLOW,3.5,16); }
  for(const bm of bumpers){ if(bm.y<vTop()-bm.r-20||bm.y>vBot()+bm.r+20) continue;
    const f=bm.flash>0; if(bm.flash>0) bm.flash--; drawGlowRing(bm.x,bm.y,bm.r, f?'#fff7b0':YELLOW, f?7:5, f?30:20); }
  for(const s of spinners){ if(s.cy<vTop()-120||s.cy>vBot()+120) continue;
    const c=Math.cos(s.ang),sn=Math.sin(s.ang),hx=c*s.len/2,hy=sn*s.len/2;
    drawGlowLine(s.cx-hx,s.cy-hy,s.cx+hx,s.cy+hy,CYAN,s.th,18); }
  if(finishY>vTop()-20&&finishY<vBot()+20) drawGlowLine(WALL,finishY,W-WALL,finishY,'#ff3df0',3,14);

  for(const b of balls){ if(b.y<vTop()-40||b.y>vBot()+60) continue;
    ctx.save(); ctx.shadowColor=b.color; ctx.shadowBlur=20; ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(sx(b.x),sy(b.y),b.r*scale,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='#ff2d55'; ctx.stroke(); ctx.restore();
    ctx.save(); ctx.font='700 13px sans-serif'; ctx.textAlign='center'; ctx.fillStyle=b.color;
    ctx.shadowColor=b.color; ctx.shadowBlur=8; ctx.fillText(b.name,sx(b.x),sy(b.y)+b.r*scale+15); ctx.restore(); }

  drawMinimap(); drawLeaderboard(); drawCountdown(); drawConfetti(); drawWinner();
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawMinimap(){
  const mw=46, mh=Math.min(CH*0.62,360), mx=10, my=(CH-mh)/2, s=mh/H;
  ctx.save(); ctx.globalAlpha=0.92; ctx.fillStyle='rgba(10,20,30,.55)';
  ctx.strokeStyle='#1f6b4f'; ctx.lineWidth=1.5; roundRect(mx,my,mw,mh,8); ctx.fill(); ctx.stroke();
  for(const b of balls){ ctx.fillStyle=b.color; ctx.beginPath();
    ctx.arc(mx+mw/2+(b.x-W/2)*(mw/W), my+b.y*s, 2.2, 0, Math.PI*2); ctx.fill(); }
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1; ctx.strokeRect(mx,my+camY*s,mw,(CH/scale)*s);
  ctx.restore();
}
function rankOrder(){ const fin=[...finishOrder], act=balls.filter(b=>!b.finished).sort((a,b)=>b.y-a.y); return fin.concat(act); }
function drawLeaderboard(){
  const order=rankOrder(), total=balls.length;
  ctx.save(); ctx.textAlign='right';
  ctx.font='800 22px sans-serif'; ctx.fillStyle='#cfd8e3'; ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText(finishOrder.length+' / '+total, CW-14, 30);
  ctx.font='800 19px sans-serif'; let yy=64;
  order.forEach((b,i)=>{ let pre=b.finished?(b.place===1?'☆ ':'✔ '):'';
    ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=8;
    ctx.fillText(pre+b.name+'  #'+(i+1), CW-14, yy); yy+=33; });
  ctx.restore();
}
function drawCountdown(){
  if(gateOpen && raceClock>2.7) return;
  let txt=''; if(raceClock<0.8) txt='3'; else if(raceClock<1.5) txt='2'; else if(raceClock<2.1) txt='1';
  else if(raceClock<2.7) txt='출발!';
  if(!txt) return;
  ctx.save(); ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#00e5ff'; ctx.shadowBlur=24;
  ctx.font='900 '+(txt==='출발!'?64:90)+'px sans-serif';
  ctx.fillText(txt, CW/2, CH*0.32); ctx.restore();
}
function spawnConfetti(){
  confetti=[]; fireworks=[];
  for(let i=0;i<160;i++) confetti.push({ x:Math.random()*CW, y:-20-Math.random()*CH*0.5,
    vx:(Math.random()-0.5)*2.2, vy:1.5+Math.random()*3, size:8+Math.random()*12,
    color:PALETTE[i%PALETTE.length], rot:Math.random()*Math.PI, vrot:(Math.random()-0.5)*0.3 });
  for(let b=0;b<5;b++) setTimeout(burstFirework, b*260); // 폭죽 5발
}
function burstFirework(){
  const cx=CW*(0.2+Math.random()*0.6), cy=CH*(0.15+Math.random()*0.35);
  const col=PALETTE[Math.floor(Math.random()*PALETTE.length)], n=34;
  for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2, sp=2+Math.random()*3.2;
    fireworks.push({ x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, color:col, life:1 }); }
  Audio2.pop();
}
function drawConfetti(){
  if(fireworks.length){ ctx.save();
    for(let i=fireworks.length-1;i>=0;i--){ const p=fireworks[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.vx*=0.98; p.vy*=0.98; p.life-=0.018;
      if(p.life<=0){ fireworks.splice(i,1); continue; }
      ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); }
    ctx.restore(); }
  if(!confetti.length) return; ctx.save();
  for(const c of confetti){ c.x+=c.vx; c.y+=c.vy; c.vy+=0.06; c.rot+=c.vrot;
    if(c.y>CH+30){ c.y=-20; c.x=Math.random()*CW; c.vy=1.5+Math.random()*3; }
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.fillStyle=c.color; ctx.globalAlpha=0.9;
    ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size); ctx.restore(); }
  ctx.restore();
}
function drawWinner(){
  if(finishOrder.length>0 && !winnerName){ winnerName=finishOrder[0].name; winnerColor=finishOrder[0].color;
    winnerShownAt=performance.now(); Audio2.fanfare(); spawnConfetti(); }
  if(!winnerName) return;
  const a=Math.min(1,(performance.now()-winnerShownAt)/500);
  // 우측 하단 Winner 배너만 표시
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='right';
  ctx.font='800 30px sans-serif'; ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=6;
  ctx.fillText('Winner', CW-30, CH-110);
  ctx.font='900 56px sans-serif'; ctx.fillStyle=winnerColor; ctx.shadowColor=winnerColor; ctx.shadowBlur=24;
  ctx.fillText(winnerName, CW-30, CH-56); ctx.restore();
}

function loop(){
  if(!running) return;
  worldToScreen();
  if(!raceOver){
    raceClock=(performance.now()-startTime)/1000;
    if(!gateOpen && raceClock>=2.1){ gateOpen=true; Audio2.go(); }
    if(gateOpen) step(); else { for(const b of balls){ b.vy+=GRAV; b.y+=b.vy*0.2; for(const w of walls) collideSeg(b,w.ax,w.ay,w.bx,w.by,0.2); for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++) ballBall(balls[i],balls[j]); } }
    updateCamera();
    if(finishOrder.length>=1){ raceOver=true; document.getElementById('replayWrap').style.display='block'; } // 1등 나오면 즉시 종료
  }
  render(); // 종료 후에도 폭죽·컨페티·배너는 계속 애니메이션
  requestAnimationFrame(loop);
}

function startRace(){
  const raw=document.getElementById('names').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const names=raw.slice(0,12);
  if(names.length<2){ alert('이름을 2명 이상 입력해주세요!'); return; }
  buildTrack(); makeBalls(names);
  camY=0; winnerName=null; winnerColor=null; confetti=[]; fireworks=[]; gateOpen=false; raceClock=0; raceOver=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('replayWrap').style.display='none';
  document.getElementById('musicBtn').style.display='block';
  Audio2.init(); unlockTTS();
  running=true; startTime=performance.now(); requestAnimationFrame(loop);
}
document.getElementById('startBtn').addEventListener('click',startRace);
document.getElementById('replay').addEventListener('click',()=>{ running=false; try{speechSynthesis.cancel();}catch(e){} document.getElementById('replayWrap').style.display='none'; document.getElementById('setup').style.display='flex'; });
document.getElementById('musicBtn').addEventListener('click',function(){ this.textContent=Audio2.toggle()?'🔇':'🔊'; });

// 우승자 음성 안내 (브라우저 TTS)
let _ttsUnlocked=false, _lastWinText='';
function unlockTTS(){   // 사용자가 버튼 누른 순간 음성 엔진을 깨워둠 (모바일 자동재생 차단 회피)
  if(_ttsUnlocked || !('speechSynthesis' in window)) return;
  try{
    speechSynthesis.getVoices();
    const u=new SpeechSynthesisUtterance(' '); u.volume=0; u.lang='ko-KR';
    speechSynthesis.speak(u);
    _ttsUnlocked=true;
  }catch(e){}
}
function speakWinner(name){
  if(Audio2.muted || !('speechSynthesis' in window)) return;
  _lastWinText = '축하합니다! ' + name + ' 님 당첨! 아빠에게 커피를 살 쿠폰을 드립니다!';
  const pick=()=>{
    try{
      const u=new SpeechSynthesisUtterance(_lastWinText);
      u.lang='ko-KR'; u.rate=1.05; u.pitch=1.22; u.volume=1;   // 살짝 높고 신나는 톤
      const vs=speechSynthesis.getVoices().filter(v=>/ko/i.test(v.lang));
      if(vs.length) u.voice=vs[0];
      speechSynthesis.cancel(); speechSynthesis.resume(); speechSynthesis.speak(u);
    }catch(e){}
  };
  // 팡파레가 끝날 즈음 말하도록 약간 지연
  setTimeout(()=>{
    if(speechSynthesis.getVoices().length===0){ speechSynthesis.onvoiceschanged=pick; setTimeout(pick,400); }
    else pick();
  }, 650);
}

// ---------- 사운드 (경쾌한 메이저 칩튠) ----------
const Audio2={
  ctx:null, master:null, musicG:null, muted:false, started:false, nextTime:0, step16:0, timer:null, lastBlip:0, _noise:null,
  init(){ if(this.started) return;
    try{ const AC=window.AudioContext||window.webkitAudioContext; this.ctx=new AC();
      this.master=this.ctx.createGain(); this.master.gain.value=0; this.master.connect(this.ctx.destination);
      this.musicG=this.ctx.createGain(); this.musicG.gain.value=0.17; this.musicG.connect(this.master);
      this.started=true;
      this.master.gain.setValueAtTime(0,this.ctx.currentTime);
      this.master.gain.linearRampToValueAtTime(this.muted?0:0.9,this.ctx.currentTime+1.0);
      this.startMusic();
    }catch(e){}
  },
  note(f,t,dur,type,gain,dest){ const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||'square'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    o.connect(g); g.connect(dest||this.musicG); o.start(t); o.stop(t+dur+0.02); },
  kick(t){ const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='sine';
    o.frequency.setValueAtTime(130,t); o.frequency.exponentialRampToValueAtTime(48,t+0.11);
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g); g.connect(this.musicG); o.start(t); o.stop(t+0.17); },
  hat(t){ if(!this._noise){ const b=this.ctx.createBuffer(1,this.ctx.sampleRate*0.2,this.ctx.sampleRate);
      const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; this._noise=b; }
    const s=this.ctx.createBufferSource(); s.buffer=this._noise;
    const hp=this.ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7500;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    s.connect(hp); hp.connect(g); g.connect(this.musicG); s.start(t); s.stop(t+0.05); },
  startMusic(){
    // C - G - Am - F (경쾌한 메이저 진행)
    const ARP=[ [261.63,329.63,392,523.25], [196,246.94,293.66,392], [220,261.63,329.63,440], [174.61,220,261.63,349.23] ];
    const BASS=[130.81,98,110,87.31];
    const LEAD=[523.25,659.25,587.33,783.99]; // 가끔 들어가는 밝은 멜로디 음
    const tempo=130, sixteenth=15/tempo;
    this.nextTime=this.ctx.currentTime+0.1; this.step16=0; const self=this;
    this.timer=setInterval(()=>{ if(!self.ctx) return;
      while(self.nextTime<self.ctx.currentTime+0.12){
        const s=self.step16, block=Math.floor(s/8)%4, ib=s%8, ch=ARP[block];
        self.note(ch[ib%ch.length], self.nextTime, 0.16, 'square', 0.42);
        if(ib===0||ib===4) self.note(BASS[block], self.nextTime, 0.40, 'triangle', 0.34);
        if(s%4===0) self.kick(self.nextTime);
        if(s%2===1) self.hat(self.nextTime);
        if(ib===2||ib===6) self.note(LEAD[block], self.nextTime, 0.22, 'square', 0.22);
        self.nextTime+=sixteenth; self.step16=(self.step16+1)%32;
      } }, 25);
  },
  blip(strength){ if(!this.ctx||this.muted) return; const now=this.ctx.currentTime;
    if(now-this.lastBlip<0.06) return; this.lastBlip=now;
    const f=440+Math.random()*560, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='square'; o.frequency.value=f; const vol=Math.min(0.13,0.04+(strength||0)*0.01);
    g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.07);
    o.connect(g); g.connect(this.master); o.start(now); o.stop(now+0.09); },
  go(){ if(!this.ctx) return; const t=this.ctx.currentTime; [392,523.25,659.25].forEach((f,i)=>this.note(f,t+i*0.08,0.3,'square',0.4,this.master)); },
  pop(){ if(!this.ctx||this.muted) return; const t=this.ctx.currentTime;
    // 폭죽 펑 + 반짝
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+0.18);
    g.gain.setValueAtTime(0.32,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.24);
    this.note(1318.5,t+0.02,0.12,'square',0.18,this.master); },
  fanfare(){ if(!this.ctx) return; const t=this.ctx.currentTime;
    // 빠- 빠- 밤!
    this.note(523.25,t,      0.18,'square',0.5,this.master);
    this.note(523.25,t+0.22, 0.18,'square',0.5,this.master);
    [523.25,659.25,783.99,1046.5].forEach(f=> this.note(f,t+0.46,1.2,'square',0.42,this.master)); // 밤! 큰 화음
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); // 베이스 쿵
    o.type='triangle'; o.frequency.setValueAtTime(131,t+0.46); o.frequency.exponentialRampToValueAtTime(65,t+0.95);
    g.gain.setValueAtTime(0.5,t+0.46); g.gain.exponentialRampToValueAtTime(0.001,t+1.15);
    o.connect(g); g.connect(this.master); o.start(t+0.46); o.stop(t+1.25); },
  toggle(){ this.muted=!this.muted; if(this.master&&this.ctx){ this.master.gain.cancelScheduledValues(this.ctx.currentTime);
    this.master.gain.linearRampToValueAtTime(this.muted?0:0.9,this.ctx.currentTime+0.2); } return this.muted; }
};

  window.__ghPagesUrl=pagesUrl; setTimeout(()=>document.getElementById('ghOverlay').classList.add('show'),600);
})();
function ghClose(){ document.getElementById('ghOverlay').classList.remove('show'); }
function ghCopyLink(){ var url=window.__ghPagesUrl||'';
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(t).catch(fb); } else fb();
  function fb(){ var x=document.createElement('textarea'); x.value=url; document.body.appendChild(x); x.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(x); t(); }
  function t(){ var el=document.getElementById('ghToast'); el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1600); }
}
