<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

<meta name="apple-mobile-web-app-capable" content="yes" />

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{--paper:#EAEDF2;--surface:#FFFFFF;--ink:#1A2230;--muted:#697585;--line:#E1E6EC;
    --navy:#244A7D;--navy-d:#1A3860;--green:#1B9C53;--red:#D23B3B;--seal:#C8372D;
    --shadow:0 1px 2px rgba(20,35,55,.05),0 6px 22px rgba(20,35,55,.06);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard","Pretendard Variable",-apple-system,system-ui,"Apple SD Gothic Neo",sans-serif;
    line-height:1.6;padding-bottom:80px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:620px;margin:0 auto;padding:0 14px}
  header{background:linear-gradient(135deg,#1F3F6E,#2C5896);color:#fff;padding:16px;position:sticky;top:0;z-index:30;box-shadow:0 4px 16px rgba(26,56,96,.22)}
  .htop{max-width:620px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .htop h1{font-size:17px;font-weight:800;margin:0;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .seal{width:26px;height:26px;border:2px solid #F4C9C4;border-radius:6px;display:grid;place-items:center;font-size:12px;font-weight:800;color:#FBE3E0;transform:rotate(-8deg);flex:none}
  .score{font-size:13px;font-weight:800;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .controls{max-width:620px;margin:12px auto 0;display:flex;gap:8px;align-items:center}
  .ctrl{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:inherit;font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px;cursor:pointer}
  .ctrl.on{background:#fff;color:var(--navy-d)}
  .spacer{flex:1}
  .bar{height:6px;background:#DDE3EB;border-radius:999px;overflow:hidden;margin:14px 2px 4px}
  .bar i{display:block;height:100%;background:var(--navy);width:0;transition:width .3s}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px 2px;text-align:center}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 16px;margin:14px 0}
  .qnum{display:inline-block;background:var(--navy);color:#fff;font-size:12.5px;font-weight:800;padding:3px 11px;border-radius:7px;margin-bottom:10px}
  .qtext{font-size:16px;font-weight:600;letter-spacing:-.2px;margin:0 0 14px;white-space:pre-wrap;word-break:break-word}
  .opt{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:#F7F9FC;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;font-family:inherit;font-size:14.5px;color:var(--ink);transition:.12s;position:relative;line-height:1.55}
  .opt:active{transform:scale(.995)}
  .opt .mk{flex:none;font-weight:800;color:var(--navy);font-size:15px;min-width:18px}
  .opt .tx{flex:1;padding-right:22px}
  .opt.correct{background:#EAF7EF;border-color:#9FD9B6}.opt.correct .mk{color:var(--green)}
  .opt.wrong{background:#FCEDEC;border-color:#EFB7B2}.opt.wrong .mk{color:var(--red)}
  .opt.disabled{cursor:default}
  .stamp{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:25px;font-weight:900;line-height:1;color:var(--seal)}
  .result{margin-top:6px;padding:13px 14px;border-radius:12px;font-size:14px;display:none}
  .result.show{display:block}
  .result.ok{background:#EAF7EF;color:#157A40;border:1px solid #BCE3CB}
  .result.no{background:#FCEDEC;color:#B3322C;border:1px solid #EAC2BE}
  .result b{font-weight:800}
  .expl{margin-top:8px;font-size:13px;color:#33404F;line-height:1.7;white-space:pre-wrap}
  .retry{margin-top:10px;background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-weight:700;font-size:13px;padding:7px 13px;border-radius:9px;cursor:pointer}
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:620px;margin:0 auto;z-index:25}
  .nav button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;background:var(--navy);color:#fff}
  .nav button.ghost{background:#EEF1F5;color:var(--navy-d);border:1px solid var(--line)}
  .nav button:disabled{opacity:.4}
  .jump{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:700}
  .jump input{width:52px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;text-align:center}
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(16px);background:#1A2230;color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .allwrap .qcard{margin:12px 0}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1><span class="seal">검</span> 형집행법령 문제집</h1>

  </div>
  <div class="controls">
    <button class="ctrl on" id="m1" onclick="setMode('one')">한 문제씩</button>
    <button class="ctrl" id="m2" onclick="setMode('all')">전체 보기</button>
    <span class="spacer"></span>

</header>

</div>

<div class="nav" id="nav">

  <button id="next" onclick="go(1)">다음 →</button>
</div>
<div class="toast" id="toast"></div>

<script>
const QUIZDATA=[{"n": 1, "stem": "「형집행법령」의 내용으로 맞는 것은?", "opts": ["「형집행법」에서는 수형자의 건전한 사회복귀를 지원하기 위하여 교정시설에 취업알선 및 창업지원에 관한 협의기구를 둘 수 있도록 규정하고 있다.", "소장은 석방될 수형자의 자립지원 및 피해자 보호를 위하여 필요하다고 인정하면 해당 수형자의 수용이력 또는 사회복귀에 관한 의견을 그의 거주지를 관할하는 보호관찰소나 법인 또는 개인에게 통보할 수 있다.", "수용자가 감염병으로 사망한 사실을 알게 된 사람이 사망 사실을 알게 된 날부터 3일 이내에 그 시신을 인수하지 아니하면 수용자를 임시로 매장할 수 있다.", "귀휴의 취소는 임의적 취소만 인정되고 교도관 동행귀휴는 예외적으로 소장이 필요하다고 인정하는 경우에 한다."], "ans": 4, "expl": "① 시행령 85조에 근거규정을 두고 있음 (령 85조 ①)\n② 보호관찰소가 아니라 경찰관서 (법 126조의 2 ①)\n③ 감염병은 즉시 화장하여야 함 (법 128조 ②)\n④ 소장이 필요하다고 인정하면 교도관을 동행시킬 수 있음(규칙 141조 ①)"}, {"n": 2, "stem": "「형집행법령」의 내용으로 맞는 것은?", "opts": ["학과교육생ㆍ직업훈련생 등은 전담교정시설에 수용되며, 그 특성에 알맞은 처우를 받는다.", "소장은 재심 청구사건의 대리인이 되려는 변호사 접견 수요 또는 접견실 사정 등을 고려하여 원활한 접견 사무 진행에 현저한 장애가 발생한다고 판단하면 접견 시간 및 횟수를 줄일 수 있다. 이 경우 줄어든 시간과 횟수는 다음 접견 시에 추가하여야 한다.", "교도관은 신입자를 인수한 경우 호송인에게 인수서를 써 주어야 한다. 인수서에는 신입자의 성명, 나이 및 인수일시를 적고 서명 또는 날인하여야 한다.", "다른 교정시설로부터 이송되어 온 사람에게도 청원, 소장면담, 진정에 관한 사항을 알려줄 수 있다."], "ans": 1, "expl": "① (법 57조 ⑥)\n② 추가하도록 노력하여야 한다. (령 59조의 2 ④)\n③ 소장이 인수서를 받는 주체, 교도관은 서명 날인함 (령 13조 ②)\n④ 알려주어야 한다. (법 17조 3호)"}, {"n": 3, "stem": "「형집행법령」 및 청원관련규정에 대한 설명으로 맞는 것은?", "opts": ["순회점검공무원에 대한 청원은 말로도 할 수 있으며, 순회점검공무원이 청원을 청취하는 경우에는 해당 교정시설의 교도관이 참여하여서는 아니 된다. 다만, 보이는 거리에서 수용자를 관찰할 수 있다.", "순회점검공무원은 법 제117조제1항의 청원을 스스로 결정하는 것이 부적당하다고 인정하는 경우에는 그 내용을 법무부장관 또는 지방교정청장에게 보고하여야 한다.", "수용자의 청원처리의 기준ㆍ절차 등에 관하여 필요한 사항은 법무부령으로 정한다.", "순회점검공무원에 대한 청원을 문서로 하였을 경우에도 소장이 청원서를 받아 청원부에 관련사항을 기록한 후 순회점검 공무원에게 전달하여야 한다."], "ans": 4, "expl": "① 단서조항 삭제 (법 117조 ④)\n② 지방교정청장은 삭제 (법 139조 ④)\n③ 법무부장관이 정한다. (령 139조 ⑤)\n④ (법 117조 ③, 수용자청원처리지침 4조 ①)"}, {"n": 4, "stem": "「형집행법령」의 금품관리에 대한 설명으로 맞는 것은?", "opts": ["소장은 수용자 외의 사람이 수용자에게 음식물 외의 물품을 건네줄 것을 신청하는 경우 심리적인 안정을 해칠 우려가 있는 물품은 허가하지 않는다.", "소장은 수용자 외의 사람이 수용자에게 주려는 금품을 수용자가 받지 아니하려는 경우에는 해당 금품을 보낸 사람에게 되돌려 보낼 수 있다.", "소장은 상속인 또는 가족이 금품을 내어달라고 청구하면 지체없이 내어주어야 한다. 다만, 청구사유가 발생한 날부터 1년이 지나도 청구하지 아니하면 그 금품은 국고에 귀속된다.", "수용자 외의 사람이 수용자에게 금품을 건네줄 것을 신청하는 때에는 수형자의 교화 또는 건전한 사회복귀를 위하여 필요할 경우 허가할 수 있다."], "ans": 1, "expl": "① (규칙 22조 ③)\n② 보내야 한다. (법 27조 ②)\n③ 알림을 받은 날부터이며, 알려줄 수가 없는 경우에는 청구사유가 발생한 날부터 (법 28조 ②)\n④ 해칠우려가 있을때에 해당하지 아니하면 허가할 수 있다. (법 27조 ①)"}, {"n": 5, "stem": "「형집행법령」의 내용으로 맞는 것은?", "opts": ["수용자의 접견횟수는 매월 4회로 하고, 접견 시간은 회당 30분 이내, 장소는 접촉차단시설이 설치된 장소에서 하게 한다.", "중경비처우급 수형자에게는 처우상 특히 필요하다고 인정하는 경우 접촉차단시설이 설치된 장소 외의 장소에서 접견하게 할 수 있다.", "미결수용자가 변호인과 접견하는 경우 및 수용자가 소송사건의 대리인인 변호사와 접견하는 경우에는 언제나 접촉차단시설이 설치되지 아니한 장소에서 접견하게 하여야 한다.", "서신의 상대방이 누구인지 확인할 수 없는 때에는 편지의 내용을 검열하고, 발신을 금지시킬 수 있다."], "ans": 2, "expl": "① 수형자의 (령 58조 ②)\n② (규칙 88조)\n③ 소송사건의 대리인인 변호사와의 접견, 상소권 회복 및 재심 청구사건의 대리인이 되려는 변호사와 접견하는 경우에는 시설의 안전 또는 질서를 해칠 우려가 없는 경우에 한하여 접촉차단시설이 없는 장소에서 접견하게 할 수 있다. (법 41조 ②, 령 59조 ②)\n④ 검열사유에는 해당하지만, 수발신 금지사유에는 해당되지 않음 (법 43조 ④⑤)"}, {"n": 6, "stem": "「형집행법령」의 내용으로 맞는 것은?", "opts": ["수용자에 대한 전화통화허가는 소장의 재량이나, 허용횟수는 중경비처우급 수형자에 대해서는 월 2회를 초과하지 못하도록 규정하고 있다.", "마약류수용자에게는 본인이 신청한 경우에는 중독을 치료하기 위한 재활교육을 부과할 수 있고, 강제에 의하지 아니하는 범위에서 소변을 채취하여 마약반응검사를 할 수 있다.", "최루탄과 전자충격기는 강제력의 행사사유에 해당하더라도 상황이 긴급하여 다른 보안장비로는 그 목적을 달성할 수 없을 때에만 사용 가능하다.", "소장은 수용자의 신체 등을 검사한 후 금지물품이 발견되면 그 금지물품을 수용자에게 알린 후 교정시설에 보관한다. 다만, 수용자가 동의하면 폐기할 수 있다."], "ans": 1, "expl": "① 처우상 특히 필요한 경우에는 개방처우급ㆍ완화경비처우급 수형자의 전화통화 허용횟수를 늘릴 수 있다. (규칙 90조 ②)\n② 소장은 마약류수용자가 마약류 근절(根絶) 의지를 갖고 이를 실천할 수 있도록 해당 교정시설의 여건에 적합한 마약류수용자 재활교육계획을 수립하여 시행하여야 한다. (규칙 209조 ①)\n③ 전기교도봉과 ~ (규칙 187조 ①)\n④ 금지물품이 발견되면 형사 법령으로 정하는 절차에 따라 처리할 물품을 제외하고는 수용자에게 알린 후 폐기한다. 다만, 폐기하는 것이 부적당한 물품은 교정시설에 보관하거나 수용자로 하여금 자신이 지정하는 사람에게 보내게 할 수 있다. (법 93조 ⑤)"}, {"n": 7, "stem": "「형집행법령」의 내용 중 맞는 것은?", "opts": ["교도관은 소장의 명령을 받아 무기를 사용한다. 다만, 그 명령을 받을 시간적 여유가 없으면 그 직무를 대행하는 사람의 명령을 받아 사용한다.", "교도관이 총기를 사용하는 경우에는 구두경고, 공포탄 발사 등의 방법으로 사전에 이를 경고하여야 한다. 다만, 상황이 급박하여 경고할 시간적인 여유가 없는 때에는 그러하지 아니하다.", "소장은 교정시설의 안에서 천재지변 등으로 피난의 방법이 없는 경우에는 수용자를 다른 장소로 이송하거나 일시석방하여야 한다.", "징벌혐의자 기피신청이 있는 경우에도 해당 징벌위원은 징벌위원회에 참석할 수 있다."], "ans": 4, "expl": "① 교도관은 소장 또는 그 직무를 대행하는 사람의 명령을 받아 무기를 사용한다. 다만, 그 명령을 받을 시간적 여유가 없으면 그러하지 아니하다. (법 101조 ③)\n② 경고는 사전에 상대방에 대하여 하여야 함 (법 101조 ④)\n③ 이송이 불가능하면 일시석방할 수 있음 (법 102조 ②)\n④ 위원회 의결로 기피여부가 결정되지 않으면 참석이 가능함 (법 111조 ⑤)"}, {"n": 8, "stem": "「형집행법령」의 내용으로 맞는 것은?", "opts": ["수용자가 징벌집행을 유예받은 후 규율위반행위 없이 유예기간이 지난 경우에는 그 징벌의 집행은 종료된 것으로 본다.", "인성검사는 모든 신입심사 대상자에 대해 실시하여야 하고, 지능 및 적성검사는 신입심사 대상자로서 집행할 형기가 형집행지휘서 접수일로부터 1년 이상이고 나이가 35세 이하인 경우로 한다.", "외부직업훈련은 개방·완화경비처우급 및 처우상 특히 필요한 일반경비처우급 수형자에게 소장이 실시할 수 있고, 외부직업훈련비용은 국가가 부담한다.", "교정시설 밖에서의 활동을 허가하는 경우 소장은 별도의 수형자 의류를 지정하여 입게 한다. 다만, 처우상 필요한 경우에는 자비구매의류를 입게 할 수 있다."], "ans": 4, "expl": "① 수용자가 징벌집행을 유예받은 후 징벌을 받음이 없이 유예기간이 지나면 그 징벌의 집행은 종료된 것으로 본다. (법 114조 ③)\n② 분류심사가 유예되거나, 인성검사가 곤란하거나, 불필요하다고 인정되는 때에는 하지 않을 수 있음 (규칙 71조 ②)\n③ 일반경비처우급은 대상이 아님 (규칙 96조 ①)\n④ (규칙 92조 ②)"}, {"n": 9, "stem": "「형집행법령」에 대한 설명으로 맞는 것은?", "opts": ["소장은 청원에 관한 결정서를 접수하면 청원인에게 이를 지체없이 통보하여야 한다.", "수용자는 그 처우에 관하여 소장 또는 소속 교도관에게 면담을 신청할 수 있다.", "소장은 수용자에 대하여 1년에 1회 이상 건강검진을 하여야 하며,「건강검진기본법」에 따라 지정된 건강검진기관에 의뢰하여 할 수 있다.", "소장은 보관품이 현금ㆍ수표ㆍ금ㆍ은ㆍ보석ㆍ유가증권ㆍ인장, 그 밖에 특별히 보관할 필요가 있는 귀중품인 경우에는 잠금장치가 되어 있는 견고한 용기에 넣어 보관해야 한다."], "ans": 3, "expl": "① 전달하여야 한다. (법 117조 ⑥)\n② 소속 교도관은 제외 (법 116조 ①)\n③ (령 51조 ②)\n④ 현금과 수표는 제외 (령 36조)"}, {"n": 10, "stem": "「형집행법령」 및 관련 법령에 대한 설명으로 맞는 것은?", "opts": ["구금·보호시설의 직원은 국가인권위원회 위원 등이 시설수용자를 면담하는 장소 또는 시설수용 진정인과 위원 등이 면담하는 장소에 참여하지 못한다.", "소장은 수용자가 진료 또는 음식물의 섭취를 거부하는 경우에도 의무관의 관찰·조언·설득 없이는 곧바로 의무관으로 하여금 적당한 진료 또는 영양보급 등의 조치를 하게 할 수는 없다.", "분류처우위원회·징벌위원회·귀휴심사위원회·취업지원협의회는 교정시설별로 설치되고, 그 위원은 소장이 임명 또는 위촉한다.", "소장은 접견 중인 수용자가 수용자의 처우 또는 교정시설의 운영에 관하여 거짓사실을 유포하는 때에는 접견을 중지할 수 있다."], "ans": 2, "expl": "① 구금ㆍ보호시설의 직원은 위원 등이 시설수용자를 면담하는 장소에 참석할 수 있다. 다만, 대화 내용을 녹음하거나 녹취하지 못한다. (인권위법 24조 ⑤)\n   시설에 수용되어 있는 진정인(진정을 하려는 사람을 포함한다)과 위원 또는 위원회 소속 직원의 면담에는 구금ㆍ보호시설의 직원이 참여하거나 그 내용을 듣거나 녹취하지 못한다. 다만, 보이는 거리에서 시설수용자를 감시할 수 있다. (인권위법 31조 ⑥)\n② (형집행법 40조 ②)\n③ 취업지원협의회 외부위원은 법무부장관이 위촉한다. (형집행법 시행규칙 146조 ①)\n④ 교도관은 (법 42조)\n ※ 형집행법에서 교도관이 주체인 경우\n    접견의 중지, 신체·거실검사, 전자장비를 이용한 계호, 보호장비의 사용, 강제력 행사, 무기의 사용, 수용을 위한 체포 \n (헷갈리기 쉬운 것 : 보호실 수용, 진정실 수용, 재난 시의 조치)"}, {"n": 11, "stem": "「형집행법령」 및 관련 법령에 대한 설명으로 맞는 것은?", "opts": ["소장은 자살·자해 등을 방지하기 위하여 필요한 범위에서 전자장비를 이용하여 수용자 또는 시설을 계호할 수 있다.", "「교도관 직무규칙」에 따르면 교정직 교도관 이외의 교도관으로 하여금 교정직 교도관의 직무를 수행하게 할 수 있다.", "일반경비시설이란 도주방지 및 수형자 상호간의 접촉을 차단하는 통상적인 설비를 갖추고, 수형자에 대하여 통상적인 관리·감시를 하는 교정시설을 말한다.", "기본수용급상 수형자의 연령은 19세, 23세, 65세를 기준으로 구분하며, 경비처우급상 작업기준은 외부통근작업, 개방지역작업, 구내작업으로 구분한다."], "ans": 4, "expl": "① 교도관은 (94조 ①)\n② 교정시설의 운영을 위하여 특히 필요하다고 인정하는 경우에는 교정직교도관으로 하여금 그 밖의 교도관의 직무를 수행하게 할 수 있다. (교도관 직무규칙 25조 ②)\n③ 수형자 상호간의 접촉을 차단하는 것은 중경비시설임 (법 57조 ②)\n④ (규칙 74조 ②)"}, {"n": 12, "stem": "「형집행법령」 및 관련 법령에 대한 설명으로 맞는 것은?", "opts": ["정보공개에 따른 예상비용의 산정방법, 납부방법, 납부기간, 그 밖에 비용납부에 관하여 필요한 사항은 대통령령으로 정하고, 비용의 세부적인 납부방법 및 반환방법 등에 관한 사항은 법무부장관이 정한다.", "청원이 타인의 이름, 가명 또는 집단으로 제출되거나 청원 내용이 불명확한 경우, 동일한 청원서를 2회 이상 제출한 경우 나중에 접수된 청원은 청원의 기각사유에 해당한다.", "청원사유에 해당하는 청원을 하려는 수용자는 청원서를 작성하여 봉함하고, 이것을 소장 또는 순회점검공무원에게 제출하여야 한다.", "봉사원 선정은 완화경비처우급 이상이 원칙이며, 필요 시 일반경비처우급까지 선정할 수 있다."], "ans": 1, "expl": "① (령 117조의 2 ④)\n② 각하사유임 (수용자 청원처리지침 9조)\n(수용자 청원처리지침 10조 청원의 기각)\n1. 청원내용이 사실이 아니거나 사실 유무를 확인하는 것이 불가능한 경우 \n2. 청원내용이 사실이라고 인정할 만한 객관적인 증거가 없는 경우 \n3. 이미 피해회복이 이루어지는 등 따로 구제조치가 필요하지 아니하다고 인정되는 경우\n4. 청원내용이 이유 없다고 인정되는 경우\n③ 순회점검공무원은 아님 (법 117조 ②)\n④ 일반경비처우급도 원칙적으로 대상임 (규칙 85조 ①)"}, {"n": 13, "stem": "「형집행법령」상 소장이 수용자의 면담신청을 받아들이지 않을 수 있는 사유는 모두 몇 개인가? 氠瑢 1. 정당한 사유없이 면담사유를 밝히지 아니하는 때 2. 면담목적이 법령이나 지시에 명백히 위배되는 사항을 요구하는 것일 때 3. 동일한 사유로 면담한 사실이 있음에도 불구하고 반복하여 면담을 신청하는 때 4. 교도관의 직무집행을 방해할 목적이라고 인정되는 이유가 있는 때", "opts": ["1개", "2개", "3개", "4개"], "ans": 1, "expl": "(법 116조 ②)\n2. 지시에는 제외\n3. 정당한 사유없이 추가\n4. 상당한 이유"}, {"n": 14, "stem": "다음 중「형집행법 시행법령」의 품목별 착용시기 및 대상으로 맞는 것은?", "opts": ["방한모는 작업을 하는 수용자 중 소장이 지급할 필요가 있다고 인정하는 사람이 착용한다.", "모범수형자복은 수형자가 사회봉사활동 등 대내외 행사 참석 시 착용한다.", "양말은 소장이 지급할 필요가 있다고 인정하는 미결수용자가 착용한다.", "위생모는 수용자가 운영지원작업을 하는 때에 착용한다."], "ans": 3, "expl": "① 외부작업 수용자가 겨울철에 착용 (규칙 5조 16호)\n② 소장이 필요하다고 인정하는 때 착용 (규칙 5조 2호)\n③ (규칙 5조 13호)\n④ 취사장에서 작업하는 수용자가 착용 (규칙 5조 16호)"}, {"n": 15, "stem": "다음 중「형집행법 시행법령」의 음식물에 대한 설명으로 맞는 것은?", "opts": ["소장은 수용자에 대한 원활한 급식을 위하여 해당 교정시설의 직전 분기 급식인원을 기준으로 1개월 분의 주식을 항상 확보하고 있어야 한다.", "소장은 수용자의 나이, 건강, 작업 여부 및 작업의 종류 등을 고려하여 필요한 경우에는 주식의 지급 기준량을 변경할 수 있다.", "소장은 작업의 장려나 적절한 처우를 위하여 필요하다고 인정하는 경우 대용식을 지급할 수 있다.", "수용자에게 지급하는 주·부식의 총열량은 1명당 1일 2천 500칼로리를 기준으로 한다."], "ans": 2, "expl": "① 평균 급식인원 (규칙 12조)\n② (규칙 11조 ②)\n③ 특별한 부식을 (규칙 13조 ②)\n④ 음식물의 총열량은 (규칙 14조 ②)"}, {"n": 16, "stem": "「형집행법령」의 수형자 처우와 관련한 내용으로 맞는 것은?", "opts": ["교정시설 밖에서 이루어지는 사회적 처우의 활동에 필요한 비용은 수형자가 부담한다. 다만, 처우상 필요한 경우에는 예산의 범위에서 그 비용을 지원할 수 있다.", "‘가족만남의 집’이란 수형자와 그 가족이 숙식을 함께 할 수 있도록 교정시설에 수용동과 별도로 설치된 일반주택 형태의 건축물을 말한다.", "소장은 완화경비처우급인 수형자가 관련 기술이 있는 경우 교도관의 작업지도를 보조하게 할 수 있다.", "형기가 3년이상인 사람, 수용횟수가 2회 이하인 사람, 중간처우를 받는 날로부터 가석방 예정일까지의 기간이 3개월 이상 1년 6개월 이하인 사람은 교정시설에 설치된 개방시설에 수용하여 사회 적응에 필요한 교육 등을 할 수 있다."], "ans": 2, "expl": "① 연극, 영화, 그 밖의 문화공연 관람만 해당 (규칙 92조 ③)\n② (규칙 89조 ④)\n③ 작업·교육 등의 성적이 우수하고 관련기술이 있는 경우 (규칙 94조)\n④ 수용횟수가 아니라 범죄횟수 (규칙 93조 ①)"}, {"n": 17, "stem": "「형집행법령」의 수용과 관련하여 맞는 것은?", "opts": ["소장은 수용자거실 앞에 이름표를 붙이되, 이름표 윗부분에는 수용자의 성명·나이·죄명·형명 및 형기를 적고, 그 아랫부분에는 수용자번호 및 입소일을 적는다.", "소장은 수용자가 법령에 따라 지켜야 할 사항과 수용자의 권리구제 절차에 관한 사항을 수용자 거실의 상단에 붙이는 등의 방법으로 비치하여야 한다.", "소장은 수용목적상 필요하면 수용중인 사람에 대하여 사진촬영이나 지문채취의 조치를 할 수 있다.", "소장은 신입자 및 이입자의 키·용모·문신·흉터 등 신체 특징과 가족 등 보호자의 연락처를 수용기록부에 기록하여야 한다."], "ans": 3, "expl": "① 나이가 아니라 생년월일 (령 12조 ②)\n② 보기 쉬운 장소에 (령 12조 ③)\n③ (법 19조 ①)\n④ 이입자는 제외 (령 17조 ①)"}, {"n": 18, "stem": "「형집행법령」의 금품관리와 관련하여 맞는 것은?", "opts": ["수용자의 현금을 보관하는 경우에는 그 금액을 보관금대장에 기록하고 수용자의 물품을 보관하는 경우에는 그 품목·유형 및 수량을 보관품대장에 기록해야 한다.", "소장은 수용자의 형제자매에게 도움을 주기 위하여 보관금의 사용을 신청한 경우에는 그 사정을 고려하여 허가할 수 있다.", "보관금의 출납·예탁, 보관금품의 보관 등에 관하여 필요한 사항은 법무부령으로 정한다.", "소장은 수용자가 아닌 사람이 수용자에 대한 금품을 건네줄 것을 신청하는 경우에는 그의 성명·주소·수용자와의 관계 및 전달사유를 확인해야 한다."], "ans": 2, "expl": "① 품목·수량 및 규격 (령 35조)\n② (령 38조 ①)\n③ 법무부장관이 정한다. (령 38조 ②)\n④ 전달사유는 확인하지 않음 (령 41조)"}, {"n": 19, "stem": "「형집행법령」의 집필과 관련하여 맞는 것은?", "opts": ["집필용구의 구입비용은 수용자가 부담한다. 다만, 소장은 처우 및 교화를 위하여 필요한 경우에는 집필용구를 지급할 수 있다.", "수용자는 문서 또는 도화를 작성할 수 있다. 다만, 교화 또는 건전한 사회복귀를 해칠 명백한 위험이 있다고 인정하는 경우에는 예외로 한다.", "수용자는 작성 또는 집필한 문서나 도화를 지니거나 처리하는 것에 관하여 법무부령으로 정하는 범위에서 지닐 수 있다.", "집필한 도화가 사생활의 비밀을 침해할 우려가 있을 때에는 그 구체적인 사유를 서면으로 작성해 관리하고, 수용자에게 그 사유를 알린 후 교정시설에 보관한다. 다만, 수용자가 동의하면 폐기할 수 있다."], "ans": 4, "expl": "① 수용자가 그 비용을 부담할 수 없는 경우에는 (령 74조 ①)\n② 시설의 안전 또는 질서를 해칠 명백한 위험 (법 49조 ①)\n③ 법부부장관이 정하는 범위에서 (법 49조 ②)\n④ (법 49조 ③)"}, {"n": 20, "stem": "「형집행법령」의 여성수용자 처우에 관한 설명으로 맞는 것은?", "opts": ["유아양육의 허가를 받은 수용자가 허가의 취소를 요청하는 때에는 수용자의 의사를 고려하여 유아보호에 적당하다고 인정하는 개인에게 그 유아를 보낼 수 있다.", "유아나 여성 수용자가 질병·부상, 그 밖의 사유로 교정시설에서 생활하는 것이 특히 부적당하다고 인정되는 때에는 교정시설에서 유아를 양육하는 것을 허가하지 않을 수 있다.", "소장은 유아의 양육을 허가한 경우에는 필요한 설비와 물품의 제공, 그 밖에 양육을 위한 필요한 조치를 제공할 수 있도록 노력하여야 한다.", "소장은 여성수용자의 목욕횟수를 정하는 경우에는 여성의 신체적·심리적 특성을 특히 고려하여야 한다."], "ans": 1, "expl": "① (령 80조 ②)\n② 여성수용자는 양육할 능력이 없다고 인정되는 때 (법 53조 ① 2호)\n③ 조치를 하여야 한다. (법 53조 ②)\n④ 심리적은 제외 (령 77조 ①)"}, {"n": 21, "stem": "「형집행법령」의 수형자 처우에 관한 설명으로 맞는 것은?", "opts": ["소장은 미결수용자로서 자유형이 확정된 사람에 대하여는 검사의 집행 지휘서가 도달된 때부터 수형자로 처우한다.", "소장은 수형자의 처우수준을 경비등급별 처우계획의 시행에 적합하게 정하거나 조정하기 위하여 교정성적에 따라 처우등급을 부여할 수 있다.", "소장은 분류심사를 위하여 외부전문가에게 필요한 조사를 의뢰할 수 있다.", "소장은 수용자가 형집행중에 형사사건으로 재수용되면 개별처우계획을 새로 수립하여야 한다."], "ans": 3, "expl": "① 처우할 수 있다. (령 82조 ①)\n② 개별처우 계획의 시행에 (령 84조 ②)\n③ (법 59조 ④)\n④ 재수용되어 형이 확정된 경우에는 (규칙 60조 ④)"}, {"n": 22, "stem": "「형집행법령」의 수형자 처우에 관한 설명으로 맞는 것은?", "opts": ["소장은 분류심사와 그 밖에 수용목적의 달성을 위하여 필요하면 법원에 대하여 필요한 사실을 조회할 수 있다.", "개별처우계획의 수립 및 조정을 위한 분류심사는 매월 초일부터 말일까지 형집행지휘서가 접수된 수형자를 대상으로 하며, 그 다음 달까지 완료하여야 한다.", "2개 이상의 징역형 또는 금고형을 집행하는 수형자의 재심사 시기를 산정하는 경우에는 그 형기를 합산한다. 다만, 합산한 형기가 20년 이상인 경우에는 그 형기를 20년으로 본다.", "이해력의 현저한 부족 등으로 인하여 분류검사를 하지 아니한 경우에는 상담 내용과 관련서류를 토대로 인성을 판정하여 경비처우급 분류지표를 결정할 수 있다."], "ans": 1, "expl": "① (60조 ①)\n② 조정은 제외 (규칙 64조)\n③ 20년을 초과하는 (규칙 66조 ④)\n④ 분류검사가 아니라 인성검사 (규칙 71조 ③)"}, {"n": 23, "stem": "「형집행법령」의 수용자 교육에 대한 설명으로 맞는 것은?", "opts": ["소장은 수형자에게 고등학교 과정의 교육기회를 부여하기 위하여 수형자가 의무교육을 원할 경우에는「초·중등교육법」제51조에 따른 방송통신 고등학교 교육과정을 설치·운영하여야 한다.", "소장은 수용자가 그 비용을 부담할 수 없는 경우에는 방송통신고등학교 교육과정의 입학금, 수업료, 교과용 도서 구입비 등 교육과정에 필요한 비용을 지원할 수 있다.", "소장은 중학교 졸업과 동등한 수준 이상의 학력이 인정되는 수형자를 선발하여 방송통신 고등학교 과정을 지원하게 할 수 있다.", "소장은 수형자가 징벌을 받고 교육부적격자로 판단되어 교육대상자 선발을 취소한 경우에는 선발 당시의 소속기관으로 이송하지 아니할 수 있다."], "ans": 4, "expl": "① 교육기회를 부여하기 위하여 ~ 할 수 있다. (규칙 109조 ①)\n② 예산의 범위에서 지원할 수 있다. (규칙 109조 ③)\n③ 지원하여 합격하면 교육대상자로 선발할 수 있다. (규칙 109조 ②)\n④ (규칙 106조 ② 3호)"}, {"n": 24, "stem": "「형집행법, 시행령, 시행규칙」상 종교와 문화에 대한 설명으로 맞는 것은?", "opts": ["소장은 시설의 안전과 질서를 해칠 우려가 있는 때에는 수형자의 신앙생활에 필요한 서적이나 물품을 지니는 것을 제한할 수 있다.", "소장은 수형자의 교정교화를 위하여 상담·심리치료, 그 밖의 교화프로그램을 실시하여야 하고, 교화프로그램의 효과를 높이기 위하여 범죄 원인별로 적절한 교화프로그램의 내용, 교육장소 및 전문인력의 확보 등 적합한 환경을 갖추도록 노력하여야 한다.", "소장은 수형자의 건전한 사회복귀를 위하여 필요한 때에는 개별 수형자에 대하여 텔레비전 시청을 금지할 수 있다.", "소장은 시설의 안전 또는 질서를 해칠 우려가 있는 때에는 수용자의 집필을 제한할 수 있다."], "ans": 2, "expl": "① 시설의 안전과 질서유지를 위하여 필요한 때 (법 45조 ③)\n② (법 63조 ②)\n③ 해칠 우려가 있는 때 (법 48조 ② 1호)\n④ 명백한 위험이 있다고 인정하는 경우 (법 49조 ①)"}, {"n": 25, "stem": "「형집행법, 시행령, 시행규칙」상 작업 및 직업훈련에 대한 설명으로 맞는 것은?", "opts": ["취업지원 협의회는 회장이 필요하다고 인정하는 때, 위원 과반수 이상의 요구가 있을 때에는 임시회의를 개최할 수 있다.", "심신이 허약하거나 질병 등으로 훈련을 감당할 수 없는 경우에는 직업훈련을 취소할 수 있다.", "직업훈련으로 인한 질병으로 신체에 장해가 발생한 때에는 법무부장관이 정하는 바에 따라 위로금을 지급한다.", "작업장려금 및 위로금은 본인의 가족생활 부조, 교화 또는 건전한 사회복귀를 위하여 특히 필요하면 석방 전이라도 그 전부 또는 일부를 지급할 수 있다."], "ans": 3, "expl": "① 위원 3분의 1 이상의 요구가 있는 때 (규칙 148조 ①) \n② 직업훈련 보류 사유 (규칙 128조)\n③ (법 74조 ①)\n④ 위로금은 본인에게 지급함 (법 74조 ②)"}, {"n": 26, "stem": "「형집행법, 시행령, 시행규칙」상 귀휴제도에 대하여 맞는 것은?", "opts": ["귀휴심사 대상자에 대한 심사사항 중 수용관계에서는 심사대상자가 속한 범죄단체 구성원과의 교류정도를 심사한다.", "소년수형자에 대해서는 사회적응의 기회를 주어야 할 필요성이 크므로 귀휴의 요건을 별도로 정하고 있다.", "귀휴심사위원회 외부인사는 2명으로 한다.", "특별귀휴를 허가하는 경우를 포함하여 6개월 이상 형을 집행받은 수형자로서 유기형의 경우에는 그 형기의 3분의 1을 경과하여야 한다."], "ans": 1, "expl": "① (규칙 135조 1호) \n② 특칙규정이 없음\n③ 2명 이상 (규칙 131조 ③)\n④ 특별귀휴에는 조건이 없음 (법 77조 ①)"}, {"n": 27, "stem": "다음「형집행 법령」의 접견에 대한 설명으로 맞는 것은?", "opts": ["소장은 수형자가 교화 또는 건전한 사회복귀를 해칠 우려가 없는 때에는 접견 횟수를 늘릴 수 있다.", "수용자가 소송사건의 대리인인 변호사와 접견하는 경우에는 접촉차단시설이 설치되지 아니한 장소에서 접견 )\n② 총 열량은 (규칙 58조 ①)\n③ 주식은 제외 (규칙 58조 ③)\n④ 고려하여야 한다. (규칙 58조 ②)"}, {"n": 61, "stem": "다음「형집행 법령」의 경기 또는 오락회 개최에 대한 내용 중 맞는 것은?", "opts": ["일반경비처우급 수형자에게도 특히 필요한 경우에는 월 2회 이내에서 경기 또는 오락회를 개최하게 할 수 있다.", "수형생활 태도를 고려하여 자치생활을 하는 소년 수형자에 대해서는 경기 또는 오락회의 횟수를 늘릴 수 있다.", "경기 또는 오락회가 개최되는 경우 소장은 해당시설의 사정을 고려하여 참석 인원, 방법 등을 정할 수 있다.", "경기 또는 오락회가 개최되는 경우 소장은 관련 분야의 전문지식과 자격을 가지고 있는 외부강사를 초빙하거나 자격을 보유한 직원을 참여하게 할 수 있다."], "ans": 3, "expl": "① 일반경비처우급은 대상 아님 (규칙 91조 ①)\n② 수형생활 태도는 없음 (규칙 91조 ①)\n③ (규칙 91조 ②)\n④ 직원은 대상 아님 (규칙 91조 ③)"}, {"n": 62, "stem": "다음「형집행 법령」의 전화통화와 관련한 내용으로 맞는 것은?", "opts": ["소장은 교화상 특히 필요한 경우에는 완화경비처우급 수형자의 전화통화 허용횟수를 늘릴 수 있다.", "전화통화의 허용횟수는 개방처우급의 경우 월 5회, 완화경비처우급은 월 3회이다.", "소장은 사형확정자의 심리적 안정도모 또는 교정시설의 안전과 질서유지를 위하여 특히 필요하다고 인정하는 경우에는 월 3회 이내의 범위에서 전화통화를 허가할 수 있다.", "수형자의 경비처우급별 전화통화는 1일 1회만 허용한다. 다만, 처우상 특히 필요한 경우에는 그러하지 아니하다."], "ans": 4, "expl": "① 처우상 (규칙 90조 ②)\n② 5회 이내, 3회 이내 (규칙 90조 ①)\n③ 교정시설의 안전과 질서유지가 아니라 원만한 수용생활을 위하여 필요하다고 (규칙 156조)\n④ (규칙 90조 ③)"}, {"n": 63, "stem": "다음「형집행 법령」의 사회적 처우에 대한 설명으로 맞는 것은?", "opts": ["소장은 교화 및 건전한 사회복귀를 위하여 특히 필요한 경우에는 일반경비처우급 수형자에 대하여도 가족만남의 집을 허가할 수 있다.", "소장은 교화 및 처우상 필요한 경우에는 수용자가 다른 교정시설의 수용자와 통신망을 이용하여 화상으로 접견하는 것을 허가할 수 있다.", "교정시설 밖에서 이루어지는 자신이 신봉하는 종교행사에 참석할 경우 처우상 필요하면 자비구매 의류를 입게 할 수 있다.", "소장은 개방처우급 및 완화경비처우급 수형자에 대하여는 법무부장관이 정하는 바에 따라 접촉차단시설이 설치된 장소 외의 적당한 곳에서 접견을 실시할 수 있다."], "ans": 3, "expl": "① 건전한 사회복귀는 제외 (규칙 89조 ③)\n② 특히 필요한 경우 (규칙 87조 ③)\n③ (규칙 92조 ③)\n④ 완화경비처우급은 대상 아님 (규칙 88조)"}, {"n": 64, "stem": "다음「형집행 법령」의 분류처우에 대한 설명으로 맞는 것은?", "opts": ["법무부장관은 수형자를 개별처우하기 위하여 분류심사를 전담하는 교정시설을 지정·운영할 수 있다.", "분류심사를 전담하는 교정시설을 지정·운영하는 경우에는 지방교정청별로 1개소가 되도록 하여야 한다.", "분류처우위원회 회의는 매월 10일에 개최한다. 다만 법무부장관이 정한 휴무일일 때에는 그 다음 날에 개최한다.", "분류처우위원회에서는 가석방 적격심사 신청 및 취소 대상자 선정에 관한 사항을 심의·의결한다."], "ans": 3, "expl": "① 개별처우가 아니라 과학적으로 분류 (법 61조)\n② 1개소 이상이 (령 86조)\n③ (규칙 99조 ①)\n④ 취소는 해당되지 않음 (규칙 97조 4호)"}, {"n": 65, "stem": "다음「형집행 법령」의 교육과 관련하여 맞는 것은?", "opts": ["소장은 교육의 효과를 거두지 못하였다고 인정하는 교육대상자에 대하여 교육을 취소할 수 있다.", "소장은 기관의 교육전문인력, 교육시설, 교육대상인원 등의 사정을 고려하여 단계별 교육과 자격취득 목표를 설정할 수 있으며, 자격취득·대회입상 등을 하면 처우에 반영할 수 있다.", "소장은 각 교육과정의 선정 요건과 수형자의 나이, 학력, 경비처우급, 자체 평가시험 성적, 교육계획과 시설의 규모 등을 고려하여 교육대상자를 선발하거나 추천하여야 한다.", "방송통신대학과정, 독학에 의한 학위취득 과정 등 학과교육대상자의 과정수료 단위는 학년으로 하되, 학기의 구분은 국공립학교의 학기에 준하며, 수업일수의 제한을 받는다."], "ans": 2, "expl": "① 다시 교육을 할 수 있다. (규칙 101조 ④)\n② (규칙 101조 ⑤)\n③ 경비처우급은 제외 (규칙 103조 ①)\n④ 독학에 의한 학위취득 과정은 수업일수의 제한을 받지 아니함 (규칙 104조 ①)"}, {"n": 66, "stem": "다음「형집행 법령」의 교육과 관련하여 맞는 것은?", "opts": ["교육목적을 위하여 필요한 경우 신체장애를 보완하는 교육용 물품의 사용을 허가할 수 있으며, 수용자가 그 비용을 부담할 수 없는 경우에는 예산의 범위에서 학용품과 응시료를 지원할 수 있다.", "소장은 교육기간 중에 검정고시에 합격한 교육대상자에 대하여 상위 교육과정에 임시 편성시킬 수 있다.", "교육과정 중 징벌을 받은 경우에는 교육대상자 선발을 취소할 수 있다.", "고등학교 졸업, 형기 5년에 3분의 1을 지난상태로, 집행할 형기 2년 6월인 중경비처우급 수형자는 방송통신대학과정에 지원할 수 있다."], "ans": 2, "expl": "① 수용자가 비용을 부담할 수 없는 경우 라는 조건 없음 (규칙 104조 ③)\n② (규칙 108조 ②)\n③ 징벌을 받고 교육부적격자로 판단되어야 함 (규칙 105조 3호)\n④ 일반경비처우급까지 지원 가능함 (규칙 111조 ②)"}, {"n": 67, "stem": "다음「형집행 법령」의 작업 및 직업훈련에 대한 설명으로 맞는 것은?", "opts": ["징벌집행 중인 경우에는 직업훈련을 보류할 수 있다.", "공휴일·토요일과 그 밖의 휴일에는 작업을 부과하지 아니한다. 여기에서 말하는 그 밖의 휴일이란「각종 기념일 등에 관한 규정」에 따른 교정의 날 및 법무부장관이 지정하는 날을 말한다.", "소장은 외부의 단체에서 훈련을 받는 경우에는 접견·전화통화·교육 등의 처우를 제한할 수 있다.", "소장은 수형자의 가족 또는 배우자의 직계존속이 사망하면 2일간, 부모 또는 배우자 직계존속의 제삿날에는 1일간 해당 수형자의 작업을 면제한다."], "ans": 3, "expl": "① 징벌대상행위로 조사를 받게 된 경우가 보류대상임 (규칙 128조 ①)\n② 소장이 지정한 날 (령 96조)\n③ (법 70조)\n④ 배우자의 제삿날 (법 72조 ①)"}, {"n": 68, "stem": "다음「형집행 법령」의 귀휴에 대한 설명으로 옳은 것은?", "opts": ["소장은 교화 또는 건전한 사회복귀를 위하여 법무부령으로 정하는 사유가 있을 때에는 1년 중 20일 이내의 귀휴를 허가할 수 있다.", "직계존속, 배우자, 배우자의 직계존속, 형제자매 또는 본인의 회갑일일 경우에는 일반귀휴를 신청할 수 있다.", "1년 중 20일 이내의 귀휴에서 1년이란 형집행지휘서 접수일을 기준으로 한다.", "귀휴심사위원회의 위원장이 부득이한 사유로 직무를 수행하지 못할 경우에는 위원장이 미리 정한 위원이 그 직무를 대행한다."], "ans": 1, "expl": "① (법 77조 ①)\n② 형제자매는 제외 (규칙 129조 ③ 1호)\n③ 매년 1월 1일부터 12월 31일까지 (규칙 130조 ②)\n④ 부소장인 위원이 그 직무를 대행하고 (규칙 132조 ②)"}, {"n": 69, "stem": "다음「형집행 법령」의 귀휴에 대한 설명으로 옳은 것은?", "opts": ["교화 또는 사회복귀 준비 등을 위하여 특히 필요한 경우에는 일반경비처우급 수형자에게도 귀휴를 허가할 수 있다.", "소장은 수형자의 가족 또는 배우자의 법령」에는 사형확정자에 대한 교육교화 프로그램과 작업에 대해서 장소제한에 대한 명시적인 규정이 없다.", "소장은 교화프로그램의 효과를 높이기 위하여 범죄원인별로 적절한 교화프로그램의 내용, 교육장소 및 전문인력의 확보 등 적합한 환경을 갖추어야 한다.", "노인수형자 전담교정시설의 장은 노인문제에 관한 지식과 경험이 풍부한 외부전문가를 초빙하여 교육하게 하는 등 노인수형자의 교육받을 기회를 확대하여야 한다."], "ans": 4, "expl": "① 학과교육, 석방전 교육, 집중인성교육 (지침 3조 1호)\n② 작업에 대해서만 교정시설 안에서 실시하는 작업을 부과한다고 규정하고 있고, 교육에 대해서는 규정없음 (규칙 153조 ①)\n③ 갖추도록 노력하여야 한다. (법 64조 ②)\n④ (시행규칙 48조 ①)"}, {"n": 87, "stem": "다음「형집행 법령」의 외국인 수용자 처우에 대한 내용으로 맞는 것은?", "opts": ["소장은 외국인 수용자에 대하여는 그 생활양식을 고려하여 필요한 수용설비를 제공하도록 노력하여야 한다.", "외국인수용자에게 지급하는 음식물의 총량은 소속 국가의 음식문화, 체격 등을 고려하여 조정할 수 있다.", "외국인에게 지급하는 주·부식의 지급기준은 법무부장관이 정한다.", "외국인수용자에 대하여는 쌀, 빵 또는 그 밖의 식품을 주식으로 지급하되, 소속 국가의 음식문화를 고려하여 제공하도록 노력하여야 한다."], "ans": 1, "expl": "① (규칙 57조 ②)\n② 총 열량은 (규칙 58조 ①)\n③ 주식은 제외 (규칙 58조 ③)\n④ 고려하여야 한다. (규칙 58조 ②)"}, {"n": 88, "stem": "다음「형집행 법령」의 무기사용에 대한 설명으로 맞는 것은?", "opts": ["수용자가 폭동을 일으키려고 하여 그 사태가 위급할 때에에는 무기를 사용할 수 있다.", "기관총은 수용자 외의 사람이 교정시설 밖에서 수용자를 계호하고 있는때에 자기의 신체를 보호하기 위하여 권총이나 소총으로 그 목적을 달성할 수 없다고 인정되면 사용할 수 있다.", "기관총은 대공초소 또는 집중사격이 가장 용이한 곳에 설치하고, 유사 시 즉시 사용할 수 있도록 적정한 인원의 사수·부사수·탄약수를 미리 지정하여야 한다.", "수용자가 협박에 사용할 위험물을 지니고 있어 신속하게 제지하지 아니하면 그 확산을 방지하기 어렵다고 인정되는 때에는 기관총을 사용할 수 있다."], "ans": 2, "expl": "① 신속하게 제지하지 아니하면 그 확산을 방지하기 어렵다고 인정되는 때 (법 101조 ① 3호)\n② (규칙 190조 ② 1호)\n③ 충분한 인원의 (규칙 191조)\n④ 수용자가 폭동을 일으키거나 일으키려고 하여 (법 101조 ① 3호)"}, {"n": 89, "stem": "다음「형집행 법령」의 엄중관리대상자에 대한 설명으로 맞는 것은?", "opts": ["엄중관리대상자 구분이 중복되는 수용자의 경우 그 번호표 및 거실표의 색상은 조직폭력수용자의 경우 노란색, 관심대상수용자의 경우 노란색, 마약류수용자의 경우 파란색의 순으로 한다.", "엄중관리대상자에 대해서는 상담책임자를 지정하여 책임자 1명 당 10명 이내로 상담하여야 한다.", "상담책임자는 해당 엄중관리대상자에 대하여 수시로 개별상담을 함으로써 신속한 고충처리와 원만한 수용생활 지도를 위하여 노력하여야 한다.", "공범의 재판서에 조직폭력사범으로 명시된 수용자는 조직폭력수용자로 지정할 수 있으나, 피해자의 공소장에 명시된 수용자를 조직폭력수용자로 지정할 수는 없다."], "ans": 3, "expl": "① 관심 -> 조직 -> 마약 순 (규칙 195조 ②)\n② 엄중관리대상자 중 지속적인 상담이 필요하다고 인정되는 자 (규칙 196조 ②)\n③ (규칙 196조 ③)\n④ 피해자의 공소장도 가능 (규칙 198조 3호)"}, {"n": 90, "stem": "다음「형집행 법령」의 징벌과 관련한 사항 중 옳은 것은?", "opts": ["다른 사람을 처벌받게 하거나 교도관의 직무집행을 방해할 목적으로 신고하는 행위는 징 는 직업훈련을 보류할 수 있다.", "공휴일·토요일과 그 밖의 휴일에는 작업을 부과하지 아니한다. 여기에서 말하는 그 밖의 휴일이란「각종 기념일 등에 관한 규정」에 따른 교정의 날 및 법무부장관이 지정하는 날을 말한다.", "소장은 외부의 단체에서 훈련을 받는 경우에는 접견·전화통화·교육 등의 처우를 제한할 수 있다.", "소장은 수형자의 가족 또는 배우자의 직계존속이 사망하면 2일간, 부모 또는 배우자 직계존속의 제삿날에는 1일간 해당 수형자의 작업을 면제한다."], "ans": 3, "expl": "① 징벌대상행위로 조사를 받게 된 경우가 보류대상임 (규칙 128조 ①)\n② 소장이 지정한 날 (령 96조)\n③ (법 70조)\n④ 배우자의 제삿날 (법 72조 ①)"}, {"n": 95, "stem": "다음「형집행 법령」의 교육과 관련하여 맞는 것은?", "opts": ["소장은 교육의 효과를 거두지 못하였다고 인정하는 교육대상자에 대하여 교육을 취소할 수 있다.", "소장은 기관의 교육전문인력, 교육시설, 교육대상인원 등의 사정을 고려하여 단계별 교육과 자격취득 목표를 설정할 수 있으며, 자격취득·대회입상 등을 하면 처우에 반영할 수 있다.", "소장은 각 교육과정의 선정 요건과 수형자의 나이, 학력, 경비처우급, 자체 평가시험 성적, 교육계획과 시설의 규모 등을 고려하여 교육대상자를 선발하거나 추천하여야 한다.", "방송통신대학과정, 독학에 의한 학위취득 과정 등 학과교육대상자의 과정수료 단위는 학년으로 하되, 학기의 구분은 국공립학교의 학기에 준하며, 수업일수의 제한을 받는다."], "ans": 2, "expl": "① 다시 교육을 할 수 있다. (규칙 101조 ④)\n② (규칙 101조 ⑤)\n③ 경비처우급은 제외 (규칙 103조 ①)\n④ 독학에 의한 학위취득 과정은 수업일수의 제한을 받지 아니함 (규칙 104조 ①)"}, {"n": 96, "stem": "다음「형집행 법령」의 가석방심사위원회와 관련한 내용으로 맞는 것은?", "opts": ["특정 종파나 특정 사상에 편향되어 가석방 심사의 공정성을 해칠 우려가 있는 경우에는 해당 위원을 해촉할 수 있다.", "가석방심사위원회 간사는 위원장의 명을 받아 위원회의 사무를 처리하고 회의에 참석할 수 있으나 발언할 수는 없다.", "가석방심사위원회 간사는 위원회의 결정에 대하여 결정서를 작성하여야 한다.", "회의록에는 회의의 내용을 기록하고 위원장 및 각 위원이 기명날인 또는 서명하여야 한다."], "ans": 3, "expl": "① 징벌위원회 위원에 대한 내용임 (규칙 239조의 2)\n② 발언할 수 있다. (규칙 241조 ②)\n③ (규칙 242조 ②)\n④ 위원장 및 간사가 (규칙 243조 ②)"}, {"n": 97, "stem": "다음「형집행 법령」의 가석방심사위원회와 관련한 내용으로 맞는 것은?", "opts": ["소장은 가석방이 취소된 사람 또는 가석방이 실효된 사람이 교정시설에 수용되지 아니한 사실을 알게 된 때에는 관할 지방검찰청 검사 또는 관할 경찰서장에게 구인하도록 의뢰하여야 한다.", "수형자를 가석방한 소장은 가석방자가 가석방 취소사유에 해당하는 사실이 있음을 알게 되거나 관할 지방검찰청 검사로부터 그 사실을 통보받은 경우에는 지체없이 가석방 취소심사신청서에 가석방 취소심사 및 조사표를 첨부하여 위원회에 가석방 취소심사를 신청하여야 한다.", "가석방 기간 중 형사사건으로 구속되어 교정시설에 미결수용 중인 자의 가석방 취소 결정으로 잔형을 집행하게 된 경우에는 가석방된 형의 집행을 지휘하였던 검찰청 검사에게 잔형 집행지휘를 받아 우선 집행할 수 있다.", "소장은 가석방을 취소하는 것이 타당하다고 인정하는 경우 긴급한 사유가 있을 때에는 위원회의 심사를 거치지 아니하고 전화, 전산망 또는 그 밖의 통신수단으로 지방교정청장에게 가석방의 취소를 신청할 수 있다."], "ans": 1, "expl": "① (규칙 242조 ②)\n② 경찰서장으로부터 (규칙 261조 ①)\n③ 하여야 한다. (규칙 263조 ⑥)\n④ 법무부장관에게 (규칙 261조 ②)"}, {"n": 98, "stem": "다음「형집행 법령」의 석방에 대한 설명으로 맞는 것은?", "opts": ["사면, 가석방, 형의 집행면제, 형의 집행정지, 감형에 따른 석방은 그 서류가 교정시설에 도달한 후 12시간 이내에 하여야 한다. 다만, 그 서류에서 석방일시를 지정하고 있으면 그 일시에 한다.", "소장은 수형자의 건전한 사회복귀를 위하여 필요하다고 인정하면 석방 전 3일 동안 석방예정자를 별도의 거실에 수용하여 장래에 관한 상담과 지도를 할 수 있다.", "소장은 형기종료로 석방될 수형자에 대하여는 석방 10일 전까지 석방 후의 보호에 관한 사항을 조사하여야 한다.", "소장은 석방될 수형자의 재범방지, 자립지원 및 피해자 보호를 위하여 필요하다고 인정하면 해당 수형자의 수용이력 또는 사회복귀에 관한 의견을 그의 거주지를 관할하는 검찰청, 경찰관서나 자립을 지원할 법인 또는 개인에게 통보할 수 있다."], "ans": 3, "expl": "① 형의 집행정지는 제외 (법 124조)\n② 3일 이내의 범위에서 (령 141조)\n③ (령 142조)\n④ 검찰청은 제외 (법 126조의 2 ①)"}, {"n": 99, "stem": "다음「형집행 법령」의 교정장비와 관련한 설명으로 맞는 것은?", "opts": ["소장은 법 제92조의 금지물품을 숨기고 있다고 우려되는 수용자와 마약류 사범·조직폭력사범 등 법무부령으로 정하는 수용자의 거실 등은 수시로 검사하게 할 수 있다.", "소장은 교도관에게 작업장이나 실외에서 수용자거실로 돌아오는 수용자의 신체·의류 및 휴대품을 검사하게 하여야 한다. 다만, 경비등급을 고려하여 그 검사가 필요하지 아니하다고 인정되는 경우에는 예외로 할 수 있다.", "교도관 외의 사람은「국가공무원 복무규정」제9조에 따른 근무시간 외에는 소장 및 당직간부의 허가 없이 교정시설에 출입하지 못한다.", "교정시설의 구내·외에는 시야를 가리거나 그 밖에 계호상 장애가 되는 물건을 두어서는 아니된다."], "ans": 1, "expl": "① (령 112조)\n② 교정성적 등을 고려하여 (령 113조)\n③ 당직간부 제외 (령 115조 ①)\n④ 구외는 해당되지 않음 (령 118조)"}];

const $=s=>document.querySelector(s);
const NUMC=["","①","②","③","④","⑤"];
let answered={}, idx=0, mode="one";

function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1600);}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function optHtml(q,qi){
  const picked=answered[qi];
  let h='<span class="qnum">'+q.n+'번</span><p class="qtext">'+esc(q.stem)+'</p>';
  q.opts.forEach((o,oi)=>{
    const n=oi+1;let cls="opt",stamp="";
    if(picked!=null){cls+=" disabled";
      if(n===q.ans){cls+=" correct";stamp='<span class="stamp">○</span>';}
      if(picked===n&&picked!==q.ans){cls+=" wrong";stamp='<span class="stamp">✕</span>';}
    }
    h+='<button class="'+cls+'" '+(picked!=null?'':'onclick="pick('+qi+','+n+')"')+'><span class="mk">'+NUMC[n]+'</span><span class="tx">'+esc(o)+'</span>'+stamp+'</button>';
  });
  if(picked!=null){
    const ok=picked===q.ans;
    h+='<div class="result '+(ok?'ok':'no')+' show">'+
      (ok?'<b>정답입니다 ○</b>':'<b>오답입니다 ✕</b>  정답: '+NUMC[q.ans]+'번')+
      (q.expl?'<div class="expl">💡 '+esc(q.expl)+'</div>':'')+
      '<br><button class="retry" onclick="retry('+qi+')">다시 풀기</button></div>';
  }
  return h;
}

function render(){
  const area=$("#area");
  if(mode==="all"){
    $("#nav").style.display="none";
    area.className="allwrap";
    area.innerHTML=QUIZDATA.map((q,qi)=>'<div class="qcard">'+optHtml(q,qi)+'</div>').join("");
  }else{
    $("#nav").style.display="flex";
    area.className="";
    const q=QUIZDATA[idx];
    area.innerHTML='<div class="qcard">'+optHtml(q,idx)+'</div>';
    $("#prev").disabled=idx===0;
    $("#next").disabled=idx===QUIZDATA.length-1;
    $("#jumpIn").value=q.n;
    $("#hint").textContent=(idx+1)+" / "+QUIZDATA.length+"문항";
    window.scrollTo(0,0);
  }
  updateScore();
}
function pick(qi,n){answered[qi]=n;save();render();}
function retry(qi){delete answered[qi];save();render();}
function go(d){idx=Math.max(0,Math.min(QUIZDATA.length-1,idx+d));render();}
function jump(){let v=parseInt($("#jumpIn").value,10);if(v>=1&&v<=QUIZDATA.length){idx=v-1;render();}}
function setMode(m){mode=m;$("#m1").classList.toggle("on",m==="one");$("#m2").classList.toggle("on",m==="all");render();}
function resetAll(){if(!confirm("모든 답을 지우고 처음부터 풀까요?"))return;answered={};save();idx=0;render();toast("초기화했어요");}
function updateScore(){
  const done=Object.keys(answered).length;let c=0;
  for(const k in answered) if(answered[k]===QUIZDATA[k].ans) c++;
  $("#score").textContent=c+" / "+done;
  $("#barFill").style.width=(done/QUIZDATA.length*100)+"%";
}
function save(){try{localStorage.setItem("hjh_ans",JSON.stringify(answered));}catch(e){}}
function load(){try{answered=JSON.parse(localStorage.getItem("hjh_ans")||"{}");}catch(e){answered={};}}

load();render();
