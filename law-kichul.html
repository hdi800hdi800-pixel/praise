용요건\n➀\n수용자\n권총\n소총", "13-2회"], ["(법103조) 교도관이 17번에 따라 질문을 할 때에는 그 신분을 표시하는 증표를 제시하고 질문의 목적과 이유를 설명할 수 있다.(  )", "X / 설명할 수 있다 → 설명하여야 한다.", "13-2회"], ["(영128조) 소장은 수용자가 도주등을 하거나 도주자를 체포한 경우에는 법무부장관에게 지체 없이 보고하여야 한다.(  )", "O / 수용자 도주 and 체포 = 지체없이 장관 보고 / 미결수용자 도주시 검사(기소시 법원 추가) 통보 및 장관 보고\n / 미결수용자 체포시 장관만 보고!!!(대통령령 104조 미결수용자 규정 중 도주 사망시 검사 법원 통보 규정은 있지만, 도주자 체포시에 대한 통보 규정은 존재하지 않는다.)", "13-2회"], ["(규칙171조) 소장은 영 제120조제1항에 따라 보호장비 사용을 명령하거나 승인하는 경우에는 보호장비의 종류 및 사용방법을 구체적으로 지정하여야 하며, 이 규칙에서 정하지 아니한 방법으로 보호장비를 사용하게 해서는 아니 된다.(  )\n① 수갑의 사용방법은 다음 각 호와 같다.\n1. 법 제97조제1항 각 호의 어느 하나에 해당하는 경우에는 별표 6(앞수갑)의 방법으로 할 것\n  - 아무 때나 앞수갑이 기본이고, 호송하는 때는 오직 앞 수갑만 가능하다\n2. 법 제97조제1항제2호부터 제4호까지의 규정의 어느 하나에 해당하는 경우 별표 6(앞수갑)의 방법으로는 사용목적을 달성할 수 없다고 인정되면 별표 7(뒷수갑)의 방법으로 할 것\n  - 호송하는 때 수용자가 소란을 피운다 하더라도 뒷수갑을 할 수가 없다.\n3. 진료를 받거나 입원 중인 수용자에 대하여 한손수갑을 사용하는 경우에는 별표 8(한손수갑)의 방법으로 할 것\n② 제1항제1호(앞수갑)에 따라 수갑을 사용하는 경우에는 수갑보호기를 함께 사용할 수 있다.\n   - 앞수갑인 경우에 수갑보호기 사용가능하고 뒷수갑인 경우에는 수갑보호기 사용 불가능\n③ 제1항제2호(뒷수갑)에 따라 별표 7의 방법으로 수갑을 사용하여 그 목적을 달성한 후에는 즉시 별표 6(압수갑)의 방법으로 전환하거나 사용을 중지하여야 한다.\n(법97조제1항)\n  1. 이송ㆍ출정, 그 밖에 교정시설 밖의 장소로 수용자를 호송하는 때\n  2. 도주ㆍ자살ㆍ자해 또는 다른 사람에 대한 위해의 우려가 큰 때 (암기 : 도자자위큰)\n  3. 위력으로 교도관의 정당한 직무집행을 방해하는 때(암기 : 위직방 – 큰 때가 아님에 유의)\n  4. 교정시설의 설비ㆍ기구 등을 손괴하거나 그 밖에 시설의 안전 또는 질서를 해칠 우려가 큰 때", "O\n(규칙172조) 수갑의 사용방법 - 설명으로 갈음하고 별도 문제없음", "13회"], ["(규칙176조) 보호의자는 별표 14(보호의자)의 방법으로 사용하며, 다른 보호장비로는 법 제97조제1항제2호부터 제4호까지의 규정의 어느 하나에 해당하는 행위를 방지하기 어려운 특별한 사정이 있는 경우에만 사용하여야 한다.(  )", "O / 보호의자 사용하여야 한다 = 호송제외 보호장비요건 + 특별한 사정에만", "13회"], ["(규칙179조) 법 제97조제1항제2호부터 제4호(호송 제외 보호장비 사용요건)까지의 규정의 어느 하나에 해당하는 경우 제2호의 방법(일반포승 도는 벨트형포승)으로는 사용목적을 달성할 수 없다고 인정되면 별표 19(하체승)의 방법으로 한다. 이 경우 2개의 포승을 연결하여 사용할 수 있다.(  )", "O / 하체승시 2개의 포승을 연결하여 사용하여야 한다 같지만 사용할 수 있다로 규정되어 있음", "13회"], ["(규칙180조) 하나의 보호장비로 사용목적을 달성할 수 없는 경우에는 둘 이상의 보호장비를 사용할 수 있다. 다만, 보호의자, 보호침대, 보호복에 해당하는 경우에는 다른 보호장비와 같이 사용할 수 없다.(  )", "X / 단독으로 사용해야 하는 보호장비는 보호의자와 보호침대(하나의 보호장비로 손발을 모두 다 묶는 경우에는 단독 사용)", "13회"], ["(규칙198조) 조직폭력수용자 지정대상으로 맞는 것은  금지ㄹ. 부당한 목적을 위하여 사용 금지", "4개 모두 다 해당", "5회"], ["소장은 녹음ㆍ녹화 기록물을 제공할 경우에는 접견정보 취급자로 하여금 녹음ㆍ녹화기록물을 (요청한 기관의 명칭), (제공받는 목적), (제공 근거), (제공을 요청한 범위), (수용자 인적사항), (그 밖에 필요한 사항)을 (녹음ㆍ녹화기록물 관리대장)에 입력하게 하고, 따로 (이동식 저장매체)에 옮겨 담아 제공한다. 괄호 안의 내용 중 틀린 부분은?(  )", "수용자 인적사항X(규정없음), 녹음 녹화기록물 관리 대장X -> 관리 프로그램O", "5회"], ["소장은 수용자의 정서함양 및 교양습득에 필요한 도서를 비치하고 수용자가 이용할 수 있도록 하여야 한다.(  ) 법46조", "X / 도서비치 목적 – 지식함양+교양습득 (암기 : 지교도)", "6회"], ["다음 중 틀린 것은 몇 개인가?(  ) 규칙56~57조\n① 외국인수용자를 수용하는 소장은 외국어에 능통한 소속 교도관을 전담요원으로 지정하여 일상적인 개별면담, 고충해소, 통역·번역 및 외교공관 또는 영사관 등 관계기관과의 연락 등의 업무를 수행하게 하여야 한다.\n② 전담요원은 외국인 미결수용자에게 소송 진행에 필요한 법률지식을 제공하는 등의 조력을 하여야 한다.\n③ 소장은 외국인수용자의 수용거실을 지정하는 경우에는 종교 또는 생활관습이 다르거나 민족감정 등으로 인하여 분쟁의 소지가 있는 외국인수용자는 거실을 분리하여 수용하여야 한다.\n④ 소장은 외국인수용자에 대하여는 그 생활양식을 고려하여 필요한 수용설비를 제공하도록 노력하여야 한다.", "다 맞음 / 틀린 곳 없음", "7회"], ["(영82조) 소장은 미결수용자로서 자유형 또는 재산형이 확정된 사람에 대하여는 검사의 집행 지휘서가 도달된 때부터 수형자로 처우할 수 있다.(  )", "X / 자유형이 확정된 사람이고 재산형은 해당되지 않음", "8회"], ["(영83조) 다음 설명 중 틀린 부분은 몇 개인가?(  )\n  1. 수형자의 생명이나 신체, 그 밖의 인권 보호에 적합할 것\n  2. 교정시설의 안전과 질서유지를 위하여 필요한 최소한의 범위일 것\n  3. 법 제56조제1항의 개별처우계획의 시행에 적합할 것\n  *비교 : 시설의 설비 및 계호의 정도 -> 대통령령 / 수용설비 및 계호의 정도 -> 장관\n수용설비 및 계호의 정도는 다음 각 호의 규정에 어긋나지 않는 범위에서 법무부장관이 정한다.\n  1. 수형자의 생명이나 신체, 그 밖의 인권 보호에 최소한의 범위일 것\n  2. 교정시설의 안전과 질서유지를 위하여 적합할 것\n  3. 법 제56조제1항의 개별처우계획의 시행에 적합할 것", "2개 틀림 / 규정 - 수용설비 및 계호의 정도는 다음 각 호의 규정에 어긋나지 않는 범위에서 법무부장관이 정한다.", "8회"], ["(법60조) (소장)은 (분류심사)와 그 밖에 (수용목적의 달성)을 위하여 필요하면 (수용자의 가족 등을 면담)하거나 (법원ㆍ경찰관서, 그 밖의 관계 기관 또는 단체(이하 \"관계기관등\"이라 한다)에 대하여 필요한 사실을 조회할 수) 있다. 조회를 요청받은 관계기관 등의 장은 (특별한 사정이 없으면) (지체 없이) 그에 관하여 (회신하여야 한다).(  )", "O", "8회"], ["(규칙84조) 수형자의 경비등급에 따라 의류를 지급하는 경우 수형자가 개방처우급인 경우에는 색상, 크기, 디자인 등을 다르게 할 수 있다. 처우상 특히 필요한 경우 완화경비처우급인 경우에도 적용할 수 있다.(  )", "X / 색상 디자인만 달리~ 크기는 해당없음 / 단서조항없으며 완화경비처우는 해당안됨", "8회"], ["(규칙87조) 소장은 교화 및 처우상 특히 필요한 경우에는 수용자가 다른 교정시설의 수용자와 통신망을 이용하여 화상으로 접견하는 것(\"화상접견\")을 허가할 수 있다. 이 경우 화상접견은 접견 허용횟수에 포함한다.(  )", "O / 규정이 특이함  - 교화 및 처우가 같이 등장하는 유일한 조항임 / 수형자에 한정하지 않고 수용자(미결수용자․사형확정자 모두) 화상접견이 가능함에 유의!!!", "8회"], ["(규칙101조) 다음 설명 중 틀린 부분은 몇 개인가?(  )\n① 소장은 교육대상자를 소속기관(소장이 관할하고 있는 교정시설을 말한다. 이하 같다)에서 선발하여 교육한다. 다만, 소속기관에서 교육대상자를 선발하기 어려운 경우에는 다른 기관에서 추천한 사람을 모집하여 교육해야 한다.\n② 소장은 교육대상자의 성적불량, 학업태만 등으로 인하여 교육의 목적을 달성하기 어려운 경우에는 그 선발을 취소해야 한다.\n③ 소장은 교육대상자 및 시험응시 희망자의 학습능력을 평가하기 위하여 자체 평가시험을 정기적으로 실시해야 있다.\n④ 소장은 교육의 효과를 거두지 못하였다고 인정하는 교육대상자에 대하여 다시 교육을 해야 한다.\n⑤ 소장은 기관의 교육전문인력, 교육시설, 교육대상인원 등의 사정을 고려하여 단계별 교육과 자격취득 목표를 설정할 수 있으며, 자격취득·대회입상 등을 하면 처우에 반영하여야 있다.", "모두 틀림 / 1. 교육해야→교육할 수, 2. 취소해야→취소할 수, 3. 정기적으로X 실시해야→실시할 수, 4. 다시 교육을 해야→다시 교육을 할 수, 5. 처우에 반영하여야→처우에 반영할 수 / 5. 교육전문인력, 교육시설, 교육대상인원 암기는 불필요하고 교육의 3요소 - 교사, 건물, 학생을 전문용어로 설명한 것 뿐임!", "9회"], ["(규칙103조) 소장은 각 교육과정의 (선)정 요건과 수형자의 (나)이, (학)력, (교)정성적, 자체 평가(시)험 성적, (정)신자세, (성)실성, (교)육계획과 시설의 (규)모, 교육대상(인)원 등을 고려하여 교육대상자를 선발하거나 추천하여야 한다.(  )", "O / 정말 안외워지는 것 중의 하나 – 그냥 외운 암기법 : 선나학교 시정성 교규인(선정요건, 나이, 학력, 교정성적, 시험성적, 정신자세, 성실성, 교육계획, 규모, 인원) / 학력이 있음에 유의", "9회"], ["(규칙105조) 교육과정의 변경은 교육대상자의 선발로 본다.(  )", "O / 교육과정의 변경은 교육대상자의 선발로 보아 제103조를 준용한다.", "9회"]]}, {"t": "기본계획·위원회·순회점검", "q": [["(규칙131조) 귀휴심사위원회는 위원장을 포함한 6명 이상 8명 이하의 위원으로 구성한다. 여성위원은 2명 이상으로 한다.(  )", "X / 여성위원에 대한 규정 없다. 여성위원은 교정자문위원회에만 존재한다.", "10회"], ["(규칙131조) 귀휴심사위원회 위원장은 소장이 되며, 위원은 위원장이 소속기관의 부소장·과장(지소의 경우에는 6급 이상의 교도관) 및 교정에 관한 학식과 경험이 풍부한 외부인사 중에서 임명 또는 위촉한다. 이 경우 외부위원은 2명 이상으로 한다.(  )", "X / 위원은 위원장이X→위원은 소장이~ / 지소는 7급 이상의 교도관 /참고 : 6급 이상의 교도관은 교정자문위원회에서만 나옵니다.", "10회"], ["(규칙136조) 소장이 귀휴심사위원회 외부위원을 해촉할 수 있는 사유가 아닌 것은?(  )\n  1. 심신장애로 직무수행이 불가능하거나 현저히 곤란하다고 인정되는 경우\n  2. 직무와 관련된 비위사실이 있는 경우\n  3. 직무태만, 품위손상, 그 밖의 사유로 인하여 위원으로 적합하지 아니하다고 인정되는 경우\n  4. 위원 스스로 직무를 수행하는 것이 곤란하다고 의사를 밝히는 경우\n  5. 특정 종파나 특정 사상에 편향되어 징벌의 공정성을 해칠 우려가 있는 경우\n  6. 제269조(교정자문위원 준수사항)의 준수사항을 위반하였을 경우", "5, 6 / 외부위원 해촉사유 1~4번은 모든 외부위원에 공통됨. 5번은 징벌위원만, 6번은 교정장문위원만 해당\n*참고 : 내부위원은 임명이고, 외부위원은 위촉이라는 용어 사용(내부위원 위촉이라는 말은 없음)", "10회"], ["(규칙136조) 소장은 귀휴심사위원회 외부위원에게는 예산의 범위에서 수당과 여비를 지급할 수 있다.(  )", "O / 외부위원 수당관련 정리(교정행정 개입의 정도에 따라 구분 : 의결기구>심사기구>자문기구>협의기구)\n의결 : 징벌위원회 : 3종 지급 – 수당, 여비, 경비\n심사 : 귀휴심사위원회, 가석방심사위원회 : 2종 지급 – 수당, 여비\n자문 : 교정자문위원회 : 1종 지급 - 수당\n협의 : 취업지원협의회, 교정위원협의회 : 미지급", "10회"], ["(규칙223조) 징벌위원회 외부위원은 소장의 추천을 받아 법무부장관이 위촉한다.(  )", "X / 징벌위원은 소장이 위촉 / 소장위촉위원 : 귀휴심사위원, 징벌위원 / 장관위촉위원 : 취업위원, 교정위원, 가석방심사위원, 교정자문위원", "15회"], ["(규칙223조) 소장이 징벌위원으로 위촉할 수 없는 사람은 몇 명인가?(  )\n  1. 변호사\n  2. 대학에서 법률학을 가르치는 조교수 이상의 직에 있는 사람\n  3. 교정협의회(교정위원 전원으로 구성된 협의체를 말한다)에서 추천한 사람\n  4. 교정자문위원회에서 추천한 사람\n  4. 그 밖에 교정에 관한 학식과 경험이 풍부한 사람", "1명 / 4. 교정자문위원회에서 추천한 사람은 규정변경으로 삭제됨 / 비교참고사항 : 징벌위원 – 조교수(법률학), 취업위원 – 강사(법률학), 가석방심사위원 – 부교수(형사정책학 등)", "15회"], ["(규칙223조) 소장이 외부위원(내부위원X, 소장이 해촉)을 해촉할 수 있는 사유로 맞는 것은 몇 개인가?(  )\n  1. 심신장애로 직무수행이 불가능하거나 현저히 곤란하다고 인정되는 경우\n  2. 직무와 관련된 비위사실이 있는 경우\n  3. 직무태만, 품위 손상, 그 밖의 사유로 인하여 위원으로서 직무를 수행하기 적합하지 아니하다고 인정되는 경우\n  4. 위원 스스로 직무를 수행하는 것이 곤란하다고 의사를 밝히는 경우\n  5. 특정 종파나 특정 사상에 편향되어 징벌의 공정성을 해칠 우려가 있는 경우", "O / 모두 맞음 / 1234는 모든 외부위원에 공통적인 사항이며, 5는 징벌위원만 해당되고, 기타 교정자문위원은 준수사항 위반한 때가 추가된다.", "15회"], ["(법129조) 다음 빈칸에 들어갈 말을 기재하시오.(  )\n  ② 위원회는 (10명) 이상 (15명) 이하의 위원으로 (성별)을 고려하여 구성하고, 위원장은 위원 중에서 (호선)하며, 위원은 교정에 관한 학식과 경험이 풍부한 외부인사 중에서 (지방교정청장)의 추천을 받아 (법무부장관)이 (위촉)한다.\n  ③ 이 법에 규정된 사항 외에 위원회에 관하여 필요한 사항은 (법무부령)으로 정한다.", "둔다, 10명, 15명, 성별, 호선, 지방교정청장, 법무부장관, 위촉, 법무부령\n제129조 ① 수용자의 관리ㆍ교정교화 등 사무에 관한 지방교정청장의 자문에 응하기 위하여 지방교정청에 교정자문위원회(이하 이 조에서 \"위원회\"라 한다)를 (둔다).", "17회"], ["(규칙265~266조) 다음 중 교정자문위원회에 대한 설명 중 틀린 것은 몇 개인가?(  )\n1. 위원회에 부위원장을 두며, 위원 중에서 호선한다.\n2. 위원 중 4명 이상은 여성으로 한다.(*해석 : 위원 전원을 여성만으로도 가능하다)\n3. 지방교정청장이 위원을 추천하는 경우에는 교정자문위원회 위원 추천서를 법무부장관에게 제출하여야 한다. 다만, 재위촉의 경우에는 지방교정청장의 의견서로 추천서를 갈음한다.\n4. 위원의 임기는 2년 이하로 하며, 연임할 수 있다.\n5. 지방교정청장은 위원의 결원이 생긴 경우에는 결원이 생긴 다음날부터 30일 이내에 후임자를 법무부장관에게 추천해야 한다.\n6. 결원이 된 위원의 후임으로 위촉된 위원의 임기는 새로 시작한다.", "3개 틀림 / 4. 임기는 2년 이하로 하며 → 2년으로 하며, 5. 결원이 생긴 다음날부터 30일 이내 → 결원이 생긴 날부터 30일 이내, 6. 새로 시작한다 → 전임자 임기의 남은 기간으로 한다.", "17회"], ["(규칙267조) 교정자문위원회 위원장은 위원회를 소집하고 위원회의 업무를 총괄한다. 위원장이 부득이한 사유로 직무를 수행할 수 없을 때에는 부위원장이 그 직무를 대행하고, 부위원장도 부득이한 사유로 직무를 수행할 수 없을 때에는 부위원장이 미리 지명한 위원이 그 직무를 대행한다.(  )", "X / 부위원장이 미리 지명한 위원이 그 직무를 대행 → 위원장이 미리 지명한 위원이 그 직무를 대행(부위원장은 직무대행자를 지정할 권한이 없다.)", "17회"], ["(규칙268조) 교정자문위원회의 회의는 위원 과반수의 요청이 있거나 지방교정청장이 필요하다고 인정하는 경우에 개최한다. 위원회는 재적위원 과반수의 출석으로 개의하고 출석위원 과반수의 찬성으로 의결한다.(  )", "O / 과반수 요청시 회의 개최(임시회의가 아님) – 비교 : 취업지원위원회 위원 1/3요구시 임시회의 개최(임시회의 개최가능 위원회 2개 : 취업지원협의회, 분류처우위원회)", "17회"], ["(규칙268조) 교정자문위원회의 회의는 공개한다. 다만, 위원회의 의결을 거친 경우에는 공개하지 않을 수 있다.(  )", "X / 회의는 비공개 원칙, 의결거친 경우 공개 가능", "17회"], ["(규칙269조) 교정자문위원의 지켜야 할 사항으로 맞는 것은 몇 개인가?(  )\n  1. 직위를 이용하여 영리 행위를 하거나 업무와 관련하여 금품·접대를 주고받지 아니할 것\n  2. 자신의 권한을 특정인이나 특정 단체의 이익을 위하여 행사하지 아니할 것\n  3. 업무 수행 중 알게 된 사실이나 개인 신상에 관한 정보를 누설하거나 개인의 이익을 위하여 이용하지 아니할 것", "모두 준수해야 한다 / 준수사항 특징 : 누설 + 이익관련 용어(영리, 금품접대, 이익)", "17회"], ["(규칙269조) 교정자문위원은 별지 제30호서식의 서약서에 규정된 바에 따라 내용을 준수하겠다는 서약을 해야 한다.(  )", "O / 교정관계법령에서 유일하게 서약서에 서약해야 한다는 규정이 있는 위원임!!!", "17회"], ["(규칙271조) 교정자문위원회의 사무를 처리하기 위하여 위원회에 간사 1명을 둔다. 간사는 해당 교정시설의 총무과장 또는 7급 이상의 교도관으로 한다.(  )", "X / 해당 교정시설의 총무과장 또는 7급 이상의 교도관 → 해당 지방교정청의 총무과장 또는 6급 이상의 교도관(형집행법령에서 6급 이상 교도관은 교정자문위원회에서만 등장함!!!)", "17회"], ["(규칙271조) 교정자문위원회 간사는 회의에 참석하여 위원회의 심의사항에 대한 설명을 하거나 필요한 발언을 할 수 있으며, 별지 제31호서식의 교정자문위원회 회의록을 작성하여 유지하여야 한다.(  )", "O", "17회"], ["(규칙272조) 지방교정청장은 교정자문위원회의 회의에 참석한 위원에게는 예산의 범위에서 수당 및 여비를 지급할 수 있다.(  )", "X / 수당 및 여비 → 수당(자문기구이므로 1종 지급)", "17회"], ["(영151조) 교정위원은 수용자의 고충 해소 및 교정ㆍ교화를 위하여 필요한 의견을 소장에게 건의할 수 있다.(  )", "O", "17회"], ["(영151조) 교정위원의 임기, 위촉 및 해촉, 지켜야 할 사항 등에 관하여 필요한 사항은 법무부장관이 정한다.(  )", "O", "17회"], ["(영152조) 교정위원, 교정자문위원, 그 밖에 교정시설에서 활동하는 외부인사는 활동 중에 알게 된 교정시설의 안전과 질서 및 수용자의 신상에 관한 사항을 외부에 누설하거나 공개해서는 안 된다.(  )", "O / 외부누설 금지조항은 외부위원 모두 준수사항에 해당!!!", "17회"], ["형집행법 기본계획의 수립에 대한 설명과 관련 틀린 것은?(  )\n   1. 1개2. 2개3. 3개4. 4개\n  ㄱ. 법무부장관은 기본계획을 수립 또는 변경하려는 때에는 법원, 검찰 및 경찰 등 관계 기관과 협의하여야 한다.\n  ㄴ. 법무부장관은 기본계획을 수립하기 위하여 실태조사와 수요예측 조사를 실시하여야 한다.\n  ㄷ. 법무부장관은 기본계획을 수립하기 위하여 필요하다고 인정하는 경우에는 관계 기관의 장에게 필요한 자료를 요청할 수 있다.\n  ㄹ. 자료를 요청받은 관계 기관의 장은 특별한 사정이 없으면 요청에 따라야 한다.", "1 - ㄴ. 실시할 수 있다.", "1회"], ["그 밖에 법무부장관이 필요하다고 인정하는 사항(  )", "10. 법무부장관은 기본계획을 수립하려는 때에는 법원, 검찰 및 경찰 등 관계 기관과 협의할 수 있고, 변경하려는 때에는 협의하여야 한다.(  )\n X - 법무부장관은 기본계획을 수립 또는 변경하려는 때에는 법원, 검찰 및 경찰 등 관계 기관과 협의하여야 한다.", "1회"], ["법무부장관은 기본계획을 수립하기 위하여 실태조사와 수요예측 조사를 실시하여야 한다.(  )", "X - 실시할 수 있다", "1회"], ["법무부장관은 기본계획을 수립하기 위하여 필요하다고 인정하는 경우에는 관계 기관의 장에게 필요한 자료를 요청할 수 있다. 이 경우 자료를 요청받은 관계 기관의 장은 특별한 사정이 없으면 요청에 따라야 한다.(  )", "O", "1회"], ["법무부장관은 형의 집행 및 수용자 처우에 관한 사항을 협의하기 위하여 법원, 검찰 및 경찰 등 관계 기관과 협의체를 설치하여 운영하여야 한다.(  )", "X - 운영할 수 있다.", "1회"], ["협의체의 설치 및 운영 등에 필요한 사항은 법무부령으로 정한다.(  )", "X - 대통령령", "1회"], ["「형의 집행 및 수용자의 처우에 관한 법률」(이하 “법”이라 한다) 제5조의3에 따른 협의체는 위원장과 12명의 위원으로 구성한다.(  )", "X - 위원장을 포함하여 12명", "1회"], ["협의체의 위원장은 법무부차관 또는 법무부장관이 지명하는 위원이 위원장이 된다.(  )", "X - 법무부차관이 되고 O/ 또는 법무부장관이 지명하는 위원 규정 없음", "1회"], ["협의체의 위원장은 협의체 회의를 소집하며, 회의 개최 5일 전까지 회의의 일시ㆍ장소 및 안건 등을 각 위원에게 알려야 한다.(  )", "X - 7일 전까지", "1회"], ["협의체의 위원장은 협의체의 회의 결과를 위원이 소속된 기관의 장에게 통보해야 한다.(  )", "O", "1회"], ["(법률) 법무부장관은 교정시설의 설치 및 운영에 관한 업무의 전부 또는 일부를 법인·단체 또는 개인에게 위탁할 수 있다.(  )", "X – 전부 또는 X – 일부 O / 단체 X – 형집행법에 단체는 없음", "1회"], ["제1항에 따라 위탁을 받을 수 있는 법인 또는 개인의 자격요건, 교정시설의 시설기준, 수용대상자의 선정기준, 수용자 처우의 기준, 위탁절차, 국가의 감독, 그 밖에 필요한 사항은 따로 법률로 정한다.(  )", "O – 암기 : 감자시위대처필요 – 감독, 자격요건, 시설기준, 위탁절차, 대상자 선정기준, 처우의 기준, 필요한 사항", "1회"], ["(법63조) 소장은 의무교육에 따른 교육을 위하여 필요하면 수형자를 중간처우를 위한 전담교정시설에 수용하여 외부 교육기관에의 통학, 외부 교육기관에서의 위탁교육 조치를 할 수 있다.(  )\n    1. 외부 교육기관에의 통학  2. 외부 교육기관에서의 위탁교육", "O / 규정 : 소장은 제1항(교육) 및 제2항(의무교육)에 따른 교육을 위하여 필요하면 수형자를 중간처우를 위한 전담교정시설에 수용하여 다음 각 호의 조치를 할 수 있다.", "9회"], ["(법63조) 교육과정․외부통학․위탁교육 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )", "O", "9회"]]}, {"t": "수용·이송·독거혼거", "q": [["소장은 감염병이나 그 밖에 감염의 우려가 있는 질병의 발생과 확산을 방지하기 위하여 필요한 경우 수용자에 대하여 예방접종ㆍ격리수용ㆍ이송, 그 밖에 필요한 조치를 해야 한다.(  )", "O", "코로나"], ["(규칙134조) 수용관리 및 귀휴업무를 담당하는 부서의 장은 제137조제3항의 서류(1. 귀휴심사부, 2. 수용기록부, 3. 그 밖에 귀휴심사에 필요하다고 인정되는 서류)를 검토하여 그 의견을 지체 없이 소장에게 보고하여야 한다.(  )", "O", "10회"], ["(규칙137조) 다음 설명 중 틀린 것은 몇 개인가?(  )\n① 위원회의 사무를 처리하기 위하여 귀휴업무를 담당하는 교도관 중에서 간사 1명을 둔다.\n② 간사는 위원장의 명을 받아 위원회의 사무를 처리한다.\n③ 간사는 1. 귀휴심사부, 2. 수용기록부, 3. 그 밖에 귀휴심사에 필요하다고 인정되는 서류를 위원회에 제출하여야 한다.\n④ 간사는 위원회 회의록을 작성하여 유지하여야 한다.", "틀린 곳 없음", "10회"], ["(법81조) 소장은 미결수용자로서 사건에 서로 관련이 있는 사람은 구분수용하고 서로 간의 접촉을 제한하여야 한다.(  )", "X / 구분수용→분리수용(구분수용과 분리수용은 명백히 다름), 제한→금지(미결 공범끼리는 분리수용이고 접촉을 제한이 아니고 완전히 금지하는 것임)", "11회"], ["(규칙150조) 사형확정자에 대한 다음 설명 중 틀린 것은 몇 개인가?(  )\n① 사형확정자는 사형집행시설이 설치되어 있는 교정시설에 수용하되, 다음 각 호와 같이 구분하여 수용한다.\n  1. 교도소 : 교도소 수용 중 사형이 확정된 사람, 교도소에서 교육·교화프로그램 또는 신청에 따른 작업을 실시할 필요가 있다고 인정되는 사람\n  2. 구치소: 구치소 수용 중 사형이 확정된 사람, 교도소에서 교육·교화프로그램 또는 신청에 따른 작업을 실시할 필요가 없다고 인정되는 사람\n② 사형확정자의 심리적 안정 도모 또는 교정시설의 안전과 질서유지를 위하여 특히 필요하다고 인정하는 경우에는 제1항 각 호에도 불구하고 교도소에 수용할 사형확정자를 구치소에 수용할 수 있고, 구치소에 수용할 사형확정자를 교도소에 수용할 수 있다.\n③ 소장은 사형확정자의 자살·도주 등의 사고를 방지하기 위하여 필요한 경우에는 사형확정자와 미결수용자를 혼거수용할 수 있고, 사형확정자의 교육·교화프로그램, 작업 등의 적절한 처우를 위하여 필요한 경우에는 사형확정자와 수형자를 혼거수용할 수 있다.\n④ 사형확정자의 번호표 및 거실표의 색상은 붉은색으로 한다.", "틀린 곳 없음", "11회"], ["(규칙163조) 교도관이 영상계호하는 과정에서 수용자의 처우 및 관리에 특히 참고할만한 사항을 알게 된 경우에는 그 요지를 수용기록부에 기록하여 소장에게 지체 없이 보고하여야 한다.(  )", "O / ‘특히’ 참고할만한 사항 → 수용기록부 요지기록 → 지체없이 소장보고(특히 참고할만한 사항이란 가급적 보고하지 않거나 정말 보고할만한 가치가 있는 사항만 보고하라는 의미로 특히를 집어 넣음)", "12회"], ["(법95조) 다음 중 보호실에 대한 설명으로 잘못된 것은 몇 개인가?(  )\n  ① 소장은 수용자가 다음 각 호의 어느 하나에 해당하면 의무관의 의견을 고려하여 보호실(자살 및 자해 방지 등의 설비를 갖춘 거실을 말한다. 이하 같다)에 수용할 수 있다.\n  1. 자살 또는 자해의 우려가 있는 때(*큰 때가 아니다)\n  2. 신체적ㆍ정신적 질병으로 인하여 특별한 보호가 필요한 때(*정신적 질병뿐만 아니라 신체적 질병도 포함한다)\n  ② 수용자의 보호실 수용기간은 15일 이내로 한다. 다만, 소장은 특히 계속하여 수용할 필요가 있으면 의무관의 의견을 고려하여 1회당 7일의 범위에서 기간을 연장할 수 있다.(*15일 이내가 되어야지 15일이 되면 해제사유가 있어도 해제를 할 수가 없는 상황이 온다)\n  ③ 제2항에 따라 수용자를 보호실에 수용할 수 있는 기간은 계속하여 3개월을 초과할 수 없다.\n  ④ 소장은 수용자를 보호실에 수용하거나 수용기간을 연장하는 경우에는 그 사유를 본인에게 알려 주어야 한다.(*보호실 수용 및 연장은 불이익한 행정행위로 적법절차에 따라 그 사유를 본인에게 고지하도록 하고 있다. 해제는 이익되는 행정행위로 적법절차 준수가 완화되고 해제 자체로 고지의 효과가 발생한다.)\n  ⑤ 의무관은 보호실 수용자의 건강상태를 수시로 확인하여야 한다.(*건강상태 확인의 주체는 소장이 아니고 ‘의무관’이다.\n  ⑥ 소장은 보호실 수용사유가 소멸한 경우에는 보호실 수용을 즉시 중단하여야 한다.(*지체없이 중단이 아니고 즉시)\n1. 소장은 수용자가 (➀자살의 우려가 큰 때, ➁자해의 우려가 큰 때, ➂신체적 질병으로 인하여 특별한 보호가 필요한 때, ④정신적 질병으로 인하여 특별한 보호가 필요한 때)에 해당하면 의무관의 의견을 고 는 기준을 말한다.(  )", "X – 수용자X, 수형자O(처우등급은 수형자에 한함) / 암기 : 처우등급은 수형자의 시계수내(시설, 계호의정도, 처우의 수준, 처우의 내용), 추후 뒤편에 나오는 처우등급(기본수용급, 경비처우급, 개별처우급)에서 시계수내가 다시 등장함.", "1회"], ["(소장)은 수용자가 자비구매물품의 구매를 신청하는 경우에는 (법무부장관이 교정성적) 또는 (처우등급을 고려하여 정하는 보관금의 사용한도), (교정시설의 보관범위) 및 (수용자가 지닐 수 있는 범위)에서 허가한다. 괄호 안의 내용 중 틀린 곳은? (  )", "X / 처우등급 X, 경비처우급 O", "3회"], ["(법56조) 장관은 분류처우위원회의 의결에 따라 수형자의 개별적 특성에 알맞은 교육ㆍ교화프로그램, 작업, 직업훈련 등의 처우에 관한 계획(이하 \"개별처우계획\"이라 한다)을 수립하여 시행한다.(  )", "X / 소장은 제62조의 분류처우위원회의 의결에 따라 수형자의 개별적 특성에 알맞은 교육ㆍ교화프로그램, 작업, 직업훈련 등의 처우에 관한 계획(이하 \"개별처우계획\"이라 한다)을 수립하여 시행한다.", "8회"], ["(법56조) 소장은 수형자가 스스로 개선하여 사회에 복귀하려는 의욕이 고취되도록 개별처우계획을 정기적으로 또는 수시로 점검하여야 한다.(  )", "O", "8회"], ["(법57조) 수형자는 제59조의 분류심사의 결과에 따라 그에 적합한 교정시설에 수용되며, 개별처우계획에 따라 그 특성에 알맞은 처우를 받는다.(  )", "O", "8회"], ["(영84조) 소장은 수형자의 처우수준을 개별처우계획의 시행에 적합하게 정하거나 조정하기 위하여 교정성적에 따라 처우등급을 부여할 수 있다. 수형자에게 부여하는 처우등급에 관하여 필요한 사항은 법무부령으로 정한다.(  )", "O / 정하거나 – 신입심사, 조정하기 – 재심사 / 처우등급을 부여하여야 한다고 아니고 부여할 수 있다고 규정한 것은 분류심사 제외자 있으므로~", "8회"], ["(법59조) 다음 설명 중 바르지 않은 것은 몇 개인가?(  )\n① 소장은 수형자에 대한 개별처우계획을 합리적으로 수립하고 조정하기 위하여 수형자의 인성, 행동특성 및 자질 등을 과학적으로 조사ㆍ측정ㆍ평가(이하 \"분류심사\"라 한다)할 수 있다. 다만, 집행할 형기가 짧거나 그 밖의 특별한 사정이 있는 경우에는 예외로 할 수 있다.\n② 수형자의 분류심사는 형이 선고된 경우에 개별처우계획을 수립하기 위하여 하는 심사와 일정한 형기가 지나거나 상벌 또는 그 밖의 사유가 발생한 경우에 개별처우계획을 조정하기 위하여 하는 심사로 구분한다.\n③ 소장은 분류심사를 위하여 수형자를 대상으로 상담 등을 통한 신상에 관한 개별사안의 검사, 심리ㆍ지능ㆍ적성 조사, 그 밖에 필요한 조사를 할 수 있다.\n④ 소장은 분류심사를 위하여 외부전문가로부터 필요한 의견을 듣거나 외부전문가에게 조사를 의뢰하여야 한다.\n⑤ 이 법에 규정된 사항 외에 분류심사에 관하여 필요한 사항은 법무부장관이 정한다.", "모두 틀림 / 1 – 평가하여야 한다임 / 2 – 형이 선고된 경우가 아니고 형이 확정된 경우 / 3 – 상담 등 개별사안에 대한 조사, 심리지능적성 검사 그 밖의 필요한 검사(조사와 검사가 차이가 있음) / 4 – 조사를 의뢰할 수 있다임 / 5 – 법무부장관이 아니고 법무부령", "8회"], ["(규칙60조) 소장은 형집행정지 중에 있는 사람이 기간만료 또는 그 밖의 정지사유 소멸로 재수용된 경우에는 석방 당시와 동일한 처우등급을 부여한다.(  )", "X / 부여할 수 있다가 맞음", "8회"], ["(규칙60조) 소장은 제260조에 따른 가석방의 취소로 재수용되어 잔형(殘刑)이 집행되는 경우에는 석방 당시보다 한 단계 낮은 기본수용급 및 경비처우급을 부여한다. 다만, 「가석방자관리규정」 제5조 단서를 위반하여 가석방이 취소되는 등 가석방 취소사유에 특히 고려할 만한 사정이 있는 때에는 석방당시와 동일한 처우등급을 부여할 수 있다.(  )", "X / 가석방취소 잔형집행 경우 한단계 낮은 처우등급은 경비처우급만 해당되고, 기본수용급과 개별처우급은 낮은 등급이 없음", "8회"], ["(규칙60조) 소장은 형집행정지 중이거나 가석방기간 중에 있는 사람이 형사사건으로 재수용되어 형이 확정된 경우에는 개별처우계획을 새로 수립하여야 한다.(  )", "O / 당연한 것 – 형사사건의 재수용은 추가사건이고 형이 확정된 경우 재심사 대상이므로, 새로 수립해야 함.", "8회"], ["(규칙61조) 소장은 군사법원에서 자유형이 확정되거나 그 형의 집행 중에 있는 사람이 이송되어 온 경우에는 개별처우계획을 새로 수립하여 시행한다. 이 경우 해당 군교도소로부터 접수된 그 수형자의 수형생활 또는 처우 등에 관한 내용을 고려할 수 있다.(  )", "X / 자유형이 아니라 징역형 또는 금고형이~ 구류는 분류심사제외자이므로 자유형으로 사용시 틀림", "8회"], ["(규칙63조) 분류심사 사항으로 맞는 것은 몇 개인가?(  )\n  1. 처우등급에 관한 사항\n  2. 작업, 직업훈련, 교육 및 교화프로그램 등의 처우방침에 관한 사항\n  3. 보안상의 위험도 측정 및 거실 지정 등에 관한 사항\n  4. 보건 및 위생관리에 관한 사항\n  5. 이송에 관한 사항\n  6. 가석방 및 귀휴심사에 관한 사항\n  7. 석방 후의 생활계획에 관한 사항\n  8. 그 밖에 수형자의 처우 및 관리에 관한 사항", "모두 다 맞음 / 자주 보고 익혀야 하며 – 암기 : 처처보보이귀가석방+그 밖~", "8회"], ["(규칙64조) 개별처우계획을 수립하기 위한 분류심사(이하 \"신입심사\"라 한다)는 매월 초일부터 말일까지 형집행지휘서가 접수된 수형자를 대상으로 하며, 그 다음 달까지 완료하여야 한다. 다만, 특별한 사유가 있는 경우에는 그 기간을 연장할 수 있다.(  )", "O", "8회"], ["(규칙65조) 개별처우계획을 조정할 것인지를 결정하기 위한 분류심사(이하 \"재심사\"라 한다)는  1. 정기재심사: 일정한 형기가 도달한 때 하는 재심사, 2. 부정기재심사: 상벌 또는 그 밖의 사유가 발생한 경우에 하는 재심사가 있다.(  )", "O", "8회"], ["(규칙66조) 홍길동 입소일 : 2019. 1. 1. / 징역 1년, 형기종료일 : 2019. 12. 31. / 형집행지휘서 접수일 : 2019. 7. 2. / 홍길동에 대한 정기재심사 시기는 언제 언제 실시해야 하는가?(  )\n  1. 형기의 3분의 1에 도달한 때  2. 형기의 2분의 1에 도달한 때\n  3. 형기의 3분의 2에 도달한 때  4. 형기의 6분의 5에 도달한 때\n  5. 재심사하지 않음", "5 / 정기재심사는 다음 각 호의 어느 하나에 해당하는 경우에 한다. 다만, 형집행지휘서가 접수된 날부터 6개월이 지나지 아니한 경우에는 그러하지 아니하다.", "8회"], ["(규칙66조) 다음 설명중 틀린 것은 몇 개인가?(  )\n1. 부정기형의 재심사 시기는 단기형을 기준으로 한다.\n2. 사형, 무기형과 20년을 초과하는 징역형·금고형의 재심사 시기를 산정하는 경우에는 그 형기를 20년으로 본다.\n3. 2개 이상의 징역형 또는 금고형을 집행하는 수형자의 재심사 시기를 산정하는 경우에는 그 형기를 합산한다. 다만, 합산한 형기가 20년을 초과하는 경우에는 그 형기를 20년으로 본다.", "1개 / 2번의 사형은 규정에 없음 – 사형은 법령상 수형자가 아니므로 분류심사 대상이 아님(제외자도 아님)", "8회"], ["(규칙67조) 부정기재심사 사유에 해당되지 않는 것은 몇 개인가?(  )\n  1. 분류심사에 오류가 있음이 발견된 때\n  2. 수형자가 교정사고(교정시설에서 발생하는 화재, 수용자의 자살·도주·폭행·소란, 그 밖에 사람의 생명·신체를 해하거나 교정시설의 안전과 질서를 위태롭게 하는 사고를 말한다. 이하 같다)의 예방에 뚜렷한 공로가 있는 때\n  3. 수형자를 조사하거나 징벌하기로 의결한 때 (참고 - 경고, 징벌집행유예도 부정기재심사 사유다.)\n  4. 수형자가 집행유예의 실효 또는 추가사건(현재 수용의 근거가 된 사건 외의 형사사건을 말한다. 이하 같다)으로 자격정지이상의 형이 확정된 때\n  5. 수형자가 「숙련기술장려법」 제20조제2항에 따른 지방기능경기대회 입상, 기능사 이상의 자격취득, 학사 이상의 학위를 취득한 때\n  6. 가석방을 위해 필요한 때\n  7. 그 밖에 수형자의 수용 또는 처우의 조정이 필요한 때", "4개 / 3번 조사규정 없음 / 4번 자격정지 아니고 금고이상의 형 / 5번 전국기능경기대회 기사 이상의 자격취득임 / 6번 가석방 필요규정 삭제되어 없음", "8회"], ["(규칙68조) 소장은 재심사를 할 때에는 그 사유가 발생한 달의 다음 달까지 완료하여야 한다.(  )", "O", "8회"], ["(규칙68조) 재심사에 따라 제74조의 경비처우급을 조정할 필요가 있는 경우에는 한 단계의 범위에서 조정한다. 다만, 수용 및 처우를 위하여 특히 필요한 경우에는 두 단계의 범위에서 조정할 수 있다.(  )\n1. 성장과정\n2. 학력 및 직업경력\n3. 생활환경\n4. 건강상태 및 병력사항\n5. 심리적 특성\n6. 마약·알코올 등 약물중독 경력\n7. 가족 관계 및 보호자 관계\n8. 범죄경력 및 범행내용\n9. 폭력조직 가담여부 및 정도\n10. 교정시설 총 수용기간\n11. 교정시설 수용(과거에 수용된 경우를 포함한다) 중에 받은 징벌 관련 사항\n12. 도주(음모, 예비 또는 미수에 그친 경우를 포함한다) 또는 자살기도(企圖) 유무와 횟수\n13. 상담관찰 사항\n14. 수용생활태도\n15. 범죄피해의 회복 노력 및 정도\n16. 석방 후의 생활계획(재심사사항이 아님)\n17. 재범의 위험성(공통사항)\n18. 처우계획 수립에 관한 사항\n19. 그 밖에 수형자의 처우 및 관리에 필요한 사항\n1. 교정사고 유발 및 징벌 관련 사항(-)\n2. 제77조의 소득점수를 포함한 교정처우의 성과(+,-)\n3. 교정사고 예방 등 공적 사항(+)\n4. 추가사건 유무(-)\n5. 재범의 위험성(공통사항)\n6. 처우계획 변경에 관한 사항\n7. 그 밖에 재심사를 위하여 필요한 사항", "O\n* (규칙69조) 신입심사, 재심사 분류조사사항에 대한 문제 출제빈도는 매우 낮으나 몇 번 보고 구별방법 필요(신입심사시 특이점을 암기하고, 재심사는 플러스 또는 마이너스 사항, 공통점있음 유의)\n신입심사(한번 확인하고 변경사항이 없는 편)\n재심사(변경사항 있는 편 + 또는 -)", "8회"], ["(규칙71조) 소장은 분류심사를 위하여 수형자의 인성, 지능, 적성 등의 특성을 측정·진단하기 위한 검사를 할 수 있다.(  )", "O", "8회"], ["(규칙71조) 인성검사는 신입심사 대상자 및 그 밖에 처우상 필요한 수형자를 대상으로 한다. 다만, 수형자가 1. 제62조제2항에 따라 분류심사가 유예된 때, 2. 그 밖에 인성검사가 곤란하거나 불필요하다고 인정되는 사유가 있는 때에 해당하면 인성검사를 하지 아니한다.(  )", "X / 하지 아니한다가 아니고 아니할 수 있다임.", "8회"], ["(규칙71조) 이해력의 현저한 부족 등으로 인하여 인성검사를 하지 아니한 경우에는 상담 내용과 관련 서류를 토대로 인성을 판정하여 경비처우급을 결정할 수 있다.(  )", "X / 경비처우급을 결정하는 것이 아니고, 경비처우급 분류지표를 결정", "8회"], ["(규칙72조) 처우등급은 기본수용급, 경비처우급, 개별처우급, 그 밖의 처우등급으로 구분한다.(  )", "X / 그 밖의 처우등급은 존재하지 않음", "8회"], ["(규칙72조) 수형자의 처우등급에 대한 설명 중 틀린 부분은?(  )\n  1. 기본수용급: 성별·국적·나이·죄명 등에 따라 수용할 시설 및 구획 등을 구별하는 기준\n  2. 경비처우급: 자살 등의 위험성에 따라 수용시설과 계호의 정도를 구별하고, 범죄성향의 진전과 개선정도, 교정성적에 따라 처우수준을 구별하는 기준\n  3. 개별처우급: 수형자의 개별적인 성격에 따라 중점처우의 내용을 구별하는 기준", "모두 틀림 / 1 – 성별, 국적, 나이, 형기 / 2 – 자살 등의 위험성이 아니라 도주 등 n  ①소장은 개방처우급·완화경비처우급·일반경비처우급 수형자로서 교정성적, 나이, 인성 등을 고려하여 다른 수형자의 모범이 된다고 인정되는 경우에는 봉사원으로 선정하여 담당교도관의 사무처리와 그 밖의 업무를 보조하게 할 수 있다.\n  ② 소장은 봉사원의 활동기간을 1년 이하로 정하되, 필요한 경우에는 그 기간을 연장할 수 있다.\n  ③ 소장은 봉사원의 활동과 역할 수행이 부적당하다고 인정하는 경우에는 그 선정을 취소할 수 있다.\n  ④ 소장은 제1항부터 제3항까지의 봉사원 선정, 기간연장 및 선정취소에 관한 사항을 결정할 때에는 법무부장관이 정하는 바에 따라 분류처우위원회의 심의·의결을 거쳐야 한다.\n① (분류처우위원회)는 (개방처우급·완화경비처우급·일반경비처우급) 수형자로서 (경비처우급, 나이, 인성 등을 고려)하여 다른 수형자의 모범이 된다고 인정되는 경우에는 봉사원으로 선정하여 (담당교도관의 사무처리)와 (그 밖의 업무를 보조하게 할 수) 있다.\n② (소장)은 봉사원의 활동기간을 (1년으로 정하되), 필요한 경우에는 그 (기간을 단축하거나 연장할 수) 있다.\n③ 소장은 봉사원의 활동과 역할 수행이 부적당하다고 인정하는 경우에는 그 (선정을 취소할 수) 있다.\n④ 소장은 (봉사원 선정), (기간 단축․연장) 및 (선정취소)에 관한 사항을 결정할 때에는 (법무부장관이 정하는 바)에 따라 (분류처우위원회의 심의·의결)을 (거쳐야 한다.)", "1 : 분류처우위원회→소장, 경비처우급→교정성적 / 2 : 1년으로→1년 이하, 단축하거나X / 3 : O / 4 : 단축X", "8회"], ["(규칙86조) 다음 자치생활 가운데 틀린 부분은 몇 개인가?(  )\n① 소장은 개방처우급·(완화경비처우급) 수형자에게 자치생활을 (허가할 수) 있다.\n② 수형자 자치생활의 범위는 (인원점검), (취미활동), (일정한 구역 안에서의 생활) 등으로 한다.\n③ 소장은 자치생활 수형자들이 (교육실, 강당 등 적당한 장소)에서 (월 1회 이상) (토론회)를 (할 수 있도록 노력하여야) 한다.\n④ 소장은 자치생활 수형자가 (법무부장관) (또는) (소장)이 정하는 (자치생활 준수사항을 위반)한 경우에는 자치생활 (허가를 취소할 수) 있다.", "1곳 : 3 – 토론회를 할 수 있도록 노력하여야 한다가 아니고 “하여야 한다”임", "8회"], ["(규칙91조) 소장은 개방처우급·완화경비처우급 또는 자치생활 수형자에 대하여 월 2회 경기 또는 오락회를 개최하게 할 수 있다. 다만, 소년수형자에 대하여는 그 시간과 횟수를 늘릴 수 있다.(  )", "X / 월 2회가 아니고 월 2회 이내임 – 소장이 하기 나름이므로 안해도 그만임 / 소년수형자에 대해서는 횟수증가만 있고 시간증대는 규정없다. / 자치생활 수형자가 들어가 있음에 유의할 것!!!", "8회"], ["(규칙93조) 중간처우와 관련해 다르게 바르지 못한 부분은 몇 개인가?(  )\n① 법무부장관은 개방처우급 혹은 완화경비처우급 수형자가 다음 각 호의 사유에 모두 해당하는 경우에는 교정시설 또는 지역사회에 설치된 개방시설에 수용하여 사회 적응에 필요한 교육, 취업지원 등 적정한 처우를 할 수 있다.(  )\n  1. 집행할 형기가 3년 이상인 사람(  )\n  2. 수용 횟수가 2회 이하인 사람(  )\n  3. 중간처우 대상자 선정일부터 가석방 또는 형기 종료 예정일까지 기간이 3개월 이상 1년 6개월 이하인 사람(  )\n  ② 소장은 제1항에 따른 처우의 대상자 중 중간처우를 받는 날부터 가석방 또는 형기 종료 예정일까지의 기간이 9개월 이하인 수형자에 대해서는 지역사회에 설치된 개방시설에 수용하여 제1항에 따른 처우를 할 수 있다.(  )\n  ③ 제1항에 따른 중간처우 대상자의 선발절차는 법무부령으로 정한다.(  )", "모두 틀림 / ① 또는 지역사회에X / 1. 집행할 형기→형기 / 2. 수용횟수→범죄횟수 / 3. 대상자 선정일→중간처우를 받는 날부터 / ② 9개월 이하인 → 9개월 미만인 / ③ 법무부령→법무부장관", "8회"], ["(규칙94조~95조) 다음 중 바르지 못한 부분은 몇 개인가?(  )\n1. 소장은 수형자가 개방처우급 또는 (완화경비처우급)으로서 작업·교육 등의 (성적이 우수)하고 (관련 기술이 있는 경우)에는 교도관의 (작업지도를 보조하게 할 수) 있다.\n2. 소장은 수형자가 개방처우급 또는 (완화경비처우급)으로서 (작업기술이 탁월)하고 (작업성적이 우수한 경우)에는 수형자 자신을 위한 (개인작업을 하게 할 수) 있다. 이 경우 개인작업 시간은 (교도작업에 지장을 주지 아니하는 범위에서 1일 2시간)으로 한다.\n3. 소장은 개인작업을 하는 수형자에게 (개인작업 용구를 사용하게 할 수) 있다. 이 경우 작업용구는 (잠금장치가 되어 있는 특정한 용기에 보관하도록 하여야) 한다.\n4. 개인작업에 필요한 (작업재료 등의 구입비용은 수형자가 부담)한다. 다만, (처우상 필요한 경우)에는 (예산의 범위에서 그 비용을 지원할 수) 있다.", "2, 3번 틀림 / 2 : 1일 2시간으로→2시간 이내로, 3 : 개인용구 보관은 “특정한 용기”, 잠금장치X", "8회"], ["(규칙96조) 소장은 수형자가 개방처우급 또는 완화경비처우급으로서 직업능력 향상을 위하여 특히 필요한 경우에는 교정시설 외부의 공공기관 또는 기업체 등에서 운영하는 직업훈련을 받게 할 수 있다. 직업훈련의 비용은 수형자가 부담한다. 다만, 처우상 특히 필요한 경우에는 예산의 범위에서 그 비용을 지원할 수 있다.(  )", "O", "8회"], ["(영61조) 법무부장관은 수형자를 과학적으로 분류하기 위하여 분류심사를 전담하는 교정시설을 지정ㆍ운영하여야 한다.(  )", "X / 운영하여야 한다→운영할 수 있다", "8회"], ["(법62조) 분류처우위원회에 대한 설명 중 틀린 것은 몇 개인가?(  )\n1. 수형자의 (개별처우계획, 가석방심사신청 대상자 선정, 그 밖에 수형자의 분류처우에 관한 중요 사항)을 (심의ㆍ의결)하기 위하여 (교정시설)에 (분류처우위원회)를 (둔다).\n2. 위원회는 (위원장을 포함)한 (5인 이상 7인 이하의 위원)으로 구성하고, (위원장은 소장)이 되며, (위원)은 (위원장)이 (소속 기관의 부소장 및 과장(지소의 경우에는 7급 이상의 교도관) 중에서 임명)한다. *외부위원은 없다.\n3. 위원회는 그 심의ㆍ의결을 위하여 (외부전문가로부터 의견을 들을 수) 있다.\n4. 이 법에 규정된 사항 외에 위원회에 관하여 (필요한 사항은 법무부령)으로 정한다.", "틀린 곳 없음 / 유의사항 – 분류처우위원회의 위원을 소장이 임명하지 않고 위원장이 임명함 – 다른 위원회는 소장, 장관이 임명함.", "8회"], ["(영86조) 법무부장관은 법 제61조의 분류심사를 전담하는 교정시설을 지정ㆍ운영하는 경우에는 지방교정청별로 1개소 이상이 되도록 하여야 한다.(  )", "O", "8회"], ["(규칙97조) 분류처우위원회 심의·의결 사항이 아닌 것은 몇 개인가?(  )\n  1. 처우등급 판단 등 분류심사에 관한 사항\n  2. 소득점수 등의 평가 및 평정에 관한 사항\n  3. 수형자 처우와 관련하여 소장(위원장X)이 심의를 요구한 사항\n  4. 가석방 적격심사 신청 대상자 선정(가석방 적격심사 대상자X) 등에 관한 사항\n  5. 그 밖에 수형자의 수용 및 처우에 관한 사항", "없음 / 모두 심의의결대상임 / 암기 - 처소소가수", "8회"], ["(규칙98조~100조) 분류처우위원회에 대한 설명을 틀린 것은 몇 개인가?(  )\n1. 소장은 위원회를 소집하고 위원회의 사무를 총괄한다.\n2. 위원장이 부득이한 사유로 그 직무를 수행할 수 없을 때에는 위원장이 미리 지정한 위원이 그 직무를 대행한다.\n3. 위원회의 회의는 매월 10일에 개최한다. 다만, 위원회의 회의를 개최하는 날이 토요일, 공휴일, 그 밖에 부득이한 사정이 있는 때에는 그 다음 날에 개최한다.\n4. 위원장은 수형자의 처우와 관련하여 긴급히 처리하여야 하는 사항이 있는 경우에는 임시회의를 개최할 수 있다.\n5. 위원회의 회의는 재적위원 과반수의 출석으로 개의하고, 출석위원 과반수의 찬성으로 의결한다.\n6. 위원회의 사무를 처리하기 위하여 분류심사 업무를 담당하는 교도관 중에서 간사 1명 이상을 둔다.\n7. 위원장과 간사는 위원회의 회의록을 작성하여 유지하여야 한다.", "모두 틀림 / 1. 소장은→위원장은 / 2. 직무를 대행한다→대행할 수 있다.(특이한규정임, 다른 직무대행규정은 다 한다임에 유의) / 3. 그 밖에 부득이한 사정이 있는 때→ 그 밖에 법무부장관이 정한 휴무일일 때에는(소장보다 높은 사람이 정하는 경우에만 분류처우위원회 날짜 변경이 가능) / 4. 긴급히 처리하여야 하는 사항(옛날규정)→필요한 경우 / 5. 재적 과반수의 출석→2/3 출석으로 개의 / 6. 간사 1명 이상→1명을 둔다 / 7. 위원장과 간사→간사", "8회"]]}, {"t": "작업·직업훈련", "q": [["(규칙134조) 소장은 토요일, 공휴일, 그 밖에 위원회의 소집이 매우 곤란한 때에 귀휴 사유가 발생한 경우에는 귀휴심사위원회의 심사를 거치지 아니하고 귀휴를 허가할 수 있다. 다만, 이 경우 1. 수용관리를 담당하고 있는 부서 (and) 2. 귀휴업무를 담당하고 있는 부서의 장의 의견을 들어야 한다.(  )", "X / 귀휴사유가 발생한 경우→가족 또는 배우자의 직계존속이 사망한 때(개별적인 특별귀휴 요건인 경우에만 귀휴심사위원회 생략이 가능한 것이지 단순히 ‘귀휴사유’라고 하면 틀린 문장이 됨)", "10회"], ["(규칙142조) 귀휴자의 여비와 귀휴 중 착용할 복장은 본인이 부담한다. 소장은 귀휴자가 신청할 경우 작업장려금의 전부 또는 일부를 귀휴비용으로 사용하게 할 수 있다.(  )", "O", "10회"], ["(법86조) 소장은 미결수용자에 대하여는 교육 또는 교화프로그램을 실시하거나 작업 또는 직업훈련을 부과할 수 있다.(  )", "X / 소장은 미결수용자에 대하여는 신청에 따라 교육 또는 교화프로그램을 실시하거나 작업을 부과할 수 있다.(미결수용자는 신청하는 경우에만 교육, 교화프로그램, 작업을 부과할 수 있고, 직업훈련 규정은 없으므로 부과할 수 없다)", "11회"], ["(법86조) 미결수용자에게 교육 또는 교화프로그램을 실시하거나 작업을 부과하는 경우 준용되는 법률조항입니다. 준용되지 않는 부분과 준용되는 부분을 참고하시기 바랍니다.(답체크 아님)\n  ② 소장은 「교육기본법」 제8조의 의무교육을 받지 못한 미결수용자에 대하여는 본인의 의사ㆍ나이ㆍ지식정도, 그 밖의 사정을 고려하여 그에 알맞게 교육하여야 한다.\n  ③ 소장은 제1항 및 제2항에 따른 교육을 위하여 필요하면 미결수용자를 중간처우를 위한 전담교정시설에 수용하여 다음 각 호의 조치를 할 수 있다. \u003c개정 2015.3.27.> (밖에서 행하는 것은 제외하므로 준용 안됨)\n  1. 외부 교육기관에의 통학\n  2. 외부 교육기관에서의 위탁교육\n  ④ 교육과정ㆍ외부통학ㆍ위탁교육 등에 관하여 필요한 사항은 법무부령으로 정한다.\n제64조(교화프로그램) ① 소장은 미결수용자의 교정교화를 위하여 상담ㆍ심리치료, 그 밖의 교화프로그램을 실시하여야 한다.\n ② 소장은 제1항에 따른 교화프로그램의 효과를 높이기 위하여 범죄원인별로 적절한 교화프로그램의 내용, 교육장소 및 전문인력의 확보 등 적합한 환경을 갖추도록 노력하여야 한다.\n ③ 교화프로그램의 종류ㆍ내용 등에 관하여 필요한 사항은 법무부령으로 정한다.\n제65조(작업의 부과) ① 미결수용자에게 부과하는 작업은 건전한 사회복귀를 위하여 기술을 습득하고 근로의욕을 고취하는 데에 적합한 것이어야 한다.\n  ② 소장은 미결수용자에게 작업을 부과하려면 나이ㆍ형기ㆍ건강상태ㆍ기술ㆍ성격ㆍ취미ㆍ경력ㆍ장래생계, 그 밖의 미결수용자의 사정을 고려하여야 한다.\n제70조(집중근로에 따른 처우) ① 소장은 미결수용자의 신청에 따라 제68조의 작업(외부통근), 제69조제2항(외부직업훈련)의 훈련(밖에서 행하는 것은 제외하므로 준용 안됨, 미결수용자는 집중근로작업이 준용되고 사형확정자는 집중근로작업 준용되지 않음), 그 밖에 집중적인 근로가 필요한 작업을 부과하는 경우에는 접견ㆍ전화통화ㆍ교육ㆍ공동행사 참가 등의 처우를 제한할 수 있다. 다만, 접견 또는 전화통화를 제한한 때에는 휴일이나 그 밖에 해당 수용자의 작업이 없는 날에 접견 또는 전화통화를 할 수 있게 하여야 한다.\n  ② 소장은 제1항에 따라 작업을 부과하거나 훈련을 받게 하기 전에 미결수용자에게 제한되는 처우의 내용을 충분히 설명하여야 한다.\n제71조(휴일의 작업) 공휴일ㆍ토요일과 그 밖의 휴일에는 작업을 부과하지 아니한다. 다만, 취사ㆍ청소ㆍ간호, 그 밖에 특히 필요한 작업은 예외로 한다.\n제72조(작업의 면제) ① 소장은 미결수용자의 가족 또는 배우자의 직계존속이 사망하면 2일간, 부모 또는 배우자의 기일을 맞이하면 1일간 해당 미결수용자의 작업을 면제한다. 다만, 미결수용자가 작업을 계속하기를 원하는 경우는 예외로 한다.\n  ② 소장은 미결수용자에게 부상ㆍ질병, 그 밖에 작업을 계속하기 어려운 특별한 사정이 있으면 그 사유가 해소될 때까지 작업을 면제할 수 있다.\n제73조(작업수입 등) ① 작업수입은 국고수입으로 한다.\n  ② 소장은 미결수용자의 근로의욕을 고취하고 건전한 사회복귀를 지원하기 위하여 법무부장관이 정하는 바에 따라 작업의 종류, 작업성적, 교정성적, 그 밖의 사정을 고려하여 미결수용자에게 작업장려금을 지급할 수 있다.\n  ③ 제2항의 작업장려금은 석방할 때에 본인에게 지급한다. 다만, 본인의 가족생활 부조, 교화 또는 건전한 사회복귀를 위하여 특히 필요하면 석방 전이라도 그 전부 또는 일부를 지급할 수 있다.\n제74조(위로금ㆍ조위금) ① 소장은 미결수용자가 다음 각 호의 어느 하나에 해당하면 법무부장관이 정하는 바에 따라 위로금 또는 조위금을 지급한다.\n  1. 작업 또는 직업훈련으로 인한 부상 또는 질병으로 신체에 장해가 발생한 때\n  2. 작업 또는 직업훈련 중에 사망하거나 그로 인하여 사망한 때\n  ② 위로금은 석방할 때에 본인에게 지급하고, 조위금은 그 상속인에게 지급한다.\n제75조(다른 보상ㆍ배상과의 관계) 위로금 또는 조위금을 지급받을 사람이 국가로부터 동일한 사유로 「민법」이나 그 밖의 법령에 따라 제74조의 위로금 또는 조위금에 상당하는 금액을 지급받은 경우에는 그 금액을 위로금 또는 조위금으로 지급하지 아니한다.\n제76조(위로금ㆍ조위금을 지급받을 권리의 보호) ① 제74조의 위로금 또는 조위금을 지급받을 권리는 다른 사람 또는 법인에게 양도하거나 담보로 제공할 수 없으며, 다른 사람 또는 법인은 이를 압류할 수 없다.\n  ② 제74조에 따라 지급받은 금전을 표준으로 하여 조세와 그 밖의 공과금(公課金)을 부과하여서는 아니 된다.", "해당없음\n제63조(교육) ① 소장은 미결수용자가 건전한 사회복귀에 필요한 지식과 소양을 습득하도록 교육할 수 있다.", "11회"], ["(규칙153조) 사형확정자의 작업에 대한 다음 설명 중 틀린 것은 무엇인가?(  )\n① 소장은 사형확정자가 작업을 신청하면 교도관회의 또는 분류처우위원회의 심의를 거쳐 교정시설 안에서 실시하는 작업을 부과할 수 있다. 이 경우 부과하는 작업은 심리적 안정과 원만한 수용생활을 도모하는 데 적합한 것이어야 한다.\n② 소장은 교육, 교화프로그램 또는 작업이 부과된 사형확정자에 대하여 교도관회의의 심의를 거쳐 제150조제4항(번호표 및 거실표의 색상은 붉은색)을 적용하지 아니할 수 있다.\n③ 소장은 작업이 부과된 사형확정자가 작업의 취소를 요청하면 사형확정자의 의사(意思)·건강, 담당교도관의 의견 등을 고려하여 작업을 취소할 수 있다.\n④ 사형확정자에게 작업을 부과하는 경우에는 법 제71조부터 제76조까지의 규정(휴일의 작업, 작업의 면제, 작업수입 등, 위로금, 조위금 등)을 준용한다. 제70조(집중근로작업에 따른 처우)는 준용되지 않는다.\n⑤ (규칙200조) 소장은 사형확정자에게 거실 및 작업장 등의 봉사원, 반장, 조장, 분임장, 그 밖에 수용자를 대표하는 직책을 부여해서는 아니 된다.\n⑥ 담당교도관은 사형확정자의 영치품 및 소지물의 변동 상황을 수시로 점검하고, 특이사항이 있는 경우에는 감독교도관에게 보고하여야 한다.", "1, 2, 6번 틀림 / 1. 사형확정자는 분류처우대상자가 아니므로 교도관회의를 통해 처우가 결정됨. / 2. 붉은색 적용 예외는 작업하는 사형확정자에 대해서만 적용되고 교육 또는 교화프로그램 대상자에게는 적용되지 않음. / 6. 위 규정은 마약류수용자에 대한 규정임.", "11회"], ["(규칙156조) 소장은 사형확정자의 심리적 안정과 원만한 수용생활을 위하여 필요하다고 인정하는 경우에는 월 3회 이내의 범위에서 전화통화를 허가할 수 있다.(  )\n  ② 소장은 사형확정자에게 작업을 부과하려면 나이ㆍ형기ㆍ건강상태ㆍ기술ㆍ성격ㆍ취미ㆍ경력ㆍ장래생계, 그 밖의 사형확정자의 사정을 고려하여야 한다.\n제70조(집중근로에 따른 처우) ① 소장은 사형확정자의 신청에 따라 제68조의 작업(외부통근), 제69조제2항(외부직업훈련)의 훈련, 그 밖에 집중적인 근로가 필요한 작업을 부과하는 경우에는 접견ㆍ전화통화ㆍ교육ㆍ공동행사 참가 등의 처우를 제한할 수 있다. 다만, 접견 또는 전화통화를 제한한 때에는 휴일이나 그 밖에 해당 수용자의 작업이 없는 날에 접견 또는 전화통화를 할 수 있게 하여야 한다.\n  ② 소장은 제1항에 따라 작업을 부과하거나 훈련을 받게 하기 전에 사형확정자에게 제한되는 처우의 내용을 충분히 설명하여야 한다. (사형확정자는 집중근로작업을 포함 위의 조항이 준용되지 아니함)\n제71조(휴일의 작업) 공휴일ㆍ토요일과 그 밖의 휴일에는 작업을 부과하지 아니한다. 다만, 취사ㆍ청소ㆍ간호, 그 밖에 특히 필요한 작업은 예외로 한다.\n제72조(작업의 면제) ① 소장은 사형확정자의 가족 또는 배우자의 직계존속이 사망하면 2일간, 부모 또는 배우자의 기일을 맞이하면 1일간 해당 사형확정자의 작업을 면제한다. 다만, 사형확정자가 작업을 계속하기를 원하는 경우는 예외로 한다.\n  ② 소장은 사형확정자에게 부상ㆍ질병, 그 밖에 작업을 계속하기 어려운 특별한 사정이 있으면 그 사유가 해소될 때까지 작업을 면제할 수 있다.\n제73조(작업수입 등) ① 작업수입은 국고수입으로 한다.\n  ② 소장은 사형확정자의 근로의욕을 고취하고 건전한 사회복귀를 지원하기 위하여 법무부장관이 정하는 바에 따라 작업의 종류, 작업성적, 교정성적, 그 밖의 사정을 고려하여 사형확정자에게 작업장려금을 지급할 수 있다.\n  ③ 제2항의 작업장려금은 석방할 때에 본인에게 지급한다. 다만, 본인의 가족생활 부조, 교화 또는 건전한 사회복귀를 위하여 특히 필요하면 석방 전이라도 그 전부 또는 일부를 지급할 수 있다.\n제74조(위로금ㆍ조위금) ① 소장은 사형확정자가 다음 각 호의 어느 하나에 해당하면 법무부장관이 정하는 바에 따라 위로금 또는 조위금을 지급한다.\n  1. 작업 또는 직업훈련으로 인한 부상 또는 질병으로 신체에 장해가 발생한 때\n  2. 작업 또는 직업훈련 중에 사망하거나 그로 인하여 사망한 때\n  ② 위로금은 석방할 때에 본인에게 지급하고, 조위금은 그 상속인에게 지급한다.\n제75조(다른 보상ㆍ배상과의 관계) 위로금 또는 조위금을 지급받을 사람이 국가로부터 동일한 사유로 「민법」이나 그 밖의 법령에 따라 제74조의 위로금 또는 조위금에 상당하는 금액을 지급받은 경우에는 그 금액을 위로금 또는 조위금으로 지급하지 아니한다.\n제76조(위로금ㆍ조위금을 지급받을 권리의 보호) ① 제74조의 위로금 또는 조위금을 지급받을 권리는 다른 사람 또는 법인에게 양도하거나 담보로 제공할 수 없으며, 다른 사람 또는 법인은 이를 압류할 수 없다.\n  ② 제74조에 따라 지급받은 금전을 표준으로 하여 조세와 그 밖의 공과금(公課金)을 부과하여서는 아니 된다.", "O\n사형확정자에 대한 작업 준용 규정(71조~76조 준용)\n제65조(작업의 부과) ① 사형확정자에게 부과하는 작업은 건전한 사회복귀를 위하여 기술을 습득하고 근로의욕을 고취하는 데에 적합한 것이어야 한다.", "11회"], ["(영116조) 교정시설의 바깥문, 출입구, 거실, 작업장, 그 밖에 수용자를 수용하고 있는 장소는 외부와 차단하여야 한다. 다만, 필요에 따라 일시 개방하는 경우에는 그 장소를 경비하여야 한다.(  )", "O / 바깥문(정문), 출입구(수용동입구), 거실(출입문), 작업장(출입문) - 외부와 차단, 일시개방시 경비해야", "12회"], ["(규칙231조) 작업장려금의 삭감은 징벌위원회가 해당 징벌을 의결한 이전 달의 작업장려금부터 이미 지급된 작업장려금에 대하여 역순으로 집행한다.(  )", "X / 이전 달의X → 해당 징벌을 의결한 날이 속하는 달의 작업장려금부터 이미 지급된 작업장려금에 대하여 역순으로 집행한다", "15회"], ["(법134조)  귀휴ㆍ외부통근, 그 밖의 사유로 소장의 허가를 받아 교도관의 계호 없이 교정시설 밖으로 나간 후에 정당한 사유 없이 기한 내에 돌아오지 아니하는 행위를 한 수용자는 1년 이하의 징역에 처한다.(  )", "O / 벌금형 없다 / ‘소장의 허가를 받아 교도관의 계호없이’를 규정한 이유는 형법상 도주죄(법률에 의하여 체포 또는 구금된 자가 도주한 때에는 1년 이하의 징역에 처한다.)의 성립요건 이외인 경우를 처벌할 수 있도록 하기 위해 규정된 것으로 보인다.", "17회"], ["\"외부통근자\"란 교정교화와 기술습득을 촉진하기 위하여 외부기업체 또는 교정시설 안에 설치된 외부기업체의 작업장에 통근하며 작업하는 수용자를 말한다.(  )", "X – 교정교화X, 건전한 사회복귀O / 수용자X, 수형자O", "1회"], ["소장은 거실ㆍ작업장, 그 밖에 수용자가 생활하는 장소(이하 이 조에서 \"거실등\"이라 한다)에 수용생활에 필요한 기구를 갖춰 둘 수 있도록 노력하여야 한다.(  )", "X / 갖춰두야 한다.O", "3회"], ["모범수형자복 및 외부통근자복은 겨울옷·봄가을옷·여름옷을 남녀용으로 각각 구분하여 6종으로 한다.(  )", "O", "3회"], ["평상복은 실내생활 수용자, 교도작업·직업능력개발훈련(이하 \"직업훈련\"이라 한다) 수용자, 각종 교육을 받는 수용자 및 다른 교정시설로 이송되는 수용자가 착용한다.(  )", "O", "3회"], ["모범수형자복은 개방처우급에 해당하는 수형자가 작업·교육 등 일상생활을 하는 때, 가석방예정자가 실내생활을 하는 때 및 수형자가 사회봉사활동 등 대내외 행사 참석 시 소장이 필요하다고 인정하는 때 착용(  )", "X / 실내생활X, 실외생활O", "3회"], ["외부통근자복은 외부통근자로서 실내·외 생활을 하는 때에 착용(  )", "X / 실내외생활X, 실외생활O", "3회"], ["비옷은 수용자가 우천 시 실외작업을 하는 때 소장이 지급할 필요가 있다고 인정하는 경우에 착용(  )", "X / 실외작업을 하는 때 착용O , 소장 지급X", "3회"], ["장갑은 교육·작업을 하는 수용자 중 소장이 지급할 필요가 있다고 인정하는 자가 착용(  )", "X / 교육X, 작업O", "3회"], ["소장은 (수용자)가 그의 가족(배우자, 직계존비속 또는 형제자매를 말한다) 또는 (배우자의 직계존속)에게 (도움을 주거나) 그 밖에 (정당한 용도로 사용)하기 위하여 보관금의 사용을 신청한 경우에는 그 (사정을 고려하여 허가할 수) 있다. 괄호안의 내용 중 규정과 다른 것은?(  )", "틀린 곳 없음 / 보관금 사용 신청과 작업장려금 사용 신청의 차이점 구분 필요\n  cf) 작업장려금은 석방할 때에 본인에게 지급한다. 다만, 본인의 가족생활 부조, 교화 또는 건전한 사회복귀를 위하여 특히 필요하면 석방 전이라도 그 전부 또는 일부를 지급할 수 있다.", "3회"], ["(법55조) 수용자에 대하여는 교육ㆍ교화프로그램, 작업, 직업훈련 등을 통하여 교정교화를 도모하고 사회생활에 적응하는 능력을 함양하도록 처우하여야 한다.(  )", "X / 수형자만 대상이고 수용자는 아님", "8회"], ["(영84조) \"교정성적\"이란 수형자의 수용생활 태도, 상벌 유무, 교육 및 작업의 성과 등을 종합적으로 평가한 결과를 말한다.(  )", "O / 교정성적 암기 – 태상성 – 수용생활(태)도, (상)벌유무, 작업 및 교육의 (성)과", "8회"], ["(규칙7  교육 대상자는 면제한다가 맞음", "9회"], ["(규칙108조) 다음 중 설명으로 틀린 것은 몇 개인가?(  )\n ① 소장은 매년 초 다음 각 호의 시험을 준비하는 수형자를 대상으로 검정고시반을 설치·운영할 수 있다.\n  1. 초등학교 졸업학력 검정고시  2. 중학교 졸업학력 검정고시  3. 고등학교 졸업학력 검정고시\n ② 소장은 교육기간 중에 검정고시에 합격한 교육대상자에 대하여는 해당 교육과정을 조기 수료시키거나 상위 교육과정에 임시 편성시킬 수 있다.\n ③ 소장은 고등학교 졸업 또는 이와 동등한 수준 이상의 학력이 인정되는 수형자를 대상으로 대학입학시험 준비반을 편성·운영할 수 있다.\n1. 소장은 매년 초 초등학교 졸업학력 검정고시반을 설치․운영하여야 한다.\n2. 소장은 매년 초 중학교 졸업학력 검정고시반을 설치․운영하여야 한다.\n3. 소장은 매년 초 고등학교 졸업학력 검정고시반을 설치․운영할 수 있다.\n4. 소장은 교육기간 중에 검정고시 합격한 교육대상자에 대하여는 해당 교육과정을 조기 수료시킬 수 있다.\n5. 소장은 교육기간 중에 검정고시에 합격한 교육대상자에 대하여는 상위 교육과정에 정규 편성시킬 수 있다.\n6. 소장은 고등학교 졸업 또는 이와 동등한 수준 이상의 학력이 인정되는 수형자를 대상으로 대학입학시험 준비반을 편성·운영할 수 있다.\n22.(규칙109조) 소장은 수형자에게 고등학교 과정의 교육기회를 부여하기 위하여 「초·중등교육법」 제51조에 따른 방송통신고등학교 교육과정을 설치·운영할 수 있다.(  )\n O\n23. (규칙109조) 소장은 중학교 졸업 또는 이와 동등한 수준 이상의 학력이 인정되는 수형자가 방송통신고등학교 교육과정을 지원하여 합격한 경우에는 교육대상자로 선발할 수 있다.(  )\n O\n24. (규칙109조) 소장은 방송통신고등학교 교육과정의 입학금, 수업료, 교과용 도서 구입비 등 교육에 필요한 비용을 예산의 범위에서 지원할 수 있다.(  )\n O\n25. (규칙110조) 독학의 의한 학위 취득과정 설치 및 운영에 대한 설명으로 틀린 것은?(  )\n 2개 틀림 / 2번 틀림-학사고시반 수형자의 신청이 필수, 직권선정 규정 없음 / 3번 틀림-형집행지휘서 접수일이 아니고 교육개시일 기준임, 20년이 아니고 21년임\n규정 : 110조 2항 ② 소장은 다음 각 호의 요건을 갖춘 수형자가 제1항의 학사고시반 교육을 신청하는 경우에는 교육대상자로 선발할 수 있다.(소장은 수형자의 신청이 있어야만 선발이 가능함 / 경비처우급 규정없으므로 S4 가능)\n1. 고등학교 졸업 또는 이와 동등한 수준 이상의 학력이 인정될 것\n2. 교육개시일을 기준으로 형기의 3분의 1(21년 이상의 유기형 또는 무기형의 경우에는 7년)이 지났을 것\n3. 집행할 형기가 2년 이상일 것\n1. 소장은 수형자에게 학위취득 기회를 부여하기 위하여 독학에 의한 학사학위 취득과정(이하 \"학사고시반 교육\"이라 한다)을 설치·운영할 수 있다.\n2. 소장은 학사고시반 교육을 신청하지 않은 수형자를 교육대상자로 선발할 수 있다.\n3. 학사고시반 교육 수형자의 요건으로는, ➀고등학교 졸업 또는 이와 동등한 수준 이상의 학력이 인정될 것\n4. ➁형집행지휘서 접수일로부터 형기의 3분의 1(20년 이상의 유기형 또는 무기형의 경우에는 7년)이 지났을 것\n5. ➂집행할 형기가 2년 이상일 것 요건을 모두 충족해야 한다.\n6. 중경비처우급도 교육대상자로 선발될 수 있다.\n26. (규칙111조) 소장은 대학 과정의 교육기회를 부여하기 위하여 「고등교육법」 제2조에 따른 방송통신대학 교육과정을 설치·운영할 수 있다.(  )\n O\n27. (규칙111조) 소장은 제110조제2항(고졸이상학력, 형기 1/3 경과, 2년 이상) 각 호의 요건을 갖춘 개방처우급·완화경비처우급·일반경비처우급 수형자가 방송통신대학 교육과정에 지원하여 합격한 경우에는 교육대상자로 선발할 수 있다. 교화상 특히 필요한 경우 중경비처우급 수형자도 교육대상자로 선발할 수 있다.(  )\n X / 방송통신대학 – 일반경비처우급까지 가능 / 단서 규정 없다.\n28. (규칙112조) 소장은 전문대학과정의 교육기회를 부여하기 위하여 「고등교육법」 제2조에 따른 전문대학 위탁교육과정을 설치·운영할 수 있다.(  )\n O\n29. (규칙112조) 소장은 제110조제2항(고졸이상학력, 형기 1/3 경과, 2년 이상) 각 호의 요건을 갖춘 개방처우급·완화경비처우급·일반경비처우급 수형자가 전문대학 위탁교육과정에 지원하여 합격한 경우에는 교육대상자로 선발할 수 있다. 교화상 특히 필요한 경우 중경비처우급 수형자도 교육대상자로 선발할 수 있다.(  )\n X / 단서 규정 없다. 방송통신대학이나 전문대학 위탁교육과정이나 동일하다.\n30. (규칙112조) 전문대학 위탁교육과정의 교과과정, 시험응시 및 학위취득에 관한 세부사항은 법무부장관과 수탁자 간의 협약에 따른다.(  )\n X / 법무부장관→위탁자\n31. (규칙112조) 소장은 학사고시반 교육, 방송통신대학 교육, 전문대학 위탁교육을 위하여 필요한 경우 수형자를 중간처우를 위한 전담교정시설에 수용할 수 있다.(  )\n X / 중간처우는 위탁교육과만 관계가 있고, 방송통신대, 독학 등과 관계가 없다\n32. (규칙113조) 다음 중 빈칸에 맞는 말을 채우시오?(  )\n 정보화, 중경비, 일반경비, 외국어, 외국어, 교육실 외에서의, 어학학습장비, 계호수준, 독거여부, 교육정도, 교도관회의, 법무부장관, 지식, 소양,\n① 소장은 수형자에게 지식정보사회에 적응할 수 있는 교육기회를 부여하기 위하여 (     ) 교육과정을 설치·운영할 수 있다. (       )처우급까지 대상이 될 수 있다.\n② 소장은 개방처우급·완화경비처우급·(        )처우급 수형자에게 다문화 시대에 대처할 수 있는 교육기회를 부여하기 위하여 (      ) 교육과정을 설치·운영할 수 있다.\n③ 소장은 (      ) 교육대상자가 (          )에서의 (          )를 이용한 외국어학습을 원하는 경우에는 (          ), (        ), (        ) 등에 대한 (         )의 심의를 거쳐 허가할 수 있다.\n④ 소장은 이 규칙에서 정한 교육과정 외에도 (           )이 수형자로 하여금 건전한 사회복귀에 필요한 (     )과 (      )을 습득하게 하기 위하여 정하는 교육과정을 설치·운영할 수 있다.\n(들어갈 단어)\n지식, 소양, 교양, 정서안정, 법무부장관, 교도관회의, 계호수준, 독거여부, 혼거여부, 교육정도,\n교정성적, 외국어, 카세트, 재생전용기기, 어학학습장비, 교육실에서의, 교육실 외에서의,\n분류처우위원회, 일반경비, 중경비, 완화경비, 정보화,\n33. (영88조) 소장은 수형자의 정서 함양을 위하여 필요하다고 인정하면 연극ㆍ영화관람, 체육행사, 그 밖의 문화예술활동을 하게 할 수 있다.(  )\n O\n34. (법64조) 다음 중 틀린 부분은 몇 개인가?(  )\n 틀린 부분 없음 / 유의 : 상담, 심리치료, 교화프로그램 하여야 한다 / 범죄원인별!!! 처음등장 단어임. 죄명별X / 환경을 갖춰야 한다가 아니고 갖추도록 노력하여야 한다임(신설된 규정이다보니 처음부터 환경을 갖추기 어려우므로 노력정도로 규정함)\n① 소장은 수형자의 교정교화를 위하여 상담ㆍ심리치료, 그 밖의 교화프로그램을 실시하여야 한다.\n② 소장은 교화프로그램의 효과를 높이기 위하여 범죄원인별로 적절한 교화프로그램의 내용, 교육장소 및 전문인력의 확보 등 적합한 환경을 갖추도록 노력하여야 한다.\n③ 교화프로그램의 종류ㆍ내용 등에 관하여 필요한 사항은 법무부령으로 정한다.\n35. (규칙114조) 교화프로그램의 종류는 몇 개인가?(  )\n 모두 맞음\n1. 문화프로그램  2. 문제행동예방프로그램  3. 가족관계회복프로그램\n4. 교화상담  5. 그 밖에 법무부장관이 정하는 교화프로그램\n36. (규칙115조) 소장은 죄명, 죄질 등을 구분하여 음악, 미술, 독서 등 문화예술과 관련된 다양한 프로그램을 도입하거나 개발하여 운영할 수 있다.(  )\n X / 죄명, 죄질 등을 구분하여(문제행동예방프로그램)→수형자의 인성 함양, 자아존중감 회복 등을 위하여\n37. (규칙116조) 소장은 수형자의 죄명, 죄질 등을 구분하여 그에 따른 심리측정·평가·진단·치료 등의 문제행동예방프로그램을 도입하거나 개발하여 실시할 수 있다.(  )\n O\n38. (규칙117조) 소장은 수형자와 그 가족의 관계를 유지·회복하기 위하여 수형자의 가족이 참여하는 각종 프로그램을 운영할 수 있다. 다만, 가족이 없는 수형자의 경우 교화를 위하여 필요하면 결연을 맺었거나 그 밖에 가족에 준하는 사람의 참여를 허가할 수 있다.(  )\n O\n39. (규칙117조) 가족관계회복프로그램 대상 수형자는 교도관회의 또는 분류처우위원회의 심의를 거쳐 선발하고, 참여인원은 5명으로 한다. 다만, 특히 필요하다고 인정하는 경우에는 참여인원을 늘리거나 줄일 수 있다.(  )\n X / 또는 분류처우위원회X / 5명으로→5명 이내의 가족으로 / 참여인원을 늘릴 수 있다.O\n   규정 : 수형자는 교도관회의의 심의를 거쳐 선발하고, 참여인원은 5명 이내의 가족으로 한다. 다만, 특히 필요하다고 인정하는 경우에는 참여인원을 늘릴 수 있다\n40. (규칙118조) 소장은 수형자의 건전한 가치관 형성, 정서안정, 고충해소 등을 위하여 교화상담을 실시할 수 있다. 소장은 교화상담을 위하여 교도관이나 교정참여인사를 교화상담자로 지정할 수 있으며, 수형자의 안정을 위하여 결연을 주선할 수 있다.(  )\n O / 교화상담 실시하여야 한다 같지만 실시할 수 있다가 맞음(실시하여야 한다고 하면 수형자가 왜 상담안하냐며 직무유기를 주장할 여지가 있음)\n41. (규칙119조) 교화프로그램 운영 방법 중 틀린 부분은 몇 개인가?(  )\n 2개 틀림 / 1 – 하여야한다→할 수 있다 *교화프로그램 운영시 ‘(암기) 약정신건성나’ 고려하여야 하며, ‘성시인’고려 이송할 수 있다. / 3 – 수용기록부→교정정보시스템 / 준용규정 꼭 읽어보고 적용해봐야 함!\n① 소장은 교화프로그램을 운영하는 경우 약물중독·정신질환·신체장애·건강·성별·나이 등 수형자의 개별 특성을 고려하여야 하며, 프로그램의 성격 및 시설 규모와 인원을 고려하여 이송 등의 적절한 조치를 하여야 한다.\n② 소장은 교화프로그램을 운영하기 위하여 수형자의 정서적인 안정이 보장될 수 있는 장소를 따로 정하거나 방송설비 및 방송기기를 이용할 수 있다.\n③ 소장은 수용기록부에 교화프로그램의 주요 진행내용을 기록하여 수형자 처우에 활용하여야 하며, 상담내용 등 개인정보가 유출되지 아니하도록 하여야 한다.\n④ 교화프로그램 운영에 관하여는 제101조부터 제107조(교육관련 조항)까지의 규정을 준용한다.\n42. (법65조) 수형자에게 부과하는 작업은 건전한 사회복귀를 위하여 기술을 습득하고 근로의욕을 고취하는 데에 적합한 것이어야 한다.(  )\n O\n43. (법65조) 소장은 수형자에게 작업을 부과하려면 나이ㆍ형기ㆍ건강상태ㆍ기술ㆍ성격ㆍ취미ㆍ경력ㆍ장래생계, 그 밖의 수형자의 사정을 고려하여야 한다.(  )\n O\n44. (법66조) 수형자는 자신에게 부과된 작업과 그 밖의 노역을 수행하여야 할 의무가 있다.(  )\n O / 수형자는 구류형도 포함하고 있지만 법률 규정은 수형자로만 규정됨에 유의\n45. (법67조) 소장은 금고형 또는 구류형의 집행 중에 있는 사람에 대하여는 신청에 따라 작업을 부과할 수 있다.(  )\n O\n46. (법68조) 소장은 수형자의 건전한 사회복귀와 기술습득을 촉진하기 위하여 필요하면 외부기업체 등에 통근 작업하게 하거나 교정시설의 안에 설치된 외부기업체의 작업장에서 작업하게 할 수 있다.(  )\n O\n47. (법68조) 외부 통근 작업 대상자의 선정기준 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )\n O\n48. (영89조) 소장은 법무부장관의 허가를 받아 수형자에게 부과하는 작업의 종류를 정한다.(  )\n X / 허가→승인\n49. (영90조) 소장은 19세 미만의 수형자에게 작업을 부과하는 경우에는 정신적ㆍ신체적 성숙 정도, 교육적 효과 등을 고려하여야 한다.(  )\n O / 암기 : 정신교 고려\n50. (영91조) 소장은 수형자에게 작업을 부과하는 경우에는 작업의 종류 및 작업과정을 정하여 고지하여야 한다.\n O\n51. (영91조) 작업과정은 작업(  ), 작업(  ), 작업의 (  )도 및 (  )도를 고려하여 정한다. 작업과정을 정하기 어려운 경우에는 작업(  )을 작업과정으로 본다. 빈칸에 들어갈 단어는?(  )\n 성적, 시간, 난이, 숙련, 시간 / 규정 : 작업과정은 작업성적, 작업시간, 작업의 난이도 및 숙련도를 고려하여 정한다. 작업과정을 정하기 어려운 경우에는 작업시간을 작업과정으로 본다.(암기 : 성시난숙)\n52. (영92조) 소장은 매일 수형자의 작업실적을 확인하여야 한다.(  )\n X / 규정 : 소장은 교도관에게 매일 수형자의 작업실적을 확인하게 하여야 한다.\n53. (영93조) 소장은 작업이 부과된 수형자가 작업의 취소를 요청하는 경우에는 그 수형자의 의사, 건강 및 교도관의 의견 등을 고려하여 작업을 취소한다.(  )\n X / 취소한다→취소할 수 있다\n54. (규칙120조) 외부기업체에 통근하며 작업하는 수형자의 선정요건으로 틀린 것은?(  )\n 5. / 미만이거나→미만이고(둘 요건을 모두 충족해야 함)\n  1. 18세 이상 65세 미만일 것\n  2. 해당 작업 수행에 건강상 장애가 없을 것\n  3. 개방처우급·완화경비처우급에 해당할 것\n  4. 가족·친지 또는 법 제130조의 교정위원(이하 \"교정위원\"이라 한다) 등과 접견·서신수수·전화통화 등으로 연락하고 있을 것\n  5. 집행할 형기가 7년 미만이거나 가석방이 제한되지 아니할 것\n55. (규칙120조) 교정시설 안에 설치된 외부기업체의 작업장에 통근하며 작업하는 수형자는 제1항제1호부터 제4호까지의 요건(같은 항 제3호의 요건의 경우에는 일반경비처우급에 해당하는 수형자도 포함한다)을 갖춘 수형자로서 집행할 형기가 10년 미만이거나 형기기산일부터 10년 이상이 지난 수형자 중에서 선정한다.(  )\n O / 외부기업체는 ~이고, 안에 설치된 작업장은 ~이거나\n56. (규칙120조) 소장은 작업 부과, 교화 또는 건전한 사회복귀를 위하여 특히 필요하다고 인정하는 경우에는 제1항 및 제2항의 수형자(선정요건) 외의 수형자에 대하여도 외부통근자로 선정할 수 있다. (보충 : 노인수형자, 18세 미만 수형자, 중경비처우급 수형자도 외부통근자로 선정될 수 있다)(  )\n X / 건전한 사회복귀를 위하여X / 작업부과 또는 교화를 위하여 특히 필요\n57. (규칙121조) 소장은 외부통근자가 법령에 위반되는 행위를 하거나 법무부장관 또는 소장이 정하는 준수사항을 위반한 경우에는 외부통근자 선정을 취소할 수 있다.(  )\n O\n58. (규칙122조) 소장은 외부통근자로 선정된 수형자에 대하여는 (자)치생활·(행)동수칙·(안)전수칙·(작)업기술 및 (현)장적응훈련에 대한 교육을 하여야 한다.(  )\n X / 자치생활X→자치활동O, 외부통근자 교육사항 암기 : 자작현행안\n59. (규칙123조) 소장은 작업 또는 교육중인 수형자의 사회적응능력을 기르고 원활한 사회복귀를 촉진하기 위하여 필요하다고 인정하는 경우에는 수형자 자치에 의한 활동을 허가할 수 있다.(  )\n X / 작업 또는 교육중인 수형자X, 자치활동은 ‘외부통근자’를 대상으로 하는 실시한다.\n60. (법69조) 소장은 수형자의 건전한 사회복귀를 위하여 기술 습득 및 향상을 위한 직업능력개발훈련(이하 \"직업훈련\"이라 한다)을 실시할 수 있다.(  )\n O\n61. (법69조) 소장은 수형자의 직업훈련을 위하여 필요하면 외부의 기관 또는 단체에서 훈련을 받게 할 수 있다.(  )\n O\n62. (법69조) 직업훈련 대상자의 선정기준 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )\n O\n63. (영94조) 소장은 법 제69조에 따른 직업능력개발훈련을 하는 경우에는 그에 필요한 설비 및 실습 자재를 갖추도록 노력해야 한다.(  )\n X / 갖추도록 노력해야X→갖추어야 한다.\n64. (규칙124조) 다음 설명 중 틀린 부분은 어디인가?(  )\n 법무부장관의 허가 또는 승인 중 ‘허가X’\n직업훈련 직종 선정 및 훈련과정별 인원은 법무부장관의 허가 또는 승인을 받아 소장이 정한다.\n직업훈련 대상자는 소속기관의 수형자 중에서 소장이 선정한다.\n다만, 집체직업훈련 대상자는 집체직업훈련을 실시하는 교정시설의 관할 지방교정청장이 선정한다.\n65. 빈칸에 들어갈 말을 차례대로 기재하세요(  )\n 의(사), (적)성, 나(이), 학(력) - (암기 : 나의학적), (선정)할 수 (있다) / 집행(할) 형기, 이수(할 수), 제외(한다) / 기본소양(을 갖추었다고) 인정(될 것) / 없거(나) 재훈련(을) / 취업(할) 의사(가) / 소년(수형자의) 선도(를), 교육(할 수)\n제125조(직업훈련 대상자 선정기준) ①소장은 수형자가 다음 각 호의 요건을 갖춘 경우에는 수형자의 ○사, 적○, ○이, ○력 등을 고려하여 직업훈련 대상자로 선정○ ○ 있다.\n  1. ○○할 ○○ 중에 해당 훈련과정을 ○○할 수 있을 것(기술숙련과정 집체직업훈련 대상자는 ○○한다)\n  2. 직업훈련에 필요한 ○○○○을 갖추었다고 ○○될 것\n  3. 해당 과정의 기술이 ○○나 ○○○을 희망할 것\n  4. 석방 후 관련 직종에 ○○할 ○○가 있을 것\n  ② 소장은 ○○수형자의 ○○를 위하여 필요한 경우에는 제1항의 요건을 갖추지 못한 경우에도 직업훈련 대상자로 선정하여 ○○할 수 있다.\n66. (규칙126조) 직업훈련 대상자 선정 제한사유인 것은 몇 개인가?(  )\n 1개 / 1번 틀림 – 65세 이상은 규정 없음 / 선정제한사유 암기 : 15세문자조작질\n 1. (15세) 미만이거나 65세 이상인 경우\n 2. 교육과정을 수행할 (문자)해독능력 및 강의 이해능력이 부족한 경우(and)\n 3. 징벌대상행위의 혐의가 있어 (조)사 중이거나 징벌집행 중인 경우(or)\n 4. (작)업, 교육·교화프로그램 시행으로 인하여 직업훈련의 실시가 곤란하다고 인정되는 경우(or)\n 5. (질)병·신체조건 등으로 인하여 직업훈련을 감당할 수 없다고 인정되는 경우(or)\n67. (규칙127조) 소장은 직업훈련을 위하여 필요한 경우에는 수형자를 다른 교정시설로 이송할 수 있다. 소장은 직업훈련을 위해 이송된 수형자나 직업훈련 중인 수형자를 다른 교정시설로 이송해서는 아니 된다. 다만, 훈련취소 등 특별한 사유가 있는 경우에는 그러하지 아니하다.(  )\n X / 소장X 직업훈련자 이송권한은 ‘법무부장관’임(장관이 이송했으니, 소장은 특별한 사유가 있는 경우를 제외하고는 다른 교정시설로 이송해서는 아니된다.)\n68. (규칙128조) 소장이 직업훈련 대상자의 직업훈련을 보류할 수 있는 사유로 틀린 것은?(  )\n 2 / 보류는 일시정지로 징벌집행은 선정 제한사유이고, 경우에 따라 취소사유가 될 수 있으나, 보류사유는 아니다. 보류사유 암기 : 조심소계\n  1. 징벌대상행위의 혐의가 있어 (조)사를 받게 된 경우\n  2. (징)벌집행 중인 경우\n  3. (심)신이 허약하거나 질병 등으로 훈련을 감당할 수 없는 경우\n  4. (소)질·적성·훈련성적 등을 종합적으로 고려한 결과 직업훈련을 계속할 수 없다고 인정되는 경우\n  5. 그 밖에 직업훈련을 (계)속할 수 없다고 인정되는 경우\n69. (규칙128조) 소장은 직업훈련이 보류된 수형자가 그 사유가 소멸되면 본래의 과정에 복귀시켜 훈련하여야 한다. 다만, 본래 과정으로 복귀하는 것이 부적당하다고 인정하는 경우에는 해당 훈련을 취소할 수 있다.(  )\n O\n70. (법70조) 소장은 ➀수형자의 신청에 따라 ➁제68조의 작업(외부통근), 제69조제2항의 훈련(외부직업훈련), 그 밖에 집중적인 근로가 필요한 작업을 부과하는 경우에는 ➂접견ㆍ전화통화ㆍ교육ㆍ교화프로그램․공동행사 참가 등의 처우를 제한할 수 있다. 다만, ④접견 또는 전화통화를 제한한 때에는 ➄휴일이나 그 밖에 해당 수용자의 작업이 없는 날에 ➅접견 또는 전화통화를 할 수 있게 하여야 한다. 틀린 부분은 어디인가?(  )\n 3 / 1-수형자의 신청 필수 / 3-제한되는 처우 : 접전교공 *교화프로그램 규정 없음 / 6-접견 또는 전화통화에 한해서 할 수 있게 하여야 한다\n71. (법70조) 소장은 70번 문제(법70조 집중근로에 따른 처우)에 따른 작업을 부과하거나 훈련을 받게 하기 전에 수형자에게 제한되는 처우의 내용을 충분히 설명하여야 한다.(  )\n O\n72. (법71조, 영96조) 공휴일ㆍ토요일과 그 밖의 휴일에는 작업을 부과하지 아니한다. 다만, 취사ㆍ청소ㆍ간호, 그 밖에 특히 필요한 작업은 예외로 한다. \"그 밖의 휴일\"이란 「각종 기념일 등에 관한 규정」에 따른 교정의 날 및 소장이 특히 지정하는 날을 말한다.(  )\n O / 휴일작업 예외 암기 – 취, 청, 간, 특\n73. (법72조~73조) 다음 설명 중 빈칸에 들어갈 말을 채우시오?(  )\n 위 2번째 칸의 뒤편부터가 차례대로 들어가면 답이 됩니다. 보충설명\n ① 소장은 수형자의 가족(직계존속, 비속, 형제자매 포함) 또는 배우자의 직계존속이 사망하면 2일간, 부모 또는 배우자의 제삿날(제사를 올리는 분은 부모와 배우자 뿐이다. 배우자의 직계존속, 형제자매, 비속 등은 제사의 대상이 아니다)에는 1일간 해당 수형자의 작업을 면제한다. 다만, 수형자가 작업을 계속하기를 원하는 경우는 예외로 한다. ② 소장은 수형자에게 부상ㆍ질병, 그 밖에 작업을 계속하기 어려운 특별한 사정이 있으면 그 사유가 해소될 때까지 작업을 면제할 수 있다.\n ① 작업수입은 국고수입으로 한다. ② 소장은 수형자의 근로의욕을 고취하고 건전한 사회복귀를 지원하기 위하여 법무부장관이 정하는 바에 따라 작업의 종류, 작업성적, 교정성적, 그 밖의 사정(암기 : 종성교사)을 고려하여 수형자에게 작업장려금을 지급할 수(재량) 있다. ③ 제2항의 작업장려금은 석방할 때에 본인에게 지급한다. 다만, 본인의 가족생활 부조, 교화 또는 건전한 사회복귀를 위하여 특히 필요하면 석방 전이라도 그 전부 또는 일부를 지급할 수 있다.(*비교 : 영치금은 가족생활 부조 또는 정당한 용도 / 작업장려금은 가족생활 부조 교화 또는 건전한 사회복귀)\n1. 소장은 수형자의 ○○ 또는 ○○○의 ○○○○이 사망하면 ○일간, ○○ 또는 ○○○의 ○○○에는 ○일간 해당 수형자의 작업을 면제한다. 다만, 수형자가 작업을 ○○하기를 원하는 경우는 예외로 한다.\n2. 소장은 수형자에게 ○○ㆍ○○, 그 밖에 작업을 ○○하기 어려운 ○○한 사정이 있으면 그 사유가 ○○될 때까지 작업을 ○○○ ○ 있다.\n3. 작업수입은 ○○수입으로 한다.\n4. ○○은 수형자의 ○○○○을 고취하고 건전한 사회복귀를 ○○하기 위하여 ○○○○○이 정하는 바에 따라 작업의 ○○, ○○성적, ○○성적, 그 밖의 ○○을 고려하여 수형자에게 작업○○○을 지급○ ○ 있다.\n5. 제2항의 작업장려금은 ○○할 때에 ○○에게 지급한다. 다만, 본인의 ○○○○ 부조, ○○ 또는 건전한 ○○○○를 위하여 특히 필요하면 석방 ○이라도 그 ○○ 또는 ○○를 지급○ ○ 있다.\n할 수, 일부, 전부, 전, 사회복귀, 교화, 가족생활, 본인, 석방, 할 수, 장려금, 사정, 교정, 작업, 종류, 법무부장관, 지원, 근로의욕, 소장, 국고, 면제할 수, 해소, 특별, 계속, 부상, 질병,\n계속, 1, 제삿날, 배우자, 부모, 2, 직계존속, 배우자, 가족\n74. (법74조) 소장은 수형자가 1. 작업 또는 직업훈련으로 인한 부상 또는 질병으로 신체에 장해가 발생한 때, 2. 작업 또는 직업훈련 중에 사망하거나 그로 인하여 사망한 때에 해당하면 법무부장관이 정하는 바에 따라 위로금 또는 조위금을 지급한다.(  )\n O / 보상범위 : 인과 부상질병, 인과사망까지 보상, 지급할 수 있다가 아니고 필요적 지급해야 함을 유의\n75. 교육중 질병 부상, 또는 사망에는 위로금 또는 조위금을 절대로 지급할 수 없다.(  )\n O / 작업 또는 직업훈련 중의 위로금 조위금은 교특회계에서 세출임. 교육은 교특회계에서 세출되지 않음.\n76. (법74조) 위로금은 석방할 때에 본인에게 지급하고, 조위금은 그 상속인에게 지급한다. 다만 본인의 가족생활 부조 등 특히 필요하면 석방 전이라도 그 전부 또는 일부를 지급할 수 있다.(  )\n X / 앞 규정은 맞고 단서규정(가족생활 부조 등)은 존재하지 않음 / 석방시 본인 지급 또는 상속인 지급만 존재함\n77. (법75조~76조) 다음 설명 중 틀린 것은 몇 개인가?(  )\n 모두 틀림 / 1. 아니할 수 있다X→아니한다.  2. 법률이 정한 경우를 제외하고는X(이런 단서없음) 절대 양도, 담보, 압류 불가능임, 물론 가족에게 상속은 가능하리라 봄  3. 부득이한 사정이 있는 경우X(이런 단서없음) 절대 조세공과금 부과 안됨.\n1. 위로금 또는 조위금을 지급받을 사람이 국가로부터 동일한 사유로 「민법」이나 그 밖의 법령에 따라 제74조의 위로금 또는 조위금에 상당하는 금액을 지급받은 경우에는 그 금액을 위로금 또는 조위금으로 지급하지 아니할 수 있다.(  )\n2. 제74조의 위로금 또는 조위금을 지급받을 권리는 다른 사람 또는 법인에게 양도하거나 담보로 제공할 수 없으며, 다른 사람 또는 법인은 법률이 정한 경우를 제외하고는 이를 압류할 수 없다.(  )\n3. 제74조에 따라 지급받은 금전을 표준으로 하여 조세를 부과할 수 없으나, 부득이한 사정이 있는 경우 공과금을 부과할 수 있다.(  )\n78. (영95조) \"집중적인 근로가 필요한 작업\"이란 수형자의 신청에 따라 1일 작업시간 중 접견ㆍ전화통화ㆍ교육 및 공동행사 참가 등을 하지 아니하고 휴게시간을 포함하여 작업시간 내내 하는 작업을 말한다.(  )\n X / 휴게시간을 포함하여→휴게시간을 제외한", "3개 / 1번, 2번 – 운영하여야 한다→운영할 수 있다 / 5번 – 정규 편성→임시 편성", "9회"]]}, {"t": "교육·교화", "q": [["(영85조) 수형자의 건전한 사회복귀를 지원하기 위하여 교정시설에 취업알선 및 창업지원에 관한 협의기구를 둔다. 협의기구의 조직ㆍ운영, 그 밖에 활동에 필요한 사항은 법무부령으로 정한다.(  )", "X / 둔다→둘 수 있다.", "10회"], ["(규칙144조) 취업지원협의회의 기능으로 맞는 것은 몇 개인가?(  )\n  1. 수형자 사회복귀 지원 업무에 관한 (자문)에 대한 조언\n  2. 수형자 취업·창업 (교육)\n  3. 수형자 사회복귀 지원을 위한 지역사회 (네트워크) 추진\n  4. 취업 및 창업 지원을 위한 (자료제공) 및 (기술지원)\n  5. 직업(적성) 및 (성격검사) 등 각종 검사 및 (상담)\n  6. (불우수형자) 및 그 (가족)에 대한 (지원) 활동\n  7. 그 밖에 수형자 취업알선 및 창업지원을 위하여 (필요)한 활동", "모두 다 맞음", "10회"], ["(규칙146조) 법무부장관이 소장의 추천을 받아 취업지원협의회의 외부위원으로 위촉할 수 없는 사람은 몇 명인가?(  )\n  1. 고용노동부 고용지원센터 등 지역 취업·창업 유관 공공기관의 장 또는 기관 추천자\n  2. 취업컨설턴트, 창업컨설턴트, 기업체 대표, 시민단체 및 기업연합체의 임직원\n  3. 변호사, 「고등교육법」에 따른 대학에서 행정학을 가르치는 조교수 이상의 직에 있는 사람\n  4. 그 밖에 교정에 관한 학식과 경험이 풍부하고 수형자 사회복귀 지원에 관심이 있는 외부인사", "1개 / 3. 행정학을 가르치는 조교수 이상→법률학을 가르치는 강사 이상 / 시민단체가 왜 들어있는지는 모르지만 맞음\n교수관련 비교 참고\n부교수 : 가석방심사위원회 / 조교수 : 징벌위원회 / 강사 : 취업지원협의회", "10회"], ["(규칙148조) 취업지원협의회의 회의와 관련하여 틀린 것은 몇 개인가?(  )\n1. 협의회의 회의는 반기마다 개최한다\n2. 협의회는 일정사유가 있는 경우 임시회의를 개최할 수 있다.\n3. 수형자의 사회복귀 지원을 위하여 협의가 필요할 때 임시회의를 개최할 수 있다.\n4. 회장 또는 부회장이 필요하다고 인정하는 때 임시회의를 개최할 수 있다.\n5. 위원 2분의 1 이상의 요구가 있는 때 임시회의를 개최할 수 있다.\n6. 협의회의 회의는 회장이 소집하고 그 의장이 된다.\n7. 협의회의 회의는 재적위원 과반수의 출석으로 개의하고, 재적위원 과반수의 찬성으로 의결한다.", "3개 틀림 – 4. 회장 또는 부회장→회장(부회장은 요구권한 없음) / 5. 위원 2분의 1 이상→ 위원 3분의 1 이상 / 7. 재적위원 과반수의 찬성→출석위원 과반수의 찬성", "10회"], ["(영103조) 미결수용자에 대한 교육ㆍ교화프로그램 또는 작업은 교정시설 밖에서 행하는 것은 포함하지 아니한다.(  )", "O", "11회"], ["(법89조) 사형확정자는 독거수용한다. 다만, 자살방지, 교육ㆍ교화프로그램, 작업․직업훈련, 그 밖의 적절한 처우를 위하여 필요한 경우에는 법무부령으로 정하는 바에 따라 혼거수용할 수 있다.(  )", "X / 사형확정자 규정에서 ‘직업훈련’은 결단코 등장할 수가 없음. 직업훈련은 사회복귀를 전제로 실시되기 때문", "11회"], ["(법90조) 소장은 사형확정자의 심리적 안정 및 원만한 수용생활을 위하여 교육 또는 교화프로그램을 실시하거나 신청에 따라 작업을 부과할 수 있다.(  )", "O / 교육 또는 교화프로그램은 신청없이 소장 직권으로 가능하고, 작업은 신청에 한해 부과가능하다. 사형확정자에게 하는 처우의 기본적 목적은 “원만한 수용생활 + 심리적 안정(암기 : 원심)”이다 / 접견은 “교화+심리적 안정(교심)”, 구분수용 예외는 “시설의 안전과 질서유지+심리적안정(안심)” 각각 비교암기가 필요하다.", "11회"], ["(법90조) 사형확정자에 대한 교육ㆍ교화프로그램, 작업, 그 밖의 처우에 필요한 사항은 법무부령으로 정한다.(  )", "O", "11회"], ["(규칙151조) 소장은 사형확정자의 교육·교화프로그램, 작업 등을 위하여 필요하거나 교정시설의 안전과 질서유지를 위하여 특히 필요하다고 인정하는 경우에는 법무부장관의 승인을 받아 사형확정자를 다른 교정시설로 이송할 수 있다.(  )", "O / 이송사유 : 교육, 교화, 작업+안전과 질서유지 = 교교작안이송", "11회"], ["(규칙152조) 소장은 사형확정자의 심리적 안정 및 원만한 수용생활을 위하여 소속 교도관으로 하여금 지속적인 상담을 하게 하여야 한다. 사형확정자에 대한 상담시기, 상담책임자 지정, 상담결과 처리절차 등에 관하여는 제196조(엄중관리대상자의 상담)를 준용한다.(  )\n  ③ 상담책임자는 해당 사형확정자에 대하여 수시로 개별상담을 함으로써 신속한 고충처리와 원만한 수용생활 지도를 위하여 노력하여야 한다.\n  ④ 제3항에 따라 상담책임자가 상담을 하였을 때에는 그 요지와 처리결과 등을 제119조제3항에 따른 교정정보시스템에 입력하여야 한다. 이 경우 사형확정자의 처우를 위하여 필요하면 별지 제13호서식의 엄중관리대상자 상담결과 보고서를 작성하여 소장에게 보고하여야 한다.", "O / 사형확정자 상담은 “지속적 상담”\n제196조(상담) ② 제1항의 상담책임자는 감독교도관 또는 상담 관련 전문교육을 이수한 교도관을 우선하여 지정하여야 하며, 상담대상자는 상담책임자 1명당 10명 이내로 하여야 한다.", "11회"], ["(규칙154조) 소장은 사형확정자에 대하여 심리상담, 종교상담, 심리치료 등의 교화프로그램을 실시하는 경우에는 전문가에 의하여 집중적이고 지속적으로 이루어질 수 있도록 계획을 수립·시행하여야 한다.(  )", "O / 프로그램은 ~하여야 한다 / 심리상담․종교상담․심리치료 -> 교도관이 아닌 전문가가 시행~  집중적이고 지속적~", "11회"], ["(규칙155조) 사형확정자에 대한 교육·교화프로그램, 작업 등의 처우를 위하여 법무부장관이 정하는 전담교정시설에 수용할 수 있다.(  )", "O / 교육․교화프로그램․작업 등 처우를 위해 전담시설수용 가능", "11회"], ["(법92조) 금지물품이 아닌 것은 몇 개인가?(  )\n  1. 마약ㆍ총기ㆍ도검ㆍ폭발물ㆍ흉기ㆍ독극물, 그 밖에 범죄의 도구로 이용될 우려가 있는 물품", "모두 금지물품임 / 무인비행장치, 는 장비는 없다.", "12회"], ["(법94조) 교도관은 자살ㆍ자해ㆍ도주ㆍ폭행ㆍ손괴, 그 밖에 수용자의 생명ㆍ신체를 해하거나 시설의 안전 또는 질서를 해하는 행위(이하 \"자살등\"이라 한다)를 방지하기 위하여 필요한 범위에서 전자장비를 이용하여 수용자 또는 시설을 계호할 수 있다. 다만, 전자영상장비로 거실에 있는 수용자를 계호하는 것은 자살등의 우려가 큰 때에만 할 수 있다.(  )", "O / 자살등은 여러용어를 포함하는 개념이다. 필요한 범위로 제한함, 계호의 대상은 수용자 또는 시설이지, 외부인 등이 등장하면 틀린 말이 된다. 전자영상장비를 이용한 계호는 자살등(여러용어를 포함하는 개념)의 우려가 큰 때!!!!", "12회"], ["(법94조) 교도관은 도주의 우려가 큰 때 전자영상장비로 거실에 있는 수용자를 계호할 수 있다.(  )", "O / 자살등이므로 맞는 말이 됨.", "12회"], ["(규칙163조) 교도관이 법 제94조제1항에 따라 거실에 있는 수용자를 계호하는 경우에는 거실수용자 영상계호부에 피계호자의 인적사항 및 주요 계호내용을 개별적으로 기록하여야 한다. 다만, 다수의 엄중관리대상 수용자가 수용된 거실을 전자장비를 이용하여 계호하는 경우에는 중앙통제실 등에 비치된 현황표에 피계호인원 등 전체 현황만을 기록할 수 있다.(  )", "X / 다수의 엄중관리대상 수용자가 수용된 거실을 전자장비를 이용하여 계호하는 경우X → 중경비시설의 거실에 있는 수용자를 전자장비를 이용하여 계호하는 경우O", "12회"], ["(법96조) 다음 중 진정실에 대한 설명으로 잘못된 것은 몇 개인가?(  )\n  ① 소장은 수용자가 다음 각 호의 어느 하나에 해당하는 경우로서 강제력을 행사하거나(*or 개념) 제98조의 보호장비를 사용하여도 그 목적을 달성할 수 없는 경우에만 진정실(일반 수용거실로부터 격리되어 있고 방음설비 등을 갖춘 거실을 말한다. 이하 같다)에 수용할 수 있다. (* 진정실 수용은 대부분 야간에 이루어지고 신속성이 필요하므로 의무관의 의견을 고려하지 않고 수용함에 유의)\n  1. 교정시설의 설비 또는 기구 등을 손괴하거나 손괴하려고 하는 때(2가지- 기수 미수 모두)\n  2. 교도관의 제지에도 불구하고 소란행위를 계속하여 다른 수용자의 평온한 수용생활을 방해하는 때(1가지 – 기수만)\n  ② 수용자의 진정실 수용기간은 24시간 이내로 한다. 다만, 소장은 특히 계속하여 수용할 필요가 있으면 의무관의 의견을 고려하여 1회당 12시간의 범위에서 기간을 연장할 수 있다.\n  ③ 제2항에 따라 수용자를 진정실에 수용할 수 있는 기간은 계속하여 3일을 초과할 수 없다.\n  ④ 진정실 수용자에 대하여는 제95조제4항부터 제6항까지의 규정을 준용한다.(보호실 규정 준용)\n1. 소장은 수용자가 (➀교정시설의 설비 또는 기구 등을 손괴하는 때, ➁교정시설의 설비 또는 기구 등을 손괴하려고 하는 때, ➂교도관의 제지에도 불구하고 소란행위를 계속하여 다른 수용자의 평온한 수용생활을 방해하는 때, ➃교도관의 제지에도 불구하고 소란행위를 계속하여 다른 수용자의 평온한 수용생활을 방해하려고 하는 때)의 경우로서 강제력을 행사하거나 제98조의 보호장비를 사용하여도 그 목적을 달성할 수 없는 경우에만 진정실(일반 수용거실로부터 격리되어 있고 방음설비 등을 갖춘 거실)에 수용할 수 있다. 이 경우 의무관의 의견을 고려하여야 한다.\n2. 수용자의 진정실 수용기간은 24시간 이내로 한다. 다만, 소장은 특히 계속하여 수용할 필요가 있으면 의무관의 의견을 고려하여 1회당 12시간의 범위에서 기간을 연장할 수 있다.\n3. 수용자를 진정실에 수용할 수 있는 기간은 계속하여 3일을 초과할 수 없다.\n4. 소장은 수용자를 진정실에 수용하거나 수용기간을 연장하는 경우에는 그 사유를 본인에게 알려 주어야 한다.\n5. 의무관은 진정실 수용자의 건강상태를 수시로 확인하여야 한다.\n6. 소장은 진정실 수용사유가 소멸한 경우에는 진정실 수용을 즉시 중단하여야 한다.", "1번 틀림/ 2~6번 맞음 / 규정", "12회"], ["(규칙119조) 의무관이 보호실이나 진정실 수용자의 건강을 확인한 결과 보호실 또는 진정실에 계속 수용하는 것이 부적당하다고 인정하는 경우에는 소장에게 즉시 보고하여야 한다. 이 경우 소장은 특별한 사유가 없으면 보호실 또는 진정실 수용을 즉시 중지하여야 한다.(  )", "O / 보호실 또는 진정실에 대한 절차는 ‘지체없이, 정기적으로’가 없고 ‘즉시, 수시’만 존재한다.\n   참고 : 보호실진정실과 관련 법률에는 ‘중단하여야 한다’가 있고, 규칙에는 ‘중지하여야 한다’가 존재하는 바, 그 차이는 수용사유가 소멸한 경우에 ‘중단’이라는 개념을 사용하고, 중지개념은 건강상태가 부적당해 잠깐 중지한다는 개념으로 추후 다시 건강상태가 양호해지면 다시 수용할 수 있다는 의미를 포함하고 있다 / 구별 : 사유소멸 – 중단, 부적당-중지", "12회"], ["(법101조) 교도관이 수용자에 대하여 무기를 사용할 수 있는 사유는 몇 개인가?(  )\n  1. 수용자가 다른 사람에게 중대한 위해를 끼치거나 끼치려고 하여 그 사태가 위급한 때", "사용할 수 있는 경우 없음 - 모두 틀림\n제101조(무기의 사용) ① 교도관은 다음 각 호의 어느 하나에 해당하는 사유가 있으면 수용자에 대하여 무기를 사용할 수 있다.", "13-2회"], ["수용자가 교도관의 무기를 탈취하거나 탈취하려고 하는 때", "", "13-2회"], ["그 밖에 사람의 생명ㆍ신체 및 설비에 대한 중대하고도 뚜렷한 위험을 방지하기 위하여 무기의 사용을 피할 수 없는 때\n  1. 수용자가 다른 사람에게 위해를 끼치거나 끼치려고 하는 때\n  2. 수용자가 폭행 또는 협박에 사용할 위험물을 소지하고 있는 때\n  3. 수용자가 폭동을 일으키거나 일으키려고 하는 때\n  4. 수용자가 도주하는 때\n  5. 수용자가 교도관의 보호장비․보안장비․무기 등을 탈취하거나 탈취하려고 하는 때\n  6. 그 밖에 사람의 생명ㆍ신체 및 설비에 대한 위험을 방지하기 위하여 필요한 때\n2. (법101조) 교도관은 교정시설의 안(교도관이 교정시설의 밖에서 수용자를 계호하고 있는 경우 그 장소를 포함한다)에서 (자)기 또는 타인의 생명ㆍ신체를 보호하거나 (수)용자의 탈취를 저지하거나 (건)물 또는 그 밖의 시설과 무기에 대한 위험을 방지하기 위하여 (급박)하다고 인정되는 (상당)한 이유가 있으면 수용자 외의 사람에 대하여도 무기를 사용할 수 있다.(  )\n O / 수용자외의 무기사용 암기 : 자․수․건+급박․상당\n3. (법101조) 교도관은 소장 또는 그 직무를 대행하는 사람의 명령을 받아야만 무기를 사용할 수 있다.(  )\n X / 교도관은 소장 또는 그 직무를 대행하는 사람의 명령을 받아 무기를 사용한다. 다만, 그 명령을 받을 시간적 여유가 없으면 그러하지 아니하다.(무기 사용시 시간적 여유가 없는 경우 명령없이 사용가능!!!)\n4. (법101조) 무기를 사용하려면 공포탄을 발사하거나 그 밖에 적당한 방법으로 사전에 상대방에 대하여 이를 경고하여야 한다. 시간적 여유가 없는 경우에는 그러하지 아니한다.(  )\n X / 시간적 여유가 없는 경우에도 경고는 필수적인 절차이다. 경고없이 무기사용 불가능!!!\n5. (법101조) 무기의 사용은 필요한 최소한도에 그쳐야 하며, 최후의 수단이어야 한다.(  )\n O / 무기사용은 최소한, 최후의~\n6. (법101조) 사용할 수 있는 무기의 종류, 무기의 종류별 사용요건 및 사용절차 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )\n O", "*두문자 암기시 낭패를 보는 경우가 있어 다문자 암기로 암기하였음 : 1. 다중위사위, 2. 폭협위명령불응, 3. 폭신확산방지, 4. 도주정지명령계속도주, 5. 무기탈탈, 6. 생신설중뚜위", "13-2회"], ["(영126조) 교도관은 무기를 사용한 경우에는 소장 및 법무부장관에게 즉시 보고하여야 한다.(  )", "X / 교도관은 소장 즉시 보고, 소장은 즉시 장관 보고(보고의 주체가 교도관과 소장이 등장하지 교도관이 장관에게 직접보고가 아니다.)\n   규정 : 교도관은 법 제101조에 따라 무기를 사용한 경우에는 소장에게 즉시 보고하고, 보고를 받은 소장은 그 사실을 법무부장관에게 즉시 보고하여야 한다.", "13-2회"], ["(규칙189조) 교도관이 법률에 따라 사용할 수 있는 무기의 종류는 4종이며, (    ), (    ), (    ), 그 밖에 (         )이 정하는 무기이다.", "권총, 소총, 기관총, 법무부장관", "13-2회"], ["(법103조) 교도관은 체포를 위하여 긴급히 필요하면 도주등을 하였다고 의심할 만한 상당한 이유가 있는 사람 또는 도주등을 한 사람의 이동경로나 소재를 안다고 인정되는 사람을 정지시켜 질문하거나 소지품 검사를 할 수 있다.(  )", "X / 교도관은 정지시켜 질문까지만 가능/ 소지품검사는 불가능", "13-2회"], ["(영128조의4) 법무부장관이 포상금을 지급한 후 해당 포상금을 환수할 수 있는 사유는 몇 개인가?(  )\n1. 위법 또는 부당한 방법의 증거수집, 허위신고, 거짓진술, 증거위조 등 부정한 방법으로 포상금을 지급받은 경우\n2. 동일한 원인으로 다른 법령에 따라 포상금 등을 지급받은 경우\n3. 그 밖에 착오 등의 사유로 포상금이 잘못 지급된 경우", "모두 환수할 수 있는 사유임 / 암기 : 위동착 또는 부정지급,중복지급,잘못지급 / 포상금을 잘못 지급하였으므로 환수하여야 한다가 맞는 규정이 아닌가 싶지만 ‘환수할 수 있다.’라고 규정되어 있음에 유의", "13-2회"], ["(법97조) 교도관은 수용자 및 수용자 외의 사람에 대하여 보호장비를 사용할 수 있다.(  )", "X / 수용자만 보호장비 사용 / 수용자 외의 사람은 X", "13회"], ["(법97조) 교도관이 수용자에게 보호장비를 사용할 수 있는 경우로 맞는 것은 몇 개인가?(  )\n  1. 이송ㆍ출정, 그 밖에 교정시설 밖의 장소로 수용자를 호송하는 때\n  2. 도주ㆍ자살ㆍ자해 또는 다른 사람에 대한 위해의 우려가 큰 때 (암기 : 도자자위큰)", "1개 / 1번만 맞음 / 보호장비 : ~ 큰 때(대체적으로) / 강제력 : ~ 하거나 하려고 하는 때(대체적으로) / 보호장비 사용요건에 ‘~있는 때’라는 것은 없다.\n  보호장비", "13회"], ["그 밖의 시설의 안전 또는 질서를 해칠 우려가 있는 때\n3. (법97조) 보호장비를 사용하는 경우에는 수용자의 (   ), (      ) 및 (         ) 등을 고려하여야 한다. 빈칸에 들어갈 말은 무엇인가?(  )\n (나이), (건강상태), (수용생활 태도) 등을 고려하여야 한다 / 암기 : 나건태 고려\n나이, 성격, 건강상태, 교정성적, 수용생활 태도, 작업여부, 뉘우치는 빛\n4. (법97조) 교도관이 교정시설의 안에서 수용자에 대하여 보호장비를 사용한 경우 의무관은 그 수용자의 건강상태를 수시로 확인하여야 한다.(  )\n O / 교정시설의 안에서 보호장비를 사용한 경우에 의무관 수시 확인\n5. (법98조) 보호장비의 종류 및 사용요건은 법률에 규정되어 있다.(  )\n O\n6. (법98조) 법률에 규정된 보호장비의 종류는 8종이다.(  )\n O / 1. 수갑  2. 머리보호장비  3. 발목보호장비  4. 보호대(帶)  5. 보호의자  6. 보호침대  7. 보호복  8. 포승\n7. (법98조) 보호장비와 종류별 사용요건을 바르게 연결하시오.(  )\n A : 1,5 / B : 1,2,3,4,5 / C : 1,2,3,4,5 / D : 1,2,3,4,5\n1. 수갑ㆍ포승 : 제97조제1항제1호부터 제4호까지의 어느 하나에 해당하는 때\n  2. 머리보호장비 : 머리부분을 자해할 우려가 큰 때\n  3. 발목보호장비ㆍ보호대ㆍ보호의자 : 제97조제1항제2호부터 제4호까지의 어느 하나에 해당하는 때\n  4. 보호침대ㆍ보호복 : 자살ㆍ자해의 우려가 큰 때\n1. 수갑\n2. 발목보호장비\n3. 보호대(帶)\n4. 보호의자\n5. 포승\nA. 이송ㆍ출정, 그 밖에 교정시설 밖의 장소로 수용자를 호송하는 때\nB. 도주ㆍ자살ㆍ자해 또는 다른 사람에 대한 위해의 우려가 큰 때\nC. 위력으로 교도관의 정당한 직무집행을 방해하는 때\nD. 교정시설의 설비ㆍ기구 등을 손괴하거나 그 밖에 시설의 안전 또는 질서를 해칠 우려가 큰 때\n6. 머리보호장비\n7. 보호침대\n8. 보호복\nE. 머리부분을 자해할 우려가 큰 때(2. 머리보호장비)\nF. 자살․자해의 우려가 큰 때(6. 보호침대, 7. 보호복)\nA 요건시 사용가능 보호장비 :\nB 요건시 사용가능 보호장비 :\nC 요건시 사용가능 보호장비 :\nD 요건시 사용가능 보호장비 :\n8. (법98조) 보호장비의 사용절차 등에 관하여 필요한 사항은 대통령령으로 정한다.(  )\n O / 법률 : 종류와 사용요건 / 대통령령 : 사용절차 / 법무부령 : 규격과 사용방법\n9. (법99조) 교도관은 필요한 범위에서 보호장비를 사용하여야 하며, 그 사유가 소멸하면 사용을 지체 없이 중단하여야 한다.(  )\n X / 필요한 범위에서 → 필요한 최소한의 범위에서 / 사유 소멸시 지체없이 중단(즉시 중단일 것 같은데 규정은 지체없이 중단으로 규정되어 있음에 유의)\n10. (법99조) 보호장비는 조사 및 징벌의 수단으로 사용되어서는 아니 된다.(  )\n X / 조사 및 징벌의 수단→징벌의 수단(조사는 해당사항 없다)\n11. (영120조) 교도관은 소장의 명령 없이 수용자에게 보호장비를 사용하여서는 아니 된다. 다만, 소장의 명령을 받을 시간적 여유가 없는 경우에는 사용 후 소장에게 즉시 보고하여야 한다.(  )\n O\n12. (영120조) 보호장비의 규격과 사용방법 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )\n O\n13. (영121조) 의무관은 수용자에게 보호장비를 계속 사용하는 것이 건강상 부적당하다고 인정하는 경우에는 소장에게 즉시 보고하여야 한다. 이 경우 소장은 보호장비 사용을 즉시 중지하여야 한다.(  )\n X / 소장은 (특별한 사유가 없으면) 보호장비 사용을 즉시 중지하여야 한다. / 특별한 사유가 있는 경우 보호장비를 계속 사용할 수 있다 / 중지의 개념은 건강상 부적당한 기간만큼 중지하는 것이고, 중단은 사유소멸시 개념이다.", "", "13회"], ["(영124조) 소장은 보호장비의 사용을 명령한 경우에는 수시로 그 사용 실태를 확인ㆍ점검하여야 한다. 지방교정청장은 소속 교정시설의 보호장비 사용 실태를 정기적으로 점검하여야 한다.(  )", "O / 소장 수시 점검 / 지방청장 정기적 점검", "13회"], ["(규칙169조) 교도관이 법 제98조제1항에 따라 사용할 수 있는 보호장비(법 8종, 규칙 14종)에 대한 설명으로 틀린 곳은?(  )\n  1. 수갑 : 양손수갑, 일회용수갑, 한손수갑\n  2. 머리보호장비\n  3. 발목보호장비 : 양발목보호장비, 한발목보호장비\n  4. 보호대 : 금속보호대, 가죽보호대\n  5. 보호의자\n  6. 보호침대\n  7. 보호복\n  8. 포승 : 일반포승, 벨트형포승, 조끼형포승", "4 / 가죽보호대→벨트보호대", "13회"], ["(규칙170조) 교도관은 따른 보호장비 규격에 맞지 아니한 보호장비를 수용자에게 사용해서는 아니 된다.(  )", "O", "13회"], ["(규칙172조) 수갑은 구체적 상황에 적합한 종류를 선택하여 사용할 수 있다. 다만, 일회용수갑은 일시적으로 사용하여야 하며, 사용목적을 달성한 후에는 즉시 사용을 중단하거나 다른 보호장비로 교체하여야 한다.(  )", "O", "13회"], ["(규칙173조) 머리보호장비는 별표 9(머리보호장비)의 방법으로 사용하며, 수용자가 머리보호장비를 임의로 해제하지 못하도록 다른 보호장비를 함께 사용하여야 한다.(  )", "X / 사용하여야 한다→사용할 수 있다.", "13회"], ["(규칙175조) 보호대의 사용방법으로 바르지 못한 것은?(  )\n  1. 금속보호대는 (보호대에 부착된 고리에 수갑을  연결하여) 별표 12(금속보호대)의 방법으로 할 것\n  2. 벨트보호대는 (수갑과 수갑보호기를 보호대에 연결하여) 별표 13(벨트보호대)의 방법으로 할 것", "둘 다 틀림 / 금속 관이 교정시설의 밖에서 수용자를 계호하고 있는 경우 그 장소를 포함한다)에서 교도관의 퇴거요구를 받고도 이에 응하지 아니하는 때(퇴거요구를 먼저 받고 이에 불응해야 강제력 행사가 가능)\n[보충설명] 우리규정은 보호장비가 먼저 규정되고 강제력이 뒤편에 있으나, 업무과정에서 강제력 행사가 선행되고 이후 보호장비가 사용되고 있음을 볼 때, 강제력 행사는 현재성이 필요하고, 강제력을 통해 수용자를 제지한 후 예견가능성을 보고 보호장비를 사용하는 방식으로 진행된고 있다.\n1. 수용자를 도주하게 하거나 하려고 하는 때\n2. 교도관 또는 수용자에게 위해를 끼치거나 끼치려고 하는 때\n3. 위력으로 교도관의 정당한 직무집행을 방해하는 때\n4. 교정시설의 설비ㆍ기구 등을 손괴하거나 하려고 하는 때\n5. 교정시설에 침입하거나 하려고 하는 때\n6. 교정시설의 안(교도관이 교정시설의 밖에서 수용자를 계호하고 있는 경우 그 장소를 포함한다)에서 교도관의 퇴거요구를 받고도 이에 응하지 아니하는 때\n7. 그 밖에 시설의 안전 또는 질서를 크게 해치는 행위를 하거나 하려고 하는 때\n43 (법100조) 교도관은 수용자 및 수용자 이외의 사람에게 강제력을 행사하는 경우에는 보안장비를 사용할 수 있다.(  )\n O\n44. (법100조) \"보안장비\"란 (교도봉)ㆍ(가스분사기)ㆍ(가스총)ㆍ(최루탄) 등 (사람의 생명과 신체의 보호), (도주의 방지), (증거인멸의 방지) 및 (시설의 안전과 질서유지)를 위하여 교도관이 사용하는 장비와 기구를 말한다. 틀린 부분은 어디인가?(  )\n 증거인멸의 방지X – 규정없다.\n45. (법100조) 강제력을 행사하려면 사전에 상대방에게 이를 경고하여야 한다. 다만, 상황이 급박하여 경고할 시간적인 여유가 없는 때에는 그러하지 아니하다.(  )\n O / 강제력은 사전 경고해야 하지만, 상황이 급박하여 시간적 여유가 없는 때 경고하지 않을 수 있다.(보호장비나 무기사용은 절대적으로 사유고지 또는 경고를 해야 하는 반면 강제력은 예외규정을 두고 있다 – 강제력은 현재성을 갖고 있으므로 순간적인 찰나에 요건이 발생한다. 자해시도 자살시도 폭행시도 등 다양한 행위는 경우 제지가 먼저지 경고가 먼저 되지 않는다. 다만, 강제력 행사 후 보호장비 사용시에는 이미 제지된 상황이므로 필히 사유를 고지하도록 규정되어 있다. 무기사용 또한 최후수단성을 규정하고 있고, 가장 불이익한 행위이므로 필히 경고를 규정하고 있다.\n46. (법100조) 강제력의 행사는 필요한 최소한도에 그쳐야 하고 최후의 수단으로 사용되어야 한다.(  )\n X / 강제력행사는 침해최소성 규정만 있고, 최후수단성 규정은 없다.(강제력의 행사는 필요한 최소한도에 그쳐야 한다.)\n47. (법100조) 보안장비의 종류, 종류별 사용요건 및 사용절차 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )\n O\n보호장비\n강제력(보안장비)\n무기\n종류\n법률(세부 – 규칙)\n법무부령\n법무부령\n사용요건\n법률\n법무부령\n법무부령\n사용절차\n대통령령\n법무부령\n법무부령\n규격 및 사용방법\n법무부령\n-\n-\n48. (영125조) 교도관은 소장의 명령 없이 강제력을 행사해서는 아니 된다. 다만, 그 명령을 받을 시간적 여유가 없는 경우에는 강제력을 행사한 후 소장에게 즉시 보고하여야 한다.(  )\n O\n49. (규칙186조) 교도관이 강제력을 행사하는 경우 사용할 수 있는 보안장비의 종류로 틀린 것은?(  )\n 틀린 것 없음 / 다 맞는 사항임\n  1. 교도봉(접이식을 포함한다.)\n  2. 전기교도봉\n  3. 가스분사기\n  4. 가스총(고무탄 발사겸용을 포함한다.)\n  5. 최루탄 : 투척용, 발사용(그 발사장치를 포함한다.)\n  6. 전자충격기\n  7. 그 밖에 법무부장관이 정하는 보안장비\n50. (규칙187조) 교도관이 수용자 및 수용자 외의 사람에 대하여 사용할 수 있는 보안장비의 종류별 사용요건이다. 괄호안에 들어갈 말을 넣으시오?(  )\n 가스분사기, 가스총, 최루탄 / 전기교도봉, 전자충격기\n  1. 교도봉·(         )·(         )·(         ) : 법 제100조 제1항․제2항 각 호의 어느 하나에 해당하는 경우\n  2. (        )·(         ): 법 제100조제1항․제2항 각 호의 어느 하나에 해당하는 경우로서 상황이 긴급하여 제1호의 장비만으로는 그 목적을 달성할 수 없는 때\n51. (규칙188조) 보안장비의 종류별 사용기준에 대한 설명으로 틀린 것은?(  )\n 3번 / 50미터 이상의 원거리 / 참고사항 :\n  1. 교도봉·전기교도봉 : 얼굴이나 머리부분에 사용해서는 아니 되며, 전기교도봉은 타격 즉시 떼어야 함\n  2. 가스분사기·가스총 : 1미터 이내의 거리에서는 상대방의 얼굴을 향하여 발사해서는 안됨\n  3. 최루탄 : 투척용 최루탄은 근거리용으로 사용하고, 발사용 최루탄은 50미터 이내의 원거리에서 사용하되, 30도 이상의 발사각을 유지하여야 함\n  4. 전자충격기 : 전극침 발사장치가 있는 전자충격기를 사용할 경우 전극침을 상대방의 얼굴을 향해 발사해서는 안됨", "1개 / 1번 틀림 – 수용자를 ‘도주하게 하거나’는 없다 – 수용자를 도주하게 한 경우에는 수용자 이외의 사람에게 강제력을 행사하는 게 아니라 수용자를 먼저 잡아야 하기 때문에 규정에는 도주 기수가 없다. / 아래 설명 중 3, 4번만 수용자 및 수용자 이외의 사람에 대한 강제력 행사요건이 명확히 동일하고, 1, 2번은 비슷하지만 약간의 차이가 있다.", "13회"], ["(법104조) 소장은 마약류사범ㆍ조직폭력사범 등 법무부령으로 정하는 수용자에 대하여는 교화 또는 건전한 사회복귀를 위하여 필요한 범위에서 다른 수용자와의 접촉을 차단하거나 계호를 엄중히 하는 등 법무부령으로 정하는 바에 따라 다른 수용자와 달리 관리할 수 있다.(  )", "X / 교화 또는 건전한 사회복귀를 위하여 X→시설의 안전과 질서유지를 위하여 O", "14회"], ["(법104조) 소장은 마약류사범ㆍ조직폭력사범 등 법무부령으로 정하는 수용자를 관리하는 경우에도 처우를 제한하여서는 아니 된다.(  )", "O / 기본적인 처우O, 기초적인 처우X", "14회"], ["(규칙194조) 법 제104조에 따라 교정시설의 안전과 질서유지를 위하여 다른 수용자와의 접촉을 차단하거나 계호를 엄중히 하여야 하는 수용자에 해당하지 않는 것은?(  )\n  1. 조직폭력수용자  2. 마약류수용자\n  3. 관심대상수용자  4. 중경비수용자", "4", "14회"], ["(규칙195조) 엄중관리대상자의 번호표 및 거실표의 색상에 대한 설명으로 틀린 것은 몇개인가?(  )\n  1. 관심대상수용자: 노란색  2. 조직폭력수용자: 노란색  3. 마약류수용자: 파란색\n  ② 제194조의 엄중관리대상자 구분이 중복되는 수용자의 경우 그 번호표 및 거실표의 색상은 제1항 각 호의 순서에 따른다.\n조직폭력수용자이면서 관심대상수용자인 경우 노란색을 붙여야 한다.\n마약류수용자이면서 조직폭력수용자인 경우 노란색을 붙여야 한다.\n마약류수용자이면서 관심대상수용자인 경우 노란색을 붙여야 한다.", "틀린 것 없음\n  제195조(번호표 등 표시) ① 엄중관리대상자의 번호표 및 거실표의 색상은 다음 각 호와 같이 구분한다.", "14회"], ["(규칙197조) 소장은 엄중관리대상자에게 작업을 부과할 때에는 법 제59조제3항에 따른 조사나 검사 등의 결과를 고려하여야 한다.(  )", "O / 엄중관리대상자 작업부과 – (분류조사+분류검사) 결과 고려해야 한다.\n *중요사항 : 조직폭력수용자, 마약류수용자, 관심대상수용자별 처우상 차이점이 시행규칙에 규정되어 있으나, 셋 모두 공통적인 사항은 2가지(196조 상담 : 상담자 지정, 197조 작업 : 분류조사+분류검사 결과 고려) 밖에 없음을 유의해야 한다.", "14회"], ["(규칙199조) 소장은 규칙 제198조 각 호의 어느 하나에 해당하는 수용자에 대하여는 조직폭력수용자로 지정한다. 현재의 수용생활 중 집행되었거나 집행할 형이 제198조제1호 또는 제2호에 해당하는 경우에도 마약류수용자로 한정한다.) 해당하는 경우에는 교도관회의의 심의 또는 분류처우위원회의 의결을 거쳐 지정을 해제할 수 있다. 밑줄 친 부분 중 틀린 부분은 어디인가?(  )", "재판 확정 후가 틀림 → 지정 후 O /\n  - *비교 : 마약류 외의 법률이 적용된 마약류수용자 지정해제시 고려사항(2가지) : 수용생활태도, 교정성적 등\n            관심대상수용자 지정해제시 고려사항(1가지) : 수용생활태도 등\n             (의미 : 관심대상수용자 해제시보다 마약류수용자 지정해제가 더 많은 사항을 고려해야 하고 까다롭다.)", "14회"], ["(규칙206조) 마약류수용자에 대하여 다량 또는 장기간 복용할 경우 환각증세를 일으킬 수 있는 의약품을 투약할 때에는 특히 유의하여야 한다.(  )", "O / 마약류수용자 + 다량 or 장기간 복용(환각증세 의약품) = 투약 유의해야 한다.", "14회"], ["(규칙206조) 소장은 교정시설에 마약류를 반입하는 것을 방지하기 위하여 정기적으로 강제에 의하지 아니하는 범위에서 수용자의 소변을 채취하거나 혈액검사를 통해 마약반응검사를 할 수 있다.(  )", "X / 정기적으로X → 필요하면O, 혈액검사를 통해X(마약반응검사는 소변채취만 규정되어 있음, 혈청검사는 양성반응시 추가적으로 검사할 때 사용하는 방법임) / 목적 : 마약류반입 방지, 시기 : 필요할 때, 범위 : 강제에 의하지 아니하는, 방법 : 소변채취(다른 방법 명시되지 않았음), 시행여부 : 할 수 있다.", "14회"], ["(규칙206조) 소장은 검사 결과 음성반응이 나타난 수용자에 대하여는 관계기관에 혈청검사, 모발검사, 그 밖의 정밀검사를 의뢰하고 그 결과에 따라 적절한 조치를 하여야 한다.(  )", "X / 음성X→양성O / 마약반응검사에서 양성반응시 당연히 적절한 조치를 하여야 한다.(안하면 범죄숨기는 것이니까) / 관계기관에 혈청, 모발, 정밀검사 의뢰", "14회"], ["(규칙207조) 소장은 수용자 외의 사람이 마약류수용자에게 물품을 건네줄 것을 신청하는 경우에는 마약류 반입 등을 차단하기 위하여 신청을 허가하지 아니한다.(  )", "O / 맞는 말이다. 다만 뒤에 단서가 있음을 유의 / 규정 : 다만, 다음 각 호의 어느 하나에 해당하는 물품을 건네줄 것을 신청한 경우에는 예외로 할 수 있다.", "14회"], ["(규칙207조) 소장이 수용자 외의 사람이 마약류수용자에게 물품을 교부하려고 신청하는 경우 허가할 수 있는 경우는 몇 개인가?(  )\n 1. 소장이 정하는 바에 따라 교정시설 안에서 판매되는 물품\n 2. 그 밖에 마약류 반입을 위한 도구로 이용될 가능성이 없다고 인정되는 물품", "1개 / 1번 틀림 – 소장이 정하는X→법무부장관이 정하는O", "14회"], ["(규칙208조) 담당교도관은 엄중관리대상자의 보관품 및 지니는 물건 변동 상황을 수시로 점검하고, 특이사항이 있는 경우에는 소장에게 보고하여야 한다.(  )", "X / 엄중관리대상자의X → 마약류수용자의O, 소장에게X → 감독교도관에게O / 담당교도관이 감독교도관에게 보고함(특이규정임), 보관품 점검은 마약류수용자만 해당됨!!! 앞서 말했다시피 다 개별적이고 오직 ‘상담, 작업’만 엄중관리대상자 공통사항임!!!", "14회"], ["(규칙209조) 소장은 마약류수용자가 마약류 근절(根絶) 의지를 갖고 이를 실천할 수 있도록 해당 교정시설의 여건에 적합한 마약류수용자 재활교육계획을 수립하여 시행하여야 한다.(  )", "O / 마약류수용자 재활교육계획 수립 시행해야 한다.(강제조항)", "14회"], ["(규칙209조) 소장은 마약류수용자의 마약류 근절 의지를 북돋울 수 있도록 마약 퇴치 전문강사, 성직자 등과 자매결연을 주선하여야 한다.(  )\n1. 다른 수용자에게 상습적으로 폭력을 행사하는 수용자(수용자에게 폭력은 상습 – 교도관은 우려)\n2. 교도관을 폭행하거나 협박하여 징벌을 받은 전력이 있는 사람으로서 같은 종류의 징벌대상행위를 할 우려가 큰 수용자(교도관 폭행협박은 빈번하지 않으므로 상습이 아니라 우려)\n3. 수용생활의 편의 등 자신의 요구를 관철할 목적으로 상습적으로 자해를 하거나 각종 이물질을 삼키는 수용자(요구관철목적 필요, 자해 이물질 삼키는 자는 1회성에 그치지 않으므로 우려가 아니라 상습)\n4. 다른 수용자를 괴롭히거나 세력을 모으는 등 수용질서를 문란하게 하는 조직폭력수용자(조직폭력사범으로 행세하는 경우를 포함한다) (조직폭력수용자여야 하지, 일반수용자는 해당하지 않는다)\n5. 조직폭력수용자로서 무죄 외의 사유로 출소한 후 5년 이내에 교정시설에 다시 수용된 사람(관심대상수용자에 마약류 용어는 등장하지 않는다. 무죄 외의 사유로 출소하였으므로 형․구속집행정지, 구속취소 등으로 출소한 후 다시 수용되면 관심대상으로 잡아야 한다.)\n6. 상습적으로 교정시설의 설비·기구 등을 파손하거나 소란행위를 하여 공무집행을 방해하는 수용자\n7. 도주(음모, 예비 또는 미수에 그친 경우를 포함한다)한 전력이 있는 사람으로서 도주의 우려가 있는 수용자(도주는 빈번하지 않으므로 상습이 아니라 우려)\n8. 중형선고 등에 따른 심적 불안으로 수용생활에 적응하기 곤란하다고 인정되는 수용자(중형적응곤란)\n9. 자살을 기도한 전력이 있는 사람으로서 자살할 우려가 있는 수용자(자살은 빈번하지 않으므로 상습이 아니라 우려)\n10. 사회적 물의를 일으킨 사람으로서 죄책감 등으로 인하여 자살 등 교정사고를 일으킬 우려가 큰 수용자(사회적물의자살우려)\n11. 징벌집행이 종료된 날부터 1년 이내에 다시 징벌을 받는 등 규율 위반의 상습성이 인정되는 수용자(종료된 날부터임, 6개월이 아니고 1년 이내)\n  12. 상습적으로 법령에 위반하여 연락을 하거나 금지물품을 반입하는 등의 방법으로 부조리를 기도하는 수용자(부정연락 및 금지물품은 1회성에 그치지 않으므로 우려가 아니고 상습)\n  13. 그 밖에 교정시설의 안전과 질서유지를 위하여 엄중한 관리가 필요하다고 인정되는 수용자", "X / 주선하여야 한다X → 주선할 수 있다.O\n(규칙210조) 관심대상수용자의 지정대상 중요사항(*상습, *큰 규율위반행위는 우려)", "14회"], ["(규칙211조) 엄중관리대상자로 지정하거나 지정을 해제하는 경우에는 담당교도관 또는 감독교도관의 의견을 고려하여야 한다.(  )", "X / 엄중관리대상자 → 관심대상수용자 / 조직이나 마약은 법령에 명시된 요건에 해당하면 소장이 (분류처우위원회나 교도관회의 없이) 지정하는 것으로 담당교도관 또는 감독교도관의 요건을 필요로 하지 않는다, 반면 관심대상수용자는 해당 요건에 들더라도 지정할지 말지를 판단해야 하므로 담당교도관 또는 감독교도관의 의견을 고려하도록 규정하고 있다.", "14회"], ["(규칙213조) 소장은 다수의 엄중관리대상자가 수용되어 있는 수용동 및 작업장에는 사명감이 투철한 교도관을 엄선하여 배치하여야 한다.(  )", "X / 엄중관리대상자 → 관심대상수용자 / 수용동 및 작업장에 사명감이 투철한 직원을 엄선하여 배치해야 하는 대상은 관심대상수용자이다. (인원비율 : 관심대상\u003c조직폭력\u003c마약류), 만약 엄중관리대상자라고 한다면 조직폭력, 마약류를 모두 포함하므로 직원 중에 열심히 하는 직원은 계속 수용동 및 작업장에 배치해야 하는 문제를 초래하고, 조직폭력이나 마약류는 상당한 인원을 차지하고 있어 직원을 엄선하는 게 아니라 집어넣기에 급급할 수 있다. 따라서 가장 인원을 적게 차지하는 관심대상수용자가 수용된 곳에 사명감이 투철한 직원을 엄선하여 배치하는 것임!!!", "14회"], ["(법120조) 위원장은 법무부차관이 되고, 위원은 판사, 검사, 변호사, 법무부 소속 공무원, 교정에 관한 학식과 경험이 풍부한 사람 중에서 법무부장관이 임명 또는 위촉한다.(  )", "O", "16회"], ["(규칙254조) 다음 설명 중 틀린 것은 무엇인가?(  )\n  1. 범죄의 수단이 참혹 또는 교활하거나 극심한 위해(危害)를 발생시킨 경우\n  2. 해당 범죄로 무기형에 처해진 경우\n  3. 그 밖에 사회적 물의를 일으킨 죄를 지은 경우", "틀린 곳 없음 / 사회의 감정 유의 = 참교위무물\n제254조(사회의 감정에 대한 심사) 다음 각 호에 해당하는 수형자에 대하여 적격심사할 때에는 특히 그 범죄에 대한 사회의 감정에 유의하여야 한다.", "16회"], ["(규칙262조) 위원회는 가석방 취소심사를 위하여 필요하다고 인정하면 가석방자 및 가족 등을 위원회에 출석하게 하여 진술을 들을 수 있다.(  )", "X / 가석방자 및 가족 등을 → 가석방자를 / 취소심사시 ‘가석방자’ 출석하게 해 진술청취 가능, 가족 등 규정은 없음(비교참고 : 가석방심사신청시 수형자를 출석하게 하는 규정은 없으며 담당교도관 출석진술청취 규정은 있음)", "16회"], ["(규칙263조) 법무부장관은 가석방이 취소된 사람 또는 가석방이 실효된 사람이 교정시설에 수용되지 아니한 사실을 알게 된 때에는 관할 지방검찰청 검사 또는 관할 경찰서장에게 구인하도록 명하여야 한다.(  )", "X / 법무부장관은 → 소장은, 구인하도록 명하여야 한다. → 구인하도록 의뢰하여야 한다.", "16회"], ["(규칙263조) 제3항(79번)에 따라 구인 의뢰를 받은 검사 또는 경찰서장은 즉시 가석방취소자 또는 가석방실효자를 구인하여 소장에게 인계하여야 한다.(  )", "O / 검사 또는 경찰서장이 즉시 구인 소장 인계", "16회"], ["(규칙263조) 가석방 기간 중 형사사건으로 구속되어 교정시설에 미결수용 중인 자의 가석방 취소 결정으로 잔형을 집행하게 된 경우에는 교정시설을 관할하는 검찰청 검사에게 잔형 집행지휘를 받아 우선 집행할 수 있다.(  )", "X / 교정시설을 관할하는 검찰청 검사에게 잔형 집행지휘를 받아 우선 집행할 수 있다. → 가석방된 형의 집행을 지휘하였던 검찰청 검사에게 잔형 집행지휘를 받아 우선 집행하여야 한다.", "16회"], ["(법128조) 소장은 병원이나 그 밖의 연구기관이 학술연구상의 필요에 따라 수용자의 시신인도를 신청하면 본인의 유언 또는 상속인의 승낙이 있거나 가족이 없는 경우에는 소장이 허가한 경우에 한하여 인도할 수 있다.(  )", "X / 본인의 유언 또는 상속인의 승낙이 있거나 가족이 없는 경우에는 소장이 허가한 경우에 한하여 → 본인의 유언 또는 상속인의 승낙이 있는 경우에 한하여 (소장이 단독으로 인도할 수 있는 경우는 절대 없다)", "17회"], ["판사와 검사는 직무상 필요하면 교정시설을 시찰할 수 있다.(  )", "판사와 검사 외의 사람은 교정시설을 참관하려면 학술연구 등 정당한 이유를 명시하여 소장의 허가를 받아야 한다.(  )\n    판사 또는 검사가 교정시설을 시찰할 경우에는 미리 그 신분을 나타내는 증표를 소장에게 제시하고 시찰부에 서명한다(  )\n    소장은 제1항의 경우에 교도관에게 시찰을 요구받은 장소를 안내하게 하고 그 시간을 시찰부에 기록해야 한다.(  )\n OOXX - 소장에게 제시해야 한다 O. 제시한 후 시찰부에 서명 또는 날인하여야 한다는 규정은 옛날 규정 / 안내하게 해야 한다. O 그 시간을 시찰부에 기록하여야 한다는 옛날 규정", "1회"], ["수용자는 편지를 보내려는 경우 해당 편지를 봉함하여 교정시설에 제출한다. 다만, 소장은 다음 각 호의 어느 하나에 해당하는 경우로서 법 제43조제3항에 따른 금지물품의 확인을 위하여 필요한 경우에는 편지를 봉함하지 않은 상태로 제출하게 할 수 있다. 틀린 부분은 몇 개인가?(  )\n  1. 다음 각 목의 어느 하나에 해당하는 수용자가 변호인 외의 자에게 편지를 보내려는 경우\n    가. 법 제104조제1항에 따른 마약류사범ㆍ조직폭력사범 등 법무부령으로 정하는 수용자\n    나. 제84조제2항에 따른 처우등급이 법 제57조제2항제4호의 중(重)경비시설 수용대상인 수형자\n  2. 수용자가 같은 교정시설에 수용 중인 다른 수용자에게 편지를 보내려는 경우\n  3. 규율위반으로 조사 중이거나 징벌집행 중인 수용자가 다른 수용자에게 편지를 보내려는 경우\n 1. 다음 각 목의 어느 하나에 해당하는 수용자가 변호사 외의 자에게 편지를 보내려는 경우(  수 있다는 사실", "15회"], ["(규칙227조) 출석통지서를 전달받은 징벌대상자가 징벌위원회에 출석하기를 원하지 아니하는 경우에는 출석포기서를 소장에게 제출하여야 한다.(  )", "X / 소장에게 → 징벌위원회에 제출하여야~", "15회"], ["(규칙228조) 징벌위원회는 출석한 징벌대상자를 심문하고, 필요하다고 인정하는 경우에는 교도관이나 다른 수용자 등을 참고인으로 출석하게 하여 심문할 수 있다.(  )", "O", "15회"], ["(규칙228조) 징벌위원회는 필요하다고 인정하는 경우 심리상담을 한 교도관으로 하여금 그 심리상담 결과를 제출하게 하거나 해당 교도관을 징벌위원회에 출석하게 하여 심리상담 결과를 진술하게 하여야 한다.(  )", "X / 진술하게 하여야 한다 → 진술하게 할 수 있다.", "15회"], ["(규칙228조) 징벌위원회는 징벌대상자에게 출석통지서를 전달하였음에도 불구하고 징벌대상자가 출석포기서를 제출하거나 정당한 사유 없이 출석하지 아니한 경우에는 징벌위원회 회의록에 기록하고 서면심리만으로 징벌을 의결할 수 있다.(  )", "O", "15회"], ["(규칙228조) 징벌위원회는 재적위원 과반수의 출석으로 개의하고, 출석위원 과반수의 찬성으로 의결한다. 이 경우 외부위원 1명 이상이 출석한 경우에만 의결할 수 있다.(  )", "X / 외부위원 1명 이상이 출석한 경우에만 의결할 수 → 개의할 수 / 외부위원 1명 출석은 개의요건이지 의결요건은 아니다.", "15회"], ["(규칙228조) 징벌의 의결은 징벌의결서에 따른다. 소장은 작업장려금 삭감을 의결하려면 사전에 수용자의 작업장려금을 확인하여야 한다.(  )", "X / 소장은 → 징벌위원회는 작업장려금 삭감을 의결하려면 사전에 작업장려금을 확인하여야 한다.", "15회"], ["(규칙228조) 징벌위원회의 회의에 참여한 사람(내부위원, 외부위원)은 직무상 알게 된 비밀을 누설하여서는 아니 된다.(  )", "O", "15회"], ["(영132조) 징벌위원회가 징벌을 의결한 경우에는 이를 소장에게 즉시 보고하여야 한다.(  )", "X / 소장에게 즉시 보고하여야 → 소장에게 즉시 통고하여야 / 소장과 징벌위원회는 지위의 높낮이가 없음, 보고는 상하관계시 사용, 통고는 수평관계시 사용 / 징벌위원회 의결결과 소장에게 즉시 통고(대체적으로 오전 10:00 징벌위원회 시작, 11:00 종료하면 오전 11:30경 소장에게 의결결과를 즉시 통고한다. 이후 소장은 오후 13:00경 지체없이 징벌을 집행한다.)", "15회"], ["(법112조) 징벌은 소장이 집행한다.(  )", "O", "15회"], ["(법112조) 소장은 징벌집행을 위하여 필요하다고 인정하면 수용자를 분리하여 수용할 수 있다.(  )", "O", "15회"], ["(법112조) 소장은 실외운동 정지 징벌을 부과하는 경우, 금치처분에 따라 실외운동을 제한하는 경우라도 수용자가 매주 1회 이상 실외운동을 할 수 있도록 하여야 한다.(  )", "O", "15회"], ["(법113조) 소장은 질병이나 그 밖의 사유로 징벌집행이 곤란하면 그 사유가 해소될 때까지 그 집행을 일시 정지할 수 있다.(  )", "O", "15회"], ["(법113조) 소장은 징벌집행 중인 사람이 뉘우치는 빛이 뚜렷한 경우에는 그 징벌을 감경하거나 남은 기간의 징벌집행을 면제할 수 있다.(  )", "O / 소장은 징벌을 감경 또는 면제를 할 수 있다. 요건은 : 뉘우치는 빛이 뚜렷한 경우", "15회"], ["(법114조) 징벌위원회는 징벌을 의결하는 때에 행위의 동기 및 정황, 교정성적, 뉘우치는 정도 등 그 사정을 고려할 만한 사유가 있는 수용자에 대하여 2개월 이상 6개월 이하의 기간 내에서 징벌의 집행을 유예할 것을 의결할 수 있다.(  )", "O / 징벌집행유예시 고려사항 암기 : 동정교뉘(동기, 정황, 교정성적, 뉘우치는정도) / 비교참고 : 법률상 징벌부과시 고려사항 암기 : 동경정사(동기, 경중, 정황, 사정), 규칙상 징벌부과시 고려사항 암기 : 나성지환심건+동수결+ 는 경우에는 그러하지 아니한다.\n2. 작업장려금의 삭감, 근로봉사, 경고는 금치와 동시에 집행할 수 있다.\n3. 같은 종류의 징벌은 그 기간이 긴 것부터 집행할 수 있다.\n4. 금치를 제외한 두 가지 이상의 징벌을 집행할 경우에는 함께 집행한다.", "모두 틀림 / 1. 다만. 부득이한~ 단서규정 없다, 2. 금치와 동시집행 가능한 것은 집행 후 즉시종료되는 것(작업장려금 삭감, 경고)뿐이고 근로봉사는 즉시종료가 아닌 시간충족이 필요하므로 금치와 동시집행할 수 없다, 3. 집행할 수 있다가 아니고 ‘집행한다.’임!!!, 4. 함께 집행한다가 아니고 ‘집행할 수 있다.’임\n제230조(징벌의 집행순서) ① 금치와 그 밖의 징벌을 집행할 경우에는 금치를 우선하여 집행한다. 다만, 작업장려금의 삭감과 경고는 금치와 동시에 집행할 수 있다. (절대적으로 금치부터 집행해야 하고, 즉시종료되는 것은 동시에 집행할 수 있을 뿐이다. 설령 같이 집행 안해도 문제없다.)", "15회"], ["(규칙231조) 소장은 징벌을 집행하는 경우에는 징벌집행을 위하여 별도로 지정한 거실(이하 \"징벌거실\"이라 한다)에 해당 수용자를 수용하여야 한다.(  )", "X / 징벌을 집행하는 경우에는X → 금치를 집행하는 경우에는O / 징벌거실은 금치집행을 수용함을 원칙으로 한다.", "15회"], ["(규칙231조) 소장은 금치 외의 징벌을 집행하는 경우 그 징벌의 목적을 달성하기 위하여 필요하다고 인정하면 해당 수용자를 징벌거실에 수용할 수 있다.(  )", "O", "15회"], ["(규칙231조) 소장은 징벌집행을 받고 있거나 집행을 앞둔 수용자가 같은 행위로 형사 법률에 따른 처벌이 선고되어 징벌을 집행할 필요가 없다고 인정하면 징벌집행을 감경하거나 면제할 수 있다.(  )", "X / 선고되어X → 확정되어O / ★ 법령상 소장이 징벌집행을 감경하거나 면제할 수 있는 사유 : 2가지(1. 뉘우치는 빛이 뚜렷한 경우 / 2. 징벌집행을 받고 있거나 집행을 앞둔 수용자가 같은 행위로 형사 법률에 따른 처벌이 확정되어 징벌을 집행할 필요가 없다고 인정되는 경우) / 참고사항 : 징벌집행을 받고 있거나 징벌집행을 앞둔 수용자가 같은 행위로 형사처벌이 확정되는 경우는 거의 발생할 가능성이 희박하다고 판단됨.", "15회"], ["(규칙232조) 소장은 징벌집행 중인 수용자가 생활용품 등으로 자살·자해할 우려가 있거나 교정시설의 안전과 질서를 해칠 우려가 있는 경우에는 그 물품을 따로 보관하고 필요한 경우에만 이를 사용하게 할 수 있다.(  )", "X / 징벌집행중인 수용자가X → 금치집행중인 수용자O / 징벌의 종류는 다양하므로 모든 징벌에서 생활용품을 제한해서는 안 된다.", "15회"], ["(규칙233조) 소장은 징벌집행 중인 수용자의 심리적 안정과 징벌대상행위의 재발방지를 위해서 교도관으로 하여금 징벌집행 중인 수용자에 대한 심리상담을 하게 해야 한다.(  )", "O / 징벌자", "15회"], ["(규칙233조) 소장은 징벌대상행위의 재발방지에 도움이 된다고 인정하는 경우에는 징벌집행 중인 수용자가 교정위원, 자원봉사자 등 전문가의 상담을 받게 할 수 있다.(  )", "O", "15회"], ["(법115조) 소장은 징벌의 집행이 종료되거나 집행이 면제된 수용자가 교정성적이 양호하고 법무부령으로 정하는 기간 동안 규율위반행위를 하지 아니하면 법무부장관의 승인을 받아 징벌을 실효시킬 수 있다.(  )", "X / 규율위반행위를 하지 아니하면 → 징벌을 받지 아니하면", "15회"], ["(법115조) 법 이외에 징벌에 관하여 필요한 사항은 법무부령으로 정한다.(  )", "O", "15회"], ["(규칙234조) 소장은 실효된 징벌을 이유로 그 수용자에게 처우상 불이익을 주어서는 아니 된다.(  )", "O", "15회"], ["(법111조의2) 소장은 수용자에게 징벌을 부과한 경우에는 그 징벌대상행위를 양형(量刑) 참고자료로 작성하여 관할 검찰청 검사 또는 관할 법원에 통보하여야 한다.(  )", "X / 수용자 → 미결수용자, 통보하여야 한다 → 통보할 수 있다.", "15회"], ["(규칙270조) 다음 설명으로 틀린 것은 몇 개인가?(  )\n  1. 심신장애로 직무수행이 불가능하거나 현저히 곤란하다고 인정되는 경우(  )\n  2. 직무와 관련된 비위사실이 있는 경우(  )\n  3. 직무태만, 품위 손상, 그 밖의 사유로 인하여 위원으로서 직무를 수행하기 적합하지 아니하다고 인정되는 경우(  )\n  4. 위원 스스로 직무를 수행하는 것이 곤란하다고 의사를 밝히는 경우(  )\n  5. 제269조의 준수사항을 위반하였을 경우(  )\n  6. 특정 종파나 특정 사상에 편향되어 공정성을 해칠 우려가 있는 경우(  )", "2개 / 1. 지방교정청장의 추천를 받아 해당 위원을 해촉하여야 한다. → 지방교정청장의 건의를 받아 해당 위원을 해촉할 수 있다.(추천은 위촉시, 건의는 해촉시, 해촉을 필요적으로 규정하면 외부위원 반발하므로 해촉할 수 있다), 6. 징벌위원회 외부위원 해촉사유 중 1가지임! / 1.~4. 외부위원 해촉할 수 있는 공통사유임!\n제270조(위원의 해촉) 법무부장관은 교정자문원회 외부위원이 다음 각 호의 어느 하나에 해당하는 경우에는 지방교정청장의 추천를 받아 해당 위원을 해촉하여야 한다.(  )", "17회"], ["(규칙62조) 분류심사 관련 밑줄 친 부분은 바르지 않은 부분은 몇 개인가?(  )\n  1. 징역형·금고형이 확정된 사람으로서 집행할 형기가 형집행지휘서 접수일부터 3개월 미만인 사람\n  2. 구류형이 확정된 사람  3. 삭제\n  ② 소장은 수형자가 다음 각 호의 어느 하나에 해당하는 사유가 있으면 분류심사를 유예한다.\n  1. 질병 등으로 분류심사가 곤란한 때\n  2. 법 제107조제1호부터 제5호까지의 규정에 해당하는 행위 및 이 규칙 제214조 각 호에 해당하는 행위(이하 \"징벌대상행위\"라 한다)의 혐의가 있어 조사 중이거나 징벌집행 중인 때\n  3. 그 밖의 사유로 분류심사가 특히 곤란하다고 인정하는 때\n  ③ 소장은 제2항 각 호에 해당하는 사유가 소멸한 경우에는 지체 없이 분류심사를 하여야 한다. 다만, 집행할 형기가 사유 소멸일부터 3개월 미만인 경우에는 분류심사를 하지 아니한다.\n제62조(분류심사 제외 및 유예) ① 다음 각 호의 사람에 대해서는 \u003c분류심사를 하지 아니한다.>\n  1. \u003c징역형·금고형이 확정된 사람>으로서 \u003c집행할 형기>가 \u003c형확정일로부터 3개월 미만>인 사람\n  2. \u003c구류형이 선고>된 사람\n  3. \u003c노역형 수형자>\n  ② \u003c소장>은 수형자가 다음 각 호의 어느 하나에 해당하는 사유가 있으면 \u003c분류심사를 유예할 수 있다.>\n  1. \u003c질병 등>으로 \u003c분류심사가 곤란한> 때\n  2. 법 제107조제1호부터 제5호까지의 규정에 해당하는 행위 및 이 규칙 제214조 각 호에 해당하는 행위(이하 \"징벌대상행위\"라 한다)의 혐의가 있어 \u003c조사 중>이거나 \u003c징벌집행 중>인 때\n  3. 그 밖의 사유로 분류심사가 \u003c특히 곤란하다고 인정>하는 때\n  ③ 소장은 제2항 각 호에 해당하는 사유가 \u003c소멸한 경우>에는 \u003c지체 없이 분류심사를 하여야> 한다. 다만, \u003c집행할 형기가 사유 소멸일부터> \u003c3개월 미만인 경우>에는 \u003c분류심사를 하지 아니한다.>", "4개 / 형확정일로부터, 구류형이 선고, 노역형 수형자, 분류심사를 유예할 수 있다가 틀림\n제62조(분류심사 제외 및 유예) ① 다음 각 호의 사람에 대해서는 분류심사를 하지 아니한다.", "8회"], ["(규칙105조) 소장이 교육대상자의 선발을 취소할 수 있는 사유로 틀린 것은 몇 개인가?(  )\n  1. 각 교육과정의 관계법령, 학칙, 교육관리지침 등을 위반한 때\n  2. 학습의욕이 부족하여 서면경고를 하였는데도 개선될 여지가 없거나 수학능력이 현저히 부족하다고 판단되는 때\n  3. 조사 또는 징벌을 받고 교육 부적격자로 판 회"], ["(규칙258조) 위원회가 법 제121조제2항에 따라 가석방의 적격 여부에 대한 결정을 한 경우에는 별지 제23호서식의 결정서를 작성하여야 한다.(  )", "O", "16회"], ["(법122조) 위원회는 가석방 적격결정을 하였으면 5일 이내에 법무부장관에게 가석방 허가를 신청할 수 있다. 법무부장관은 위원회의 가석방 허가신청이 적정하다고 인정하면 허가하여야 한다.(  )", "X / 위원회 ~ 가석방 허가를 신청할 수 있다 → 신청하여야 한다,  법무부장관은 ~ 허가하여야 한다. → 허가할 수 있다.", "16회"], ["(규칙259조) 소장은 수형자의 가석방이 허가된 경우에는 주거지, 관할 경찰서 또는 보호관찰소에 출석할 기한 등을 기록한 별지 제24호서식의 가석방증을 가석방자에게 발급하여야 한다.(  )", "O", "16회"], ["(규칙260조) 가석방자는 가석방 기간 중 「가석방자관리규정」 제5조부터 제7조까지, 제10조, 제13조제1항, 제15조 및 제16조에 따른 지켜야 할 사항 및 관할 경찰서장의 명령 또는 조치를 따라야 하며 이를 위반하는 경우에는 「형법」 제75조에 따라 가석방을 취소할 수 있다.(  )", "O", "16회"], ["(규칙261조) 수형자를 가석방한 소장 또는 가석방자를 수용하고 있는 소장은 가석방자가 제260조의 가석방 취소사유에 해당하는 사실이 있음을 알게 되거나 관할 경찰서장으로부터 그 사실을 통보받은 경우에는 지체 없이 별지 제25호서식의 가석방 취소심사신청서에 별지 제26호서식의 가석방 취소심사 및 조사표를 첨부하여 법무부장관에게 가석방 취소심사를 신청하여야 한다.(  )", "X / 법무부장관에게 → 위원회에", "16회"], ["(규칙261조) 위원회가 제1항의 신청을 받아 심사를 한 결과 가석방을 취소하는 것이 타당하다고 결정한 경우에는 별지 제23호서식의 결정서에 별지 제26호서식의 가석방 취소심사 및 조사표를 첨부하여 지체 없이 법무부장관에게 가석방의 취소를 신청하여야 한다.(  )", "O", "16회"], ["(규칙261조) 소장은 가석방을 취소하는 것이 타당하다고 인정하는 경우 긴급한 사유가 있을 때에는 위원회의 심사를 거치지 아니하고 전화, 전산망 또는 그 밖의 통신수단으로 법무부장관에게 가석방의 취소를 신청할 수 있다. 이 경우 소장은 지체 없이 별지 제26호서식의 가석방 취소심사 및 조사표를 송부하여야 한다.(  )", "O", "16회"], ["(규칙262조) 위원회가 가석방 취소를 심사하는 경우에는 가석방자가 「가석방자관리규정」등의 법령을 위반하게 된 경위와 그 위반이 사회에 미치는 영향, 가석방 기간 동안의 생활 태도, 직업의 유무와 종류, 생활환경 및 친족과의 관계, 그 밖의 사정을 고려하여야 한다.(  )", "O / 취소심사시 고려사항 = 경사생직생친", "16회"], ["(규칙263조) 소장은 가석방이 취소된 경우에는 지체 없이 잔형 집행에 필요한 조치를 취하고 관할 지방교정청장에게 별지 제27호서식의 가석방취소자 잔형집행보고서를 송부하여야 한다.(  )", "X / 관할 지방교정청장 → 법무부장관 / 가석방 관련은 소장, 위원회, 장관만 등장함.", "16회"], ["(규칙263조) 소장은 가석방자가 「형법」 제74조에 따라 가석방이 실효된 것을 알게 된 경우에는 지체 없이 잔형 집행에 필요한 조치를 취하고 법무부장관에게 별지 제28호서식의 가석방실효자 잔형집행보고서를 송부하여야 한다.(  )", "O", "16회"], ["(규칙263조) 가석방취소자 및 가석방실효자의 잔형 기간은 가석방을 실시한 날부터 원래 형기의 종료일까지로 하고, 잔형집행 기산일은 가석방의 취소 또는 실효로 인하여 교정시설에 수용된 날부터 한다.(  )", "X / 잔형 기간은 가석방을 실시한 날부터 원래 형기의 종료일까지 → 잔형 기간은 가석방을 실시한 다음 날부터 원래 형기의 종료일까지", "16회"], ["(법124조) (사면), (가석방), (형의 집행면제), (감형)에 따른 석방은 그 결정 후 12시간 이내에 하여야 한다. 다만, 그 서류에서 석방일시를 지정하고 있으면 그 일시에 한다.(  )", "X / 그 결정 후 12시간 이내 → 그 서류가 교정시설에 도달한 후 12시간 이내 / 12시간 = 가사감면", "17회"]]}, {"t": "석방·사망", "q": [["(영127조) 소장은 법 제102조제3항에 따라 수용자를 일시석방하는 경우에는 같은 조 제4항의 출석 시한과 장소를 알려주어야 한다.(  )", "O", "13-2회"], ["(법123조) 소장은 사면ㆍ형기종료 또는 권한이 있는 사람의 판결 또는 결정에 따라 수용자를 석방한다.(  )", "X / 권한있는 사람의 판결 결정 → 권한있는 사람의 명령 / 수용자 석방 = 권형사", "17회"], ["(법124조) 형기종료에 따른 석방은 형기종료일에 하여야 한다.(  )", "O", "17회"], ["(법124조) 권한이 있는 사람의 명령에 따른 석방은 서류가 도달한 후 5시간 이내에 행하여야 한다.(  )", "O", "17회"], ["(법125조) 소장은 피석방자가 질병이나 그 밖에 피할 수 없는 사정으로 귀가하기 곤란한 경우에 본인의 신청이 있거나 소장이 특히 필요하다고 인정하는 경우 일시적으로 교정시설에 수용할 수 있다.(  )", "X / 소장이 특히 필요하다고 인정하는 경우X / 일시수용사유 = 질병, 피할 수 없는 사정 + 귀가곤란 + 본인신청(오직)", "17회"], ["(영142조) 소장은 수형자에 대하여는 석방 10일 전까지 석방 후의 보호에 관한 사항을 조사하여야 한다.(  )", "X / 수형자 → 형기종료로 석방될 수형자O / 수형자의 석방은 가석방 또는 형기종료가 대부분을 차지하고 가석방인 경우는 사전심사시 보호에 관한 사항(형기의 1/3 경과하기 전)을 조사하므로 영142조 규정은 가석방을 제외한 형기종료로 출소하는 수형자로 대상을 제한하고 조사기간은 석방 10일 전까지로 규정하고 있다. ~ 조사하여야 한다!!!", "17회"], ["형기종료일", "", "17회"], ["그 밖에 수용 중 특이사항으로서 석방될 수형자의 재범방지나 관련된 피해자 보호를 위해 특히 알릴 필요가 있는 사항\n  ② 법 제126조의2제1항 본문에 따라 통보하는 사회복귀에 관한 의견에는 다음 각 호의 사항이 포함되어야 한다.\n  1. 성명\n  2. 생년월일\n  3. 주민등록 상 주소 및 석방 후 거주지 주소\n  4. 수용기간 중 받은 직업훈련에 관한 사항\n  5. 수용기간 중 수상이력\n  6. 수용기간 중 학력변동사항\n  7. 수용기간 중 자격증 취득에 관한 사항\n  8. 그 밖에 석방될 수형자의 자립지원을 위해 특히 알릴 필요가 있는 사항\n  ③ 법 제126조의2제1항 본문에 따른 통보를 위한 수용이력 통보서와 사회복귀에 관한 의견 통보서의 서식은 법무부령으로 정한다.\n  ④ 법 제126조의2제1항 본문에 따라 석방될 수형자의 수용이력 또는 사회복귀에 관한 의견을 그의 거주지를 관할하는 경찰관서에 통보하는 경우에는 「형사사법절차 전자화 촉진법」 제2조제4호에 따른 형사사법정보시스템을 통해 통보할 수 있다.\n  [전문개정 2020. 8. 5.]\n영 제144조(석방예정자의 보호조치) 소장은 수형자를 석방하는 경우 특히 필요하다고 인정하면 한국법무보호복지공단에 그에 대한 보호를 요청할 수 있다. \u003c개정 2009. 3. 18.>\n1. 소장은 석방될 수용자의 재범방지, 자립지원 및 피해자 보호를 위하여 필요하다고 인정하면 해당 수형자의 수용이력 또는 사회복귀에 관한 의견을 그의 거주지를 관할하는 경찰관서나 자립을 지원할 법인 또는 개인에게 통보하여야 한다. 다만, 법인 또는 개인에게 통보하는 경우에는 해당 수용자 또는 그 가족의 동의를 받아야 한다.\n2. 제1항에 따라 통보하는 경우 수용이력 또는 사회복귀에 관한 의견의 구체적인 사항은 법무부령으로 정한다.\n3. 1번의 지문에 따라 석방될 수형자의 수용이력 또는 사회복귀에 관한 의견을 그의 거주지를 관할하는 경찰관서에 통보하는 경우에는 교정정보시스템을 통해 통보하여야 있다.\n4. 소장은 (수용자)를 석방하는 경우 기기를 소지한 경우 2년 이하의 징역 또는 2천만원 이하의 벌금에 처한다.", "17회"], ["수용자의 범죄횟수는 징역 또는 금고 이상의 형을 선고받아 확정된 횟수로 한다.(  )", "O", "1회"], ["형의 집행을 정지·종료하거나 그 집행이 면제된 날부터 다음 각 호의 기간이 지난 경우에는 범죄횟수에 포함하지 아니한다. 다만, 그 기간 중 자격상실 이상의 형을 선고받아 확정된 경우는 제외한다.(  )\n     1. 3년을 초과하는 징역 또는 금고: 10년(  )\n     2. 3년 이하의 징역 또는 금고: 5년(  )\n XOO – 형의 집행을 정지·종료X, 종료O(정지는X) / 자격상실 이상의 X, 자격정지 이상의 O", "", "1회"]]}, {"t": "기타(미분류)", "q": [["소장은 수용자가 코로나19에 걸렸다고 의심되는 경우 즉시 격리수용하고 수용자가 사용한 휴대품을 철저히 소독하여야 한다.(  )", "X / 즉시 격리수용X -> 일주일간 격리수용", "코로나"], ["소장은 코로나19에 걸렸다고 의심되는 경우 지체없이 법무부장관에게 보고하고 관할 보건기관의 장에게 알려야 한다.(  )", "X / 의심되는 경우는 보고하지 않고, 걸린 경우 보고~", "코로나"], ["배우자의 직계존속이 위독한 때", "", "10회"], ["천재지변으로 형제자매에게 회복할 수 없는 재산상의 손해가 발생하였을 때", "", "10회"], ["그 밖의 재해로 자녀에게 회복할 수 없는 중대한 재산상의 손해가 발생할 우려가 있는 때", "", "10회"], ["천재지변으로 배우자에게 회복할 수 없는 중대한 재산상의 손해가 발생하였을 때", "", "10회"], ["그 밖의 재해로 수형자 본인에게 회복할 수 없는 중대한 재산상의 손해가 발생할 우려가 있는 때", "", "10회"], ["(규칙145조) 취업지원협의회의 구성과 관련해 맞는 것은 몇 개인가?(  )\n① 협의회는 회장 1명과 3명 이상 5명 이하의 내부위원과 10명 이상의 외부위원으로 구성한다.\n② 협의회의 회장은 소장이 되고, 부회장은 2명을 두되, 1명은 소장이 위원 중에서 지명하고, 1명은 외부위원 중에서 과반수 이상을 득표한 사람으로 한다.\n③ 내부위원은 위원장이 지명하는 소속기관의 부소장·과장(지소의 경우에는 7급 이상의 교도관)으로 구성한다.\n④ 회장·부회장 외에 협의회 운영을 위하여 기관실정에 적합한 수의 임원을 둔다.", "맞는 것 없음 / 1. 회장 1명과 →회장 1명을 포함하여(협의회 하한인원은 13명이고 상한인원은 없다) / 2. 1명은 소장이 위원 중에서 지명하고→1명은 소장이 내부위원 중에서 지명하고, 과반수 이상을 득표한 사람으로 한다→호선한다. / 3. 내부위원은 위원장이 지명하는→내부위원은 소장이 지명하는 / 4. 임원을 둔다→임원을 둘 수 있다.", "10회"], ["(규칙146조) 소장은 취업지원협의회 외부위원을 해촉할 수 있다.(  )", "X / 취업지원협의회 위촉 및 해촉은 법무부장관 권한임, 소장은 위촉 추천하거나 해촉 건의할 수 있음", "10회"], ["(규칙146조) 법무부장관이 취업지원협의회 외부위원을 해촉할 수 있는 사유는 몇 개인가?(  )\n  1. 심신장애로 직무수행이 불가능하거나 현저히 곤란하다고 인정되는 경우\n  2. 직무와 관련된 비위사실이 있는 경우\n  3. 직무태만, 품위손상, 그 밖의 사유로 인하여 위원으로 적합하지 아니하다고 인정되는 경우\n  4. 위원 스스로 직무를 수행하는 것이 곤란하다고 의사를 밝히는 경우", "모두 맞음", "10회"], ["(규칙147조) 소장은 취업지원협의회를 소집하고 협의회 업무를 총괄한다. 소장이 부득이한 사유로 직무를 수행할 수 없을 때에는 소장이 지정한 부회장이 그 직무를 대행한다.(  )", "X / 소장은 취업지원협의회를→회장은~ , 소장이 부득이한 사유로 →회장이~(소장과 회장은 각각 위치가 다른 것임)", "10회"], ["(규칙149조) 취업지원협의회의 사무를 처리하기 위하여 수형자 취업알선 및 창업지원 업무를 전담하는 직원  있다.(  )", "O", "3회"], ["소장은 수용자가 73번에 따라 처분하여야 할 물품을 상당한 기간 내에 처분하지 아니하면 폐기할 수 있다.(  )", "O", "3회"], ["수용자의 물품을 폐기하는 경우 관계장부에 기록해야 하는 것은 모두 몇 개인가?(  )\nㄱ. 품목ㄴ.일시ㄷ.수량ㄹ.이유,", "4개", "3회"], ["수용자에게 건내주려고 하는 금품의 허가범위 등에 관하여 필요한 사항은 법무부령으로 정한다.(  )", "O", "3회"], ["소장은 수용자가 임신 중이거나 출산(유산․사산을 제외한다)한 경우에는 모성보호 및 건강유지를 위하여 수시로 검진 등 적절한 조치를 하여야 한다.(  ) 법52조", "X / 소장은 수용자가 임신 중이거나 출산(유산ᆞ사산을 포함한다)한 경우에는 모성보호 및 건강유지를 위하여 정기적인 검진 등 적절한 조치를 하여야 한다.(수용자의 개념이므로 미결, 노역, 사형 모두 포함됨)", "7회"], ["출산의 범위는 출산, 유산, 사산을 포함하며, 출산․유산․사산 후 60일 지나지 아니한 경우를 말한다.(  ) 영78조", "O /\"출산(유산·사산을 포함한다)한 경우\"란 출산(유산·사산한 경우를 포함한다) 후 60일이 지나지 아니한 경우를 말한다.", "7회"], ["(법57조) 경비등급에 대한 설명으로 틀린 것은 몇 개인가?(  )\n  1. 개방시설 : 도주방지를 위한 통상적인 설비의 전부 또는 일부를 갖추지 아니하고 수용자의 자율적 활동이 가능하도록 통상적인 관리ㆍ감시의 전부 또는 일부를 하지 아니하는 교정시설\n  2. 완화경비시설 : 도주방지를 위한 통상적인 설비 및 수용자에 대한 관리ㆍ감시를 일반경비시설보다 완화한 교정시설\n  3. 일반경비시설 : 도주방지를 위한 통상적인 설비를 갖추고 수용자에 대하여 통상적인 관리ㆍ감시를 하는 교정시설\n  4. 중(重)경비시설 : 도주방지 및 수형자 상호 간의 접촉을 차단하는 설비를 강화하고 수용자에 대한 관리ㆍ감시를 엄중히 하는 교정시설", "모두 틀림 / 대상 자체가 원칙적으로 수용자가 아니라 수형자임, 다른 설명은 맞음", "8회"], ["(규칙80조) 소득점수를 평정하는 경우에는 평정 대상기간 동안 매월 평가된 소득점수를 합산하여 평정 대상기간의 개월 수로 나누어 얻은 점수(이하 \"평정소득점수\"라 한다)로 한다.(  )", "O", "8회"], ["(규칙89조) \"가족 만남의 날 행사\"란 수형자와 그 가족이 교정시설 내․외부의 일정한 장소에서 다과와 음식을 함께 나누면서 대화의 시간을 갖는 행사를 말하며, \"가족 만남의 집\"이란 수형자와 그 가족이 숙식을 함께 할 수 있도록 교정시설에 수용동과 별도로 설치된 일반주택 형태의 건축물을 말한다.(  )", "X / 교정시설 내외부의 일정한 장소 → 교정시설 내의", "8회"], ["(규칙91조) 경기 또는 오락회가 개최되는 경우 소장은 해당 시설의 사정을 고려하여 참석인원, 방법 등을 정할 수 있다. 경기 또는 오락회가 개최되는 경우 소장은 관련 분야의 전문지식과 자격을 가지고 있는 외부강사를 초빙할 수 있다.(  )", "O", "8회"]]}]</script>
<script>

DATA.forEach(function(u,ui){

    var body='<div class="qt">'+esc(it[0])+'</div>';

      var rev=document.createElement('div'); rev.className='rev'; rev.innerHTML='👁 정답·해설 보기';
      var ans=document.createElement('div'); ans.className='ans'; ans.innerHTML='<span class="lab">정답·해설</span>'+esc(it[1]);
      rev.addEventListener('click',function(){var on=ans.classList.toggle('show');rev.innerHTML=on?'🙈 해설 접기':'👁 정답·해설 보기';});
      card.appendChild(rev); card.appendChild(ans);
    }
    quiz.appendChild(card);
  });
});
document.getElementById('cnt').textContent='총 '+total+'문항';
DATA.forEach(function(u,ui){
  var t=document.createElement('div'); t.className='ti';

});
