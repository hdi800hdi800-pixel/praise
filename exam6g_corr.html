<style>
  :root{--paper:#EAEDF2;--surface:#fff;--ink:#1A2230;--muted:#697585;--line:#E1E6EC;--navy:#244A7D;--navy-d:#1A3860;--green:#1B9C53;--red:#D23B3B;--seal:#C8372D;--shadow:0 1px 2px rgba(20,35,55,.05),0 6px 22px rgba(20,35,55,.06);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Pretendard","Pretendard Variable",-apple-system,system-ui,sans-serif;line-height:1.6;padding-bottom:96px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px}
  header{background:linear-gradient(135deg,#1F3F6E,#2C5896);color:#fff;padding:16px;position:sticky;top:0;z-index:30;box-shadow:0 4px 16px rgba(26,56,96,.22)}
  .htop{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .htop h1{font-size:16px;font-weight:800;margin:0;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .seal{width:auto;height:26px;padding:0 7px;border:2px solid #F4C9C4;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800;color:#FBE3E0;transform:rotate(-6deg);flex:none;white-space:nowrap}
  .score{font-size:13px;font-weight:800;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .controls{max-width:640px;margin:12px auto 0;display:flex;gap:8px;align-items:center}
  .ctrl{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:inherit;font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px;cursor:pointer}
  .ctrl.on{background:#fff;color:var(--navy-d)}.spacer{flex:1}
  .bar{height:6px;background:#DDE3EB;border-radius:999px;overflow:hidden;margin:14px 2px 4px}
  .bar i{display:block;height:100%;background:var(--navy);width:0;transition:width .3s}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px 2px;text-align:center}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 16px;margin:14px 0}
  .qnum{display:inline-block;background:var(--navy);color:#fff;font-size:12.5px;font-weight:800;padding:3px 11px;border-radius:7px;margin-bottom:10px}
  .qtext{font-size:15.5px;font-weight:600;letter-spacing:-.2px;margin:0 0 14px;white-space:pre-wrap;word-break:break-word}
  .opt{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:#F7F9FC;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink);transition:.1s;position:relative;line-height:1.55}
  .opt:active{transform:scale(.995)}
  .opt .mk{flex:none;font-weight:800;color:var(--navy);font-size:15px;min-width:20px}
  .opt .tx{flex:1;padding-right:24px}
  .opt.correct{background:#EAF7EF;border-color:#9FD9B6}.opt.correct .mk{color:var(--green)}
  .opt.wrong{background:#FCEDEC;border-color:#EFB7B2}.opt.wrong .mk{color:var(--red)}
  .opt.disabled{cursor:default}
  .stamp{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:23px;font-weight:900;line-height:1;color:var(--seal)}
  .result{margin-top:10px;padding:13px 14px;border-radius:12px;font-size:14px;display:none}
  .result.show{display:block}
  .result.ok{background:#EAF7EF;color:#157A40;border:1px solid #BCE3CB}
  .result.no{background:#FCEDEC;color:#B3322C;border:1px solid #EAC2BE}
  .result b{font-weight:800}
  .retry{margin-top:8px;background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-weight:700;font-size:13px;padding:7px 13px;border-radius:9px;cursor:pointer}
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:640px;margin:0 auto;z-index:25}
  .nav button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;background:var(--navy);color:#fff}
  .nav button.ghost{background:#EEF1F5;color:var(--navy-d);border:1px solid var(--line)}
  .nav button:disabled{opacity:.4}
  .jump{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:700}
  .jump input{width:52px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;text-align:center}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);background:#1A2230;color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head>

<script>
const QUIZDATA=[{"n": 1, "stem": "「형의 집행 및 수용자의 처우에 관한 법률 시행규칙」상 교육에 대한 설명 중 옳지 않은 것은 모두 몇 개인가?\nㄱ. 소장은 교육대상자의 성적불량, 학업태만 등으로 인하여 교육의 목적을 달성하기 어려운 경우에는 그 선발을 취소할 수 있다.\nㄴ. 소장은 교육대상자 및 시험응시 희망자의 학습능력을 평가하기 위하여 자체 평가시험을 실시하여야 한다.\nㄷ. 작업·직업훈련 수형자 등도 독학으로 검정고시·학사고시 등에 응시하게 할 수 있다. 이 경우 자체 평가시험 성적 등을 고려해야 한다.\nㄹ. 소장은 「초·중등교육법」 제51조에 따른 방송통신고등학교 교육과정의 입학금, 수업료, 교과용 도서 구입비 등 교육에 필요한 비용을 예산의 범위에서 지원할 수 있다.\nㅁ. 소장은 개방처우급·완화경비처우급·일반경비처우급·중(重)경비처우급 수형자에게 다문화 시대에 대처할 수 있는 교육기회를 부여하기 위하여 외국어 교육과정을 설치·운영할 수 있다.", "opts": ["2개", "3개", "4개", "5개"], "ans": 1}, {"n": 2, "stem": "형의 집행 및 수용자의 처우에 관한 법령상 독거수용에 대한 설명 중 옳은 것은 모두 몇 개인가? (다툼이 있는 경우 판례에 의함)\nㄱ. 처우상 독거수용은 주간에는 교육·작업 등의 처우를 위하여 일과에 따른 공동생활을 하게 하고 휴업일과 야간에만 독거수용하는 것을 말한다.\nㄴ. 교도관은 처우상 독거수용자를 수시로 시찰하여 건강상 또는 교화상 이상이 없는지 살펴야 한다.\nㄷ. 교도소장의 독거수용 거부 결정은 헌법소원의 대상이 되는 공권력의 행사에 해당하지 않는다.\nㄹ. 소장은 계호상 독거수용자를 계속하여 독거수용하는 것이 건강상 또는 교화상 해롭다고 인정하는 경우에는 이를 즉시 중단하여야 한다.", "opts": ["1개", "2개", "3개", "4개"], "ans": 3}, {"n": 3, "stem": "「형의 집행 및 수용자의 처우에 관한 법률」상 징벌에 대한 설명으로 옳지 않은 것은?", "opts": ["소장은 수용자가 정당한 사유 없이 작업·교육·교화프로그램 등을 거부하거나 태만히 하는 행위를 하면 징벌위원회의 의결에 따라 징벌을 부과할 수 있다.", "소장은 수용자에게 '3개월 이내의 작업장려금 삭감'과 '30일 이내의 신문열람 제한'의 징벌을 함께 부과할 수 있다.", "수용자가 징벌이 집행 중에 있거나 징벌의 집행이 끝난 후 또는 집행이 면제된 후 6개월 내에 다시 징벌사유에 해당하는 행위를 하면 징벌의 종류 중 '경고'를 제외한 나머지 징벌의 장기의 2분의 1까지 가중할 수 있다.", "징벌사유가 발생한 날부터 2년이 지나면 이를 이유로 징벌을 부과하지 못한다."], "ans": 2}, {"n": 4, "stem": "「형의 집행 및 수용자의 처우에 관한 법률 시행규칙」상 범죄횟수에 대한 규정으로 ㉠~㉣에 들어갈 내용을 바르게 연결한 것은?\n제3조(범죄횟수) ① 수용자의 범죄횟수는 징역 또는 금고 이상의 형을 선고받아 확정된 횟수로 한다. 다만, 집행유예의 선고를 받은 사람이 유예기간 중 (㉠)로 범한 죄로 금고 이상의 실형이 확정되지 아니하고 그 기간이 지난 경우에는 집행이 유예된 형은 범죄횟수에 포함하지 아니한다.\n② 형의 집행을 종료하거나 그 집행이 면제된 날부터 다음 각 호의 기간이 지난 경우에는 범죄횟수에 포함하지 아니한다. 다만, 그 기간 중 (㉡) 이상의 형을 선고받아 확정된 경우는 제외한다.\n1. 3년을 초과하는 징역 또는 금고: (㉢)년\n2. 3년 이하의 징역 또는 금고: (㉣)년", "opts": ["㉠고의 또는 과실 ㉡벌금 ㉢7 ㉣3", "㉠고의 ㉡벌금 ㉢10 ㉣5", "㉠고의 또는 과실 ㉡자격정지 ㉢7 ㉣3", "㉠고의 ㉡자격정지 ㉢10 ㉣5"], "ans": 4}, {"n": 5, "stem": "형의 집행 및 수용자의 처우에 관한 법령상 귀휴에 대한 설명으로 옳지 않은 것은? (단, 귀휴 기간은 적법한 것으로 봄)", "opts": ["소장은 30년의 징역형이 확 }
function render(){const area=$("#area");
  if(mode==="all"){$("#nav").style.display="none";area.innerHTML=QUIZDATA.map((q,qi)=>'<div class="qcard">'+optHtml(q,qi)+'</div>').join("");}
  else{$("#nav").style.display="flex";const q=QUIZDATA[idx];area.innerHTML='<div class="qcard">'+optHtml(q,idx)+'</div>';
    $("#prev").disabled=idx===0;$("#next").disabled=idx===QUIZDATA.length-1;$("#jumpIn").value=q.n;
    $("#hint").textContent=(idx+1)+" / "+QUIZDATA.length+"문항";window.scrollTo(0,0);}
  updateScore();}
function pick(qi,n){answered[qi]=n;save();render();}
function retry(qi){delete answered[qi];save();render();}
function go(d){idx=Math.max(0,Math.min(QUIZDATA.length-1,idx+d));render();}
function jump(){const v=parseInt($("#jumpIn").value,10);const i=QUIZDATA.findIndex(q=>q.n===v);if(i>=0){idx=i;render();}else toast("그 번호는 없어요");}
function setMode(m){mode=m;$("#m1").classList.toggle("on",m==="one");$("#m2").classList.toggle("on",m==="all");render();}
function resetAll(){if(!confirm("기록을 지우고 처음부터?"))return;answered={};save();idx=0;render();toast("초기화했어요");}
function updateScore(){let done=Object.keys(answered).length,c=0;for(const k in answered)if(answered[k]===QUIZDATA[k].ans)c++;
  $("#score").textContent=c+" / "+done;$("#barFill").style.width=(done/QUIZDATA.length*100)+"%";}
function save(){try{localStorage.setItem(KEY,JSON.stringify(answered));}catch(e){}}
function load(){try{answered=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){answered={};}}
load();render();
</script>
