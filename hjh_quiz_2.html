<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>형집행법 2회 문제집</title>
<meta name="theme-color" content="#244A7D" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="형집행법 2회 문제집" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{--paper:#EAEDF2;--surface:#FFFFFF;--ink:#1A2230;--muted:#697585;--line:#E1E6EC;
    --navy:#244A7D;--navy-d:#1A3860;--green:#1B9C53;--red:#D23B3B;--seal:#C8372D;
    --shadow:0 1px 2px rgba(20,35,55,.05),0 6px 22px rgba(20,35,55,.06);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard","Pretendard Variable",-apple-system,system-ui,"Apple SD Gothic Neo",sans-serif;
    line-height:1.6;padding-bottom:96px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px}
  header{background:linear-gradient(135deg,#1F3F6E,#2C5896);color:#fff;padding:16px;position:sticky;top:0;z-index:30;box-shadow:0 4px 16px rgba(26,56,96,.22)}
  .htop{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .htop h1{font-size:17px;font-weight:800;margin:0;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .seal{width:30px;height:26px;border:2px solid #F4C9C4;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800;color:#FBE3E0;transform:rotate(-7deg);flex:none;white-space:nowrap;padding:0 2px}
  .score{font-size:13px;font-weight:800;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .controls{max-width:640px;margin:12px auto 0;display:flex;gap:8px;align-items:center}
  .ctrl{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:inherit;font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px;cursor:pointer}
  .ctrl.on{background:#fff;color:var(--navy-d)}
  .spacer{flex:1}
  .bar{height:6px;background:#DDE3EB;border-radius:999px;overflow:hidden;margin:14px 2px 4px}
  .bar i{display:block;height:100%;background:var(--navy);width:0;transition:width .3s}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px 2px;text-align:center}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 16px;margin:14px 0}
  .qnum{display:inline-flex;gap:6px;align-items:center;background:var(--navy);color:#fff;font-size:12.5px;font-weight:800;padding:3px 11px;border-radius:7px;margin-bottom:10px}
  .badge{background:#F4C9C4;color:#7A1F18;font-size:11px;font-weight:800;padding:2px 7px;border-radius:5px;margin-left:6px}
  .qtext{font-size:16px;font-weight:600;letter-spacing:-.2px;margin:0 0 14px;white-space:pre-wrap;word-break:break-word}
  .opt{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:#F7F9FC;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer;font-family:inherit;font-size:14.5px;color:var(--ink);transition:.1s;position:relative;line-height:1.55}
  .opt:active{transform:scale(.995)}
  .opt .mk{flex:none;font-weight:800;color:var(--navy);font-size:15px;min-width:20px}
  .opt .tx{flex:1;padding-right:24px}
  .opt.sel{background:#E8F0FB;border-color:#9DC0EC}
  .opt.correct{background:#EAF7EF;border-color:#9FD9B6}.opt.correct .mk{color:var(--green)}
  .opt.wrong{background:#FCEDEC;border-color:#EFB7B2}.opt.wrong .mk{color:var(--red)}
  .opt.disabled{cursor:default}
  .stamp{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:23px;font-weight:900;line-height:1;color:var(--seal)}
  .check{margin-top:4px;background:var(--navy);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:11px;border-radius:11px;cursor:pointer;width:100%}
  .check:active{transform:scale(.99)}
  .result{margin-top:10px;padding:13px 14px;border-radius:12px;font-size:14px;display:none}
  .result.show{display:block}
  .result.ok{background:#EAF7EF;color:#157A40;border:1px solid #BCE3CB}
  .result.no{background:#FCEDEC;color:#B3322C;border:1px solid #EAC2BE}
  .result.void{background:#FFF7E8;color:#7A5A12;border:1px solid #F1DCA6}
  .result b{font-weight:800}
  .expl{margin-top:8px;font-size:13px;color:#33404F;line-height:1.7;white-space:pre-wrap}
  .retry{margin-top:10px;background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-weight:700;font-size:13px;padding:7px 13px;border-radius:9px;cursor:pointer}
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:640px;margin:0 auto;z-index:25}
  .nav button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;background:var(--navy);color:#fff}
  .nav button.ghost{background:#EEF1F5;color:var(--navy-d);border:1px solid var(--line)}
  .nav button:disabled{opacity:.4}
  .jump{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:700}
  .jump input{width:56px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;text-align:center}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);background:#1A2230;color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1><span class="seal">2회</span> 형집행법 2회 문제집</h1>
    <span class="score" id="score">0 / 0</span>
  </div>
  <div class="controls">
    <button class="ctrl on" id="m1" onclick="setMode('one')">한 문제씩</button>
    <button class="ctrl" id="m2" onclick="setMode('all')">전체 보기</button>
    <span class="spacer"></span>
    <button class="ctrl" onclick="resetAll()">↻ 초기화</button>
  </div>
</header>
<div class="wrap">
  <div class="bar"><i id="barFill"></i></div>
  <p class="hint" id="hint"></p>
  <div id="area"></div>
</div>
<div class="nav" id="nav">
  <button class="ghost" id="prev" onclick="go(-1)">← 이전</button>
  <span class="jump"><input id="jumpIn" type="number" inputmode="numeric"/><button class="ghost" style="flex:none;padding:8px 12px" onclick="jump()">이동</button></span>
  <button id="next" onclick="go(1)">다음 →</button>
</div>
<div class="toast" id="toast"></div>

  let s=new Set(st.sel);
  if(multi){ s.has(n)?s.delete(n):s.add(n); }
  else { s=new Set([n]); }   // 단일정답이면 하나만
  st.sel=[...s]; save();
  if(!multi){ grade(qi); return; }   // 단일정답은 누르면 바로 채점
  render();
}
function grade(qi){
  const st=state[qi]||(state[qi]={sel:[],done:false});
  st.done=true; save(); render();
}
function retry(qi){ state[qi]={sel:[],done:false}; save(); render(); }
function go(d){idx=Math.max(0,Math.min(QUIZDATA.length-1,idx+d));render();}
function jump(){const v=parseInt($("#jumpIn").value,10);const i=QUIZDATA.findIndex(q=>q.n===v);if(i>=0){idx=i;render();}else toast("그 번호는 없어요");}
function setMode(m){mode=m;$("#m1").classList.toggle("on",m==="one");$("#m2").classList.toggle("on",m==="all");render();}
function resetAll(){if(!confirm("모든 기록을 지우고 처음부터?"))return;state={};save();idx=0;render();toast("초기화했어요");}
function updateScore(){
  let done=0,correct=0;
  QUIZDATA.forEach((q,qi)=>{
    const st=state[qi]; if(!st||!st.done)return; done++;
    if(q.atype==="none"){correct++;return;}
    const ans=aset(q), sel=new Set(st.sel);
    if(sel.size===ans.size && [...ans].every(x=>sel.has(x))) correct++;
  });
  $("#score").textContent=correct+" / "+done;
  $("#barFill").style.width=(done/QUIZDATA.length*100)+"%";
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function load(){try{state=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){state={};}}
load();render();
</script>
