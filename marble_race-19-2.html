<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#000; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff; }
  #game { display:block; width:100vw; height:100vh; touch-action:none; }
  #musicBtn { position:fixed; top:10px; left:10px; z-index:30; display:none;
    width:42px; height:42px; border-radius:50%; border:1.5px solid #1f6b4f;
    background:rgba(10,20,30,.55); color:#fff; font-size:19px; cursor:pointer; backdrop-filter:blur(4px); }
  #musicBtn:active { transform:scale(.94); }

  #setup { position:fixed; inset:0; z-index:50;
    background:radial-gradient(circle at 50% 30%, #0a0f1f, #000 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; overflow-y:auto; }
  #setup h1 { font-size:30px; font-weight:900; letter-spacing:1px; text-align:center; margin-bottom:4px;
    color:#fff; text-shadow:0 0 12px #00e5ff, 0 0 28px #00e5ff; }
  #setup .tag { font-size:13px; color:#7fd4ff; margin-bottom:22px; text-shadow:0 0 8px #00aaff; }
  .panel { width:100%; max-width:380px; }
  .panel label { font-size:12px; color:#9fb3c8; display:block; margin-bottom:6px; font-weight:700; letter-spacing:.5px; }
  textarea { width:100%; height:170px; background:#0b1220; color:#eaf6ff; border:1.5px solid #16324d;
    border-radius:14px; padding:14px; font-size:15px; line-height:1.7; resize:none; outline:none;
    box-shadow:inset 0 0 14px rgba(0,160,255,.08); }
  textarea:focus { border-color:#00c2ff; box-shadow:inset 0 0 16px rgba(0,194,255,.18); }
  .hint2 { font-size:11px; color:#5f7488; margin-top:8px; line-height:1.5; }
  .start { width:100%; max-width:380px; margin-top:18px; padding:17px; border:none; cursor:pointer;
    font-size:18px; font-weight:900; letter-spacing:1px; color:#001018;
    background:linear-gradient(135deg,#00e5ff,#7c4dff); border-radius:16px; box-shadow:0 0 24px rgba(0,229,255,.5); }
  .start:active { transform:scale(.98); }
  #replayWrap { position:fixed; left:50%; bottom:38px; transform:translateX(-50%); z-index:40; display:none; }
  #replay { padding:15px 30px; border:none; cursor:pointer; font-size:16px; font-weight:900; color:#001018;
    background:linear-gradient(135deg,#ffe14d,#ff7ce0); border-radius:30px; box-shadow:0 0 24px rgba(255,124,224,.5); }
  #replay:active { transform:scale(.97); }

  /* 게임 종료 후 포스터 (여백 없이 아래에서 위로 슥) */
  #endCard { position:fixed; inset:0; z-index:60; background:#000;
    display:flex; flex-direction:column; overflow-y:auto;
    transform:translateY(100%); transition:transform .85s cubic-bezier(.18,.82,.2,1); }
  #endCard.show { transform:translateY(0); }
  #endCard img { width:100%; display:block; }
  #endCard .contact { text-align:center; font-size:19px; font-weight:800; letter-spacing:.5px;
    padding:18px 12px; color:#fff; background:#0a0f1f; }
  #endCard .endReplay { display:block; margin:0 auto 26px; padding:14px 34px; border:none; cursor:pointer;
    font-size:16px; font-weight:900; color:#001018;
    background:linear-gradient(135deg,#ffe14d,#ff7ce0); border-radius:30px; box-shadow:0 0 24px rgba(255,124,224,.5); }
  #endCard .endReplay:active { transform:scale(.97); }

  .gh-overlay{position:fixed;inset:0;background:rgba(20,20,40,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
  .gh-overlay.show{opacity:1;pointer-events:auto}
  .gh-card{background:#fff;color:#1a1a2e;border-radius:20px;width:100%;max-width:360px;padding:24px 20px 20px;text-align:center;transform:translateY(20px);transition:transform .3s;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .gh-overlay.show .gh-card{transform:translateY(0)}
  .gh-emoji{font-size:44px;margin-bottom:8px}
  .gh-card h2{font-size:18px;font-weight:800;margin-bottom:6px}
  .gh-card .gh-desc{font-size:13px;color:#777;line-height:1.5;margin-bottom:16px}
  .gh-linkbox{background:#f0f4ff;border-radius:12px;padding:10px 12px;margin-bottom:14px;text-align:left}
  .gh-linkbox .gh-label{font-size:10px;color:#2F5BEA;font-weight:700;letter-spacing:.5px}
  .gh-linkbox .gh-val{font-size:12px;color:#333;word-break:break-all;margin-top:2px}
  .gh-btn{display:block;width:100%;text-decoration:none;background:linear-gradient(135deg,#2F5BEA,#6a1b9a);color:#fff;font-size:15px;font-weight:800;padding:15px;border-radius:14px;margin-bottom:10px;border:none;cursor:pointer}
  .gh-btn:active{opacity:.85}
  .gh-btn.netlify{background:linear-gradient(135deg,#00ad9f,#00c7b7)}
  .gh-btn.copy{background:#fff;color:#2F5BEA;border:2px solid #2F5BEA}
  .gh-close{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;margin-top:4px;text-decoration:underline}
  .gh-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;z-index:10000;opacity:0;transition:opacity .3s;pointer-events:none}
  .gh-toast.show{opacity:1}
</style>

<body>
<canvas id="game"></canvas>
<button id="musicBtn" title="음악 켜기/끄기">🔊</button>

<div id="setup">
  <h1>청나잇퀴즈게임</h1>
  <div class="tag">이름 붙인 공들이 굴러떨어져 1등을 가려요 🏁</div>
  <div class="panel">
    <label>참가자 이름 (한 줄에 한 명, 2~12명)</label>
    <textarea id="names" placeholder="이름을 한 줄에 한 명씩 입력하세요&#10;(예시)&#10;홍길동&#10;김철수"></textarea>
    <div class="hint2">맨 위가 #1 공이에요. 이름을 자유롭게 바꿔보세요.</div>
  </div>
  <button class="start" id="startBtn">레이스 시작 🚀</button>
</div>

<div id="replayWrap"><button id="replay">다시 하기 🔄</button></div>

    <div class="gh-desc">이 파일을 업로드하면 아래 주소로<br>모두가 열어볼 수 있어요.</div>
    <div class="gh-linkbox">
      <div class="gh-label">GITHUB 공유 링크</div>
      <div class="gh-val" id="ghLink"></div>
    </div>
    <button class="gh-btn netlify" id="ghNetlify">⚡ Netlify Drop으로 빠르게 (드래그)</button>
    <button class="gh-btn" id="ghGithub">🐙 GitHub에 업로드하기</button>
    <button class="gh-btn copy" id="ghCopy">🔗 공유 링크 복사</button>
    <button class="gh-close" id="ghClose">닫기</button>
  </div>
</div>
<div class="gh-toast" id="ghToast">복사됨!</div>

<script>
/* ===================== 마블 레이스 엔진 ===================== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, dpr = 1;
let balls = [], pegs = [];
let running = false, rafId = null, lastT = 0;
let finishY = 0, finishZoneY = 0;
let winner = null, winBannerT = 0;

const COLORS = ['#ff5d73','#ffd23f','#3ddc97','#4dabff','#b388ff',
                '#ff8a3d','#41ead4','#ff79c6','#8aff80','#7c9bff',
                '#ffb86c','#ff6ec7'];

/* --- 속도 관련 튜닝값 (요청 4: 결승점 속도 더 빠르게) --- */
const GRAVITY = 1750;        // 기본 중력 (살짝 상향)
const FINISH_BOOST = 1.15;   // 결승 구간에서 추가 가속 → 마무리가 더 빠름
const MAX_V = 2900;          // 최고 속도 제한
const SUBSTEPS = 3;

function sizeCanvas(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function buildBoard(n){
  pegs = [];
  finishY = H * 0.90;
  finishZoneY = H * 0.74;
  const topPad = H * 0.18;
  const bottomPad = H * 0.10;
  const usableH = (H - topPad - bottomPad);
  const rows = Math.max(7, Math.round(usableH / 64));
  const rowGap = usableH / rows;
  const colGap = Math.max(46, W / 7);
  const pegR = Math.max(4, Math.min(7, W/90));
  for (let r = 0; r < rows; r++){
    const y = topPad + r * rowGap;
    const offset = (r % 2 === 0) ? colGap/2 : 0;
    for (let x = offset + 6; x < W - 6; x += colGap){
      pegs.push({ x, y, r: pegR });
    }
  }
}

function buildBalls(names){
  balls = [];
  const n = names.length;
  const r = Math.max(10, Math.min(18, W/24));
  const startTop = H * 0.05;
  for (let i = 0; i < n; i++){
    const x = (W / (n + 1)) * (i + 1);
    balls.push({
      x, y: startTop + (Math.random()*8 - 4),
      vx: (Math.random()*60 - 30), vy: 0,
      r, color: COLORS[i % COLORS.length],
      name: names[i], num: i + 1,
      finished: false
    });
  }
}

function clampV(b){
  const sp = Math.hypot(b.vx, b.vy);
  if (sp > MAX_V){ const k = MAX_V/sp; b.vx*=k; b.vy*=k; }
}

function step(sdt){
  for (const b of balls){
    if (b.finished) continue;
    // 중력 + 결승 구간 가속
    let g = GRAVITY;
    if (b.y > finishZoneY) g *= (1 + FINISH_BOOST);
    b.vy += g * sdt;
    b.vx += (Math.random()*40 - 20) * sdt; // 약한 흔들림으로 끼임 방지
    clampV(b);
    b.x += b.vx * sdt;
    b.y += b.vy * sdt;

    // 좌우 벽
    if (b.x < b.r){ b.x = b.r; b.vx = Math.abs(b.vx) * 0.6; }
    if (b.x > W - b.r){ b.x = W - b.r; b.vx = -Math.abs(b.vx) * 0.6; }

    // 핀 충돌
    for (const p of pegs){
      const dx = b.x - p.x, dy = b.y - p.y;
      const d2 = dx*dx + dy*dy;
      const rr = b.r + p.r;
      if (d2 < rr*rr){
        const d = Math.sqrt(d2) || 0.001;
        const nx = dx/d, ny = dy/d;
        const overlap = rr - d;
        b.x += nx * overlap; b.y += ny * overlap;
        const vn = b.vx*nx + b.vy*ny;
        b.vx -= (1 + 0.55) * vn * nx;
        b.vy -= (1 + 0.55) * vn * ny;
        b.vx += (Math.random()*120 - 60); // 살짝 튀게
      }
    }

    // 결승선 통과 → 첫 통과자가 1등
    if (!b.finished && b.y >= finishY){
      b.finished = true; b.y = finishY;
      if (!winner){ winner = b; endRace(); }
    }
  }

  // 공끼리 충돌
  for (let i=0;i<balls.length;i++){
    for (let j=i+1;j<balls.length;j++){
      const a = balls[i], c = balls[j];
      if (a.finished || c.finished) continue;
      const dx = c.x-a.x, dy = c.y-a.y;
      const d2 = dx*dx+dy*dy, rr = a.r+c.r;
      if (d2 < rr*rr && d2 > 0){
        const d = Math.sqrt(d2);
        const nx = dx/d, ny = dy/d;
        const overlap = (rr-d)/2;
        a.x -= nx*overlap; a.y -= ny*overlap;
        c.x += nx*overlap; c.y += ny*overlap;
        const avn = a.vx*nx + a.vy*ny;
        const cvn = c.vx*nx + c.vy*ny;
        const diff = (cvn - avn);
        a.vx += diff*nx*0.8; a.vy += diff*ny*0.8;
        c.vx -= diff*nx*0.8; c.vy -= diff*ny*0.8;
      }
    }
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // 배경
  const grd = ctx.createRadialGradient(W/2,H*0.3,40,W/2,H*0.3,Math.max(W,H));
  grd.addColorStop(0,'#0a0f1f'); grd.addColorStop(1,'#000');
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

  // 결승선
  ctx.strokeStyle = 'rgba(0,229,255,.5)';
  ctx.lineWidth = 2; ctx.setLineDash([10,8]);
  ctx.beginPath(); ctx.moveTo(0,finishY); ctx.lineTo(W,finishY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(0,229,255,.7)'; ctx.font = '700 13px sans-serif';
  ctx.textAlign='left'; ctx.fillText('🏁 결승선', 10, finishY - 8);

  // 핀
  ctx.fillStyle = 'rgba(150,180,220,.45)';
  for (const p of pegs){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }

  // 공
  for (const b of balls){
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color; ctx.shadowBlur = 14;
    ctx.fill(); ctx.shadowBlur = 0;
    // 번호
    ctx.fillStyle = '#001018'; ctx.font = '900 '+Math.round(b.r*0.95)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.num, b.x, b.y);
    // 이름
    ctx.fillStyle = '#eaf6ff'; ctx.font = '700 12px sans-serif';
    ctx.textBaseline='alphabetic';
    ctx.fillText(b.name, b.x, b.y - b.r - 5);
  }

  // 우승 배너
  if (winner && winBannerT > 0){
    ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle = '#ffe14d'; ctx.font = '900 46px sans-serif';
    ctx.shadowColor='#ff7ce0'; ctx.shadowBlur=24;
    ctx.fillText('🏆 1등!', W/2, H*0.42);
    ctx.fillStyle = '#fff'; ctx.font = '900 30px sans-serif';
    ctx.fillText(winner.name, W/2, H*0.42 + 44);
    ctx.shadowBlur=0;
  }
}

function loop(now){
  if (!lastT) lastT = now;
  let dt = (now - lastT) / 1000; lastT = now;
  if (dt > 0.033) dt = 0.033;
  if (running){
    const sdt = dt / SUBSTEPS;
    for (let s=0;s<SUBSTEPS;s++) step(sdt);
  }
  if (winner && winBannerT > 0) winBannerT -= dt;
  draw();
  rafId = requestAnimationFrame(loop);
}

function startRace(names){
  document.getElementById('setup').style.display = 'none';
  document.getElementById('musicBtn').style.display = 'block';
  sizeCanvas();
  buildBoard(names.length);
  buildBalls(names);
  winner = null; winBannerT = 0; running = true; lastT = 0;
  if (!rafId) rafId = requestAnimationFrame(loop);
}

function endRace(){
  running = false;
  winBannerT = 1.6; // 우승 배너 표시 시간(초)
  setTimeout(showEndCard, 1700);
}

function showEndCard(){
  document.getElementById('musicBtn').style.display = 'none';
  document.getElementById('endCard').classList.add('show');
}

function resetToSetup(){
  document.getElementById('endCard').classList.remove('show');
  winner = null; winBannerT = 0; balls = []; running = false;
  document.getElementById('setup').style.display = 'flex';
}

/* 시작 버튼 */
document.getElementById('startBtn').addEventListener('click', () => {
  const raw = document.getElementById('names').value;
  const names = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length < 2){ alert('참가자를 2명 이상 입력해 주세요.'); return; }
  if (names.length > 12){ alert('참가자는 최대 12명까지예요.'); return; }
  startRace(names);
});
document.getElementById('endReplay').addEventListener('click', resetToSetup);
document.getElementById('replay').addEventListener('click', resetToSetup);

window.addEventListener('resize', () => {
  if (running || (balls && balls.length)){ sizeCanvas(); }
});

/* ===================== 배경 음악 (간단 WebAudio) ===================== */
let actx = null, musicOn = false, musicTimer = null;
const NOTES = [523.25,659.25,783.99,659.25]; // C E G E
function startMusic(){
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  musicOn = true; let i = 0;
  const playNote = () => {
    if (!musicOn) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = NOTES[i % NOTES.length];
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.06, actx.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.45);
    o.connect(g).connect(actx.destination);
    o.start(); o.stop(actx.currentTime + 0.5);
    i++; musicTimer = setTimeout(playNote, 480);
  };
  playNote();
}
function stopMusic(){ musicOn = false; if (musicTimer) clearTimeout(musicTimer); }
document.getElementById('musicBtn').addEventListener('click', () => {
  if (musicOn){ stopMusic(); document.getElementById('musicBtn').textContent = '🔇'; }
  else { startMusic(); document.getElementById('musicBtn').textContent = '🔊'; }
});

/* ===================== 업로드 안내 팝업 ===================== */
(function(){
  const host = location.hostname || '';
  if (host.endsWith('github.io') || host.endsWith('netlify.app')) return; // 공유 링크로 열면 숨김
  let file = (location.pathname.split('/').pop() || 'index.html');
  if (!file) file = 'index.html';
  const share = 'https://hdi800hdi800-pixel.github.io/praise/' + file;
  setTimeout(() => {
    document.getElementById('ghLink').textContent = share;
    document.getElementById('ghOverlay').classList.add('show');
  }, 600);
  document.getElementById('ghNetlify').onclick = () => window.open('https://app.netlify.com/drop','_blank');
  document.getElementById('ghGithub').onclick = () => window.open('https://github.com/hdi800hdi800-pixel/praise/upload/main','_blank');
  document.getElementById('ghCopy').onclick = () => {
    navigator.clipboard && navigator.clipboard.writeText(share);
    const t = document.getElementById('ghToast'); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1400);
  };
  document.getElementById('ghClose').onclick = () => document.getElementById('ghOverlay').classList.remove('show');
})();

/* 초기 캔버스 사이즈 */
sizeCanvas();
</script>
</body>
