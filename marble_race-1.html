<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>네온 마블 레이스 🎱</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#000; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff; }
  #game { display:block; width:100vw; height:100vh; touch-action:none; }

  #musicBtn {
    position:fixed; top:10px; left:10px; z-index:30; display:none;
    width:42px; height:42px; border-radius:50%; border:1.5px solid #1f6b4f;
    background:rgba(10,20,30,.55); color:#fff; font-size:19px; cursor:pointer;
    backdrop-filter:blur(4px);
  }
  #musicBtn:active { transform:scale(.94); }

  /* setup screen */
  #setup {
    position:fixed; inset:0; z-index:50; background:radial-gradient(circle at 50% 30%, #0a0f1f, #000 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
    overflow-y:auto;
  }
  #setup h1 {
    font-size:30px; font-weight:900; letter-spacing:1px; text-align:center; margin-bottom:4px;
    color:#fff; text-shadow:0 0 12px #00e5ff, 0 0 28px #00e5ff;
  }
  #setup .tag { font-size:13px; color:#7fd4ff; margin-bottom:22px; text-shadow:0 0 8px #00aaff; }
  .panel { width:100%; max-width:380px; }
  .panel label { font-size:12px; color:#9fb3c8; display:block; margin-bottom:6px; font-weight:700; letter-spacing:.5px; }
  textarea {
    width:100%; height:200px; background:#0b1220; color:#eaf6ff; border:1.5px solid #16324d;
    border-radius:14px; padding:14px; font-size:15px; line-height:1.7; resize:none; outline:none;
    box-shadow:inset 0 0 14px rgba(0,160,255,.08);
  }
  textarea:focus { border-color:#00c2ff; box-shadow:inset 0 0 16px rgba(0,194,255,.18); }
  .hint2 { font-size:11px; color:#5f7488; margin-top:8px; line-height:1.5; }
  .start {
    width:100%; max-width:380px; margin-top:18px; padding:17px; border:none; cursor:pointer;
    font-size:18px; font-weight:900; letter-spacing:1px; color:#001018;
    background:linear-gradient(135deg,#00e5ff,#7c4dff); border-radius:16px;
    box-shadow:0 0 24px rgba(0,229,255,.5);
  }
  .start:active { transform:scale(.98); }

  /* result overlay button */
  #replayWrap {
    position:fixed; left:50%; bottom:38px; transform:translateX(-50%); z-index:40; display:none;
  }
  #replay {
    padding:15px 30px; border:none; cursor:pointer; font-size:16px; font-weight:900; color:#001018;
    background:linear-gradient(135deg,#ffe14d,#ff7ce0); border-radius:30px; box-shadow:0 0 24px rgba(255,124,224,.5);
  }
  #replay:active { transform:scale(.97); }

  /* ===== 업로드 자동안내 팝업 ===== */
  .gh-overlay{position:fixed;inset:0;background:rgba(20,20,40,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
  .gh-overlay.show{opacity:1;pointer-events:auto}
  .gh-card{background:#fff;color:#1a1a2e;border-radius:20px;width:100%;max-width:360px;padding:24px 20px 20px;text-align:center;transform:translateY(20px);transition:transform .3s;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .gh-overlay.show .gh-card{transform:translateY(0)}
  .gh-emoji{font-size:44px;margin-bottom:8px}
  .gh-card h2{font-size:18px;font-weight:800;margin-bottom:6px}
  .gh-card .gh-desc{font-size:13px;color:#777;line-height:1.5;margin-bottom:16px}
  .gh-linkbox{background:#f0f4ff;border-radius:12px;padding:10px 12px;margin-bottom:14px;text-align:left}
  .gh-linkbox .gh-label{font-size:10px;color:#2F5BEA;font-weight:700;letter-spacing:.5px}
  .gh-linkbox .gh-val{font-size:12px;color:#333;word-break:break-all;margin-top:2px}
  .gh-btn{display:block;width:100%;text-decoration:none;background:linear-gradient(135deg,#2F5BEA,#6a1b9a);color:#fff;font-size:15px;font-weight:800;padding:15px;border-radius:14px;margin-bottom:10px;border:none;cursor:pointer}
  .gh-btn:active{opacity:.85}
  .gh-btn.netlify{background:linear-gradient(135deg,#00ad9f,#00c7b7)}
  .gh-btn.copy{background:#fff;color:#2F5BEA;border:2px solid #2F5BEA}
  .gh-close{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;margin-top:4px;text-decoration:underline}
  .gh-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;z-index:10000;opacity:0;transition:opacity .3s;pointer-events:none}
  .gh-toast.show{opacity:1}
</style>

<body>

<canvas id="game"></canvas>

<button id="musicBtn" title="음악 켜기/끄기">🔊</button>

<div id="setup">
  <h1>네온 마블 레이스</h1>
  <div class="tag">이름 붙인 공들이 굴러떨어져 1등을 가려요 🏁</div>
  <div class="panel">
    <label>참가자 이름 (한 줄에 한 명, 2~12명)</label>
    <textarea id="names">김유석
성은정
김성령</textarea>
    <div class="hint2">맨 위가 #1 공이에요. 이름을 자유롭게 바꿔보세요.</div>
  </div>
  <button class="start" id="startBtn">레이스 시작 🚀</button>
</div>

<div id="replayWrap"><button id="replay">다시 하기 🔄</button></div>

<!-- 업로드 자동안내 팝업 -->
<div class="gh-overlay" id="ghOverlay">
  <div class="gh-card">
    <div class="gh-emoji">📤</div>
    <h2>GitHub에 올릴 차례!</h2>
    <div class="gh-desc">이 파일을 올리면 카톡 공유 링크가 생겨요.<br>빠르게 하려면 <b>Netlify</b>, 영구 보관은 <b>GitHub</b>!</div>
    <div class="gh-linkbox"><div class="gh-label">📁 업로드할 파일</div><div class="gh-val" id="ghFile">파일명.html</div></div>
    <div class="gh-linkbox"><div class="gh-label">🌐 업로드 후 공유 링크</div><div class="gh-val" id="ghPages">링크</div></div>
    <a class="gh-btn" href="https://github.com/hdi800hdi800-pixel/praise/upload/main" target="_blank">📤 GitHub 업로드 페이지 열기</a>

  </div>
</div>
<div class="gh-toast" id="ghToast">복사됐어요!</div>

<script>
/* ===================== 게임 ===================== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let DPR = Math.min(window.devicePixelRatio || 1, 2);
let CW = 0, CH = 0;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  CW = window.innerWidth; CH = window.innerHeight;
  canvas.width = CW * DPR; canvas.height = CH * DPR;
  canvas.style.width = CW + 'px'; canvas.style.height = CH + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// 네온 색 팔레트
const PALETTE = ['#b8ff3d','#ff4dd2','#7c9bff','#ff6ec7','#5dffd0','#5fd0ff','#c77dff','#ff6b6b','#ffd24d','#4dff9e','#ff9a4d','#4dd2ff'];

// 월드 (논리 좌표)
const W = 480;            // 코스 폭
const WALL = 18;          // 좌우 벽 두께 안쪽 여백
let H = 0;                // 코스 전체 높이
let finishY = 0;
let walls = [];           // {ax,ay,bx,by}
let pegs = [];            // {x,y,r}
let spinners = [];        // {cx,cy,len,ang,w,th}
let balls = [];
let finishOrder = [];
let running = false;
let startTime = 0;

const R = 13;             // 공 반지름
const PEG_R = 15;

function seg(ax,ay,bx,by){ walls.push({ax,ay,bx,by}); }

function buildTrack(){
  walls=[]; pegs=[]; spinners=[];
  const L = WALL, Rt = W-WALL;
  let y = 60;

  // 시작 깔때기
  seg(L, y, L, y+1100);          // 좌측 벽 (구간별로 이어 그림)
  // 우측 벽도 전체로
  // (좌우 외벽은 마지막에 통째로 그림)

  // --- 구간 A: 핀볼 핀 필드 ---
  let ay0 = 320, ay1 = 1180;
  for(let row=0, yy=ay0; yy<ay1; yy+=110, row++){
    const offset = (row%2)? 70 : 0;
    for(let xx = 70+offset; xx < W-50; xx += 140){
      pegs.push({x:xx, y:yy, r:PEG_R});
    }
  }

  // --- 구간 B: 지그재그 채널 ---
  let by = 1260;
  let dir = 1;
  for(let i=0;i<5;i++){
    const top = by + i*180;
    // 번갈아 튀어나온 경사벽
    if(dir>0){
      seg(L+40, top, W*0.72, top+150);
    } else {
      seg(Rt-40, top, W*0.28, top+150);
    }
    dir *= -1;
  }

  // --- 구간 C: 회전 바 ---
  let cy = 2280;
  spinners.push({cx:W*0.32, cy:cy,      len:120, ang:0,   w:0.045, th:14});
  spinners.push({cx:W*0.68, cy:cy+40,   len:120, ang:1.2, w:-0.05, th:14});
  spinners.push({cx:W*0.5,  cy:cy+360,  len:150, ang:0.6, w:0.04,  th:14});

  // --- 구간 D: 핀 필드 2 ---
  let dy0 = 2980, dy1 = 3760;
  for(let row=0, yy=dy0; yy<dy1; yy+=105, row++){
    const offset = (row%2)? 65 : 0;
    for(let xx = 60+offset; xx < W-45; xx += 130){
      pegs.push({x:xx, y:yy, r:PEG_R});
    }
  }

  // --- 구간 E: 결승 깔때기 ---
  let ey = 3860;
  seg(L, ey, W*0.5-34, ey+300);
  seg(Rt, ey, W*0.5+34, ey+300);
  finishY = ey + 330;
  H = ey + 520;

  // 좌우 외벽 (전체)
  walls = walls.filter(()=>true); // keep internal
  seg(L, 60, L, H);   // 왼쪽 외벽
  seg(Rt, 60, Rt, H); // 오른쪽 외벽
  // 천장(시작 위 닫기)
  seg(L, 60, Rt, 60);
}

function makeBalls(names){
  balls = []; finishOrder = [];
  names.forEach((nm,i)=>{
    const x = WALL+30 + Math.random()*(W-2*WALL-60);
    balls.push({
      name:nm, color:PALETTE[i%PALETTE.length],
      x:x, y:90 + Math.random()*40,
      vx:(Math.random()-0.5)*1.2, vy:0,
      r:R, finished:false, place:0
    });
  });
}

// ---------- 사운드 (Web Audio, 외부파일 없음) ----------
const Audio2 = {
  ctx:null, master:null, musicG:null, muted:false, started:false,
  nextTime:0, step16:0, timer:null, lastBlip:0,
  init(){
    if(this.started) return;
    try{
      const AC = window.AudioContext||window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain(); this.master.gain.value=0.0;
      this.master.connect(this.ctx.destination);
      this.musicG = this.ctx.createGain(); this.musicG.gain.value=0.16;
      this.musicG.connect(this.master);
      this.started=true;
      // 부드럽게 페이드 인
      this.master.gain.setValueAtTime(0, this.ctx.currentTime);
      this.master.gain.linearRampToValueAtTime(this.muted?0:0.9, this.ctx.currentTime+1.2);
      this.startMusic();
    }catch(e){ /* 오디오 미지원 시 무음 */ }
  },
  // 신스 음 하나
  note(freq, t, dur, type, gain, dest){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||'triangle'; o.frequency.value=freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0008, t+dur);
    o.connect(g); g.connect(dest||this.musicG);
    o.start(t); o.stop(t+dur+0.02);
  },
  kick(t){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(125, t);
    o.frequency.exponentialRampToValueAtTime(45, t+0.12);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.16);
    o.connect(g); g.connect(this.musicG);
    o.start(t); o.stop(t+0.18);
  },
  startMusic(){
    // Am - F - C - G 진행, 8스텝씩
    const ARP = [
      [220,261.63,329.63],   // Am
      [174.61,220,261.63],   // F
      [261.63,329.63,392],   // C
      [196,246.94,293.66]    // G
    ];
    const BASS=[110,87.31,130.81,98];
    const tempo=118, sixteenth=15/tempo; // 60/tempo/4
    this.nextTime=this.ctx.currentTime+0.1; this.step16=0;
    const self=this;
    const lookahead=()=>{
      if(!self.ctx) return;
      while(self.nextTime < self.ctx.currentTime+0.12){
        const s=self.step16, block=Math.floor(s/8)%4, inBlock=s%8;
        const chord=ARP[block];
        // 아르페지오 (16분마다 코드음 순회, 가끔 옥타브 업)
        const n=chord[inBlock%chord.length]*((inBlock>=6)?2:1);
        self.note(n, self.nextTime, 0.18, 'triangle', 0.5);
        // 베이스 (블록 시작과 중간)
        if(inBlock===0||inBlock===4) self.note(BASS[block], self.nextTime, 0.42, 'sawtooth', 0.32);
        // 킥 (4분음표)
        if(s%4===0) self.kick(self.nextTime);
        self.nextTime += sixteenth;
        self.step16 = (self.step16+1)%32;
      }
    };
    this.timer=setInterval(lookahead, 25);
  },
  blip(strength){
    if(!this.ctx||this.muted) return;
    const now=this.ctx.currentTime;
    if(now-this.lastBlip < 0.06) return;
    this.lastBlip=now;
    const f=420 + Math.random()*520;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='square'; o.frequency.value=f;
    const vol=Math.min(0.14, 0.04+(strength||0)*0.01);
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.07);
    o.connect(g); g.connect(this.master);
    o.start(now); o.stop(now+0.09);
  },
  fanfare(){
    if(!this.ctx) return;
    const t0=this.ctx.currentTime;
    const seq=[523.25,659.25,783.99,1046.5];
    seq.forEach((f,i)=> this.note(f, t0+i*0.13, 0.5, 'triangle', 0.5, this.master));
    this.note(1046.5, t0+0.55, 0.9, 'triangle', 0.45, this.master);
  },
  toggle(){
    this.muted=!this.muted;
    if(this.master&&this.ctx){
      this.master.gain.cancelScheduledValues(this.ctx.currentTime);
      this.master.gain.linearRampToValueAtTime(this.muted?0:0.9, this.ctx.currentTime+0.2);
    }
    return this.muted;
  }
};

// ---------- 물리 ----------
const GRAV = 0.32;
const REST = 0.55;       // 반발
const MAXV = 16;
const SUBSTEPS = 6;

function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

function collideSeg(b, ax,ay,bx,by, rest, addVx, addVy){
  const abx=bx-ax, aby=by-ay;
  const len2 = abx*abx+aby*aby || 1e-6;
  let t = ((b.x-ax)*abx + (b.y-ay)*aby)/len2;
  t = clamp(t,0,1);
  const cx=ax+abx*t, cy=ay+aby*t;
  let dx=b.x-cx, dy=b.y-cy;
  let d=Math.hypot(dx,dy);
  const minD = b.r;
  if(d<minD){
    if(d<1e-6){ dx=0; dy=-1; d=1; }
    const nx=dx/d, ny=dy/d;
    b.x = cx+nx*minD; b.y = cy+ny*minD;
    const vn = b.vx*nx + b.vy*ny;
    if(vn<0){
      b.vx -= (1+rest)*vn*nx;
      b.vy -= (1+rest)*vn*ny;
      if(-vn>2) sfxHit = Math.max(sfxHit, -vn);
    }
    if(addVx||addVy){ b.vx += addVx; b.vy += addVy; }
  }
}

function collidePeg(b, p){
  let dx=b.x-p.x, dy=b.y-p.y;
  let d=Math.hypot(dx,dy);
  const minD=b.r+p.r;
  if(d<minD){
    if(d<1e-6){ dx=0; dy=-1; d=1; }
    const nx=dx/d, ny=dy/d;
    b.x=p.x+nx*minD; b.y=p.y+ny*minD;
    const vn=b.vx*nx+b.vy*ny;
    if(vn<0){ b.vx-=(1+REST)*vn*nx; b.vy-=(1+REST)*vn*ny; if(-vn>2) sfxHit=Math.max(sfxHit,-vn); }
  }
}

function ballBall(a,b){
  let dx=b.x-a.x, dy=b.y-a.y;
  let d=Math.hypot(dx,dy);
  const minD=a.r+b.r;
  if(d<minD){
    if(d<1e-6){ dx=Math.random()-0.5; dy=Math.random()-0.5; d=Math.hypot(dx,dy)||1; }
    const nx=dx/d, ny=dy/d;
    const overlap=(minD-d)/2;
    a.x-=nx*overlap; a.y-=ny*overlap;
    b.x+=nx*overlap; b.y+=ny*overlap;
    // 속도 교환(탄성, 동일 질량)
    const va=a.vx*nx+a.vy*ny;
    const vb=b.vx*nx+b.vy*ny;
    const diff=vb-va;
    a.vx+=diff*nx; a.vy+=diff*ny;
    b.vx-=diff*nx; b.vy-=diff*ny;
  }
}

function step(){
  // 스피너 각도 갱신
  for(const s of spinners) s.ang += s.w;
  sfxHit = 0;

  for(let sub=0; sub<SUBSTEPS; sub++){
    for(const b of balls){
      if(b.finished) { // 완주 후엔 그냥 아래로 흘려보냄
        b.vy += GRAV; b.y += b.vy/SUBSTEPS; continue;
      }
      b.vy += GRAV/SUBSTEPS;
      // 속도 제한
      const sp=Math.hypot(b.vx,b.vy);
      if(sp>MAXV){ b.vx*=MAXV/sp; b.vy*=MAXV/sp; }
      b.x += b.vx/SUBSTEPS;
      b.y += b.vy/SUBSTEPS;

      // 벽
      for(const w of walls) collideSeg(b, w.ax,w.ay,w.bx,w.by, REST);
      // 핀
      for(const p of pegs){
        if(Math.abs(p.y-b.y)<60) collidePeg(b,p);
      }
      // 스피너
      for(const s of spinners){
        const c=Math.cos(s.ang), sn=Math.sin(s.ang);
        const hx=c*s.len/2, hy=sn*s.len/2;
        const ax=s.cx-hx, ay=s.cy-hy, bx=s.cx+hx, by=s.cy+hy;
        // 회전 방향 임펄스 (접선)
        const push = s.w*40;
        collideSeg(b, ax,ay,bx,by, 0.7, -sn*push, c*push);
      }
    }
    // 공끼리
    for(let i=0;i<balls.length;i++){
      for(let j=i+1;j<balls.length;j++){
        if(balls[i].finished||balls[j].finished) continue;
        ballBall(balls[i],balls[j]);
      }
    }
  }

  // 완주 판정
  for(const b of balls){
    if(!b.finished && b.y>finishY){
      b.finished=true; b.place=finishOrder.length+1;
      finishOrder.push(b);
    }
  }
  // 충돌 효과음
  if(sfxHit>0) Audio2.blip(sfxHit);
}
let sfxHit = 0;

// ---------- 카메라 ----------
let camY = 0;
function updateCamera(){
  // 선두(가장 아래) 활성 공
  let lead = null;
  for(const b of balls){ if(!b.finished && (!lead || b.y>lead.y)) lead=b; }
  if(!lead){ // 모두 완주
    let last=balls[0]; for(const b of balls) if(b.y>last.y) last=b; lead=last;
  }
  const target = lead.y - CH*0.42;
  camY += (target-camY)*0.12;
  camY = clamp(camY, 0, Math.max(0,H-CH));
}

// ---------- 렌더 ----------
let scale=1, offX=0;
function worldToScreen(){
  // 코스 폭 W를 화면 폭에 맞추되 최대치 제한 (가독성)
  const maxColW = Math.min(CW, 560);
  scale = maxColW / W;
  offX = (CW - W*scale)/2;
}

function sx(x){ return offX + x*scale; }
function sy(y){ return (y-camY)*scale; }

function drawGlowLine(ax,ay,bx,by,color,width,blur){
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=width; ctx.lineCap='round';
  ctx.shadowColor=color; ctx.shadowBlur=blur;
  ctx.beginPath(); ctx.moveTo(sx(ax),sy(ay)); ctx.lineTo(sx(bx),sy(by)); ctx.stroke();
  ctx.restore();
}
function drawGlowRing(x,y,r,color,width,blur){
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.shadowColor=color; ctx.shadowBlur=blur;
  ctx.beginPath(); ctx.arc(sx(x),sy(y),r*scale,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);

  // 벽
  for(const w of walls){
    if(Math.max(w.ay,w.by)<camY-40 || Math.min(w.ay,w.by)>camY+CH/scale+40) continue;
    drawGlowLine(w.ax,w.ay,w.bx,w.by,'#ffffff',3,10);
  }
  // 핀 (노란 링)
  for(const p of pegs){
    if(p.y<camY-30 || p.y>camY+CH/scale+30) continue;
    drawGlowRing(p.x,p.y,p.r,'#ffe14d',3.5,16);
  }
  // 스피너 (시안 바)
  for(const s of spinners){
    if(s.cy<camY-120 || s.cy>camY+CH/scale+120) continue;
    const c=Math.cos(s.ang), sn=Math.sin(s.ang);
    const hx=c*s.len/2, hy=sn*s.len/2;
    drawGlowLine(s.cx-hx,s.cy-hy,s.cx+hx,s.cy+hy,'#22e6ff',s.th,18);
  }
  // 결승선
  if(finishY>camY-20 && finishY<camY+CH/scale+20){
    drawGlowLine(WALL,finishY,W-WALL,finishY,'#ff3df0',3,14);
  }

  // 공
  for(const b of balls){
    if(b.y<camY-40 || b.y>camY+CH/scale+60) continue;
    ctx.save();
    ctx.shadowColor=b.color; ctx.shadowBlur=20;
    ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(sx(b.x),sy(b.y),b.r*scale,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='#ff2d55'; ctx.stroke();
    ctx.restore();
    // 이름
    ctx.save();
    ctx.font='700 '+Math.round(13)+'px sans-serif';
    ctx.textAlign='center'; ctx.fillStyle=b.color;
    ctx.shadowColor=b.color; ctx.shadowBlur=8;
    ctx.fillText(b.name, sx(b.x), sy(b.y)+b.r*scale+15);
    ctx.restore();
  }

  drawMinimap();
  drawLeaderboard();
  drawWinner();
}

// 미니맵 (왼쪽)
function drawMinimap(){
  const mw=46, pad=10;
  const mh=Math.min(CH*0.62, 360);
  const mx=pad, my=(CH-mh)/2;
  const s=mh/H;
  ctx.save();
  ctx.globalAlpha=0.9;
  ctx.fillStyle='rgba(10,20,30,.55)';
  ctx.strokeStyle='#1f6b4f'; ctx.lineWidth=1.5;
  roundRect(mx,my,mw,mh,8); ctx.fill(); ctx.stroke();
  // 공 점
  for(const b of balls){
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(mx+mw/2 + (b.x-W/2)*(mw/W), my+b.y*s, 2.2, 0, Math.PI*2);
    ctx.fill();
  }
  // 현재 화면 영역
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1;
  ctx.strokeRect(mx, my+camY*s, mw, (CH/scale)*s);
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// 순위표 (오른쪽)
function drawLeaderboard(){
  const order = rankOrder();
  const total = balls.length;
  ctx.save();
  ctx.textAlign='right';
  // 카운터
  ctx.font='800 22px sans-serif'; ctx.fillStyle='#cfd8e3';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText(finishOrder.length+' / '+total, CW-14, 30);
  // 목록
  ctx.font='800 19px sans-serif';
  let yy=64;
  order.forEach((b,i)=>{
    const rank=i+1;
    let prefix='';
    if(b.finished){ prefix = (b.place===1?'☆ ':'✔ '); }
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color; ctx.shadowBlur=8;
    ctx.fillText(prefix+b.name+'  #'+rank, CW-14, yy);
    yy+=33;
  });
  ctx.restore();
}

// 정렬: 완주자(순서) → 활성(아래일수록 앞)
function rankOrder(){
  const fin=[...finishOrder];
  const act=balls.filter(b=>!b.finished).sort((a,b)=>b.y-a.y);
  return fin.concat(act);
}

let winnerName=null, winnerColor=null, winnerShownAt=0;
function drawWinner(){
  if(finishOrder.length>0 && !winnerName){
    winnerName=finishOrder[0].name; winnerColor=finishOrder[0].color; winnerShownAt=performance.now();
    Audio2.fanfare();
  }
  if(!winnerName) return;
  const t=(performance.now()-winnerShownAt)/1000;
  const a=Math.min(1,t*2);
  ctx.save();
  ctx.globalAlpha=a;
  ctx.textAlign='right';
  ctx.font='800 30px sans-serif'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=6;
  ctx.fillText('Winner', CW-30, CH-110);
  ctx.font='900 56px sans-serif'; ctx.fillStyle=winnerColor;
  ctx.shadowColor=winnerColor; ctx.shadowBlur=24;
  ctx.fillText(winnerName, CW-30, CH-56);
  ctx.restore();
}

// ---------- 루프 ----------
let acc=0, last=0;
function loop(ts){
  if(!running) return;
  worldToScreen();
  step();
  updateCamera();
  render();
  // 모두 완주하면 종료
  if(finishOrder.length>=balls.length){
    running=false;
    document.getElementById('replayWrap').style.display='block';
    // 마지막 프레임 한번 더
    render();
    return;
  }
  requestAnimationFrame(loop);
}

function startRace(){
  const raw=document.getElementById('names').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let names=raw.slice(0,12);
  if(names.length<2){ alert('이름을 2명 이상 입력해주세요!'); return; }
  buildTrack();
  makeBalls(names);
  camY=0; winnerName=null; winnerColor=null;
  document.getElementById('setup').style.display='none';
  document.getElementById('replayWrap').style.display='none';
  document.getElementById('musicBtn').style.display='block';
  Audio2.init();
  running=true; startTime=performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', startRace);
document.getElementById('replay').addEventListener('click', ()=>{
  document.getElementById('replayWrap').style.display='none';
  document.getElementById('setup').style.display='flex';
});
document.getElementById('musicBtn').addEventListener('click', function(){
  const muted = Audio2.toggle();
  this.textContent = muted ? '🔇' : '🔊';
});

function ghClose(){ document.getElementById('ghOverlay').classList.remove('show'); }
function ghCopyLink(){
  var url=window.__ghPagesUrl||'';
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(t).catch(fb); } else { fb(); }
  function fb(){ var x=document.createElement('textarea'); x.value=url; document.body.appendChild(x); x.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(x); t(); }
  function t(){ var el=document.getElementById('ghToast'); el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1600); }
}
